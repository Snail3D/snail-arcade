<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snail Arcade</title>
<meta property="og:title" content="Snail Arcade">
<meta property="og:description" content="Play free browser games by SnailKing">
<meta property="og:type" content="website">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Courier New', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 1px solid #222;
  }
  .header h1 {
    font-size: 2.5em;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0,255,136,0.3);
  }
  .header p {
    color: #666;
    margin-top: 8px;
  }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 30px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .game-card {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .game-card:hover {
    border-color: #00ff88;
    transform: translateY(-2px);
  }
  .game-card a {
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .game-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3em;
  }
  .game-info {
    padding: 16px;
  }
  .game-info h3 {
    color: #00ff88;
    margin-bottom: 6px;
  }
  .game-info p {
    color: #888;
    font-size: 0.85em;
    line-height: 1.4;
  }
  .tag {
    display: inline-block;
    background: #1e1e1e;
    color: #00ff88;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75em;
    margin-top: 8px;
  }
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #444;
  }
  .empty-state p { font-size: 1.2em; }
</style>
</head>
<body>
  <div class="header">
    <h1>Snail Arcade</h1>
    <p>Browser games by SnailKing &mdash; playable anywhere, even Discord</p>
  </div>
  <div class="games-grid" id="games"></div>
  <div class="empty-state" id="empty" style="display:none;">
    <p>No games yet. Tell your AI to make one.</p>
  </div>
  <script>
    // Game registry — add entries here when new games are created
    const GAMES = [
      { slug: "snail-racer", title: "Snail Racer", emoji: "\u{1F40C}", desc: "Tap to race your snail to the finish line!", tags: ["arcade", "tap"] },
      { slug: "conveyor-crush", title: "Conveyor Crush", emoji: "🏭", desc: "Sort 3D printed parts into the right bins! Drag, tap, or press 1/2/3.", tags: ["arcade", "maker", "sorting"] },
      { slug: "neon-pong", title: "Neon Pong", emoji: "\u{1F3B1}", desc: "4-player neon pong with AI opponents!", tags: ["arcade", "pong", "neon"] },
      { slug: "bed-blaster", title: "Bed Blaster", emoji: "🐌🔥", desc: "Dodge blobs and clogs as you extrude across the print bed!", tags: ["arcade", "3d-printing", "shooter"] },
      { slug: "subscriber-surge", title: "Subscriber Surge", emoji: "📺", desc: "Build your YouTube empire — click, upgrade, hit milestones!", tags: ["arcade", "tycoon", "youtube"] },
      { slug: "context-collapse", title: "Context Collapse", emoji: "🤖💀", desc: "Navigate the neural net maze. Avoid THINK blocks — stay under the context limit!", tags: ["arcade", "llm", "puzzle"] },
      { slug: "snail-snake", title: "Snail Snake", emoji: "\u{1F40C}", desc: "Classic snake game with a snail twist!", tags: ["arcade", "snake"] },
      { slug: "space-invaders", title: "Space Invaders", emoji: "\u{1F47E}", desc: "Defend Earth from alien invaders!", tags: ["arcade", "shooter"] },
      { slug: "hang-on", title: "Hang-On", emoji: "\u{1F3C1}", desc: "1985 arcade racing clone!", tags: ["arcade", "racing"] },
      { slug: "donkey-kong-mobile", title: "Donkey Kong Mobile", emoji: "\u{1F435}", desc: "Classic DK platforming action on the go!", tags: ["arcade", "platformer"] },
      { slug: "battleship-blitz", title: "Battleship Blitz", emoji: "\u{1F6A2}", desc: "Naval combat strategy!", tags: ["arcade", "strategy"] },
      { slug: "tetris", title: "Snail Tetris", emoji: "\u{1F500}", desc: "Classic block stacking with neon cyberpunk style!", tags: ["arcade", "puzzle"] },
      { slug: "notblast", title: "NotBlast", emoji: "\u{1F4AA}", desc: "Match blocks to clear lines and score big!", tags: ["arcade", "puzzle"] },
      { slug: "hot-solder-station", title: "Hot Solder Station", emoji: "🔥", desc: "Match circuit pads before the board overheats!", tags: ["arcade", "maker", "puzzle"] },
      { slug: "nozzle-nexus", title: "Nozzle Nexus", emoji: "🔩", desc: "Dodge filament tangles & molten gunk as the print head fights for survival!", tags: ["arcade", "3d-printing", "shooter"] },
      { slug: "layer-of-faith", title: "Layer of Faith", emoji: "🐌", desc: "Watch the print build layer by layer — tap to fix shifts, clogs, and heat loss!", tags: ["arcade", "3d-printing", "faith"] },
      { slug: "gcode-gauntlet", title: "GCode Gauntlet", emoji: "🖨️", desc: "Trace the G-code path — dodge blobs, dust, tangles and thermal events!", tags: ["arcade", "3d-printing", "survival"] },
      { slug: "entropy-engine", title: "Entropy Engine", emoji: "⚙️", desc: "Balance heat, flow & retraction as chaos mounts layer by layer!", tags: ["arcade", "3d-printing", "survival"] },
      { slug: "filament-of-faith", title: "Filament of Faith", emoji: "✝️", desc: "Guide the print head through heat, blobs, and chaos. Keep the faith alive — layer by layer.", tags: ["arcade", "3d-printing", "faith"] },
      { slug: "token-trek", title: "Token Trek", emoji: "🧠", desc: "Navigate the LLM context maze. Collect word tokens, stay under the context limit, reach the goal!", tags: ["arcade", "llm", "puzzle"] },
      { slug: "belay-of-faith", title: "Belay of Faith", emoji: "🧗", desc: "Climb higher, maker. Dodge falling tools, collect blessing sparks, keep the faith alive.", tags: ["arcade", "faith", "climb"] },
      { slug: "thermal-runaway", title: "Thermal Runaway", emoji: "🔥", desc: "Defend the hotend from jams, clogs & heat creep. Tower defense meets 3D printing!", tags: ["arcade", "3d-printing", "tower-defense"] },
    { slug: "snail-siege", title: "Snail Siege", emoji: "🐌🪿", desc: "Defend your lettuce patch from salt, beetles & birds! Survive wave after wave!", tags: ["arcade", "snail", "survival", "shooter"] },
    { slug: "stepper-dash", title: "Stepper Dash", emoji: "⚙️", desc: "Race along the filament track — dodge blobs, tangles & heat waves!", tags: ["arcade", "maker", "runner"] },
    { slug: "comment-cascade", title: "Comment Cascade", emoji: "💬", desc: "Moderate live chat! Catch hate comments before they hit bottom, avoid spam, and keep the vibe positive!", tags: ["arcade", "youtube", "moderation"] },
    { slug: "z-hop-dash", title: "Z-Hop Dash", emoji: "⚡", desc: "Dodge z-hop artifacts, filament tangles & heat waves as the print head races forward!", tags: ["arcade", "3d-printing", "runner"] },
    { slug: "slicer-sweep", title: "Slicer Sweep", emoji: "🖨️", desc: "Choose the right infill pattern — lines, grid, gyroid — to print parts strong enough!", tags: ["arcade", "3d-printing", "puzzle"] },
    { slug: "snail-crawl", title: "Snail Crawl", emoji: "🐌", desc: "Guide your snail through the garden — dodge salt, beetles & birds!", tags: ["arcade", "snail", "runner"] },
    { slug: "resurrection-protocol", title: "Resurrection Protocol", emoji: "🖨️👻", desc: "Fight ghosts of failed prints — blob berserkers, stringer phantoms & layer-shift liches. Every death is a new layer.", tags: ["arcade", "3d-printing", "shooter", "survival"] },
    { slug: "print-jam", title: "Print Jam", emoji: "🖨️🧩", desc: "Fit the pieces, clear the plate! Tetromino-style shape fitting with 3D printing flavor.", tags: ["arcade", "3d-printing", "puzzle"] },
  ];

    const grid = document.getElementById('games');
    const empty = document.getElementById('empty');

    if (GAMES.length === 0) {
      empty.style.display = 'block';
    } else {
      GAMES.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';
        const link = document.createElement('a');
        link.href = 'games/' + g.slug + '/index.html';

        const thumb = document.createElement('div');
        thumb.className = 'game-thumb';
        thumb.textContent = g.emoji || '\u{1F3AE}';

        const info = document.createElement('div');
        info.className = 'game-info';
        const title = document.createElement('h3');
        title.textContent = g.title;
        const desc = document.createElement('p');
        desc.textContent = g.desc;
        info.appendChild(title);
        info.appendChild(desc);
        (g.tags || []).forEach(t => {
          const tag = document.createElement('span');
          tag.className = 'tag';
          tag.textContent = t;
          info.appendChild(tag);
        });

        link.appendChild(thumb);
        link.appendChild(info);
        card.appendChild(link);
        grid.appendChild(card);
      });
    }
  </script>
</body>
</html>
