  body {

    z-index: 0;
    pointer-events: none;
  }

  .games-grid {

    gap: 20px;
    padding: 30px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .game-card {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .game-card:hover {
    border-color: #00ff88;
    transform: translateY(-2px);
  }
  .game-card a {
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .game-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3em;

  .game-info {

  .game-info h3 {

  }
  .game-info p {
    color: #888;
    font-size: 0.85em;
    line-height: 1.4;

  .tag {

    background: #1e1e1e;
    color: #00ff88;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75em;
    margin-top: 8px;
  }
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #444;

  .empty-state p { font-size: 1.2em; }

    if (GAMES.length === 0) {

    } else {
      GAMES.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';
        const link = document.createElement('a');
        link.href = 'games/' + g.slug + '/index.html';

        const thumb = document.createElement('div');
        thumb.className = 'game-thumb';
        thumb.textContent = g.emoji || '\u{1F3AE}';

        const info = document.createElement('div');
        info.className = 'game-info';
        const title = document.createElement('h3');
        title.textContent = g.title;
        const desc = document.createElement('p');
        desc.textContent = g.desc;
        info.appendChild(title);
        info.appendChild(desc);
        (g.tags || []).forEach(t => {
          const tag = document.createElement('span');
          tag.className = 'tag';
          tag.textContent = t;
          info.appendChild(tag);
        });

        link.appendChild(thumb);
        link.appendChild(info);
        card.appendChild(link);
        grid.appendChild(card);
      });
