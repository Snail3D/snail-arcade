<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Battleship Blitz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            touch-action: none;
        }
        h1 {
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin: 12px 0 6px;
            text-shadow: 0 0 8px #0f0;
        }
        #status {
            text-align: center;
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: #0a0;
            margin-bottom: 10px;
            min-height: 1.4em;
        }
        .boards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .board-section { display: flex; flex-direction: column; align-items: center; }
        .board-label {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            margin-bottom: 6px;
            color: #0a0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, clamp(26px, 6vw, 34px));
            grid-template-rows: repeat(10, clamp(26px, 6vw, 34px));
            gap: 1px;
            border: 2px solid #0f0;
            background: #0f0;
        }
        .cell {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(10px, 2.5vw, 14px);
            cursor: default;
        }
        .enemy-board .cell { cursor: crosshair; }
        .cell.miss { background: #010a0a; }
        .cell.miss::after { content: '·'; color: #0a0; font-size: 1.2em; }
        .cell.hit { background: #200; }
        .cell.hit::after { content: 'X'; color: #f60; font-weight: bold; }
        .cell.sunk { background: #300; }
        .cell.sunk::after { content: '#'; color: #f00; }
        .cell.ship { background: #001000; border: 1px solid #0a0; }
        .cell.ship::after { content: '▪'; color: #0f0; }
        .panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 12px 0;
        }
        .panel-item {
            background: #010;
            border: 1px solid #0a0;
            padding: 6px 12px;
            text-align: center;
            min-width: 80px;
        }
        .panel-label { font-size: 0.65rem; color: #0a0; }
        .panel-value { font-size: 1rem; text-shadow: 0 0 5px #0f0; }
        #fleet { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
        .fleet-col { text-align: left; }
        .ship-row { font-size: 0.7rem; display: flex; justify-content: space-between; gap: 8px; }
        .ship-name { color: #0a0; }
        .ship-hits { color: #f60; }
        button {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            cursor: pointer;
            margin: 8px 0;
        }
        button:hover { background: #0f0; color: #000; }
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        #modal h2 { font-size: clamp(1.5rem, 5vw, 3rem); margin-bottom: 10px; }
        #modal h2.victory { color: #0f0; text-shadow: 0 0 20px #0f0; }
        #modal h2.defeat { color: #f00; text-shadow: 0 0 20px #f00; }
        #modal p { font-size: 0.9rem; color: #0a0; margin-bottom: 8px; }
        @media (max-width: 600px) {
            .boards { gap: 12px; }
        }
    </style>
</head>
<body>
    <h1>BATTLESHIP BLITZ</h1>
    <div id="status">CLICK ENEMY GRID TO FIRE</div>

    <div class="boards">
        <div class="board-section">
            <div class="board-label">ENEMY WATERS</div>
            <div class="grid enemy-board" id="enemyGrid"></div>
        </div>
        <div class="board-section">
            <div class="board-label">YOUR FLEET</div>
            <div class="grid player-board" id="playerGrid"></div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-item"><div class="panel-label">SHOTS</div><div class="panel-value" id="shots">0</div></div>
        <div class="panel-item"><div class="panel-label">HITS</div><div class="panel-value" id="hits">0</div></div>
        <div class="panel-item"><div class="panel-label">ACC</div><div class="panel-value" id="acc">0%</div></div>
    </div>

    <div id="fleet"></div>
    <button onclick="newGame()">NEW GAME</button>

    <div id="modal">
        <h2 id="modalTitle"></h2>
        <p id="modalStats"></p>
        <button onclick="newGame()">PLAY AGAIN</button>
    </div>

<script>
const SHIPS = [
    { id: 'carrier',    name: 'Carrier',    size: 5 },
    { id: 'battleship', name: 'Battleship', size: 4 },
    { id: 'cruiser',    name: 'Cruiser',    size: 3 },
    { id: 'submarine',  name: 'Submarine',  size: 3 },
    { id: 'destroyer',  name: 'Destroyer',  size: 2 }
];
const SIZE = 10;

let pBoard, eBoard, pShips, eShips;
let gameOn, pTurn, shots, hits;
let aiHunt, aiQueue;

function mkBoard() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(null).map(() => ({ ship: null, hit: false })));
}

function canPlace(b, r, c, sz, h) {
    if (h) { if (c + sz > SIZE) return false; for (let i = 0; i < sz; i++) if (b[r][c + i].ship) return false; }
    else   { if (r + sz > SIZE) return false; for (let i = 0; i < sz; i++) if (b[r + i][c].ship) return false; }
    return true;
}

function place(b, ships, r, c, sz, h, id) {
    const pos = [];
    for (let i = 0; i < sz; i++) {
        const rr = h ? r : r + i;
        const cc = h ? c + i : c;
        b[rr][cc].ship = id;
        pos.push([rr, cc]);
    }
    ships[id] = { pos, hits: 0, sunk: false };
}

function randomPlace(b, ships, sz, id) {
    let a = 0;
    while (a < 200) {
        const h = Math.random() < 0.5;
        const r = Math.floor(Math.random() * SIZE);
        const c = Math.floor(Math.random() * SIZE);
        if (canPlace(b, r, c, sz, h)) { place(b, ships, r, c, sz, h, id); return true; }
        a++;
    }
    return false;
}

function sunk(ships, id) {
    const s = ships[id];
    if (!s || s.sunk) return false;
    const sh = SHIPS.find(x => x.id === id);
    return s.hits >= sh.size;
}

function renderGrid(el, board, enemy) {
    el.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r;
            cell.dataset.c = c;
            if (enemy) cell.addEventListener('click', () => fire(r, c));
            el.appendChild(cell);
        }
    }
}

function draw() {
    const eCells = document.querySelectorAll('#enemyGrid .cell');
    const pCells = document.querySelectorAll('#playerGrid .cell');

    eCells.forEach((cell, i) => {
        const r = Math.floor(i / SIZE);
        const c = i % SIZE;
        const d = eBoard[r][c];
        cell.className = 'cell';
        if (d.hit) cell.classList.add(d.ship ? 'hit' : 'miss');
        if (d.hit && d.ship && sunk(eShips, d.ship)) cell.classList.add('sunk');
    });

    pCells.forEach((cell, i) => {
        const r = Math.floor(i / SIZE);
        const c = i % SIZE;
        const d = pBoard[r][c];
        cell.className = 'cell';
        if (d.hit) {
            cell.classList.add(d.ship ? 'hit' : 'miss');
            if (d.ship && sunk(pShips, d.ship)) cell.classList.add('sunk');
        } else if (d.ship) {
            cell.classList.add('ship');
        }
    });

    document.getElementById('shots').textContent = shots;
    document.getElementById('hits').textContent = hits;
    document.getElementById('acc').textContent = shots ? Math.round(hits / shots * 100) + '%' : '0%';

    const fleet = document.getElementById('fleet');
    fleet.innerHTML = '';
    const pDiv = document.createElement('div');
    pDiv.className = 'fleet-col';
    SHIPS.forEach(s => {
        const row = document.createElement('div');
        row.className = 'ship-row';
        const nm = document.createElement('span');
        nm.className = 'ship-name';
        nm.textContent = s.name;
        const hp = document.createElement('span');
        hp.className = 'ship-hits';
        const ps = pShips[s.id];
        if (ps && ps.sunk) hp.textContent = 'SUNK';
        else if (ps) hp.textContent = '▪'.repeat(ps.hits) + '▷'.repeat(s.size - ps.hits);
        else hp.textContent = '▷'.repeat(s.size);
        row.appendChild(nm); row.appendChild(hp); pDiv.appendChild(row);
    });
    fleet.appendChild(pDiv);

    const eDiv = document.createElement('div');
    eDiv.className = 'fleet-col';
    SHIPS.forEach(s => {
        const row = document.createElement('div');
        row.className = 'ship-row';
        const nm = document.createElement('span');
        nm.className = 'ship-name';
        nm.textContent = s.name;
        const hp = document.createElement('span');
        hp.className = 'ship-hits';
        const es = eShips[s.id];
        if (es && es.sunk) hp.textContent = 'SUNK';
        else if (es) hp.textContent = '▪'.repeat(es.hits) + '▷'.repeat(s.size - es.hits);
        else hp.textContent = '▷'.repeat(s.size);
        row.appendChild(nm); row.appendChild(hp); eDiv.appendChild(row);
    });
    fleet.appendChild(eDiv);
}

function setStatus(msg) {
    document.getElementById('status').textContent = msg;
}

function fire(r, c) {
    if (!gameOn || !pTurn) return;
    if (eBoard[r][c].hit) return;

    shots++;
    eBoard[r][c].hit = true;

    if (eBoard[r][c].ship) {
        hits++;
        const id = eBoard[r][c].ship;
        eShips[id].hits++;
        if (sunk(eShips, id)) { eShips[id].sunk = true; setStatus(SHMS[id].name + ' SUNK!'); }
        else setStatus('HIT!');
    } else {
        setStatus('MISS — ENEMY MOVING');
        pTurn = false;
        setTimeout(aiTurn, 700);
    }

    draw();
    if (SHIPS.every(s => eShips[s.id].sunk)) { endGame(true); return; }
}

function aiTurn() {
    if (!gameOn) return;
    let r, c;

    if (!aiHunt && aiQueue.length > 0) {
        const t = aiQueue.shift();
        r = t[0]; c = t[1];
    } else {
        aiHunt = true;
        r = Math.floor(Math.random() * SIZE);
        c = Math.floor(Math.random() * SIZE);
    }

    while (pBoard[r][c].hit) {
        if (!aiHunt && aiQueue.length > 0) {
            const t = aiQueue.shift(); r = t[0]; c = t[1];
        } else {
            r = Math.floor(Math.random() * SIZE);
            c = Math.floor(Math.random() * SIZE);
        }
    }

    pBoard[r][c].hit = true;
    const hit = pBoard[r][c].ship;
    if (hit) {
        aiHunt = false;
        const id = pBoard[r][c].ship;
        pShips[id].hits++;
        if (sunk(pShips, id)) { pShips[id].sunk = true; setStatus('ENEMY SUNK YOUR ' + SHIPS[id].name.toUpperCase() + '!'); aiHunt = true; aiQueue = []; }
        else { setStatus('ENEMY HIT YOUR ' + SHIPS[id].name.toUpperCase() + '!'); addQueue(r, c); }
    } else {
        setStatus('ENEMY MISSED AT ' + String.fromCharCode(65 + c) + (r + 1));
    }

    draw();
    if (SHIPS.every(s => pShips[s.id].sunk)) { endGame(false); return; }
    pTurn = true;
}

function addQueue(r, c) {
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr, dc]) => {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && !pBoard[nr][nc].hit) {
            aiQueue.push([nr, nc]);
        }
    });
}

function endGame(win) {
    gameOn = false;
    const modal = document.getElementById('modal');
    const title = document.getElementById('modalTitle');
    const stats = document.getElementById('modalStats');
    title.textContent = win ? 'VICTORY' : 'DEFEATED';
    title.className = win ? 'victory' : 'defeat';
    stats.innerHTML = 'Shots: ' + shots + ' — Hits: ' + hits + ' — Accuracy: ' + (shots ? Math.round(hits/shots*100) : 0) + '%';
    modal.style.display = 'flex';
}

function newGame() {
    document.getElementById('modal').style.display = 'none';
    pBoard = mkBoard();
    eBoard = mkBoard();
    pShips = {};
    eShips = {};
    SHIPS.forEach(s => { randomPlace(pBoard, pShips, s.size, s.id); randomPlace(eBoard, eShips, s.size, s.id); });
    gameOn = true; pTurn = true; shots = 0; hits = 0; aiHunt = true; aiQueue = [];
    renderGrid(document.getElementById('enemyGrid'), eBoard, true);
    renderGrid(document.getElementById('playerGrid'), pBoard, false);
    draw();
    setStatus('YOUR TURN — SELECT TARGET');
}

newGame();
</script>
</body>
</html>
