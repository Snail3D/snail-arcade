<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Battleship Blitz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: #0f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.15),
                    rgba(0, 0, 0, 0.15) 1px,
                    transparent 1px,
                    transparent 2px
                );
        }

        .crt-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                rgba(0, 15, 0, 0.3) 90%
            );
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 0, 0.1);
            animation: scanline 8s linear infinite;
            z-index: 1001;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { top: -4px; }
            100% { top: 100%; }
        }

        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #001a00 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .intro-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 40px #0f0;
            margin-bottom: 20px;
            text-align: center;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            95% { opacity: 0.9; }
            96% { opacity: 1; }
        }

        .intro-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: #0a0;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 3px;
        }

        .intro-radar {
            width: 200px;
            height: 200px;
            border: 3px solid #0f0;
            border-radius: 50%;
            position: relative;
            margin-bottom: 40px;
            box-shadow: 0 0 20px #0f0, inset 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .intro-radar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, rgba(0, 255, 0, 0.8), transparent);
            transform-origin: left center;
            animation: radar-sweep 2s linear infinite;
        }

        @keyframes radar-sweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            padding: 15px 50px;
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .start-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 30px #0f0;
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            min-height: 100vh;
        }

        .game-header {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            padding: 10px;
            width: 100%;
        }

        .game-title {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 700;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 5px;
        }

        .game-status {
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: #0a0;
            letter-spacing: 2px;
            min-height: 1.5em;
        }

        .game-boards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
            width: 100%;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .board-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #0f0;
            letter-spacing: 2px;
        }

        .grid-wrapper {
            position: relative;
            padding: 15px;
            background: rgba(0, 20, 0, 0.5);
            border: 2px solid #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
        }

        .cell {
            width: clamp(26px, 6vw, 36px);
            height: clamp(26px, 6vw, 36px);
            background: rgba(0, 40, 0, 0.3);
            border: 1px solid #0a0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(10px, 2.5vw, 14px);
            cursor: default;
            transition: all 0.2s;
        }

        .cell.coordinate {
            background: transparent;
            border-color: transparent;
            color: #0a0;
            font-size: 0.7em;
        }

        .enemy-board .cell:not(.coordinate) {
            cursor: crosshair;
        }

        .cell.miss {
            background: rgba(0, 40, 40, 0.5);
        }

        .cell.miss::after {
            content: '·';
            color: #0a0;
        }

        .cell.hit {
            background: rgba(255, 50, 0, 0.4);
            box-shadow: inset 0 0 10px rgba(255, 100, 0, 0.5);
        }

        .cell.hit::after {
            content: '✕';
            color: #f60;
            font-weight: bold;
        }

        .cell.sunk {
            background: rgba(255, 0, 0, 0.3);
        }

        .cell.sunk::after {
            content: '█';
            color: #f00;
        }

        .cell.ship {
            background: rgba(0, 60, 0, 0.5);
            border-color: #0f0;
        }

        .cell.ship::after {
            content: '▪';
            color: #0f0;
        }

        .game-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            width: 100%;
        }

        .panel-section {
            background: rgba(0, 20, 0, 0.5);
            border: 1px solid #0a0;
            padding: 10px 15px;
            min-width: 150px;
            text-align: center;
        }

        .panel-label {
            font-size: 0.7rem;
            color: #0a0;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .panel-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #0f0;
        }

        .fleet-status {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }

        .ship-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
        }

        .ship-name {
            color: #0a0;
        }

        .ship-hits {
            color: #f60;
        }

        .game-controls {
            margin: 15px 0;
        }

        .control-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            padding: 10px 30px;
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        #game-over-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .game-over-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-over-title.victory {
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
        }

        .game-over-title.defeat {
            color: #f00;
            text-shadow: 0 0 20px #f00;
        }

        .game-over-stats {
            font-size: 1rem;
            color: #0a0;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.8;
        }

        @media (max-width: 600px) {
            .game-boards {
                gap: 10px;
            }

            .grid-wrapper {
                padding: 8px;
            }

            .cell {
                width: clamp(24px, 8vw, 32px);
                height: clamp(24px, 8vw, 32px);
            }

            .panel-section {
                min-width: 120px;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="scanline"></div>

    <div id="intro-screen">
        <h1 class="intro-title">BATTLESHIP BLITZ</h1>
        <p class="intro-subtitle">NORAD RADAR COMMAND CENTER</p>
        <div class="intro-radar"></div>
        <button class="start-btn" id="start-btn">INITIATE BATTLE</button>
    </div>

    <div id="game-container">
        <div class="game-header">
            <h1 class="game-title">BATTLESHIP BLITZ</h1>
            <div class="game-status" id="game-status">AWAITING INITIALIZATION...</div>
        </div>

        <div class="game-boards">
            <div class="board-container">
                <div class="board-label">ENEMY WATERS</div>
                <div class="grid-wrapper enemy-board">
                    <div class="grid" id="enemy-grid"></div>
                </div>
            </div>
            <div class="board-container">
                <div class="board-label">YOUR FLEET</div>
                <div class="grid-wrapper player-board">
                    <div class="grid" id="player-grid"></div>
                </div>
            </div>
        </div>

        <div class="game-panel">
            <div class="panel-section">
                <div class="panel-label">SHOTS FIRED</div>
                <div class="panel-value" id="shots-fired">0</div>
            </div>
            <div class="panel-section">
                <div class="panel-label">ACCURACY</div>
                <div class="panel-value" id="accuracy">0%</div>
            </div>
            <div class="panel-section">
                <div class="panel-label">ENEMY FLEET</div>
                <div class="fleet-status" id="enemy-fleet"></div>
            </div>
            <div class="panel-section">
                <div class="panel-label">YOUR FLEET</div>
                <div class="fleet-status" id="player-fleet"></div>
            </div>
        </div>

        <div class="game-controls">
            <button class="control-btn" id="new-game-btn">NEW GAME</button>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 class="game-over-title" id="game-over-title">VICTORY</h1>
        <div class="game-over-stats" id="game-over-stats"></div>
        <button class="start-btn" id="play-again-btn">PLAY AGAIN</button>
    </div>

    <script>
        const SHIPS = {
            carrier: { name: 'Carrier', size: 5 },
            battleship: { name: 'Battleship', size: 4 },
            cruiser: { name: 'Cruiser', size: 3 },
            submarine: { name: 'Submarine', size: 3 },
            destroyer: { name: 'Destroyer', size: 2 }
        };

        const GRID_SIZE = 10;

        let playerBoard = [];
        let enemyBoard = [];
        let playerShips = {};
        let enemyShips = {};
        let gameActive = false;
        let playerTurn = true;
        let shotsFired = 0;
        let hitsCount = 0;

        let aiHuntMode = true;
        let aiTargetQueue = [];

        function initBoard() {
            playerBoard = [];
            enemyBoard = [];
            playerShips = {};
            enemyShips = {};

            for (let i = 0; i < GRID_SIZE; i++) {
                playerBoard[i] = [];
                enemyBoard[i] = [];
                for (let j = 0; j < GRID_SIZE; j++) {
                    playerBoard[i][j] = { ship: null, hit: false };
                    enemyBoard[i][j] = { ship: null, hit: false };
                }
            }
        }

        function canPlaceShip(board, row, col, size, horizontal, shipId) {
            if (horizontal) {
                if (col + size > GRID_SIZE) return false;
                for (let i = 0; i < size; i++) {
                    if (board[row][col + i].ship) return false;
                }
            } else {
                if (row + size > GRID_SIZE) return false;
                for (let i = 0; i < size; i++) {
                    if (board[row + i][col].ship) return false;
                }
            }
            return true;
        }

        function placeShip(board, ships, row, col, size, horizontal, shipId) {
            const positions = [];
            for (let i = 0; i < size; i++) {
                if (horizontal) {
                    board[row][col + i].ship = shipId;
                    positions.push({ row: row, col: col + i });
                } else {
                    board[row + i][col].ship = shipId;
                    positions.push({ row: row + i, col: col });
                }
            }
            ships[shipId] = { positions: positions, hits: 0, sunk: false };
        }

        function randomPlacement(board, ships, size, shipId) {
            const horizontal = Math.random() < 0.5;
            let row, col;
            let attempts = 0;
            const maxAttempts = 100;

            do {
                row = Math.floor(Math.random() * GRID_SIZE);
                col = Math.floor(Math.random() * GRID_SIZE);
                attempts++;
            } while (!canPlaceShip(board, row, col, size, horizontal, shipId) && attempts < maxAttempts);

            if (attempts < maxAttempts) {
                placeShip(board, ships, row, col, size, horizontal, shipId);
                return true;
            }
            return false;
        }

        function placeAllShips(board, ships) {
            const shipKeys = Object.keys(SHIPS);
            for (const key of shipKeys) {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 100) {
                    placed = randomPlacement(board, ships, SHIPS[key].size, key);
                    attempts++;
                }
                if (!placed) return false;
            }
            return true;
        }

        function renderGrid(boardElement, board, isEnemy) {
            boardElement.innerHTML = '';

            const emptyCoord = document.createElement('div');
            emptyCoord.className = 'cell coordinate';
            emptyCoord.textContent = ' ';
            boardElement.appendChild(emptyCoord);

            for (let c = 0; c < GRID_SIZE; c++) {
                const coordCol = document.createElement('div');
                coordCol.className = 'cell coordinate';
                coordCol.textContent = String.fromCharCode(65 + c);
                boardElement.appendChild(coordCol);
            }

            for (let r = 0; r < GRID_SIZE; r++) {
                const coordRowLabel = document.createElement('div');
                coordRowLabel.className = 'cell coordinate';
                coordRowLabel.textContent = r + 1;
                boardElement.appendChild(coordRowLabel);

                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    if (isEnemy) {
                        cell.addEventListener('click', handleEnemyClick);
                        cell.addEventListener('touchend', handleEnemyClick);
                    }

                    boardElement.appendChild(cell);
                }
            }
        }

        function updateGridDisplay(boardElement, board, isEnemy) {
            const cells = boardElement.querySelectorAll('.cell:not(.coordinate)');
            let cellIndex = 0;

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cellData = board[r][c];
                    const cell = cells[cellIndex];
                    cellIndex++;

                    cell.className = 'cell';

                    if (cellData.hit) {
                        if (cellData.ship) {
                            cell.classList.add('hit');
                            if (isShipSunk(isEnemy ? enemyShips : playerShips, cellData.ship)) {
                                cell.classList.add('sunk');
                            }
                        } else {
                            cell.classList.add('miss');
                        }
                    } else if (!isEnemy && cellData.ship) {
                        cell.classList.add('ship');
                    }
                }
            }
        }

        function isShipSunk(ships, shipId) {
            const ship = ships[shipId];
            if (!ship || ship.sunk) return false;
            return ship.hits >= SHIPS[shipId].size;
        }

        function handleEnemyClick(e) {
            e.preventDefault();
            if (!gameActive || !playerTurn) return;

            const cell = e.target;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);

            if (isNaN(row) || isNaN(col)) return;
            if (enemyBoard[row][col].hit) return;

            playerFire(row, col);
        }

        function playerFire(row, col) {
            shotsFired++;
            enemyBoard[row][col].hit = true;

            const hit = enemyBoard[row][col].ship !== null;
            if (hit) {
                hitsCount++;
                const shipId = enemyBoard[row][col].ship;
                enemyShips[shipId].hits++;

                if (isShipSunk(enemyShips, shipId)) {
                    enemyShips[shipId].sunk = true;
                    setStatus('ENEMY ' + SHIPS[shipId].name.toUpperCase() + ' DESTROYED!');
                } else {
                    setStatus('HIT! Enemy ' + SHIPS[shipId].name + ' damaged.');
                }
            } else {
                setStatus('MISS! No enemy vessel at coordinates.');
            }

            updateDisplay();

            if (checkVictory()) {
                endGame(true);
                return;
            }

            playerTurn = false;
            setTimeout(aiTurn, 800);
        }

        function aiTurn() {
            if (!gameActive) return;

            let row, col;

            if (!aiHuntMode && aiTargetQueue.length > 0) {
                const target = aiTargetQueue.shift();
                row = target.row;
                col = target.col;
            } else {
                aiHuntMode = true;
                row = Math.floor(Math.random() * GRID_SIZE);
                col = Math.floor(Math.random() * GRID_SIZE);
            }

            while (playerBoard[row][col].hit) {
                if (!aiHuntMode && aiTargetQueue.length > 0) {
                    const target = aiTargetQueue.shift();
                    row = target.row;
                    col = target.col;
                } else {
                    row = Math.floor(Math.random() * GRID_SIZE);
                    col = Math.floor(Math.random() * GRID_SIZE);
                }
            }

            playerBoard[row][col].hit = true;
            const hit = playerBoard[row][col].ship !== null;

            if (hit) {
                aiHuntMode = false;
                const shipId = playerBoard[row][col].ship;
                playerShips[shipId].hits++;

                if (isShipSunk(playerShips, shipId)) {
                    playerShips[shipId].sunk = true;
                    setStatus('ENEMY DESTROYED YOUR ' + SHIPS[shipId].name.toUpperCase() + '!');
                    aiHuntMode = true;
                    aiTargetQueue = [];
                } else {
                    addTargetQueue(row, col);
                    setStatus('ENEMY HIT YOUR ' + SHIPS[shipId].name + '!');
                }
            } else {
                setStatus('Enemy missed at ' + String.fromCharCode(65 + col) + (row + 1) + '.');
            }

            updateDisplay();

            if (checkDefeat()) {
                endGame(false);
                return;
            }

            playerTurn = true;
        }

        function addTargetQueue(row, col) {
            const offsets = [
                { r: -1, c: 0 },
                { r: 1, c: 0 },
                { r: 0, c: -1 },
                { r: 0, c: 1 }
            ];

            for (const offset of offsets) {
                const newRow = row + offset.r;
                const newCol = col + offset.c;

                if (
                    newRow >= 0 && newRow < GRID_SIZE &&
                    newCol >= 0 && newCol < GRID_SIZE &&
                    !playerBoard[newRow][newCol].hit
                ) {
                    aiTargetQueue.push({ row: newRow, col: newCol });
                }
            }
        }

        function checkVictory() {
            for (const shipId in enemyShips) {
                if (!enemyShips[shipId].sunk) return false;
            }
            return true;
        }

        function checkDefeat() {
            for (const shipId in playerShips) {
                if (!playerShips[shipId].sunk) return false;
            }
            return true;
        }

        function updateDisplay() {
            updateGridDisplay(
                document.getElementById('enemy-grid'),
                enemyBoard,
                true
            );
            updateGridDisplay(
                document.getElementById('player-grid'),
                playerBoard,
                false
            );

            document.getElementById('shots-fired').textContent = shotsFired;
            const accuracy = shotsFired > 0 ? Math.round((hitsCount / shotsFired) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';

            updateFleetStatus('enemy-fleet', enemyShips);
            updateFleetStatus('player-fleet', playerShips);
        }

        function updateFleetStatus(elementId, ships) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';

            for (const shipId in SHIPS) {
                const ship = ships[shipId];
                const shipInfo = SHIPS[shipId];

                const div = document.createElement('div');
                div.className = 'ship-status';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'ship-name';
                nameSpan.textContent = shipInfo.name;

                const hitsSpan = document.createElement('span');
                hitsSpan.className = 'ship-hits';

                if (ship && ship.sunk) {
                    hitsSpan.textContent = 'SUNK';
                } else if (ship) {
                    hitsSpan.textContent = '\u2666'.repeat(ship.hits) + '\u2665'.repeat(shipInfo.size - ship.hits);
                } else {
                    hitsSpan.textContent = '\u2665'.repeat(shipInfo.size);
                }

                div.appendChild(nameSpan);
                div.appendChild(hitsSpan);
                container.appendChild(div);
            }
        }

        function setStatus(message) {
            document.getElementById('game-status').textContent = message;
        }

        function endGame(victory) {
            gameActive = false;

            const screen = document.getElementById('game-over-screen');
            const title = document.getElementById('game-over-title');
            const stats = document.getElementById('game-over-stats');

            title.className = 'game-over-title ' + (victory ? 'victory' : 'defeat');
            title.textContent = victory ? 'VICTORY' : 'DEFEAT';

            const accuracy = shotsFired > 0 ? Math.round((hitsCount / shotsFired) * 100) : 0;
            stats.innerHTML = 'Shots Fired: ' + shotsFired + '<br>' +
                'Direct Hits: ' + hitsCount + '<br>' +
                'Accuracy: ' + accuracy + '%<br>' +
                (victory ? 'All enemy vessels destroyed!' : 'Your fleet has been destroyed.');

            screen.style.display = 'flex';
        }

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';

            initBoard();

            let placed = false;
            while (!placed) {
                initBoard();
                placed = placeAllShips(enemyBoard, enemyShips) && placeAllShips(playerBoard, playerShips);
            }

            gameActive = true;
            playerTurn = true;
            shotsFired = 0;
            hitsCount = 0;
            aiHuntMode = true;
            aiTargetQueue = [];

            renderGrid(document.getElementById('enemy-grid'), enemyBoard, true);
            renderGrid(document.getElementById('player-grid'), playerBoard, false);
            updateDisplay();

            setStatus('YOUR TURN - SELECT TARGET COORDINATES');
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('play-again-btn').addEventListener('click', startGame);
        document.getElementById('new-game-btn').addEventListener('click', startGame);
    </script>
</body>
</html>
