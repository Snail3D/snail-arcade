<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pong Bug - Snail Twist</title>
<style>body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#111;}canvas{background:#222;}</style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<script>
const canvas=document.getElementById('game');const ctx=canvas.getContext('2d');
let paddleWidth=20,paddleHeight=100;
let leftPaddle={x:10,y:canvas.height/2-paddleHeight/2,speed:5};
let rightPaddle={x:canvas.width-paddleWidth-20,y:canvas.height/2-paddleHeight/2,speed:5};
let ball={x:canvas.width/2,y:canvas.height/2,vx:5,vy:2};
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#0f0';ctx.fillRect(leftPaddle.x,leftPaddle.y,paddleWidth,paddleHeight);
// snail head
ctx.fillStyle='#ff0';ctx.fillRect(leftPaddle.x,leftPaddle.y-15,10,15);
ctx.fillRect(rightPaddle.x,rightPaddle.y,paddleWidth,paddleHeight);
ctx.arc(ball.x,ball.y,10,0,Math.PI*2);ctx.fillStyle='#ff0';ctx.fill();
if(ball.y+10>canvas.height||ball.y-10<0)ball.vy=-ball.vy;
if(ball.x-10<leftPaddle.x+paddleWidth&&ball.y>leftPaddle.y&&ball.y<leftPaddle.y+paddleHeight){ball.vx=-ball.vx+0.1;ball.x=leftPaddle.x+paddleWidth;}
if(ball.x+10>rightPaddle.x&&ball.y>rightPaddle.y&&ball.y<rightPaddle.y+paddleHeight){ball.vx=-ball.vx+0.1;ball.x=rightPaddle.x-10;}}
function loop(){draw();}
setInterval(loop,1000/60);
</script>
</body>
</html>
