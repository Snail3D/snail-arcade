<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong Bug – Snail Twist</title>
<style>
  body,html{margin:0;height:100%;display:flex;justify-content:center;align-items:center;background:#111;}
  canvas{background:#222;background-image:none;display:block;}
</style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<script>
window.onload = function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const paddleW = 20, paddleH = 100;
  const ballR = 10;
  let paddle = {x:10, y:H/2-paddleH/2, speed:4};
  let ball = {x:W/2, y:H/2, vx:4, vy:2};
  let moving = true;
  let dragging = false;

  // Touch control: finger drags paddle vertically
  const touchHandler = (e)=>{
    e.preventDefault();
    if(e.type === 'touchstart'){
      dragging = true;
    } else if(e.type === 'touchmove'){
      if(!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const mouseY = touch.clientY - rect.top;
      paddle.y = Math.min(H-paddleH, Math.max(0, mouseY-paddleH/2));
    } else if(e.type === 'touchend'){
      dragging = false;
    }
  };
  canvas.addEventListener('touchstart', touchHandler);
  canvas.addEventListener('touchmove', touchHandler);
  canvas.addEventListener('touchend', touchHandler);

  function resetBall(direction='right'){
    ball.x = W/2;
    ball.y = H/2;
    ball.vx = direction==='right' ? 4 : -4;
    ball.vy = (Math.random()*2-1)*3;
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // paddle (snail)
    ctx.fillStyle = '#0ff';
    ctx.fillRect(paddle.x, paddle.y, paddleW, paddleH);
    // snail head (yellow)
    ctx.fillStyle = '#ff0';
    ctx.fillRect(paddle.x, paddle.y-15, 10, 15);
    // ball
    ctx.fillStyle = '#f33';
    ctx.arc(ball.x, ball.y, ballR, 0, Math.PI*2);
    ctx.fill();
  }

  function update(){
    if(!moving) return;
    ball.x += ball.vx;
    ball.y += ball.vy;

    // top/bottom bounce
    if(ball.y - ballR < 0 || ball.y + ballR > H) ball.vy = -ball.vy;
    // left paddle collision
    if(ball.vx < 0 && ball.x - ballR < paddle.x + paddleW && ball.y > paddle.y && ball.y < paddle.y + paddleH){
      ball.vx = -ball.vx * 1.2;
      ball.x = paddle.x + paddleW;
    }
    // right wall bounce (optional friction)
    if(ball.x + ballR > W - paddleW - 10){
      ball.vx = -ball.vx * 0.9;
    }
    // left miss -> reset
    if(ball.x - ballR < 0){
      moving = false;
      requestAnimationFrame(()=>{resetBall('right'); moving = true;}); 
    }
  }

  function loop(){
    if(moving) requestAnimationFrame(loop);
    draw();
    update();
  }
  requestAnimationFrame(loop);
};
</script>
</body>
</html>
