let score = 0;
let questions = [];

let correctIndex = -1;
let streak = 0;

let timer = 0;

// Resize
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw / GAME_W, vh / GAME_H);
  canvas.style.width = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
  canvas.width = GAME_W;
  canvas.height = GAME_H;
}
window.addEventListener('resize', resize);
resize();

// Shuffle array
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Init game
function initGame() {
  questions = shuffle(QUESTIONS).slice(0, 10); // 10 questions per round
  currentQ = 0;
  score = 0;
  streak = 0;
  bestStreak = parseInt(localStorage.getItem('biblequiz-best') || '0', 10);
  selectedAnswer = -1;
  correctIndex = -1;
  particles = [];
  state = 'playing';
  timer = TIMER_MAX;
  startScreen.classList.remove('active');
  gameoverScreen.classList.remove('active');
}

// Draw helpers
function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawText(text, x, y, size, color, align = 'center') {
  ctx.font = `bold ${size}px 'Courier New', monospace`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
}

// Particles
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 3 + Math.random() * 4,
      color
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

  if (state !== 'playing' || selectedAnswer >= 0) return;

  const pad = 20;
  const qAreaTop = 80;
  const btnStartY = qAreaTop + 120;
  const btnH = 58;
  const gap = 10;

  for (let i = 0; i < 4; i++) {
    const by = btnStartY + i * (btnH + gap);
    if (y >= by && y <= by + btnH) {
      selectedAnswer = i;
      correctIndex = QUESTIONS[questions[currentQ]].c;

      if (i === correctIndex) {
        score++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        spawnParticles(x, y, '#00ff88', 15);
      } else {
        streak = 0;
        shakeTimer = 15;
        spawnParticles(x, y, '#ff4444', 8);
      }

      // Move to next question after delay

        currentQ++;
        if (currentQ >= questions.length) {
          state = 'gameover';
          const finalScore = document.getElementById('finalScore');
          const bestDisplay = document.getElementById('bestDisplay');
          finalScore.textContent = `${score} / ${questions.length}`;

          if (score > best) {
            best = score;
            localStorage.setItem('biblequiz-best', best);
          }
          bestDisplay.textContent = `Best: ${best} | Best Streak: ${bestStreak}`;
          gameoverScreen.classList.add('active');
        } else {
          selectedAnswer = -1;
          correctIndex = -1;
          timer = TIMER_MAX;
        }
      }, 800);
      return;
    }
  }
}

canvas.addEventListener('pointerdown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = GAME_W / rect.width;
  const scaleY = GAME_H / rect.height;
  handleInput((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
});

// Buttons
document.getElementById('startBtn').addEventListener('click', initGame);
document.getElementById('restartBtn').addEventListener('click', initGame);

// Main loop
let lastTime = 0;
function loop(time) {
  requestAnimationFrame(loop);
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;

  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    shakeTimer--;
    ctx.translate(Math.random() * 6 - 3, Math.random() * 6 - 3);
  }

  // Flash effect
  if (flashColor) {
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    flashColor = '';
  }

  if (state === 'playing') {
    // Background
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    const q = QUESTIONS[questions[currentQ]];
    const pad = 20;

    // Progress bar
    ctx.fillStyle = '#1a1a1a';
    drawRoundedRect(pad, 15, GAME_W - pad * 2, 8, 4);
    ctx.fill();
    const progress = (currentQ + 1) / questions.length;
    ctx.fillStyle = '#00ff88';
    drawRoundedRect(pad, 15, (GAME_W - pad * 2) * progress, 8, 4);
    ctx.fill();

    // Question counter & streak
    drawText(`Q${currentQ + 1}/${questions.length}`, pad, 45, 14, '#666', 'left');
    if (streak > 1) {
      drawText(`🔥 ${streak} streak`, GAME_W - pad, 45, 14, '#ff8800', 'right');
    }

    // Timer
    timer -= dt;
    if (timer <= 0) {
      timer = TIMER_MAX;
      streak = 0;
      currentQ++;
      if (currentQ >= questions.length) {
        state = 'gameover';
        const finalScore = document.getElementById('finalScore');
        const bestDisplay = document.getElementById('bestDisplay');
        finalScore.textContent = `${score} / ${questions.length}`;
        if (score > best) {
          best = score;
          localStorage.setItem('biblequiz-best', best);
        }
        bestDisplay.textContent = `Best: ${best} | Best Streak: ${bestStreak}`;
        gameoverScreen.classList.add('active');
      } else {
        selectedAnswer = -1;
        correctIndex = -1;
      }
    }

    // Timer bar
    const timerPct = Math.max(0, timer / TIMER_MAX);
    ctx.fillStyle = '#1a1a1a';
    drawRoundedRect(pad, 58, GAME_W - pad * 2, 6, 3);
    ctx.fill();
    const timerColor = timerPct > 0.5 ? '#00ff88' : timerPct > 0.25 ? '#ffcc00' : '#ff4444';
    ctx.fillStyle = timerColor;
    drawRoundedRect(pad, 58, (GAME_W - pad * 2) * timerPct, 6, 3);
    ctx.fill();

    // Question text
    const qY = 100;
    ctx.fillStyle = '#ffffff';
    ctx.font = "bold 20px 'Courier New', monospace";
    ctx.textAlign = 'center';

    // Reset textAlign to center for question text
    ctx.textAlign = 'center';

    // Word wrap question
    const words = q.q.split(' ');
    let lines = [];
    let currentLine = '';
    for (const word of words) {
      const test = currentLine + (currentLine ? ' ' : '') + word;
      if (ctx.measureText(test).width > GAME_W - pad * 2 - 20) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = test;
      }
    }
    lines.push(currentLine);

    const lineH = 28;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], GAME_W / 2, qY + i * lineH);
    }

    // Answer buttons
    const btnStartY = qY + lines.length * lineH + 30;
    for (let i = 0; i < 4; i++) {
      const bx = pad;
      const by = btnStartY + i * 68;
      const bw = GAME_W - pad * 2;
      const bh = 58;

      // Button background
      if (selectedAnswer === i) {
        ctx.fillStyle = i === correctIndex ? 'rgba(0,255,136,0.2)' : 'rgba(255,68,68,0.2)';
      } else {
        ctx.fillStyle = '#1a1a1a';
      }
      drawRoundedRect(bx, by, bw, bh, 10);
      ctx.fill();

      // Button border
      if (selectedAnswer === i) {
        ctx.strokeStyle = i === correctIndex ? '#00ff88' : '#ff4444';
        ctx.lineWidth = 2;
      } else {
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
      }
      drawRoundedRect(bx, by, bw, bh, 10);
      ctx.stroke();

      // Answer letter
      const letters = ['A', 'B', 'C', 'D'];
      drawText(letters[i], bx + 25, by + 36, 18, selectedAnswer === i ? '#fff' : '#00ff88', 'left');

      // Answer text
      drawText(q.a[i], bx + 50, by + 36, 14, selectedAnswer === i ? '#fff' : '#ccc', 'left');
    }

    // Score display
    drawText(`Score: ${score}`, GAME_W / 2, GAME_H - 30, 16, '#888', 'center');

    // Particles
    updateParticles();
    drawParticles();

  } else if (state === 'start') {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    // Animated cross
    const t = Date.now() / 1000;
    ctx.save();
    ctx.translate(GAME_W / 2, GAME_H / 2 - 80);
    ctx.rotate(Math.sin(t * 0.5) * 0.1);

    // Glow
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#00ff88';

    // Cross shape
    const cw = 12, ch = 60, aw = 40, ah = 10;
    ctx.fillRect(-cw / 2, -ch / 2, cw, ch);
    ctx.fillRect(-aw / 2, -ah / 2 - 10, aw, ah);
    ctx.shadowBlur = 0;
    ctx.restore();

    updateParticles();
    drawParticles();
  }

  ctx.restore();
}

let best = parseInt(localStorage.getItem('biblequiz-best') || '0', 10);
startScreen.classList.add('active');
requestAnimationFrame(loop);



</script>
