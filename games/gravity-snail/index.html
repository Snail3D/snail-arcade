<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gravity Snail</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
canvas { display: block; width: 100%; height: 100%; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // --- Resize handling ---
  let W, H;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = canvas.width = window.innerWidth * dpr;
    H = canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = window.innerWidth;
    H = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // --- Audio (procedural) ---
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx;
  function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
  function playTone(freq, dur, vol = 0.15, type = 'sine') {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }
  function sfxCollect() { playTone(880, 0.12, 0.12); setTimeout(() => playTone(1320, 0.15, 0.1), 80); }
  function sfxDeath() { playTone(120, 0.4, 0.25, 'sawtooth'); playTone(80, 0.6, 0.2, 'square'); }
  function sfxThrust() { playTone(60 + Math.random()*30, 0.08, 0.04, 'sawtooth'); }
  function sfxNearMiss() { playTone(200, 0.15, 0.1, 'triangle'); }

  // --- State ---
  let state = 'menu'; // menu, play, dead
  let score = 0;
  let highScore = parseInt(localStorage.getItem('gravitySnailHS') || '0');
  let speed = 1;
  let distance = 0;
  let shakeX = 0, shakeY = 0, shakeTime = 0;
  let deadTimer = 0;

  // --- Input ---
  let thrusting = false;
  const keys = {};
  window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space' || e.code === 'Enter') handleAction(); });
  window.addEventListener('keyup', e => keys[e.code] = false);

  function handleAction() {
    ensureAudio();
    if (state === 'menu') startGame();
    else if (state === 'dead' && deadTimer > 60) startGame();
  }

  canvas.addEventListener('mousedown', e => { thrusting = true; ensureAudio(); if (state !== 'play') handleAction(); });
  canvas.addEventListener('mouseup', () => thrusting = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); thrusting = true; ensureAudio(); if (state !== 'play') handleAction(); }, { passive: false });
  canvas.addEventListener('touchend', e => { e.preventDefault(); thrusting = false; }, { passive: false });

  // --- Snail ---
  const snail = {
    x: 0, y: 0, vy: 0, radius: 16,
    angle: 0, trail: [], jetpackParticles: []
  };

  // --- Obstacles & Collectibles ---
  let obstacles = [];
  let leaves = [];
  let particles = [];
  let bgLayers = [];

  // --- Init background layers (parallax) ---
  function initBg() {
    bgLayers = [];
    const layerCount = 4;
    for (let i = 0; i < layerCount; i++) {
      const rocks = [];
      for (let j = 0; j < 20 + i * 8; j++) {
        rocks.push({
          x: Math.random() * W,
          y: Math.random() * H,
          w: 20 + Math.random() * (60 - i * 10),
          h: 10 + Math.random() * (30 - i * 5),
          angle: Math.random() * Math.PI,
          shade: Math.floor(15 + i * 8 + Math.random() * 10),
          speed: (i + 1) * 0.3
        });
      }
      bgLayers.push({ rocks, speed: (i + 1) * 0.4 });
    }
  }

  // --- Generate obstacle gap ---
  let nextObstacleY = -200;
  function spawnObstacle() {
    const gapCenter = 120 + Math.random() * (H - 240);
    const gapSize = Math.max(100, 180 - speed * 5);
    const w = W;

    // Stalactite (ceiling)
    obstacles.push({
      x: 0, y: nextObstacleY, w: w, h: gapCenter - gapSize / 2,
      type: 'stalactite', gapTop: gapCenter - gapSize / 2, gapBottom: gapCenter + gapSize / 2
    });

    // Stalagmite (floor) - offset slightly for variety
    const stalH = 60 + Math.random() * (Math.min(gapCenter - gapSize / 2 - 10, H - gapCenter - gapSize / 2 - 10));
    obstacles.push({
      x: 0, y: gapCenter + gapSize / 2, w: w, h: stalH,
      type: 'stalagmite', gapTop: gapCenter - gapSize / 2, gapBottom: gapCenter + gapSize / 2
    });

    // Leaves in the gap
    const leafCount = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < leafCount; i++) {
      const ly = gapCenter - gapSize / 2 + (gapSize / (leafCount + 1)) * (i + 1);
      const lx = w / 2 - 60 + Math.random() * 120;
      leaves.push({
        x: lx, y: ly, radius: 8, glow: Math.random() * Math.PI * 2, collected: false
      });
    }

    nextObstacleY += gapSize + 180 + Math.random() * 120;
    if (nextObstacleY > H + 400) nextObstacleY = -300;
  }

  // --- Particles ---
  function spawnCollectParticles(x, y) {
    for (let i = 0; i < 16; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1.5 + Math.random() * 4;
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, decay: 0.02 + Math.random() * 0.03,
        radius: 2 + Math.random() * 4,
        color: `hsl(${90 + Math.random() * 50}, ${70 + Math.random()*30}%, ${50 + Math.random()*30}%)`
      });
    }
  }

  function spawnDeathParticles(x, y) {
    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 5;
      particles.push({
        x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, decay: 0.01 + Math.random() * 0.02,
        radius: 3 + Math.random() * 5,
        color: `hsl(${20 + Math.random()*30}, ${80}%, ${40 + Math.random()*20}%)`
      });
    }
  }

  function spawnThrustParticle(x, y) {
    if (Math.random() > 0.4) return;
    particles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + Math.random() * 4,
      vx: (Math.random() - 0.5) * 2,
      vy: 1 + Math.random() * 3,
      life: 1, decay: 0.04 + Math.random() * 0.04,
      radius: 2 + Math.random() * 3,
      color: `hsl(${20 + Math.random()*30}, ${90}%, ${50 + Math.random()*20}%)`
    });
  }

  // --- Game functions ---
  function startGame() {
    state = 'play';
    score = 0;
    speed = 1;
    distance = 0;
    snail.x = W / 2;
    snail.y = H * 0.4;
    snail.vy = 0;
    snail.trail = [];
    snail.jetpackParticles = [];
    obstacles = [];
    leaves = [];
    particles = [];
    nextObstacleY = -200;
    deadTimer = 0;
    initBg();
    // Pre-spawn some obstacles
    for (let i = 0; i < 5; i++) spawnObstacle();
  }

  function die() {
    state = 'dead';
    deadTimer = 0;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('gravitySnailHS', String(highScore));
    }
    sfxDeath();
    shakeTime = 20;
    spawnDeathParticles(snail.x, snail.y);
  }

  // --- Collision detection ---
  function rectContains(rx, ry, rw, rh, cx, cy, cr) {
    const nearX = Math.max(rx, Math.min(cx, rx + rw));
    const nearY = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - nearX;
    const dy = cy - nearY;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  // --- Update ---
  let lastTime = 0;
  function update(dt) {
    if (state === 'dead') {
      deadTimer++;
      updateParticles(dt);
      return;
    }

    distance += speed * dt * 60;
    speed = 1 + distance / 3000;

    // Snail physics
    const grav = 800 * dt;
    const thrust = -1400 * dt;
    if (thrusting) {
      snail.vy += thrust;
      sfxThrust();
    } else {
      snail.vy += grav;
    }
    snail.vy = Math.max(-600, Math.min(900, snail.vy));
    snail.y += snail.vy * dt;

    // Bounds check
    if (snail.y - snail.radius < 0 || snail.y + snail.radius > H) {
      die(); return;
    }

    // Trail
    snail.trail.push({ x: snail.x, y: snail.y, life: 1 });
    if (snail.trail.length > 20) snail.trail.shift();

    // Thrust particles
    if (thrusting) spawnThrustParticle(snail.x, snail.y + snail.radius);

    // Scroll obstacles
    const scrollSpeed = 180 * speed;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].y += scrollSpeed * dt;
      if (obstacles[i].type === 'stalactite' && obstacles[i].y > H + 200) {
        obstacles.splice(i, 1);
      }
    }

    // Scroll leaves
    for (let i = leaves.length - 1; i >= 0; i--) {
      leaves[i].y += scrollSpeed * dt;
      leaves[i].glow += dt * 4;
      if (leaves[i].y > H + 50) leaves.splice(i, 1);
    }

    // Scroll background
    for (const layer of bgLayers) {
      for (const r of layer.rocks) {
        r.y += scrollSpeed * dt * layer.speed / (bgLayers.length);
        if (r.y > H + 100) { r.y = -100; r.x = Math.random() * W; }
      }
    }

    // Spawn new obstacles
    const lastObs = obstacles.filter(o => o.type === 'stalactite');
    if (lastObs.length < 5) spawnObstacle();

    // Collision with obstacles
    for (const obs of obstacles) {
      if (rectContains(obs.x, obs.y, obs.w, obs.h, snail.x, snail.y, snail.radius - 2)) {
        die(); return;
      }
    }

    // Leaf collection
    for (const leaf of leaves) {
      if (leaf.collected) continue;
      const dx = snail.x - leaf.x;
      const dy = snail.y - leaf.y;
      if (dx * dx + dy * dy < (snail.radius + leaf.radius) ** 2) {
        leaf.collected = true;
        score += 10;
        sfxCollect();
        spawnCollectParticles(leaf.x, leaf.y);
      }
    }

    // Near-miss detection (screen shake)
    for (const obs of obstacles) {
      if (obs.y > snail.y + 50 || obs.y + obs.h < snail.y - 50) continue;
      const dx1 = Math.abs(snail.x - obs.x);
      const dx2 = Math.abs((snail.x) - (obs.x + obs.w));
      if ((dx1 < snail.radius + 30 || dx2 < snail.radius + 30) &&
          !(rectContains(obs.x, obs.y, obs.w, obs.h, snail.x, snail.y, snail.radius))) {
        if (!obs.nearMissTriggered) {
          obs.nearMissTriggered = true;
          shakeTime = 8;
          sfxNearMiss();
        }
      } else if (obs.nearMissTriggered && obs.y > snail.y + 50) {
        obs.nearMissTriggered = false;
      }
    }

    // Particles
    updateParticles(dt);

    // Screen shake decay
    if (shakeTime > 0) {
      shakeTime--;
      shakeX = (Math.random() - 0.5) * shakeTime * 1.5;
      shakeY = (Math.random() - 0.5) * shakeTime * 1.5;
    } else {
      shakeX = shakeY = 0;
    }

    // Score from distance
    score += speed * dt * 2;
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // --- Draw ---
  function draw() {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background gradient (dark cave)
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0a0a12');
    bgGrad.addColorStop(0.5, '#0d0d1a');
    bgGrad.addColorStop(1, '#080810');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Parallax background rocks
    for (const layer of bgLayers) {
      for (const r of layer.rocks) {
        ctx.save();
        ctx.translate(r.x, r.y);
        ctx.rotate(r.angle);
        ctx.fillStyle = `rgb(${r.shade},${r.shade},${Math.min(25, r.shade + 3)})`;
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        // Irregular rock shape
        for (let p = 0; p < 6; p++) {
          const a = (p / 6) * Math.PI * 2;
          const rx = r.w / 2 * (0.6 + Math.sin(a * 3) * 0.4);
          const ry = r.h / 2 * (0.6 + Math.cos(a * 2) * 0.4);
          if (p === 0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    // Cave walls (left/right edges)
    const wallGrad = ctx.createLinearGradient(0, 0, 30, 0);
    wallGrad.addColorStop(0, 'rgba(15,12,20,0.9)');
    wallGrad.addColorStop(1, 'rgba(15,12,20,0)');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, 35, H);

    const wallGrad2 = ctx.createLinearGradient(W, 0, W - 30, 0);
    wallGrad2.addColorStop(0, 'rgba(15,12,20,0.9)');
    wallGrad2.addColorStop(1, 'rgba(15,12,20,0)');
    ctx.fillStyle = wallGrad2;
    ctx.fillRect(W - 35, 0, 35, H);

    if (state === 'menu') {
      drawMenu();
      ctx.restore();
      return;
    }

    // Draw obstacles (stalactites & stalagmites)
    for (const obs of obstacles) {
      drawObstacle(obs);
    }

    // Draw leaves
    for (const leaf of leaves) {
      if (leaf.collected) continue;
      drawLeaf(leaf);
    }

    // Draw particles
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw snail trail
    for (let i = 0; i < snail.trail.length; i++) {
      const t = snail.trail[i];
      const alpha = (i / snail.trail.length) * 0.3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#8B7355';
      ctx.beginPath();
      ctx.arc(t.x, t.y, snail.radius * (i / snail.trail.length) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw snail
    if (state === 'play' || state === 'dead') {
      drawSnail();
    }

    // HUD
    if (state === 'play') {
      drawHUD();
    }

    // Death screen
    if (state === 'dead') {
      drawDeathScreen();
    }

    ctx.restore();
  }

  function drawObstacle(obs) {
    const grad = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.h);
    if (obs.type === 'stalactite') {
      grad.addColorStop(0, '#1a1520');
      grad.addColorStop(0.3, '#2a2035');
      grad.addColorStop(1, 'rgba(42,32,53,0)');
    } else {
      grad.addColorStop(0, 'rgba(42,32,53,0)');
      grad.addColorStop(0.7, '#2a2035');
      grad.addColorStop(1, '#1a1520');
    }

    ctx.fillStyle = grad;
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

    // Crystal formations along edges
    ctx.fillStyle = '#3d2a5c';
    for (let x = 0; x < obs.w; x += 45) {
      const h = 8 + Math.sin(x * 0.3 + obs.y * 0.1) * 6;
      if (obs.type === 'stalactite') {
        // Point down from ceiling
        ctx.beginPath();
        ctx.moveTo(x, obs.y);
        ctx.lineTo(x + 12, obs.y + h + 4);
        ctx.lineTo(x + 24, obs.y);
        ctx.fill();
      } else {
        // Point up from floor
        const topY = obs.y + obs.h;
        ctx.beginPath();
        ctx.moveTo(x, topY);
        ctx.lineTo(x + 12, topY - h - 4);
        ctx.lineTo(x + 24, topY);
        ctx.fill();
      }
    }

    // Subtle glow on edges near the gap
    ctx.fillStyle = 'rgba(100, 70, 150, 0.15)';
    if (obs.type === 'stalactite') {
      ctx.fillRect(obs.x, obs.y + obs.h - 3, obs.w, 6);
    } else {
      ctx.fillRect(obs.x, obs.y - 3, obs.w, 6);
    }
  }

  function drawLeaf(leaf) {
    const glow = Math.sin(leaf.glow) * 0.3 + 0.7;
    const pulse = leaf.radius + Math.sin(leaf.glow * 2) * 2;

    // Outer glow
    const glowGrad = ctx.createRadialGradient(leaf.x, leaf.y, 0, leaf.x, leaf.y, pulse * 3);
    glowGrad.addColorStop(0, `rgba(120, 255, 80, ${0.3 * glow})`);
    glowGrad.addColorStop(1, 'rgba(120, 255, 80, 0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(leaf.x, leaf.y, pulse * 3, 0, Math.PI * 2);
    ctx.fill();

    // Leaf shape
    ctx.save();
    ctx.translate(leaf.x, leaf.y);
    ctx.rotate(Math.sin(leaf.glow) * 0.2);

    // Main leaf body
    ctx.fillStyle = `hsl(${110 + Math.sin(leaf.glow) * 20}, 75%, ${45 + glow * 15}%)`;
    ctx.beginPath();
    ctx.moveTo(0, -pulse);
    ctx.bezierCurveTo(pulse * 1.2, -pulse * 0.5, pulse * 1.2, pulse * 0.5, 0, pulse);
    ctx.bezierCurveTo(-pulse * 1.2, pulse * 0.5, -pulse * 1.2, -pulse * 0.5, 0, -pulse);
    ctx.fill();

    // Vein
    ctx.strokeStyle = `rgba(200, 255, 180, ${0.6 * glow})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -pulse * 0.8);
    ctx.lineTo(0, pulse * 0.8);
    ctx.stroke();

    // Highlight
    ctx.fillStyle = `rgba(255, 255, 255, ${0.3 * glow})`;
    ctx.beginPath();
    ctx.arc(-pulse * 0.2, -pulse * 0.2, pulse * 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawSnail() {
    const x = snail.x;
    const y = snail.y;
    const r = snail.radius;

    // Jetpack flame
    if (thrusting && state === 'play') {
      const flicker = Math.random() * 6;
      ctx.fillStyle = '#ff6622';
      ctx.beginPath();
      ctx.moveTo(x - 8, y + r * 0.6);
      ctx.lineTo(x, y + r * 1.8 + flicker);
      ctx.lineTo(x + 8, y + r * 0.6);
      ctx.fill();

      ctx.fillStyle = '#ffaa33';
      ctx.beginPath();
      ctx.moveTo(x - 4, y + r * 0.6);
      ctx.lineTo(x, y + r * 1.2 + flicker * 0.5);
      ctx.lineTo(x + 4, y + r * 0.6);
      ctx.fill();

      // Jetpack body
      ctx.fillStyle = '#556';
      ctx.fillRect(x - 10, y - r * 0.3, 20, r * 1.0);
      ctx.fillStyle = '#778';
      ctx.fillRect(x - 8, y - r * 0.1, 16, r * 0.6);
    } else {
      // Jetpack (folded)
      ctx.fillStyle = '#445';
      ctx.fillRect(x - 9, y - r * 0.2, 18, r * 0.8);
      ctx.fillStyle = '#556';
      ctx.fillRect(x - 7, y + r * 0.0, 14, r * 0.5);
    }

    // Shell
    const shellGrad = ctx.createRadialGradient(x - 3, y - 2, 2, x, y, r);
    shellGrad.addColorStop(0, '#c4956a');
    shellGrad.addColorStop(0.6, '#8B6914');
    shellGrad.addColorStop(1, '#5a3e0a');
    ctx.fillStyle = shellGrad;
    ctx.beginPath();
    ctx.arc(x, y - 2, r * 0.85, 0, Math.PI * 2);
    ctx.fill();

    // Shell spiral pattern
    ctx.strokeStyle = 'rgba(90, 62, 10, 0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let a = 0; a < Math.PI * 4; a += 0.2) {
      const sr = 3 + a * 1.8;
      const sx = x + Math.cos(a) * sr * 0.5;
      const sy = y - 2 + Math.sin(a) * sr * 0.5;
      if (a === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    // Shell highlight
    ctx.fillStyle = 'rgba(255, 220, 180, 0.2)';
    ctx.beginPath();
    ctx.arc(x - r * 0.2, y - r * 0.4, r * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Snail body (head)
    ctx.fillStyle = '#a0896b';
    ctx.beginPath();
    ctx.ellipse(x + r * 0.5, y + r * 0.3, r * 0.5, r * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes/stalks
    ctx.strokeStyle = '#a0896b';
    ctx.lineWidth = 2.5;
    // Left stalk
    ctx.beginPath();
    ctx.moveTo(x + r * 0.6, y);
    ctx.lineTo(x + r * 1.0, y - r * 0.5);
    ctx.stroke();
    // Right stalk
    ctx.beginPath();
    ctx.moveTo(x + r * 0.7, y);
    ctx.lineTo(x + r * 1.1, y - r * 0.35);
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + r * 1.0, y - r * 0.5, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + r * 1.1, y - r * 0.35, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    const lookAngle = Math.atan2(snail.vy, 1);
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(x + r * 1.0 + Math.sin(lookAngle) * 1.5, y - r * 0.5 + Math.cos(lookAngle) * 1.5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + r * 1.1 + Math.sin(lookAngle) * 1.5, y - r * 0.35 + Math.cos(lookAngle) * 1.5, 2, 0, Math.PI * 2);
    ctx.fill();

    // Smile
    ctx.strokeStyle = '#5a3e0a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x + r * 0.8, y + r * 0.45, 5, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  }

  function drawHUD() {
    // Score
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.font = `bold ${Math.min(24, W * 0.04)}px monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(`🍃 ${Math.floor(score)}`, 15, 35);

    // Speed indicator
    ctx.fillStyle = 'rgba(200, 180, 255, 0.6)';
    ctx.font = `${Math.min(14, W * 0.025)}px monospace`;
    ctx.fillText(`SPEED: x${speed.toFixed(1)}`, 15, 58);

    // High score
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255, 215, 0, 0.6)';
    ctx.font = `${Math.min(14, W * 0.025)}px monospace`;
    ctx.fillText(`BEST: ${highScore}`, W - 15, 35);

    // Thrust indicator (battery-style)
    const barW = Math.min(120, W * 0.2);
    const barH = 6;
    const barX = W / 2 - barW / 2;
    const barY = H - 30;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(barX, barY, barW, barH);

    const thrustPct = Math.max(0, 1 - (snail.vy + 600) / 1500);
    const thrustGrad = ctx.createLinearGradient(barX, 0, barX + barW * thrustPct, 0);
    thrustGrad.addColorStop(0, '#ff6622');
    thrustGrad.addColorStop(1, '#ffaa33');
    ctx.fillStyle = thrustGrad;
    ctx.fillRect(barX, barY, barW * thrustPct, barH);

    ctx.fillStyle = 'rgba(255,200,100,0.5)';
    ctx.font = `${Math.min(11, W * 0.02)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('JETPACK', W / 2, barY - 5);
  }

  function drawMenu() {
    // Title
    ctx.textAlign = 'center';

    // Glow effect behind title
    const titleGlow = ctx.createRadialGradient(W / 2, H * 0.3, 10, W / 2, H * 0.3, 200);
    titleGlow.addColorStop(0, 'rgba(100, 70, 200, 0.15)');
    titleGlow.addColorStop(1, 'rgba(100, 70, 200, 0)');
    ctx.fillStyle = titleGlow;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#c8b0ff';
    ctx.font = `bold ${Math.min(48, W * 0.08)}px monospace`;
    ctx.fillText('GRAVITY SNAIL', W / 2, H * 0.3);

    ctx.fillStyle = '#8a7aaa';
    ctx.font = `${Math.min(16, W * 0.03)}px monospace`;
    ctx.fillText('A jetpack-powered shell in an endless cave', W / 2, H * 0.36);

    // Animated snail preview
    const previewY = H * 0.5 + Math.sin(Date.now() / 800) * 15;
    ctx.save();
    ctx.translate(W / 2, previewY);

    // Mini snail
    const pr = 20;
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.arc(0, 0, pr * 0.85, 0, Math.PI * 2);
    ctx.fill();

    // Jetpack flame animation
    const flick = Math.random() * 4;
    ctx.fillStyle = '#ff6622';
    ctx.beginPath();
    ctx.moveTo(-8, pr * 0.6);
    ctx.lineTo(0, pr * 1.8 + flick);
    ctx.lineTo(8, pr * 0.6);
    ctx.fill();

    // Body
    ctx.fillStyle = '#a0896b';
    ctx.beginPath();
    ctx.ellipse(pr * 0.5, pr * 0.3, pr * 0.5, pr * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(pr * 1.0, -pr * 0.3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(pr * 1.0, -pr * 0.3, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Instructions
    const blink = Math.sin(Date.now() / 400) > -0.3;
    if (blink) {
      ctx.fillStyle = '#ddd';
      ctx.font = `${Math.min(18, W * 0.035)}px monospace`;
      ctx.fillText('[ CLICK or TAP to START ]', W / 2, H * 0.72);
    }

    ctx.fillStyle = '#6a6a8a';
    ctx.font = `${Math.min(13, W * 0.025)}px monospace`;
    ctx.fillText('Hold mouse/touch = thrust  |  Release = fall', W / 2, H * 0.82);
    ctx.fillText('Dodge crystals  |  Collect glowing leaves', W / 2, H * 0.86);

    if (highScore > 0) {
      ctx.fillStyle = 'rgba(255, 215, 0, 0.7)';
      ctx.font = `${Math.min(15, W * 0.028)}px monospace`;
      ctx.fillText(`HIGH SCORE: ${highScore}`, W / 2, H * 0.93);
    }
  }

  function drawDeathScreen() {
    const alpha = Math.min(1, deadTimer / 40);
    ctx.fillStyle = `rgba(5, 2, 10, ${alpha * 0.7})`;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    if (deadTimer < 20) return;

    ctx.textAlign = 'center';
    const shake = deadTimer < 30 ? (Math.random() - 0.5) * 4 : 0;

    ctx.save();
    ctx.translate(shake, shake);

    ctx.fillStyle = '#ff4444';
    ctx.font = `bold ${Math.min(40, W * 0.07)}px monospace`;
    ctx.fillText('SNAIL CRUSHED', W / 2, H * 0.35);

    ctx.fillStyle = '#c8b0ff';
    ctx.font = `bold ${Math.min(28, W * 0.05)}px monospace`;
    ctx.fillText(`Score: ${Math.floor(score)}`, W / 2, H * 0.48);

    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = `${Math.min(18, W * 0.035)}px monospace`;
      ctx.fillText('★ NEW HIGH SCORE! ★', W / 2, H * 0.55);
    }

    ctx.fillStyle = '#8a7aaa';
    ctx.font = `${Math.min(16, W * 0.03)}px monospace`;
    ctx.fillText(`Best: ${highScore}`, W / 2, H * 0.61);

    const blink = Math.sin(Date.now() / 400) > -0.3;
    if (blink && deadTimer > 60) {
      ctx.fillStyle = '#ddd';
      ctx.font = `${Math.min(16, W * 0.03)}px monospace`;
      ctx.fillText('[ CLICK or TAP to RETRY ]', W / 2, H * 0.75);
    }

    ctx.restore();
  }

  // --- Game loop ---
  function loop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    update(dt);
    draw();

    requestAnimationFrame(loop);
  }

  initBg();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
