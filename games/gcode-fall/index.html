<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>G-Code Fall</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: 'Courier New', monospace; touch-action: none; -webkit-user-select: none; user-select: none; }
canvas { display: block; width: 100%; height: 100%; }
#overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,18,0.95); z-index: 10; pointer-events: auto; }
#overlay.hidden { display: none !important; }
#overlay h1 { font-size: clamp(28px, 6vw, 56px); color: #00f0ff; text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff; margin-bottom: 8px; letter-spacing: 4px; }
#overlay .subtitle { font-size: clamp(11px, 2.5vw, 16px); color: #ff00aa; margin-bottom: 30px; text-shadow: 0 0 10px #ff00aa; }
#overlay .instructions { font-size: clamp(10px, 2vw, 14px); color: #888; margin-bottom: 30px; text-align: center; line-height: 1.6; max-width: 320px; }
#overlay .instructions span { color: #00f0ff; }
#startBtn { pointer-events: auto; background: transparent; border: 2px solid #00f0ff; color: #00f0ff; padding: 14px 40px; font-size: clamp(16px, 3.5vw, 22px); font-family: 'Courier New', monospace; cursor: pointer; letter-spacing: 3px; transition: all 0.2s; text-shadow: 0 0 10px #00f0ff; box-shadow: 0 0 15px rgba(0,240,255,0.3); }
#startBtn:hover { background: #00f0ff; color: #0a0a12; }
#hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; z-index: 5; pointer-events: none; }
#hud div { font-size: clamp(12px, 2.5vw, 16px); color: #00f0ff; text-shadow: 0 0 8px #00f0ff; }
#scoreLabel { color: #ff00aa; }
#comboLabel { color: #ffcc00; }
#gameOver { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,18,0.92); z-index: 10; pointer-events: auto; }
#gameOver h2 { font-size: clamp(24px, 5vw, 44px); color: #ff0055; text-shadow: 0 0 20px #ff0055; margin-bottom: 10px; }
#gameOver .finalScore { font-size: clamp(16px, 3vw, 24px); color: #00f0ff; margin-bottom: 6px; }
#gameOver .highScore { font-size: clamp(12px, 2.5vw, 16px); color: #ff00aa; margin-bottom: 30px; }
#restartBtn { pointer-events: auto; background: transparent; border: 2px solid #ff00aa; color: #ff00aa; padding: 12px 36px; font-size: clamp(14px, 3vw, 20px); font-family: 'Courier New', monospace; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }
#restartBtn:hover { background: #ff00aa; color: #0a0a12; }
#grain { position: fixed; inset: 0; pointer-events: none; z-index: 4; opacity: 0.04; mix-blend-mode: overlay; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<canvas id="grain"></canvas>

<div id="overlay">
  <h1>G-CODE FALL</h1>
  <div class="subtitle">// print bed survival //</div>
  <div class="instructions">
    Move the <span>print bed</span> to dodge falling<br>
    <span>G-code commands</span> and <span>spool debris</span>.<br>
    Survive longer = higher score.<br><br>
    <span>← →</span> or <span>touch</span> to move
  </div>
  <button id="startBtn">START PRINT</button>
</div>

<div id="gameOver">
  <h2>PRINT FAILED</h2>
  <div class="finalScore" id="finalScore"></div>
  <div class="highScore" id="highScore"></div>
  <button id="restartBtn">RETRY</button>
</div>

<div id="hud">
  <div id="scoreLabel">SCORE: 0</div>
  <div id="comboLabel"></div>
  <div id="levelLabel">LVL 1</div>
</div>

<script>
// --- Config ---
const W = 400, H = 700;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const grainCanvas = document.getElementById('grain');
const grainCtx = grainCanvas.getContext('2d');
const overlay = document.getElementById('overlay');
const gameOverScreen = document.getElementById('gameOver');
const scoreLabel = document.getElementById('scoreLabel');
const comboLabel = document.getElementById('comboLabel');
const levelLabel = document.getElementById('levelLabel');
const finalScoreEl = document.getElementById('finalScore');
const highScoreEl = document.getElementById('highScore');

// --- Grain overlay ---
function renderGrain() {
  grainCanvas.width = window.innerWidth;
  grainCanvas.height = window.innerHeight;
  const imgData = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const v = Math.random() * 255;
    imgData.data[i] = v; imgData.data[i+1] = v; imgData.data[i+2] = v; imgData.data[i+3] = 255;
  }
  grainCtx.putImageData(imgData, 0, 0);
}
renderGrain();
window.addEventListener('resize', renderGrain);

// --- Scale canvas ---
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// --- Audio ---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, vol, type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function sfxHit() { playTone(150, 0.3, 0.15, 'sawtooth'); playTone(80, 0.4, 0.1, 'square'); }
function sfxCollect() { playTone(600, 0.1, 0.06); playTone(900, 0.15, 0.06); }
function sfxLevelUp() { playTone(400, 0.1, 0.08); setTimeout(() => playTone(600, 0.1, 0.08), 80); setTimeout(() => playTone(800, 0.15, 0.08), 160); }

// --- Game State ---
let game = null;
let highScore = parseInt(localStorage.getItem('gcodefall_high') || '0');
let running = false;
let animFrame = null;

const GCODE_TEXTS = ['G0 X10', 'G1 Y50', 'M104', 'G28', 'G92', 'M82', 'G1 Z0.2', 'G0 F2400', 'T0', 'M302'];
const SPAWN_TYPES = ['gcode', 'spool', 'nozzle'];

// --- Player (Print Bed) ---
function createPlayer() {
  return {
    x: W / 2, y: H - 60, w: 50, h: 18, speed: 5,
    trail: [], invincible: 0
  };
}

// --- Falling objects ---
function spawnObstacle() {
  const type = SPAWN_TYPES[Math.floor(Math.random() * SPAWN_TYPES.length)];
  const obj = {
    type,
    x: Math.random() * (W - 40) + 20,
    y: -30,
    w: type === 'gcode' ? 55 + Math.random() * 30 : type === 'spool' ? 20 + Math.random() * 10 : 14,
    h: type === 'gcode' ? 18 : type === 'spool' ? 20 + Math.random() * 10 : 24,
    speed: 2 + Math.random() * 1.5 + game.difficulty * 0.3,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.05,
    text: GCODE_TEXTS[Math.floor(Math.random() * GCODE_TEXTS.length)]
  };
  return obj;
}

function spawnBonus() {
  return {
    type: 'bonus',
    x: Math.random() * (W - 30) + 15,
    y: -20,
    r: 8,
    speed: 1.5 + Math.random() + game.difficulty * 0.2,
    pulse: 0,
    value: Math.random() < 0.3 ? 50 : 25
  };
}

// --- Particles ---
let particles = [];
function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

// --- Input ---
let keys = {};
let touchX = null;
let touchActive = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length > 0) {
    touchX = e.touches[0].clientX;
    touchActive = true;
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length > 0) {
    touchX = e.touches[0].clientX;
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  touchX = null;
}, { passive: false });

// --- Game Init ---
function initGame() {
  game = {
    player: createPlayer(),
    obstacles: [],
    bonuses: [],
    score: 0,
    combo: 0,
    level: 1,
    difficulty: 0,
    time: 0,
    spawnTimer: 0,
    bonusTimer: 0,
    spawnInterval: 45,
    alive: true
  };
  particles = [];
  scoreLabel.textContent = 'SCORE: 0';
  comboLabel.textContent = '';
  levelLabel.textContent = 'LVL 1';
}

// --- Collision ---
function rectsOverlap(a, b) {
  return a.x - a.w/2 < b.x + b.w/2 &&
         a.x + a.w/2 > b.x - b.w/2 &&
         a.y - a.h/2 < b.y + b.h/2 &&
         a.y + a.h/2 > b.y - b.h/2;
}
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx - rw/2, Math.min(cx, rx + rw/2));
  const nearY = Math.max(ry - rh/2, Math.min(cy, ry + rh/2));
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

// --- Update ---
function update() {
  if (!game || !game.alive) return;
  const p = game.player;
  game.time++;

  // Player movement
  let moveDir = 0;
  if (keys['ArrowLeft'] || keys['a']) moveDir -= 1;
  if (keys['ArrowRight'] || keys['d']) moveDir += 1;
  if (touchActive && touchX !== null) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const targetX = (touchX - rect.left) * scaleX;
    const diff = targetX - p.x;
    moveDir = Math.abs(diff) > 5 ? Math.sign(diff) : 0;
  }
  p.x += moveDir * p.speed;
  p.x = Math.max(p.w / 2, Math.min(W - p.w / 2, p.x));

  // Trail
  if (moveDir !== 0) {
    p.trail.push({ x: p.x, y: p.y + p.h / 2, life: 1 });
    if (p.trail.length > 12) p.trail.shift();
  }
  p.trail.forEach(t => t.life -= 0.08);
  p.trail = p.trail.filter(t => t.life > 0);

  if (p.invincible > 0) p.invincible--;

  // Spawn obstacles
  game.spawnTimer++;
  if (game.spawnTimer >= game.spawnInterval) {
    game.spawnTimer = 0;
    game.obstacles.push(spawnObstacle());
    // Extra obstacles at higher difficulty
    if (game.difficulty >= 3 && Math.random() < 0.3) game.obstacles.push(spawnObstacle());
    if (game.difficulty >= 6 && Math.random() < 0.3) game.obstacles.push(spawnObstacle());
  }

  // Spawn bonuses
  game.bonusTimer++;
  if (game.bonusTimer >= 180) {
    game.bonusTimer = 0;
    game.bonuses.push(spawnBonus());
  }

  // Update obstacles
  for (let i = game.obstacles.length - 1; i >= 0; i--) {
    const o = game.obstacles[i];
    o.y += o.speed;
    o.rotation += o.rotSpeed;

    // Collision
    if (p.invincible <= 0 && rectsOverlap(p, o)) {
      game.alive = false;
      sfxHit();
      addParticles(p.x, p.y, '#ff0055', 20);
      addParticles(p.x, p.y, '#ff6600', 10);
      showGameOver();
      return;
    }

    // Remove if off screen
    if (o.y > H + 50) {
      game.obstacles.splice(i, 1);
      game.score += 1;
      game.combo++;
    }
  }

  // Update bonuses
  for (let i = game.bonuses.length - 1; i >= 0; i--) {
    const b = game.bonuses[i];
    b.y += b.speed;
    b.pulse += 0.1;

    if (p.invincible <= 0 && circleRect(b.x, b.y, b.r, p.x, p.y, p.w, p.h)) {
      game.score += b.value;
      game.combo += 2;
      sfxCollect();
      addParticles(b.x, b.y, '#00ff88', 8);
      game.bonuses.splice(i, 1);
      continue;
    }

    if (b.y > H + 30) {
      game.bonuses.splice(i, 1);
    }
  }

  // Level up
  const newLevel = Math.floor(game.score / 50) + 1;
  if (newLevel > game.level) {
    game.level = newLevel;
    game.difficulty = Math.min(game.level - 1, 10);
    game.spawnInterval = Math.max(15, 45 - game.difficulty * 3);
    levelLabel.textContent = 'LVL ' + game.level;
    sfxLevelUp();
    addParticles(W / 2, H / 2, '#00f0ff', 15);
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vy += 0.1;
    pt.life -= pt.decay;
    if (pt.life <= 0) particles.splice(i, 1);
  }

  // Score display
  scoreLabel.textContent = 'SCORE: ' + game.score;
  if (game.combo >= 10) {
    comboLabel.textContent = '🔥 x' + game.combo;
  } else {
    comboLabel.textContent = '';
  }
}

// --- Render ---
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = 'rgba(0,240,255,0.06)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Particles
  particles.forEach(pt => {
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - pt.size / 2, pt.y - pt.size / 2, pt.size, pt.size);
  });
  ctx.globalAlpha = 1;

  if (!game) return;
  const p = game.player;

  // Player trail (filament)
  p.trail.forEach(t => {
    ctx.globalAlpha = t.life * 0.4;
    ctx.fillStyle = '#ff00aa';
    ctx.fillRect(t.x - 2, t.y, 4, 3);
  });
  ctx.globalAlpha = 1;

  // Player (print bed)
  const blink = p.invincible > 0 && Math.floor(game.time / 4) % 2;
  if (!blink) {
    // Bed body
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h);
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h);
    // Nozzle
    ctx.fillStyle = '#ff00aa';
    ctx.fillRect(p.x - 3, p.y - p.h / 2 - 8, 6, 10);
    ctx.fillStyle = '#00f0ff';
    ctx.fillRect(p.x - 1, p.y - p.h / 2 - 10, 2, 4);
    // Glow
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 10;
    ctx.strokeRect(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h);
    ctx.shadowBlur = 0;
  }

  // Obstacles
  game.obstacles.forEach(o => {
    ctx.save();
    ctx.translate(o.x, o.y);
    ctx.rotate(o.rotation);

    if (o.type === 'gcode') {
      // Text block
      ctx.fillStyle = 'rgba(255,0,85,0.15)';
      ctx.fillRect(-o.w / 2, -o.h / 2, o.w, o.h);
      ctx.strokeStyle = '#ff0055';
      ctx.lineWidth = 1;
      ctx.strokeRect(-o.w / 2, -o.h / 2, o.w, o.h);
      ctx.fillStyle = '#ff0055';
      ctx.font = '10px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(o.text, 0, 0);
    } else if (o.type === 'spool') {
      // Filament spool
      ctx.fillStyle = '#ff00aa';
      ctx.fillRect(-o.w / 2, -o.h / 2, o.w, o.h);
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(-o.w / 4, -o.h / 4, o.w / 2, o.h / 2);
      ctx.strokeStyle = '#ff00aa';
      ctx.lineWidth = 1;
      ctx.strokeRect(-o.w / 2, -o.h / 2, o.w, o.h);
    } else {
      // Nozzle tip
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(0, -o.h / 2);
      ctx.lineTo(-o.w / 2, o.h / 2);
      ctx.lineTo(o.w / 2, o.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.restore();
  });

  // Bonuses
  game.bonuses.forEach(b => {
    const pulse = 1 + Math.sin(b.pulse) * 0.2;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#00ff88';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0a0a12';
    ctx.font = 'bold 8px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.value > 30 ? '★' : '+', 0, 1);
    ctx.restore();
  });
}

// --- Game Over ---
function showGameOver() {
  finalScoreEl.textContent = 'SCORE: ' + game.score;
  if (game.score > highScore) {
    highScore = game.score;
    localStorage.setItem('gcodefall_high', highScore);
    highScoreEl.textContent = '★ NEW HIGH SCORE! ★';
  } else {
    highScoreEl.textContent = 'BEST: ' + highScore;
  }
  gameOverScreen.style.display = 'flex';
  gameOverScreen.classList.add('visible');
}

// --- Start ---
function startGame() {
  initAudio();
  initGame();
  overlay.classList.add('hidden');
  overlay.style.display = 'none';
  gameOverScreen.style.display = 'none';
  running = true;
  if (animFrame) cancelAnimationFrame(animFrame);
  function loop() {
    if (!running) return;
    update();
    render();
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

// --- Buttons ---
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// Prevent scroll
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
