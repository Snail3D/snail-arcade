<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PharmaSweep</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --cell-color: #ffffff;
            --cell-revealed: #e2e8f0;
            --text-control: #2d3748;
            --error-color: #e53e3e;
            --safe-color: #38a169;
            --border-color: #cbd5e0;
            --primary-blue: #3182ce;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-control);
            touch-action: manipulation;
        }

        h1 { margin: 10px 0 5px 0; color: #2c5282; font-size: 1.5rem; }
        p { margin: 0 0 15px 0; font-size: 0 %= 0.85rem; color: #4a5568; text-align: center; padding: 0 10px; }

        #controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .control-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        #game-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid var(--border-color);
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            grid-template-rows: repeat(10, 30px);
            gap: 4px;
        }

        .cell {
            width: 32px;
            height: 30px;
            background-color: var(--cell-color);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            border-radius: 4px;
            transition: background 0.1s;
            font-size: 0.9rem;
        }

        .cell:active { background-color: #edf2f7; }

        .cell.revealed {
            background-color: var(--cell-revealed);
            cursor: default;
        }

        .cell.error {
            background-color: var(--error-color);
            color: white;
        }

        .cell.flagged {
            background-color: #fff5f5;
        }

        .cell.flagged::after {
            content: '⚠️';
            font-size: 14px;
        }

        .cell.revealed-num-1 { color: #3182ce; }
        .cell.revealed-num-2 { color: #38a169; }
        .cell.revealed-num-3 { color: #e53e3e; }
        .cell.revealed-num-4 { color: #805ad5; }

        #status {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            height: 1.5rem;
        }

        #reset-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>PharmaSweep 💊</h1>
    <p>Identify medication errors (⚠️) to clear the ward.</p>

    <div id="controls">
        <button id="mode-reveal" class="control-btn active" onclick="setMode('reveal')">Reveal 💊</button>
        <button id="mode-flag" class="control-wrap control-btn" onclick="setMode('flag')">Flag ⚠️</button>
    </div>

    <div id="game-container">
        <div id="grid"></div>
    </div>

    <div id="status"></div>
    <button id="reset-btn" onclick="initGame()">New Shift (Reset)</button>

    <script>
        const gridSize = 10;
        const errorCount = 15;
        let grid = [];
        let revealedCount = 0;
        let gameOver = false;
        let currentMode = 'reveal';

        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');
        const modeRevealBtn = document.getElementById('mode-reveal');
        const modeFlagBtn = document.getElementById('mode-flag');

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'reveal') {
                modeRevealBtn.classList.add('active');
                modeFlagBtn.classList.remove('active');
            } else {
                modeFlagBtn.classList.add('active');
                modeRevealBtn.classList.remove('active');
            }
        }

        function initGame() {
            grid = [];
            revealedCount = 0;
            gameOver = false;
            statusElement.innerText = '';
            gridElement.innerHTML = '';
            setMode('reveal');
            
            for (let r = 0; r < gridSize; r++) {
                grid[r] = [];
                for (let c = 0; c < gridSize; c++) {
                    grid[r][c] = {
                        r, c,
                        isError: false,
                        isRevealed: false,
                        isFlagged: false,
                        errorNeighbors: 0
                    };
                }
            }

            let placed = 0;
            while (placed < errorCount) {
                let r = Math.floor(Math.random() * gridSize);
                let c = Math.floor(Math.random() * gridSize);
                if (!grid[r][c].isError) {
                    grid[r][c].isError = true;
                    placed++;
                }
            }

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!grid[r][c].isError) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let nr = r + dr;
                                let nc = c + dc;
                                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                                    if (grid[nr][nc].isError) count++;
                                }
                            }
                        }
                        grid[r][c].errorNeighbors = count;
                    }
                }
            }

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.classList.add('cell');
                    cellDiv.id = `cell-${r}-${c}`;
                    cellDiv.dataset.r = r;
                    cellDiv.dataset.c = c;
                    
                    cellDiv.addEventListener('click', () => handleInteraction(r, c));
                    
                    gridElement.appendChild(cellDiv);
                    grid[r][c].element = cellDiv;
                }
            }
        }

        function handleInteraction(r, c) {
            if (gameOver || grid[r][c].isRevealed) return;

            if (currentMode === 'flag') {
                toggleFlag(r, c);
            } else {
                revealCell(r, c);
            }
        }

        function toggleFlag(r, c) {
            if (gameOver || grid[r][c].isRevealed) return;
            grid[r][c].isFlagged = !grid[r][c].isFlagged;
            grid[r][c].element.classList.toggle('flagged');
        }

        function revealCell(r, c) {
            if (gameOver || grid[r][c].isRevealed || grid[r][c].isFlagged) return;

            const cell = grid[r][c];
            cell.isRevealed = true;
            cell.element.classList.add('revealed');
            revealedCount++;

            if (cell.isError) {
                endGame(false);
                return;
            }

            if (cell.errorNeighbors > 0) {
                cell.element.innerText = cell.errorNeighbors;
                cell.element.classList.add(`revealed-num-${cell.errorNeighbors}`);
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r + dr;
                        let nc = c + dc;
                        if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                            revealCell(nr, nc);
                        }
                    }
                }
            }

            if (revealedCount === (gridSize * gridSize) - errorCount) {
                endGame(true);
            }
        }

        function endGame(win) {
            gameOver = true;
            statusElement.innerText = win ? "✅ Shift Complete! All clear!" : "❌ Error Found! Critical Incident!";
            statusElement.style.color = win ? "var(--safe-color)" : "var(--error-color)";

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (grid[r][c].isError) {
                        grid[r][c].element.classList.add('error');
                        grid[r][c].element.innerText = '⚠️';
                    }
                }
            }
        }

        initGame();
    </script>
</body>
</html>
