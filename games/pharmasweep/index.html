<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaSweep</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --cell-color: #ffffff;
            --cell-revealed: #e2e8f0;
            --text-color: #2d3748;
            --error-color: #e53e3e;
            --safe-color: #38a169;
            --border-color: #cbd5e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: varvar(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        h1 { margin-bottom: 10px; color: #2c5282; }
        p { margin-bottom: 20px; font-size: 0.9rem; color: #4a5568; }

        #game-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid var(--border-color);
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 35px);
            grid-template-rows: repeat(10, 35px);
            gap: 4px;
        }

        .cell {
            width: 35px;
            height: 35px;
            background-color: var(--cell-color);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .cell:hover { background-color: #edf2f7; }

        .cell.revealed {
            background-color: var(--cell-revealed);
            cursor: default;
        }

        .cell.error {
            background-color: var(--error-length);
            background-color: var(--error-color);
            color: white;
        }

        .cell.flagged {
            background-color: #fff5f5;
        }

        .cell.flagged::after {
            content: '⚠️';
            font-size: 14px;
        }

        .cell.revealed-num-1 { color: #3182ce; }
        .cell.revealed-num-2 { color: #38a169; }
        .cell.revealed-num-3 { color: #e53e3e; }
        .cell.revealed-num-4 { color: #805ad5; }

        #status {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #reset-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #reset-btn:hover { background-color: #2b6cb0; }
    </style>
</head>
<body>

    <h1>PharmaSweep 💊</h1>
    <p>Avoid Medication Errors (⚠️) to clear the ward!</p>

    <div id="game-container">
        <div id="grid"></div>
    </div>

    <div id="status"></div>
    <button id="reset-btn" onclick="initGame()">New Shift (Reset)</button>

    <script>
        const gridSize = 10;
        const errorCount = 15;
        let grid = [];
        let revealedCount = 0;
        let gameOver = false;

        const gridElement = document.getElementById('grid');
        const statusElement = document.getElementById('status');

        function initGame() {
            grid = [];
            revealedCount = 0;
            gameOver = false;
            statusElement.innerText = '';
            gridElement.innerHTML = '';
            
            // Create board
            for (let r = 0; r < gridSize; r++) {
                grid[r] = [];
                for (let c = 0; c < gridSize; c++) {
                    grid[r][c] = {
                        r, c,
                        isError: false,
                        isRevealed: false,
                        isFlagged: false,
                        errorNeighbors: 0
                    };
                }
            }

            // Place errors
            let placed = 0;
            while (placed < errorCount) {
                let r = Math.floor(Math.random() * gridSize);
                let c = Math.floor(Math.random() * gridSize);
                if (!grid[r][c].isError) {
                    grid[r][c].isError = true;
                    placed++;
                }
            }

            // Calculate neighbors
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!grid[r][c].isError) {
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let nr = r + dr;
                                let nc = c + dc;
                                if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                                    if (grid[nr][nc].isError) count++;
                                }
                            }
                        }
                        grid[r][c].errorNeighbors = count;
                    }
                }
            }

            // Render
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.classList.add('cell');
                    cellDiv.id = `cell-${r}-${c}`;
                    cellDiv.dataset.r = r;
                    cellDiv.dataset.c = c;
                    cellDiv.addEventListener('click', () => revealCell(r, c));
                    cellDiv.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        toggleFlag(r, c);
                    });
                    gridElement.appendChild(cellDiv);
                    grid[r][c].element = cellDiv;
                }
            }
        }

        function toggleFlag(r, c) {
            if (gameOver || grid[r][c].isRevealed) return;
            grid[r][c].isFlagged = !grid[r][c].isFlagged;
            grid[r][c].element.classList.toggle('flagged');
        }

        function revealCell(r, c) {
            if (gameOver || grid[r][c].isRevealed || grid[r][c].isFlagged) return;

            const cell = grid[r][c];
            cell.isRevealed = true;
            cell.element.classList.add('revealed');
            revealedCount++;

            if (cell.isError) {
                endGame(false);
                return;
            }

            if (cell.errorNeighbors > 0) {
                cell.element.innerText = cell.errorNeighbors;
                cell.element.classList.add(`revealed-num-${cell.errorNeighbors}`);
            } else {
                // Flood fill
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r + dr;
                        let nc = c + dc;
                        if (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize) {
                            revealCell(nr, nc);
                        }
                    }
                }
            }

            if (revealedCount === (gridSize * gridSize) - errorCount) {
                endGame(true);
            }
        }

        function endGame(win) {
            gameOver = true;
            statusElement.innerText = win ? "✅ Shift Complete! All clear!" : "❌ Error Found! Critical Incident!";
            statusElement.style.color = win ? "var(--safe-color)" : "var(--error-color)";

            // Reveal all errors
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (grid[r][c].isError) {
                        grid[r][c].element.classList.add('error');
                        grid[r][c].element.innerText = '⚠️';
                    }
                }
            }
        }

        initGame();
    </script>
</body>
</html>
