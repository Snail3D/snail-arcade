<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Prompt Dodge 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    touch-action: none;
    font-family: 'Courier New', monospace;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,10,26,0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; pointer-events: auto;
  }
  #overlay.hidden { display: none; }
  #overlay h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    margin-bottom: 1rem;
    letter-spacing: 0.1em;
  }
  #overlay .subtitle {
    color: #f0f;
    font-size: clamp(0.8rem, 2.5vw, 1.2rem);
    margin-bottom: 2rem;
    text-shadow: 0 0 10px #f0f;
  }
  #startBtn, #restartBtn {
    background: transparent;
    border: 2px solid #0ff;
    color: #0ff;
    padding: 1rem 2.5rem;
    font-size: clamp(1rem, 3vw, 1.5rem);
    font-family: 'Courier New', monospace;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    transition: all 0.3s;
    pointer-events: auto;
  }
  #startBtn:hover, #startBtn:active, #restartBtn:hover, #restartBtn:active {
    background: #0ff;
    color: #0a0a1a;
    box-shadow: 0 0 30px #0ff;
  }
  #hud {
    position: fixed; top: 0; left: 0; width: 100%;
    display: none; justify-content: space-between;
    padding: 0.5rem 1rem;
    z-index: 5; pointer-events: none;
  }
  #hud .hud-item {
    color: #0ff;
    font-size: clamp(0.7rem, 2vw, 1rem);
    text-shadow: 0 0 10px #0ff;
  }
  #hud .score { color: #f0f; text-shadow: 0 0 10px #f0f; }
  #hud .lives { color: #ff0; text-shadow: 0 0 10px #ff0; }
  #gameOver {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,10,26,0.9);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10; pointer-events: auto;
  }
  #gameOver h2 {
    font-size: clamp(1.5rem, 5vw, 3rem);
    color: #f00;
    text-shadow: 0 0 20px #f00;
    margin-bottom: 0.5rem;
  }
  #gameOver .final-score {
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: #0ff;
    margin-bottom: 2rem;
  }
  #gameOver #restartBtn {
    background: transparent;
    border: 2px solid #f0f;
    color: #f0f;
    padding: 1rem 2.5rem;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-family: 'Courier New', monospace;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    pointer-events: auto;
  }
  #gameOver #restartBtn:hover, #gameOver #restartBtn:active {
    background: #f0f;
    color: #0a0a1a;
    box-shadow: 0 0 30px #f0f;
  }
  .instructions {
    color: #888;
    font-size: clamp(0.6rem, 1.8vw, 0.9rem);
    margin-top: 1.5rem;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <h1>PROMPT DODGE 3D</h1>
  <div class="subtitle">Token Survival · Depth Perspective</div>
  <button id="startBtn">START</button>
  <div class="instructions">
    ← → or drag to move<br>
    Dodge RED prompts · Collect CYAN prompts<br>
    Don't let the AI hallucinate!
  </div>
</div>

<div id="hud">
  <span class="hud-item score">SCORE: <span id="scoreVal">0</span></span>
  <span class="hud-item">LEVEL: <span id="levelVal">1</span></span>
  <span class="hud-item lives">♥ <span id="livesVal">3</span></span>
</div>

<div id="gameOver">
  <h2>SYSTEM CRASHED</h2>
  <div class="final-score">Final Score: <span id="finalScore">0</span></div>
  <button id="restartBtn">RETRY</button>
</div>

<script>
// ── Canvas Setup ──
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
const FOCAL = 420;
const HORIZON_Y = 0.42;
const NEAR_Z = 100;
const FAR_Z = 1800;
const LANE_HALF = 320;
let VP_X, VP_Y;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  VP_X = W / 2;
  VP_Y = H * HORIZON_Y;
}
resize();
window.addEventListener('resize', resize);

function project(x, y, z) {
  if (z < NEAR_Z) z = NEAR_Z;
  const scale = FOCAL / z;
  const sx = VP_X + x * scale;
  const sy = VP_Y + y * scale;
  return { sx, sy, scale };
}

// ── Game State ──
let player, prompts, particles, score, lives, level, gameRunning;
let spawnTimer, spawnInterval, difficultyTimer, speedMultiplier;
let frameCount;
let keys = {};
let touchX = null;
let highScore = parseInt(localStorage.getItem('pd_highscore') || '0');

const BAD_PROMPTS = [
  "NaN output", "Infinite loop", "Segfault", "Stack overflow",
  "Buffer overflow", "Null ptr", "Race condition", "Deadlock",
  "Memory leak", "Type error", "Syntax err", "Timeout",
  "OOM killed", "Core dump", "Kernel panic", "BSOD",
  "404 not found", "DNS fail", "SSL expired", "Connection reset",
  "Permission denied", "Access denied", "Forbidden", "Unauthorized",
  "Hallucination", "Troll prompt", "Jailbreak", "Adversarial"
];

const GOOD_PROMPTS = [
  "Optimal", "Fast ✓", "Clean", "Valid",
  "Compiled", "Tested", "Deployed", "Secure",
  "Optimized", "Refactored", "Merged", "Passed",
  "Working", "Perfect", "Flawless", "Elegant",
  "Minimal", "Correct", "Solved", "Fixed"
];

// ── Player ──
function createPlayer() {
  return {
    x: 0, y: 80, w: 50, h: 30,
    speed: 280, // world units per second
    laneX: 0,
    trail: [],
    glow: 0,
    glowDir: 1,
    z: NEAR_Z + 30
  };
}

// ── Prompt Objects (3D) ──
function createPrompt() {
  const isBad = Math.random() < 0.4;
  const text = isBad
    ? BAD_PROMPTS[Math.floor(Math.random() * BAD_PROMPTS.length)]
    : GOOD_PROMPTS[Math.floor(Math.random() * GOOD_PROMPTS.length)];
  const x = (Math.random() - 0.5) * LANE_HALF * 1.8;
  return {
    x, y: 0,
    z: FAR_Z,
    text,
    isBad,
    rotZ: (Math.random() - 0.5) * 0.4,
    rotY: (Math.random() - 0.5) * 0.3,
    flash: 0,
    collected: false
  };
}

function resetGame() {
  player = createPlayer();
  prompts = [];
  particles = [];
  score = 0;
  lives = 3;
  level = 1;
  spawnTimer = 0;
  spawnInterval = 1.2;
  difficultyTimer = 0;
  speedMultiplier = 1;
  frameCount = 0;
  gameRunning = true;
}

function startGame() {
  resetGame();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('livesVal').textContent = '3';
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('levelVal').textContent = '1';
}

function endGame() {
  gameRunning = false;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('pd_highscore', highScore);
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('gameOver').style.display = 'flex';
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); startGame(); }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('touchend', () => { touchX = null; });

canvas.addEventListener('mousedown', e => { touchX = e.clientX; });
canvas.addEventListener('mouseup', () => { touchX = null; });

// ── Update ──
let lastTime = performance.now();
function update(dt) {
  if (!gameRunning) return;
  frameCount++;
  const dts = dt / 1000; // seconds

  // Player movement (world units)
  let dir = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dir -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dir += 1;
  if (touchX !== null) {
    const dx = touchX - VP_X;
    if (Math.abs(dx) > 30) dir = Math.sign(dx);
  }
  player.laneX += dir * player.speed * dts;
  player.laneX = Math.max(-LANE_HALF, Math.min(LANE_HALF, player.laneX));

  player.trail.unshift({ laneX: player.laneX, life: 1 });
  if (player.trail.length > 12) player.trail.pop();
  player.trail.forEach(t => t.life -= 0.08);

  player.glow += 0.05 * player.glowDir;
  if (player.glow > 1) { player.glow = 1; player.glowDir = -1; }
  if (player.glow < 0.3) { player.glow = 0.3; player.glowDir = 1; }

  // Difficulty / level
  difficultyTimer += dts;
  if (difficultyTimer > 8) {
    difficultyTimer = 0;
    level++;
    speedMultiplier = 1 + (level - 1) * 0.15;
    spawnInterval = Math.max(0.25, 1.2 - (level - 1) * 0.08);
    document.getElementById('levelVal').textContent = level;
  }

  // Spawn prompts
  spawnTimer += dts;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    prompts.push(createPrompt());
  }

  // Update prompts (move toward camera)
  for (let i = prompts.length - 1; i >= 0; i--) {
    const p = prompts[i];
    p.z -= 320 * speedMultiplier * dts;
    p.rotY += dts * 0.8;
    if (p.z < NEAR_Z - 80) {
      prompts.splice(i, 1);
      continue;
    }
    // Collision with player
    const dx = p.x - player.laneX;
    const dy = p.y - player.y;
    const dz = p.z - player.z;
    const dist3D = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (dist3D < 60 && !p.collected) {
      p.collected = true;
      if (p.isBad) {
        lives--;
        document.getElementById('livesVal').textContent = lives;
        spawnParticles(p.x, p.y, p.z, '#f00', 18);
        spawnParticles(p.x, p.y, p.z, '#ff0', 8);
        if (lives <= 0) {
          endGame();
          return;
        }
      } else {
        score += 10;
        document.getElementById('scoreVal').textContent = score;
        spawnParticles(p.x, p.y, p.z, '#0ff', 16);
      }
      prompts.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dts * 0.4;
    p.y += p.vy * dts * 0.4;
    p.z += p.vz * dts * 0.4;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function spawnParticles(x, y, z, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 80 + 40;
    particles.push({
      x, y, z,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp + 30,
      vz: (Math.random() - 0.5) * 80,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

// ── Drawing ──
function drawBg() {
  // Sky/horizon gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#020210');
  bgGrad.addColorStop(0.35, '#0a0a20');
  bgGrad.addColorStop(0.5, '#1a0a30');
  bgGrad.addColorStop(1, '#04040a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
}

function drawGround() {
  // Lateral grid lines (forward depth lines from horizon to camera)
  const lateralCount = 14;
  for (let i = -lateralCount / 2; i < lateralCount / 2; i++) {
    const xWorld = (i / (lateralCount / 2)) * LANE_HALF;
    const pFar = project(xWorld, 0, FAR_Z);
    const pNear = project(xWorld, 0, NEAR_Z);
    ctx.strokeStyle = 'rgba(0,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pFar.sx, pFar.sy);
    ctx.lineTo(pNear.sx, pNear.sy);
    ctx.stroke();
  }
  // Depth grid rings (perpendicular to viewer)
  const gridCount = 12;
  for (let i = 0; i < gridCount; i++) {
    const t = i / gridCount;
    const z = NEAR_Z + t * (FAR_Z - NEAR_Z);
    const p = project(0, 0, z);
    if (p.sy > H) continue;
    const alpha = (1 - t) * 0.25 + 0.05;
    ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, p.sy);
    ctx.lineTo(W, p.sy);
    ctx.stroke();
  }
  // Horizon glow
  const horizonGrad = ctx.createLinearGradient(0, VP_Y - 25, 0, VP_Y + 25);
  horizonGrad.addColorStop(0, 'rgba(0,255,255,0)');
  horizonGrad.addColorStop(0.5, 'rgba(255,0,255,0.2)');
  horizonGrad.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.fillStyle = horizonGrad;
  ctx.fillRect(0, VP_Y - 25, W, 50);
}

function drawPrompt(p) {
  if (p.z < NEAR_Z - 20 || p.z > FAR_Z + 50 || p.collected) return;
  const proj = project(p.x, p.y, p.z);
  const s = proj.scale * 0.5;
  const depthFade = 1 - (p.z - NEAR_Z) / (FAR_Z - NEAR_Z);
  const color = p.isBad ? '#f00' : '#0ff';
  const bgColor = p.isBad ? 'rgba(40,0,0,0.85)' : 'rgba(0,40,40,0.85)';

  ctx.save();
  ctx.translate(proj.sx, proj.sy);
  // Slight 3D rotation effect
  ctx.transform(Math.cos(p.rotY), 0, Math.sin(p.rotY) * 0.3, 1, 0, 0);

  const fontSize = Math.max(8, 16 * s);
  ctx.font = `bold ${fontSize}px Courier New`;
  const tw = ctx.measureText(p.text).width;
  const pad = 8 * s;
  const w = tw + pad * 2;
  const h = fontSize + pad * 2;

  // Background panel with 3D depth (back face)
  ctx.fillStyle = `rgba(${p.isBad ? '40,0,0' : '0,40,40'},${0.5 * depthFade})`;
  ctx.fillRect(-w/2 + 3*s, -h/2 + 3*s, w, h);
  // Front face
  ctx.fillStyle = bgColor;
  ctx.fillStyle = `rgba(${p.isBad ? '60,0,0' : '0,60,60'},${0.85 * depthFade})`;
  ctx.fillRect(-w/2, -h/2, w, h);
  // Neon border with glow
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, 2 * s);
  ctx.shadowColor = color;
  ctx.shadowBlur = 10 * depthFade;
  ctx.strokeRect(-w/2, -h/2, w, h);
  ctx.shadowBlur = 0;
  // Text
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = 6 * depthFade;
  ctx.fillText(p.text, 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawPlayer() {
  const z = player.z;
  const proj = project(player.laneX, player.y, z);
  const s = proj.scale * 0.5;
  const sx = proj.sx;
  const sy = proj.sy;

  // Trail
  for (let i = 0; i < player.trail.length; i++) {
    const t = player.trail[i];
    const tp = project(t.laneX, player.y, z - i * 12);
    const ts = tp.scale * 0.5;
    ctx.globalAlpha = t.life * 0.35;
    ctx.fillStyle = '#0ff';
    ctx.fillRect(tp.sx - 18 * ts, tp.sy - 4 * ts, 36 * ts, 8 * ts);
  }
  ctx.globalAlpha = 1;

  // Glow aura
  const auraR = 50 * s + Math.sin(frameCount * 0.1) * 5 * s;
  const auraGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, auraR);
  auraGrad.addColorStop(0, `rgba(0,255,255,${0.4 * player.glow})`);
  auraGrad.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.fillStyle = auraGrad;
  ctx.beginPath();
  ctx.arc(sx, sy, auraR, 0, Math.PI * 2);
  ctx.fill();

  // 3D Ship body (hexagonal prism - isometric look)
  const size = 28 * s;
  const shipH = 18 * s;

  // Shadow beneath
  ctx.fillStyle = 'rgba(0,255,255,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + shipH * 0.8, size * 0.8, size * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ship body — faceted 3D shape
  // Top diamond face
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.moveTo(sx, sy - shipH * 0.5);
  ctx.lineTo(sx + size, sy);
  ctx.lineTo(sx, sy + shipH * 0.5);
  ctx.lineTo(sx - size, sy);
  ctx.closePath();
  ctx.fill();

  // Lower face (darker)
  ctx.fillStyle = '#08a';
  ctx.beginPath();
  ctx.moveTo(sx - size, sy);
  ctx.lineTo(sx, sy + shipH * 0.5);
  ctx.lineTo(sx + size, sy);
  ctx.lineTo(sx + size * 0.6, sy + shipH * 0.3);
  ctx.lineTo(sx - size * 0.6, sy + shipH * 0.3);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = Math.max(1, 1.5 * s);
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(sx, sy - shipH * 0.5);
  ctx.lineTo(sx + size, sy);
  ctx.lineTo(sx, sy + shipH * 0.5);
  ctx.lineTo(sx - size, sy);
  ctx.closePath();
  ctx.stroke();

  // Core dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sx, sy, 4 * s, 0, Math.PI * 2);
  ctx.fill();

  // Engine trail (particles streaming back)
  if (gameRunning && Math.abs(player.laneX) > 5) {
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: player.laneX + (Math.random() - 0.5) * 10,
        y: player.y + (Math.random() - 0.5) * 5,
        z: z + 20 + Math.random() * 10,
        vx: (Math.random() - 0.5) * 30,
        vy: (Math.random() - 0.5) * 10,
        vz: 60 + Math.random() * 40,
        life: 0.6,
        decay: 0.04,
        r: 2 + Math.random() * 2,
        color: '#0ff'
      });
    }
  }
}

function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.z < NEAR_Z - 50 || p.z > FAR_Z + 100) continue;
    const pp = project(p.x, p.y, p.z);
    const s = pp.scale * 0.5;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8 * s;
    ctx.beginPath();
    ctx.arc(pp.sx, pp.sy, p.r * s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBg();
  drawGround();

  // Sort prompts by z (far to near) and draw
  const sorted = [...prompts].sort((a, b) => b.z - a.z);
  sorted.forEach(drawPrompt);

  drawPlayer();
  drawParticles();

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function loop(now) {
  const dt = Math.min(33, now - lastTime);
  lastTime = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
