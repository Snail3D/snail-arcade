<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Phase Shift — Snail Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  touch-action: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  display: flex;
  justify-content: center;
  align-items: center;
}
#start-screen, #game-over-screen {
  pointer-events: auto;
  text-align: center;
  color: #fff;
  display: none;
}
#start-screen.active, #game-over-screen.active { display: block; }
h1 {
  font-size: 48px;
  margin-bottom: 10px;
  text-shadow: 0 0 20px #4af, 0 0 40px #f4a;
}
.subtitle {
  font-size: 16px;
  color: #888;
  margin-bottom: 30px;
}
.btn {
  background: linear-gradient(135deg, #4af, #a4f);
  border: none;
  color: #fff;
  padding: 15px 40px;
  font-size: 20px;
  font-family: 'Share Tech Mono', monospace;
  cursor: pointer;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(74,170,255,0.5); }
.btn:active { transform: scale(0.95); }
#game-over-screen h2 { font-size: 36px; color: #f4a; margin-bottom: 10px; }
#game-over-screen .score-display { font-size: 24px; color: #4af; margin-bottom: 5px; }
#game-over-screen .best-display { font-size: 16px; color: #888; margin-bottom: 25px; }
.instructions { font-size: 13px; color: #666; margin-top: 20px; line-height: 1.8; }
.instructions span.blue { color: #4af; }
.instructions span.red { color: #f4a; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="game"></canvas>

<div id="ui-overlay">
  <div id="start-screen" class="active">
    <h1>PHASE SHIFT</h1>
    <div class="subtitle">Two worlds. One snail. No mistakes.</div>
    <button class="btn" id="start-btn">PLAY</button>
    <div class="instructions">
      <span class="blue">BLUE LAYER</span> — solid ground, no items<br>
      <span class="red">RED LAYER</span> — enemies &amp; tokens, no ground<br><br>
      <strong>TAP / SPACE</strong> to shift between layers<br>
      Collect tokens. Avoid enemies in BOTH layers.<br>
      Stay alive as long as you can.
    </div>
  </div>

  <div id="game-over-screen">
    <h2>PHASE COLLAPSED</h2>
    <div class="score-display" id="final-score">Score: 0</div>
    <div class="best-display" id="best-score">Best: 0</div>
    <button class="btn" id="restart-btn">REPHASE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Responsive sizing
let W, H;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = Math.min(window.innerWidth, 480);
  H = Math.min(window.innerHeight, 720);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Game state
const SOLID = 0; // blue layer
const DANGER = 1; // red layer
let state = 'menu'; // menu, playing, dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('phaseShiftBest') || '0');
let layer = SOLID;
let shiftFlash = 0; // flash effect timer

// Player (snail)
const player = { x: 0, y: 0, vx: 0, vy: 0, radius: 12, onGround: false };

// Platforms (solid layer only)
let platforms = [];
// Enemies (danger layer only)
let enemies = [];
// Tokens (danger layer only)
let tokens = [];
// Particles
let particles = [];

// Difficulty
let difficulty = 1;
let spawnTimer = 0;
let tokenSpawnTimer = 0;
let enemySpawnTimer = 0;

// Input
let moveLeft = false, moveRight = false;

function initGame() {
  player.x = W / 2;
  player.y = H * 0.7;
  player.vx = 0;
  player.vy = 0;
  layer = SOLID;
  score = 0;
  difficulty = 1;
  spawnTimer = 0;
  tokenSpawnTimer = 0;
  enemySpawnTimer = 0;
  shiftFlash = 0;

  platforms = [];
  enemies = [];
  tokens = [];
  particles = [];

  // Generate initial platforms
  for (let i = 0; i < 6; i++) {
    platforms.push({
      x: Math.random() * (W - 80) + 40,
      y: H * 0.3 + i * (H * 0.12),
      w: 60 + Math.random() * 80,
      h: 12
    });
  }
}

function shiftLayer() {
  if (state !== 'playing') return;
  layer = layer === SOLID ? DANGER : SOLID;
  shiftFlash = 1.0;

  // Spawn particles at player position
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.6 + Math.random() * 0.4,
      color: layer === SOLID ? '#4af' : '#f4a',
      size: 2 + Math.random() * 3
    });
  }
}

function spawnEnemy() {
  const side = Math.random() < 0.5 ? -20 : W + 20;
  const targetX = player.x + (Math.random() - 0.5) * 100;
  const targetY = player.y + (Math.random() - 0.5) * 100;
  const angle = Math.atan2(targetY - player.y, targetX - side);
  const speed = (1.5 + Math.random() * 1.5) * difficulty;

  enemies.push({
    x: side, y: player.y - 50 + Math.random() * 100,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    radius: 10 + Math.random() * 6,
    life: 8 // seconds before despawn
  });
}

function spawnToken() {
  tokens.push({
    x: 30 + Math.random() * (W - 60),
    y: 50 + Math.random() * (H - 150),
    radius: 8,
    pulse: Math.random() * Math.PI * 2,
    life: 6 // despawn after 6 seconds
  });
}

function spawnPlatform() {
  platforms.push({
    x: Math.random() * (W - 100) + 50,
    y: -20,
    w: 50 + Math.random() * 90,
    h: 12
  });
}

// Input handlers
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
    e.preventDefault();
    if (state === 'playing') shiftLayer();
  }
  if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
  if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
});

document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
  if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (state === 'playing') shiftLayer();
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (state === 'playing') shiftLayer();
});

// UI buttons
document.getElementById('start-btn').addEventListener('click', () => {
  state = 'playing';
  document.getElementById('start-screen').classList.remove('active');
  initGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  state = 'playing';
  document.getElementById('game-over-screen').classList.remove('active');
  initGame();
});

// Draw functions
function drawSnail(x, y, r) {
  // Shell (circle)
  ctx.beginPath();
  ctx.arc(x, y - r * 0.3, r * 0.7, 0, Math.PI * 2);
  ctx.fillStyle = '#ff9f43';
  ctx.fill();
  ctx.strokeStyle = '#e17055';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Shell spiral detail
  ctx.beginPath();
  ctx.arc(x, y - r * 0.3, r * 0.4, 0, Math.PI * 1.5);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Body
  ctx.beginPath();
  ctx.ellipse(x, y + r * 0.4, r * 0.6, r * 0.35, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#636e72';
  ctx.fill();

  // Eyes
  const eyeY = y - r * 0.1;
  ctx.beginPath();
  ctx.arc(x - r * 0.25, eyeY, 3, 0, Math.PI * 2);
  ctx.arc(x + r * 0.25, eyeY, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Pupils
  ctx.beginPath();
  ctx.arc(x - r * 0.2, eyeY - 0.5, 1.5, 0, Math.PI * 2);
  ctx.arc(x + r * 0.3, eyeY - 0.5, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
}

function drawPlatform(p) {
  // Blue glow
  ctx.shadowColor = '#4af';
  ctx.shadowBlur = 10;
  ctx.fillStyle = 'rgba(74, 170, 255, 0.8)';
  ctx.fillRect(p.x, p.y, p.w, p.h);

  // Top highlight
  ctx.fillStyle = 'rgba(150, 210, 255, 0.9)';
  ctx.fillRect(p.x, p.y, p.w, 3);

  // Bottom edge
  ctx.fillStyle = 'rgba(40, 100, 200, 0.5)';
  ctx.fillRect(p.x + 2, p.y + p.h - 2, p.w - 4, 2);

  ctx.shadowBlur = 0;
}

function drawEnemy(e) {
  const pulse = Math.sin(Date.now() * 0.005 + e.x) * 3;

  // Outer glow
  ctx.shadowColor = '#f4a';
  ctx.shadowBlur = 15 + pulse;

  // Body
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.radius + pulse * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 80, 130, 0.9)';
  ctx.fill();

  // Inner core
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.radius * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Eyes (menacing)
  ctx.beginPath();
  ctx.arc(e.x - e.radius * 0.3, e.y - e.radius * 0.15, 2.5, 0, Math.PI * 2);
  ctx.arc(e.x + e.radius * 0.3, e.y - e.radius * 0.15, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#f4a';
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawToken(t) {
  t.pulse += 0.05;
  const pulse = Math.sin(t.pulse) * 3;

  ctx.shadowColor = '#4f4';
  ctx.shadowBlur = 12 + pulse;

  // Diamond shape
  const r = t.radius + pulse * 0.3;
  ctx.beginPath();
  ctx.moveTo(t.x, t.y - r);
  ctx.lineTo(t.x + r * 0.7, t.y);
  ctx.lineTo(t.x, t.y + r);
  ctx.lineTo(t.x - r * 0.7, t.y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(80, 255, 130, 0.9)';
  ctx.fill();

  // Inner highlight
  ctx.beginPath();
  ctx.moveTo(t.x, t.y - r * 0.5);
  ctx.lineTo(t.x + r * 0.3, t.y);
  ctx.lineTo(t.x, t.y + r * 0.5);
  ctx.lineTo(t.x - r * 0.3, t.y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(200, 255, 220, 0.8)';
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = '18px "Share Tech Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE ${score}`, 15, 30);

  // Layer indicator
  const layerText = layer === SOLID ? '◈ SOLID' : '◉ DANGER';
  const layerColor = layer === SOLID ? '#4af' : '#f4a';
  ctx.fillStyle = layerColor;
  ctx.textAlign = 'right';
  ctx.fillText(layerText, W - 15, 30);

  // Layer bar
  const barW = 60;
  const barH = 4;
  const barX = W - 15 - barW;
  const barY = 38;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = layerColor;
  ctx.fillRect(barX, barY, barW * (layer === SOLID ? 0.5 : 1), barH);
}

function drawBackground() {
  // Dark background with subtle grid
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Layer tint overlay
  if (layer === SOLID) {
    ctx.fillStyle = 'rgba(74, 170, 255, 0.03)';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = 'rgba(255, 80, 130, 0.03)';
    ctx.fillRect(0, 0, W, H);
  }

  // Shift flash
  if (shiftFlash > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${shiftFlash * 0.15})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawLayerGhost() {
  // Draw the inactive layer as a faint ghost
  const alpha = 0.15;

  if (layer === SOLID) {
    // Ghost danger layer elements
    for (const e of enemies) {
      ctx.globalAlpha = alpha;
      drawEnemy(e);
    }
    for (const t of tokens) {
      ctx.globalAlpha = alpha;
      drawToken(t);
    }
  } else {
    // Ghost solid layer platforms
    for (const p of platforms) {
      ctx.globalAlpha = alpha;
      drawPlatform(p);
    }
  }
  ctx.globalAlpha = 1;
}

// Physics & collision
function update(dt) {
  if (state !== 'playing') return;

  // Difficulty ramp
  difficulty = 1 + score * 0.02;

  // Player movement
  const accel = 0.8;
  const friction = 0.85;
  if (moveLeft) player.vx -= accel;
  if (moveRight) player.vx += accel;
  player.vx *= friction;
  player.x += player.vx;

  // Wrap around screen edges
  if (player.x < -20) player.x = W + 20;
  if (player.x > W + 20) player.x = -20;

  // Gravity (only in solid layer)
  if (layer === SOLID) {
    player.vy += 0.4; // gravity
    player.y += player.vy;

    // Platform collision (solid layer only)
    player.onGround = false;
    for (const p of platforms) {
      if (player.vy >= 0 &&
          player.x > p.x - player.radius &&
          player.x < p.x + p.w + player.radius &&
          player.y + player.radius > p.y &&
          player.y + player.radius < p.y + p.h + 10) {
        player.y = p.y - player.radius;
        player.vy = 0;
        player.onGround = true;
      }
    }

    // Fall off screen
    if (player.y > H + 50) {
      die();
      return;
    }
  } else {
    // In danger layer: gentle float, no gravity
    player.vy *= 0.95;
    player.y += player.vy * 0.3;

    // Keep in bounds
    if (player.y < 20) { player.y = 20; player.vy = Math.abs(player.vy) * 0.5; }
    if (player.y > H - 20) { player.y = H - 20; player.vy = -Math.abs(player.vy) * 0.5; }
  }

  // Spawn enemies
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = Math.max(1.5, 4 - difficulty * 0.3);
  }

  // Spawn tokens
  tokenSpawnTimer -= dt;
  if (tokenSpawnTimer <= 0) {
    spawnToken();
    tokenSpawnTimer = Math.max(1, 3 - difficulty * 0.15);
  }

  // Spawn platforms (solid layer)
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnPlatform();
    spawnTimer = 2;
  }

  // Update enemies - chase player in BOTH layers
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.life -= dt;

    // Chase player (simple homing)
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 0) {
      const speed = (1.2 + difficulty * 0.3);
      e.vx += (dx / dist) * speed * dt;
      e.vy += (dy / dist) * speed * dt;

      // Cap velocity
      const v = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
      if (v > speed * 2) {
        e.vx = (e.vx / v) * speed * 2;
        e.vy = (e.vy / v) * speed * 2;
      }
    }

    e.x += e.vx;
    e.y += e.vy;

    // Despawn if too old or way off screen
    if (e.life <= 0 || e.x < -100 || e.x > W + 100 || e.y < -100 || e.y > H + 100) {
      enemies.splice(i, 1);
      continue;
    }

    // Collision with player (in either layer)
    const cDist = Math.sqrt((player.x - e.x) ** 2 + (player.y - e.y) ** 2);
    if (cDist < player.radius + e.radius) {
      die();
      return;
    }
  }

  // Update tokens (collect only in danger layer)
  for (let i = tokens.length - 1; i >= 0; i--) {
    const t = tokens[i];
    t.life -= dt;

    if (t.life <= 0) {
      tokens.splice(i, 1);
      continue;
    }

    // Collect in danger layer only
    if (layer === DANGER) {
      const cDist = Math.sqrt((player.x - t.x) ** 2 + (player.y - t.y) ** 2);
      if (cDist < player.radius + t.radius + 5) {
        score += 10;
        // Collect particles
        for (let j = 0; j < 8; j++) {
          const angle = Math.random() * Math.PI * 2;
          particles.push({
            x: t.x, y: t.y,
            vx: Math.cos(angle) * (1 + Math.random() * 2),
            vy: Math.sin(angle) * (1 + Math.random() * 2),
            life: 0.5,
            color: '#4f4',
            size: 2 + Math.random() * 2
          });
        }
        tokens.splice(i, 1);
      }
    }
  }

  // Update platforms - move down slowly (scrolling effect)
  for (let i = platforms.length - 1; i >= 0; i--) {
    platforms[i].y += 20 * dt;
    if (platforms[i].y > H + 50) {
      platforms.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Shift flash decay
  if (shiftFlash > 0) shiftFlash -= dt * 4;

  // Score over time
  score += Math.floor(dt * 2);
}

function die() {
  state = 'dead';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('phaseShiftBest', bestScore.toString());
  }

  // Death particles
  for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1 + Math.random(),
      color: layer === SOLID ? '#4af' : '#f4a',
      size: 3 + Math.random() * 4
    });
  }

  document.getElementById('final-score').textContent = `Score: ${score}`;
  document.getElementById('best-score').textContent = `Best: ${bestScore}`;

  setTimeout(() => {
    document.getElementById('game-over-screen').classList.add('active');
  }, 800);
}

// Main loop
let lastTime = performance.now();

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  update(dt);

  // Draw
  drawBackground();
  drawLayerGhost();

  if (state === 'playing' || state === 'dead') {
    // Draw platforms (solid layer)
    for (const p of platforms) drawPlatform(p);

    // Draw enemies (danger layer)
    for (const e of enemies) drawEnemy(e);

    // Draw tokens (danger layer)
    for (const t of tokens) drawToken(t);

    // Draw particles
    drawParticles();

    // Draw player (always visible)
    if (state === 'playing') {
      drawSnail(player.x, player.y, player.radius);

      // Layer indicator ring around snail
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 4, 0, Math.PI * 2);
      ctx.strokeStyle = layer === SOLID ? 'rgba(74,170,255,0.6)' : 'rgba(255,80,130,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    drawHUD();
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
