<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Snail</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            font-size: 24px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        h1 { font-size: 48px; margin: 0 0 20px 0; color: #4ade80; }
        p { font-size: 20px; margin: 5px 0; }
        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <div id="overlay">
        <h1 id="title">GRAVITY SNAIL</h1>
        <p id="score-display"></p>
        <p id="high-score-display"></p>
        <button class="btn" id="start-btn">START</button>
        <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">Hold mouse/touch to thrust up</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiScore = document.getElementById('ui');
        const overlay = document.getElementById('overlay');
        const title = document.getElementById('title');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const startBtn = document.getElementById('start-btn');

        let gameActive = false;
        let score = 0;
        let highScore = localStorage.getItem('gravitySnailHiScore') || 0;
        let speedMultiplier = 1;
        let screenShake = 0;

        const config = {
            gravity: 0.25,
            thrust: 0.5,
            friction: 0.98,
            snailSize: 25,
            leafSize: 12,
            obstacleMinWidth: 40,
            obstacleMaxHeight: 150,
            parallaxLayers: [
                { speed: 0.1, color: '#1a1a1a' },
                { speed: 0.3, color: '#2a2a2a' },
                { speed: 0.6, color: '#3a3a3a' }
            ]
        };

        class Snail {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = canvas.width / 4;
                this.y = canvas.height / 2;
                this.vy = 0;
                this.radius = config.snailSize;
                this.rotation = 0;
            }
            update() {
                this.vy += config.gravity * speedMultiplier;
                if (isThrusting) {
                    this.vy -= config.thrust * speedMultiplier;
                }
                this.vy *= config.friction;
                this.y += this.vy;
                this.rotation = this.vy * 0.05;

                if (this.y < this.radius) {
                    this.y = this.radius;
                    this.vy = 0;
                }
                if (this.y > canvas.height - this.radius) {
                    this.y = canvas.height - this.radius;
                    this.vy = 0;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Shell
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#5d4037';
                ctx.fill();
                ctx.strokeStyle = '#3e2723';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Snail Body/Eyes
                ctx.beginPath();
                ctx.arc(15, -5, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffab91';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(18, -10, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'black';
                ctx.fill();

                // Jetpack flame
                if (isThrusting && Math.random() > 0.3) {
                    ctx.beginPath();
                    ctx.moveTo(-20, 0);
                    ctx.lineTo(-40 - Math.random() * 20, 0);
                    ctx.strokeStyle = '#ffeb3b';
                    ctx.lineWidth = 8;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    ctx.strokeStyle = '#ff5722';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.alpha = 1;
                this.color = color;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 4, 4);
                ctx.globalAlpha = 1.0;
            }
        }

        class Obstacle {
            constructor(type) {
                this.type = type; // 'stalactite' or 'stalagmite'
                this.width = 40 + Math.random() * 60;
                this.height = config.obstacleMinWidth + Math.random() * (config.obstacleMaxHeight - config.obstacleMinWidth);
                this.x = canvas.width + 100;
                this.y = type === 'stalactite' ? 0 : canvas.height;
                this.speed = (speedMultiplier * 4);
            }
            update() {
                this.x -= this.speed;
            }
            draw() {
                ctx.fillStyle = '#444';
                ctx.beginPath();
                if (this.type === 'stalactite') {
                    ctx.moveTo(this.x, 0);
                    ctx.lineTo(this.x + this.width/2, this.height);
                    ctx.lineTo(this.x + this.width, 0);
                } else {
                    ctx.moveTo(this.x, canvas.height);
                    ctx.lineTo(this.x + this.width/2, canvas.height - this.height);
                    ctx.lineTo(this.x + this.width, canvas.height);
                }
                ctx.fill();
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class Leaf {
            constructor() {
                this.radius = config.leafSize;
                this.x = canvas.width + 50;
                this.y = 50 + Math.random() * (canvas.height - 100);
                this.speed = speedMultiplier * 4;
            }
            update() {
                this.x -= this.speed;
            }
            draw() {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 1.5, Math.PI/4, 0, Math.PI * 2);
                ctx.fillStyle = '#a2ff00';
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#a2ff00';
                ctx.shadowOffsetY = 0;
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
            }
        }

        let snail = new Snail();
        let obstacles = [];
        let leaves = [];
        let particles = [];
        let frameCount = 0;
        let isThrusting = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        const startThrust = (e) => { if (gameActive) isThrusting = true; };
        const endThrust = () => { isThrusting = false; };

        window.addEventListener('mousedown', startThrust);
        window.addEventListener('mouseup', endThrust);
        window.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            startThrust(); 
        });
        window.addEventListener('touchend', endThrust);

        function spawnElements() {
            if (frameCount % 120 === 0) {
                const type = Math.random() > 0.5 ? 'stalactite' : 'stalagmite';
                obstacles.push(new Obstacle(type));
            }
            if (frameCount % 180 === 0) {
                leaves.push(new Leaf());
            }
            speedMultiplier += 0.0002;
        }

        function isColliding(s, o) {
            const tipY = o.type === 'stalactite' ? o.height : canvas.height - o.height;
            const tipX = o.x + o.width/2;
            const dx = s.x - tipX;
            const dy = s.y - tipY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < s.radius + 15) return true;
            if (o.type === 'stalactite') {
                if (s.y < o.height && s.x > o.x && s.x < o.x + o.width) return true;
            } else {
                if (s.y > canvas.height - o.height && s.x > o.x && s.x < o.x + o.width) return true;
            }
            return false;
        }

        function gameOver() {
            gameActive = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('gravitySnailHiScore', highScore);
            }
            title.innerText = "GAME OVER";
            scoreDisplay.innerText = "Score: " + score;
            highScoreDisplay.innerText = "High Score: " + highScore;
            startBtn.innerText = "RETRY";
            overlay.style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            speedMultiplier = 1;
            obstacles = [];
            leaves = [];
            particles = [];
            snail.reset();
            gameActive = true;
            overlay.style.display = 'none';
            frameCount = 0;
        }

        function update() {
            if (!gameActive) return;
            frameCount++;
            snail.update();
            spawnElements();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (isColliding(snail, obstacles[i])) {
                    screenShake = 20;
                    gameOver();
                }
                if (obstacles[i].x < -100) obstacles.splice(i, 1);
            }

            for (let i = leaves.length - 1; i >= 0; i--) {
                leaves[i].update();
                const dx = snail.x - leaves[i].x;
                const dy = snail.y - leaves[i].y;
                if (Math.sqrt(dx*dx + dy*dy) < snail.radius + leaves[i].radius) {
                    score += 10;
                    for (let p = 0; p < 8; p++) {
                        particles.push(new Particle(leaves[i].x, leaves[i].y, '#a2ff00'));
                    }
                    leaves.splice(i, 1);
                } else if (leaves[i].x < -50) {
                    leaves.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            if (screenShake > 0) screenShake *= 0.9;
            uiScore.innerText = `Score: ${score}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            if (screenShake > 0.1) {
                ctx.translate(Math.random() * screenShake - screenShake/2, Math.random() * screenShake - screenShake/2);
            }

            config.parallaxLayers.forEach(layer => {
                ctx.fillStyle = layer.color;
                const shift = (frameCount * layer.speed) % 100;
                for(let i = -1; i < (canvas.width / 100) + 2; i++) {
                    ctx.fillRect(i * 100 - shift, 0, 80, canvas.height);
                }
            });

            obstacles.forEach(o => o.draw());
            leaves.forEach(l => l.draw());
            particles.forEach(p => p.draw());
            snail.draw();
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            update();
            draw();
        }

        startBtn.addEventListener('click', resetGame);
        gameLoop();
    </script>
</body>
</html>
