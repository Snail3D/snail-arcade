<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Spaghetti Defense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Courier New',monospace;color:#0ff}
canvas{display:block;width:100%;height:100%}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,.95);z-index:10;pointer-events:auto}
#overlay h1{font-size:clamp(24px,5vw,48px);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #f0f;margin-bottom:10px;letter-spacing:4px}
#overlay h2{font-size:clamp(12px,2.5vw,18px);color:#f0f;text-shadow:0 0 10px #f0f;margin-bottom:30px}
#overlay p{font-size:clamp(10px,2vw,14px);color:#8af;margin:4px 0}
#startBtn{margin-top:30px;padding:15px 40px;font-size:clamp(14px,3vw,20px);font-family:'Courier New',monospace;background:transparent;border:2px solid #0ff;color:#0ff;cursor:pointer;text-transform:uppercase;letter-spacing:3px;pointer-events:auto;transition:all .2s}
#startBtn:hover{background:#0ff;color:#0a0a1a;box-shadow:0 0 30px #0ff}
#hud{position:fixed;top:10px;left:10px;z-index:5;display:none;pointer-events:none;font-size:clamp(10px,2vw,14px)}
#hud div{margin-bottom:4px;text-shadow:0 0 8px #0ff}
#towerPanel{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:5;display:none;gap:8px;pointer-events:auto}
.tower-btn{padding:8px 12px;font-size:clamp(9px,1.8vw,13px);font-family:'Courier New',monospace;background:rgba(10,10,26,.8);border:1px solid #0ff;color:#0ff;cursor:pointer;pointer-events:auto;transition:all .2s}
.tower-btn:hover,.tower-btn.selected{background:#0ff;color:#0a0a1a}
.tower-btn .cost{color:#ff0;font-size:.8em}
#gameOver{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,26,.9);z-index:15;pointer-events:auto}
#gameOver h1{font-size:clamp(20px,5vw,40px);color:#f0f;text-shadow:0 0 20px #f0f;margin-bottom:20px}
#gameOver p{font-size:clamp(12px,2.5vw,18px);color:#0ff;margin:5px}
#restartBtn{margin-top:20px;padding:12px 30px;font-size:clamp(12px,2.5vw,18px);font-family:'Courier New',monospace;background:transparent;border:2px solid #f0f;color:#f0f;cursor:pointer;pointer-events:auto}
#restartBtn:hover{background:#f0f;color:#0a0a1a}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <h1>🍝 SPAGHETTI DEFENSE</h1>
  <h2>A 3D Printer Tower Defense</h2>
  <p>Defend your printer from filament goblins!</p>
  <p>Place nozzles to slow & destroy them</p>
  <p>Each goblin steals filament strands</p>
  <p>Don't let them reach your print bed!</p>
  <button id="startBtn">START PRINT</button>
</div>

<div id="hud">
  <div id="hudLives">❤️ 20</div>
  <div id="hudGold">🍝 100</div>
  <div id="hudWave">🌊 Wave 1</div>
  <div id="hudScore">⭐ 0</div>
</div>

<div id="towerPanel">
  <button class="tower-btn" data-tower="nozzle" data-cost="25">🔥 Nozzle<span class="cost"> 25</span></button>
  <button class="tower-btn" data-tower="cooler" data-cost="50">❄️ Cooler<span class="cost"> 50</span></button>
  <button class="tower-btn" data-tower="extruder" data-cost="75">⚙️ Extruder<span class="cost"> 75</span></button>
</div>

<div id="gameOver">
  <h1>PRINT FAILED</h1>
  <p id="finalScore">Score: 0</p>
  <p id="finalWave">Wave: 1</p>
  <button id="restartBtn">RETRY</button>
</div>

<script>
// ===== GAME STATE =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, scale;
let gameRunning = false;
let lives = 20;
let gold = 100;
let wave = 1;
let score = 0;
let enemies = [];
let towers = [];
let projectiles = [];
let particles = [];
let selectedTower = null;
let spawnTimer = 0;
let enemiesSpawned = 0;
let enemiesInWave = 0;
let waveDelay = 0;
let gameOver = false;
let pathPoints = [];
let animFrame = 0;
let lastTime = 0;
let grainSeed = [];

// Tower definitions
const TOWER_DEFS = {
  nozzle: { range: 100, fireRate: 0.5, damage: 10, color: '#f80', emoji: '🔥', projColor: '#ff0', projSpeed: 300, name: 'Nozzle' },
  cooler: { range: 80, fireRate: 1.0, damage: 5, color: '#0af', emoji: '❄️', projColor: '#aef', projSpeed: 200, name: 'Cooler', slow: 0.5 },
  extruder: { range: 120, fireRate: 2.0, damage: 30, color: '#f0f', emoji: '⚙️', projColor: '#f0f', projSpeed: 250, name: 'Extruder', splash: 40 }
};

// Enemy types
const ENEMY_TYPES = {
  goblin: { hp: 30, speed: 40, reward: 10, color: '#0f0', size: 8, emoji: '👺' },
  fast: { hp: 15, speed: 80, reward: 8, color: '#ff0', size: 6, emoji: '⚡' },
  tank: { hp: 100, speed: 25, reward: 25, color: '#f00', size: 12, emoji: '💀' },
  boss: { hp: 300, speed: 20, reward: 100, color: '#f0f', size: 16, emoji: '👹' }
};

// ===== INIT =====
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  scale = Math.min(W / 800, H / 600);
  generatePath();
  generateGrain();
}

function generatePath() {
  pathPoints = [];
  const cx = W * 0.1;
  const cy = H * 0.5;
  const w = W * 0.8;
  const h = H * 0.6;
  const margin = 30;
  const pts = [
    { x: margin, y: H * 0.15 },
    { x: W * 0.25, y: H * 0.15 },
    { x: W * 0.25, y: H * 0.75 },
    { x: W * 0.5, y: H * 0.75 },
    { x: W * 0.5, y: H * 0.25 },
    { x: W * 0.75, y: H * 0.25 },
    { x: W * 0.75, y: H * 0.85 },
    { x: W * 0.92, y: H * 0.85 }
  ];
  for (let i = 0; i < pts.length; i++) {
    pathPoints.push(pts[i]);
  }
}

function generateGrain() {
  grainSeed = [];
  const count = Math.min(2000, Math.floor(W * H / 500));
  for (let i = 0; i < count; i++) {
    grainSeed.push({ x: Math.random() * W, y: Math.random() * H, a: Math.random() * 0.06 });
  }
}

function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function pointOnPath(t) {
  if (pathPoints.length < 2) return { x: 0, y: 0 };
  const totalLen = getTotalPathLength();
  const targetDist = t * totalLen;
  let accum = 0;
  for (let i = 0; i < pathPoints.length - 1; i++) {
    const seg = dist(pathPoints[i], pathPoints[i + 1]);
    if (accum + seg >= targetDist) {
      const frac = (targetDist - accum) / seg;
      return {
        x: pathPoints[i].x + (pathPoints[i + 1].x - pathPoints[i].x) * frac,
        y: pathPoints[i].y + (pathPoints[i + 1].y - pathPoints[i].y) * frac
      };
    }
    accum += seg;
  }
  return pathPoints[pathPoints.length - 1];
}

function getTotalPathLength() {
  let len = 0;
  for (let i = 0; i < pathPoints.length - 1; i++) {
    len += dist(pathPoints[i], pathPoints[i + 1]);
  }
  return len;
}

// ===== ENEMIES =====
function spawnEnemy(type) {
  const def = ENEMY_TYPES[type];
  enemies.push({
    type: type,
    x: pathPoints[0].x,
    y: pathPoints[0].y,
    hp: def.hp * (1 + (wave - 1) * 0.2),
    maxHp: def.hp * (1 + (wave - 1) * 0.2),
    speed: def.speed,
    baseSpeed: def.speed,
    reward: def.reward,
    color: def.color,
    size: def.size,
    emoji: def.emoji,
    pathT: 0,
    slowTimer: 0,
    alive: true
  });
}

function updateEnemies(dt) {
  for (let e of enemies) {
    if (!e.alive) continue;
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      e.speed = e.baseSpeed * 0.4;
    } else {
      e.speed = e.baseSpeed;
    }
    const totalLen = getTotalPathLength();
    e.pathT += (e.speed * dt) / totalLen;
    const pos = pointOnPath(e.pathT);
    e.x = pos.x;
    e.y = pos.y;
    if (e.pathT >= 1) {
      e.alive = false;
      lives--;
      updateHUD();
      spawnParticles(e.x, e.y, '#f00', 8);
      if (lives <= 0) endGame();
    }
  }
  enemies = enemies.filter(e => e.alive);
}

// ===== TOWERS =====
function placeTower(type, x, y) {
  const def = TOWER_DEFS[type];
  if (gold < def.cost) return;
  gold -= def.cost;
  towers.push({
    type: type,
    x: x,
    y: y,
    range: def.range,
    fireRate: def.fireRate,
    damage: def.damage,
    color: def.color,
    emoji: def.emoji,
    projColor: def.projColor,
    projSpeed: def.projSpeed,
    slow: def.slow || 0,
    splash: def.splash || 0,
    cooldown: 0,
    angle: 0,
    target: null
  });
  updateHUD();
  spawnParticles(x, y, def.color, 12);
}

function updateTowers(dt) {
  for (let t of towers) {
    t.cooldown -= dt;
    // Find target
    let best = null;
    let bestDist = Infinity;
    for (let e of enemies) {
      if (!e.alive) continue;
      const d = dist(t, e);
      if (d <= t.range && d < bestDist) {
        best = e;
        bestDist = d;
      }
    }
    t.target = best;
    if (best) {
      t.angle = Math.atan2(best.y - t.y, best.x - t.x);
      if (t.cooldown <= 0) {
        t.cooldown = t.fireRate;
        fireProjectile(t, best);
      }
    }
  }
}

function fireProjectile(tower, target) {
  projectiles.push({
    x: tower.x,
    y: tower.y,
    target: target,
    speed: tower.projSpeed,
    damage: tower.damage,
    color: tower.projColor,
    slow: tower.slow,
    splash: tower.splash,
    alive: true
  });
}

function updateProjectiles(dt) {
  for (let p of projectiles) {
    if (!p.alive) continue;
    if (!p.target || !p.target.alive) {
      p.alive = false;
      continue;
    }
    const dx = p.target.x - p.x;
    const dy = p.target.y - p.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 10) {
      // Hit
      p.target.hp -= p.damage;
      if (p.slow) p.target.slowTimer = 2;
      if (p.splash > 0) {
        for (let e of enemies) {
          if (e === p.target || !e.alive) continue;
          if (dist(p, e) < p.splash) {
            e.hp -= p.damage * 0.5;
          }
        }
        spawnParticles(p.x, p.y, p.color, 6);
      }
      spawnParticles(p.x, p.y, p.color, 4);
      if (p.target.hp <= 0) {
        p.target.alive = false;
        gold += p.target.reward;
        score += p.target.reward;
        updateHUD();
        spawnParticles(p.target.x, p.target.y, p.target.color, 15);
      }
      p.alive = false;
      continue;
    }
    const move = p.speed * dt;
    p.x += (dx / d) * move;
    p.y += (dy / d) * move;
  }
  projectiles = projectiles.filter(p => p.alive);
}

// ===== PARTICLES =====
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 150;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.5 + Math.random() * 0.5,
      color,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles(dt) {
  for (let p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

// ===== WAVES =====
function getWaveEnemies(w) {
  const list = [];
  const count = 5 + w * 3;
  for (let i = 0; i < count; i++) {
    if (w <= 2) list.push('goblin');
    else if (w <= 4) list.push(Math.random() < 0.7 ? 'goblin' : 'fast');
    else if (w <= 6) {
      const r = Math.random();
      if (r < 0.4) list.push('goblin');
      else if (r < 0.7) list.push('fast');
      else list.push('tank');
    } else {
      const r = Math.random();
      if (r < 0.3) list.push('goblin');
      else if (r < 0.5) list.push('fast');
      else if (r < 0.8) list.push('tank');
      else if (w >= 10 && Math.random() < 0.1) list.push('boss');
    }
  }
  return list;
}

function updateWaves(dt) {
  if (gameOver) return;
  if (enemies.length === 0 && enemiesSpawned >= enemiesInWave) {
    waveDelay += dt;
    if (waveDelay > 3) {
      wave++;
      enemiesSpawned = 0;
      waveDelay = 0;
      const waveEnemies = getWaveEnemies(wave);
      enemiesInWave = waveEnemies.length;
      updateHUD();
    }
    return;
  }
  if (enemiesSpawned < enemiesInWave) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      const waveEnemies = getWaveEnemies(wave);
      if (enemiesSpawned < waveEnemies.length) {
        spawnEnemy(waveEnemies[enemiesSpawned]);
        enemiesSpawned++;
        spawnTimer = Math.max(0.3, 1.0 - wave * 0.05);
      }
    }
  }
}

// ===== RENDERING =====
function render() {
  animFrame++;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 40 * scale;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Path
  if (pathPoints.length > 1) {
    ctx.strokeStyle = 'rgba(255,100,0,0.15)';
    ctx.lineWidth = 20 * scale;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
    for (let i = 1; i < pathPoints.length; i++) {
      ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
    }
    ctx.stroke();

    // Path border
    ctx.strokeStyle = 'rgba(255,150,0,0.3)';
    ctx.lineWidth = 22 * scale;
    ctx.globalCompositeOperation = 'destination-over';
    ctx.beginPath();
    ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
    for (let i = 1; i < pathPoints.length; i++) {
      ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
    }
    ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';

    // Path center line
    ctx.strokeStyle = 'rgba(255,200,0,0.1)';
    ctx.lineWidth = 2 * scale;
    ctx.setLineDash([8 * scale, 8 * scale]);
    ctx.beginPath();
    ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
    for (let i = 1; i < pathPoints.length; i++) {
      ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Print bed (end of path)
  const endPos = pathPoints[pathPoints.length - 1];
  ctx.fillStyle = 'rgba(0,255,255,0.1)';
  ctx.fillRect(endPos.x - 30 * scale, endPos.y - 30 * scale, 60 * scale, 60 * scale);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.strokeRect(endPos.x - 30 * scale, endPos.y - 30 * scale, 60 * scale, 60 * scale);
  ctx.font = `${20 * scale}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🖨️', endPos.x, endPos.y);

  // Start point
  const startPos = pathPoints[0];
  ctx.fillStyle = 'rgba(255,0,255,0.1)';
  ctx.beginPath();
  ctx.arc(startPos.x, startPos.y, 20 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.font = `${16 * scale}px serif`;
  ctx.fillText('👺', startPos.x, startPos.y);

  // Towers
  for (let t of towers) {
    // Range circle (subtle)
    if (selectedTower && dist(mousePos, t) < t.range) {
      ctx.strokeStyle = 'rgba(0,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Base
    ctx.fillStyle = 'rgba(20,20,40,0.8)';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 18 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Turret direction
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 3 * scale;
    ctx.beginPath();
    ctx.moveTo(t.x, t.y);
    ctx.lineTo(t.x + Math.cos(t.angle) * 14 * scale, t.y + Math.sin(t.angle) * 14 * scale);
    ctx.stroke();

    // Emoji
    ctx.font = `${14 * scale}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.emoji, t.x, t.y);
  }

  // Enemies
  for (let e of enemies) {
    if (!e.alive) continue;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y + e.size + 2, e.size * 0.8, e.size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = e.color;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = e.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size * scale, 0, Math.PI * 2);
    ctx.stroke();

    // Emoji
    ctx.font = `${e.size * 1.5 * scale}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.emoji, e.x, e.y - 2);

    // HP bar
    const barW = e.size * 2 * scale;
    const barH = 3 * scale;
    const hpFrac = Math.max(0, e.hp / e.maxHp);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(e.x - barW / 2, e.y - e.size * scale - 8 * scale, barW, barH);
    ctx.fillStyle = hpFrac > 0.5 ? '#0f0' : hpFrac > 0.25 ? '#ff0' : '#f00';
    ctx.fillRect(e.x - barW / 2, e.y - e.size * scale - 8 * scale, barW * hpFrac, barH);

    // Slow indicator
    if (e.slowTimer > 0) {
      ctx.fillStyle = 'rgba(0,150,255,0.5)';
      ctx.font = `${8 * scale}px serif`;
      ctx.fillText('❄️', e.x + e.size * scale, e.y - e.size * scale);
    }
  }

  // Projectiles
  for (let p of projectiles) {
    if (!p.alive) continue;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Particles
  for (let p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Film grain (subtle)
  for (let g of grainSeed) {
    ctx.globalAlpha = g.a * (0.5 + 0.5 * Math.sin(animFrame * 0.1 + g.x));
    ctx.fillStyle = '#fff';
    ctx.fillRect(g.x, g.y, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Wave incoming text
  if (enemies.length === 0 && enemiesSpawned >= enemiesInWave && waveDelay > 0 && waveDelay < 2) {
    ctx.globalAlpha = 1 - waveDelay / 2;
    ctx.font = `bold ${24 * scale}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.fillText(`WAVE ${wave + 1} INCOMING`, W / 2, H / 2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// ===== HUD =====
function updateHUD() {
  document.getElementById('hudLives').textContent = `❤️ ${Math.max(0, lives)}`;
  document.getElementById('hudGold').textContent = `🍝 ${gold}`;
  document.getElementById('hudWave').textContent = `🌊 Wave ${wave}`;
  document.getElementById('hudScore').textContent = `⭐ ${score}`;
}

// ===== GAME FLOW =====
function startGame() {
  lives = 20;
  gold = 100;
  wave = 1;
  score = 0;
  enemies = [];
  towers = [];
  projectiles = [];
  particles = [];
  enemiesSpawned = 0;
  enemiesInWave = 0;
  waveDelay = 0;
  spawnTimer = 0;
  gameOver = false;
  gameRunning = true;
  selectedTower = null;

  document.getElementById('overlay').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('towerPanel').style.display = 'flex';

  updateHUD();
  // Start first wave
  const waveEnemies = getWaveEnemies(1);
  enemiesInWave = waveEnemies.length;
}

function endGame() {
  gameOver = true;
  gameRunning = false;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('finalScore').textContent = `Score: ${score}`;
  document.getElementById('finalWave').textContent = `Reached Wave: ${wave}`;
}

// ===== INPUT =====
let mousePos = { x: 0, y: 0 };

function getCanvasPos(clientX, clientY) {
  return { x: clientX, y: clientY };
}

canvas.addEventListener('click', (e) => {
  if (!gameRunning) return;
  const pos = getCanvasPos(e.clientX, e.clientY);
  mousePos = pos;

  // Check if clicking on existing tower
  for (let t of towers) {
    if (dist(pos, t) < 20 * scale) {
      selectedTower = selectedTower === t ? null : t;
      updateTowerButtons();
      return;
    }
  }

  // Place new tower
  if (selectedTower) {
    placeTower(selectedTower, pos.x, pos.y);
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!gameRunning) return;
  const touch = e.touches[0];
  const pos = getCanvasPos(touch.clientX, touch.clientY);
  mousePos = pos;

  for (let t of towers) {
    if (dist(pos, t) < 25 * scale) {
      selectedTower = selectedTower === t ? null : t;
      updateTowerButtons();
      return;
    }
  }

  if (selectedTower) {
    placeTower(selectedTower, pos.x, pos.y);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  mousePos = getCanvasPos(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('mousemove', (e) => {
  mousePos = getCanvasPos(e.clientX, e.clientY);
});

// Tower selection buttons
function updateTowerButtons() {
  document.querySelectorAll('.tower-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.tower === selectedTower);
  });
}

document.querySelectorAll('.tower-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const type = btn.dataset.tower;
    if (selectedTower === type) {
      selectedTower = null;
    } else {
      selectedTower = type;
    }
    updateTowerButtons();
  });
});

document.getElementById('startBtn').addEventListener('click', () => {
  startGame();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  startGame();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (!gameRunning) return;
  if (e.key === '1') { selectedTower = 'nozzle'; updateTowerButtons(); }
  if (e.key === '2') { selectedTower = 'cooler'; updateTowerButtons(); }
  if (e.key === '3') { selectedTower = 'extruder'; updateTowerButtons(); }
  if (e.key === 'Escape') { selectedTower = null; updateTowerButtons(); }
});

// ===== GAME LOOP =====
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (gameRunning) {
    updateEnemies(dt);
    updateTowers(dt);
    updateProjectiles(dt);
    updateParticles(dt);
    updateWaves(dt);
  }

  render();
  requestAnimationFrame(gameLoop);
}

// ===== START =====
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(gameLoop);
</script>
