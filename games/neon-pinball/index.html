<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEON PINBALL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #0a0a0f; }
    body { display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
    canvas { display: block; touch-action: none; }
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,0.95);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10; font-family: 'Courier New', monospace;
    }
    .overlay h1 { color: #00ff88; font-size: 2.5em; text-shadow: 0 0 20px rgba(0,255,136,0.5); margin-bottom: 10px; }
    .overlay p { color: #888; font-size: 1em; margin: 5px 0; }
    .overlay .hs { color: #00ff88; font-size: 1.2em; margin-bottom: 20px; }
    .btn { padding: 16px 40px; font-size: 1.3em; font-family: 'Courier New', monospace; background: #00ff88; color: #0a0a0a; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="start" class="overlay">
    <h1>NEON PINBALL</h1>
    <p>Swipe to launch | Tap flippers</p>
    <div class="hs" id="hs-start">🏆 High Score: 0</div>
    <button class="btn" onclick="startGame()">▶ PLAY</button>
  </div>
  <div id="gameover" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p id="go-score">Score: 0</p>
    <div class="hs" id="hs-go">🏆 Best: 0</div>
    <button class="btn" onclick="startGame()">▶ PLAY AGAIN</button>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, ball, flippers, bumpers, targets, score, ballsLeft, gameRunning, frame, multiplier, plungerPower;

    function resize() {
      W = Math.min(window.innerWidth, 480);
      H = Math.min(window.innerHeight, 720);
      canvas.width = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    function reset() {
      score = 0;
      ballsLeft = 3;
      multiplier = 1;
      plungerPower = 0;
      frame = 0;
      flippers = [
        {x: W * 0.3, y: H - 60, angle: 0, targetAngle: 0, side: 'left'},
        {x: W * 0.7, y: H - 60, angle: 0, targetAngle: 0, side: 'right'}
      ];
      bumpers = [
        {x: W * 0.25, y: H * 0.35, r: 20, points: 10},
        {x: W * 0.5, y: H * 0.3, r: 20, points: 15},
        {x: W * 0.75, y: H * 0.35, r: 20, points: 10},
        {x: W * 0.35, y: H * 0.5, r: 18, points: 20},
        {x: W * 0.65, y: H * 0.5, r: 18, points: 20},
      ];
      targets = [
        {x: W * 0.15, y: H * 0.2, hit: false, points: 50},
        {x: W * 0.5, y: H * 0.15, hit: false, points: 100},
        {x: W * 0.85, y: H * 0.2, hit: false, points: 50},
      ];
      ball = {x: W * 0.5, y: H * 0.1, vx: 0, vy: 5, r: 8, active: false};
      gameRunning = true;
      document.getElementById('start').classList.add('hidden');
      document.getElementById('gameover').classList.add('hidden');
    }

    function startGame() { reset(); }

    function launchBall(power) {
      if (ball.active) return;
      ball.active = true;
      ball.x = W * 0.5;
      ball.y = H * 0.8;
      ball.vx = (Math.random() - 0.5) * 2;
      ball.vy = -power * 2 - 5;
    }

    function flip(side) {
      for (const f of flippers) {
        if (f.side === side) f.targetAngle = 1;
      }
    }

    function unflip(side) {
      for (const f of flippers) {
        if (f.side === side) f.targetAngle = 0;
      }
    }

    function update() {
      if (!gameRunning) return;
      frame++;

      // Flipper animation
      for (const f of flippers) {
        const diff = f.targetAngle - f.angle;
        f.angle += diff * 0.15;
      }

      if (!ball.active) {
        // Plunger charging
        if (plungerPower < 5) plungerPower += 0.1;
        return;
      }

      // Ball physics
      ball.x += ball.vx;
      ball.y += ball.vy;
      ball.vy += 0.15; // gravity

      // Wall bounce
      if (ball.x < ball.r) { ball.x = ball.r; ball.vx *= -0.8; }
      if (ball.x > W - ball.r) { ball.x = W - ball.r; ball.vx *= -0.8; }
      if (ball.y < ball.r) { ball.y = ball.r; ball.vy *= -0.8; }

      // Drain (bottom)
      if (ball.y > H + ball.r) {
        ballsLeft--;
        if (ballsLeft <= 0) { gameOver(); return; }
        ball.active = false;
        plungerPower = 0;
      }

      // Flipper collision
      for (const f of flippers) {
        const fx = f.x, fy = f.y;
        const dx = ball.x - fx, dy = ball.y - fy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < ball.r + 15) {
          const angle = f.angle * 0.5;
          const nx = Math.cos(angle), ny = Math.sin(angle);
          const dot = ball.vx * nx + ball.vy * ny;
          if (dot > 0) continue;
          ball.vx = -dot * nx * 1.5;
          ball.vy = -dot * ny * 1.5;
        }
      }

      // Bumper collision
      for (const b of bumpers) {
        const dx = ball.x - b.x, dy = ball.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < ball.r + b.r) {
          score += b.points * multiplier;
          const nx = dx / dist, ny = dy / dist;
          ball.vx = nx * 5;
          ball.vy = ny * 5;
          multiplier = Math.min(10, multiplier + 0.1);
        }
      }

      // Target collision
      for (const t of targets) {
        if (t.hit) continue;
        const dx = ball.x - t.x, dy = ball.y - t.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < ball.r + 15) {
          score += t.points * multiplier;
          t.hit = true;
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      // Playfield border
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 3;
      ctx.strokeRect(5, 5, W - 10, H - 10);

      // Bumpers
      for (const b of bumpers) {
        ctx.fillStyle = '#ff4466';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '14px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(b.points, b.x, b.y + 4);
      }

      // Targets
      for (const t of targets) {
        ctx.fillStyle = t.hit ? '#666' : '#ff8844';
        ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText(t.hit ? '✓' : t.points, t.x, t.y + 4);
      }

      // Flippers
      for (const f of flippers) {
        const len = 40;
        const angle = f.angle * 0.5;
        const ex = f.x + Math.cos(Math.PI - angle) * len;
        const ey = f.y + Math.sin(Math.PI - angle) * len;
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(f.x, f.y);
        ctx.lineTo(ex, ey);
        ctx.stroke();
      }

      // Ball
      if (ball.active) {
        ctx.fillStyle = '#ff8844';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff8844';
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // HUD
      ctx.fillStyle = '#00ff88';
      ctx.font = '14px Courier New';
      ctx.textAlign = 'left';
      ctx.fillText('⭐ ' + score + '  🎱 ' + ballsLeft + '  ✖' + multiplier.toFixed(1), 10, 20);

      // Plunger power
      if (!ball.active) {
        ctx.fillStyle = '#444';
        ctx.fillRect(W/2 - 50, H - 80, 100, 10);
        ctx.fillStyle = '#00ff88';
        ctx.fillRect(W/2 - 50, H - 80, plungerPower * 20, 10);
        ctx.fillStyle = '#888';
        ctx.font = '12px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('Swipe up to launch!', W/2, H - 90);
      }
    }

    function gameOver() {
      gameRunning = false;
      const hs = localStorage.getItem('pinball_highscore') || 0;
      if (score > parseInt(hs)) {
        localStorage.setItem('pinball_highscore', score);
        document.getElementById('hs-go').textContent = '🏆 New High Score: ' + score;
      } else {
        document.getElementById('hs-go').textContent = '🏆 Best: ' + hs;
      }
      document.getElementById('go-score').textContent = 'Score: ' + score;
      document.getElementById('gameover').classList.remove('hidden');
    }

    // Touch controls
    let swipeStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const y = t.clientY - rect.top;
      swipeStartY = y;
      // Left/right flippers
      if (y > H - 100) {
        if (t.clientX < W / 2) flip('left');
        else flip('right');
      }
    });
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      unflip('left');
      unflip('right');
      // Swipe up to launch
      if (!ball.active) {
        const rect = canvas.getBoundingClientRect();
        const dy = e.changedTouches[0].clientY - swipeStartY;
        if (dy < -30) launchBall(Math.min(5, Math.abs(dy) / 30));
      }
    });

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    const saved = localStorage.getItem('pinball_highscore') || 0;
    document.getElementById('hs-start').textContent = '🏆 High Score: ' + saved;
    loop();
  </script>
</body>
</html>
