<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Comment Cascade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
  }
  #gameCanvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    cursor: none;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
// COMMENT CASCADE — SnailKing Arcade
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Responsive sizing ---
function resize() {
  const aspect = 9/16;
  let w = window.innerWidth;
  let h = window.innerHeight;
  if (w / h > aspect) {
    canvas.width = h * aspect;
    canvas.height = h;
  } else {
    canvas.width = w;
    canvas.height = w / aspect;
  }
}
resize();
window.addEventListener('resize', () => { resize(); initGame(); });

// --- Constants ---
const COLORS = {
  bg: '#0a0a0f',
  good: '#00ff88',
  bad: '#ff2266',
  spam: '#ffaa00',
  text: '#e0e0e0',
  muted: '#666666',
  accent: '#00ddff',
  combo: '#ff00ff',
  darkOverlay: 'rgba(10,10,15,0.85)',
};

// Comment types with weights per level
const COMMENT_TYPES = {
  good:    { color: COLORS.good,  label: '👍', points: 10,  prob: 0.55 },
  hateful: { color: COLORS.bad,   label: '💀', points: -30, prob: 0.25 },
  spam:    { color: COLORS.spam,  label: '🚫', points: -15, prob: 0.20 },
};

const LEVEL_CONFIG = [
  { speed: 1.0,  spawnRate: 1200, desc: '1K Subs' },
  { speed: 1.3,  spawnRate: 1000, desc: '10K Subs' },
  { speed: 1.6,  spawnRate: 850,  desc: '100K Subs' },
  { speed: 2.0,  spawnRate: 700,  desc: '1M Subs' },
  { speed: 2.5,  spawnRate: 550,  desc: 'Verified' },
  { speed: 3.0,  spawnRate: 450,  desc: 'Partnered' },
  { speed: 3.5,  spawnRate: 350,  desc: 'Trending' },
  { speed: 4.2,  spawnRate: 280,  desc: 'Viral' },
];

// Comment texts
const GOOD_COMMENTS = [
  'This is amazing! 🔥', 'Love this content!', 'First!', 'Subscribed!',
  'So good 😭', 'Tutorial of the year', 'I learned so much', 'Thanks for this!',
  'This helped me fix my print!', 'Legend', 'G.O.A.T.', 'Sharing with friends!',
  'Been waiting for this!', 'Best video ever', 'Youre the best!', 'Lets goooo!',
  'Absolute cinema 🎬', 'The algorithm gods blessed us today', 'My inner nerd is tingling',
  'This saved my project', 'Instant classic', 'The comments are GOATed here',
];

const HATEFUL_COMMENTS = [
  'This is garbage', 'Unsubbed', 'Worst video ever', 'You suck',
  'Why do you even try', 'Nobody asked for this', 'Go back to school',
  'Your printer is trash', 'This is why no one likes you',
  'Delete this immediately', 'You are a failure', 'How do you mess this up',
  'Go away', 'I hate this', 'This is cringe', 'You should quit',
];

const SPAM_COMMENTS = [
  'Check my profile for FREE ROBUX!', 'DM me for onlyfans!', 'Visit bit.ly/xyz free gift',
  'Follow for follow!!', 'Drop your IG @', 'SUBSCRIBE TO MY CHANNEL 100K!',
  'YOU WON A FREE IPHONE click here', 'Get rich quick with this one weird trick',
  'DM me to join our FREE discord nitro!', '100% working hack get it now',
  'I can make you famous DM me', 'Join my patreon for free stuff',
];

// --- Game State ---
let state;
const PLAYER_W = 70;
const PLAYER_H = 28;
const COMMENT_W = 140;
const COMMENT_H = 32;

function initGame() {
  state = {
    phase: 'menu',    // menu, playing, gameover
    score: 0,
    lives: 3,
    level: 0,
    combo: 0,
    maxCombo: 0,
    comments: [],
    lastSpawn: 0,
    player: {
      x: canvas.width / 2 - PLAYER_W / 2,
      y: canvas.height - PLAYER_H - 20,
    },
    particles: [],
    shakeTimer: 0,
    flashTimer: 0,
    flashColor: null,
    mouseX: canvas.width / 2,
    lastTime: 0,
  };
}

function spawnComment() {
  const r = Math.random();
  let type;
  if (r < COMMENT_TYPES.good.prob) type = 'good';
  else if (r < COMMENT_TYPES.good.prob + COMMENT_TYPES.hateful.prob) type = 'hateful';
  else type = 'spam';

  const textArr = type === 'good' ? GOOD_COMMENTS
                  : type === 'hateful' ? HATEFUL_COMMENTS
                  : SPAM_COMMENTS;

  const text = textArr[Math.floor(Math.random() * textArr.length)];
  const speed = LEVEL_CONFIG[Math.min(state.level, LEVEL_CONFIG.length - 1)].speed;

  state.comments.push({
    x: Math.random() * (canvas.width - COMMENT_W),
    y: -COMMENT_H,
    w: COMMENT_W,
    h: COMMENT_H,
    type,
    text,
    speed: (1.5 + Math.random() * 0.8) * speed,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 1 + Math.random(),
  });
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 1,
      color,
      size: 2 + Math.random() * 4,
    });
  }
}

function addScreenShake(amount) {
  state.shakeTimer = Math.max(state.shakeTimer, amount);
}

function flash(color) {
  state.flashColor = color;
  state.flashTimer = 0.15;
}

function update(dt) {
  if (state.phase !== 'playing') return;

  const now = Date.now();
  const cfg = LEVEL_CONFIG[Math.min(state.level, LEVEL_CONFIG.length - 1)];

  // Spawn comments
  if (now - state.lastSpawn > cfg.spawnRate) {
    spawnComment();
    state.lastSpawn = now;
  }

  // Update player position (lerp toward mouse)
  const targetX = Math.max(0, Math.min(canvas.width - PLAYER_W, state.mouseX - PLAYER_W / 2));
  state.player.x += (targetX - state.player.x) * 0.2;

  // Update comments
  for (let i = state.comments.length - 1; i >= 0; i--) {
    const c = state.comments[i];
    c.y += c.speed * dt * 60;
    c.wobble += c.wobbleSpeed * dt;

    // Collision with player
    const cx = c.x + Math.sin(c.wobble) * 5;
    if (
      cx < state.player.x + PLAYER_W &&
      cx + c.w > state.player.x &&
      c.y + c.h > state.player.y &&
      c.y < state.player.y + PLAYER_H
    ) {
      const typeData = COMMENT_TYPES[c.type];
      state.score += typeData.points * (1 + state.combo * 0.1);
      if (typeData.points > 0) {
        state.combo++;
        state.maxCombo = Math.max(state.maxCombo, state.combo);
        spawnParticles(cx + c.w / 2, c.y + c.h / 2, COLORS.combo, 8);
      } else {
        state.combo = 0;
        state.lives--;
        addScreenShake(10);
        flash(COLORS.bad);
        spawnParticles(cx + c.w / 2, c.y + c.h / 2, COLORS.bad, 12);
      }
      state.comments.splice(i, 1);
      continue;
    }

    // Hateful comment hit bottom
    if (c.y > canvas.height && c.type === 'hateful') {
      state.combo = 0;
      state.lives--;
      addScreenShake(12);
      flash(COLORS.bad);
      state.comments.splice(i, 1);
      continue;
    }

    // Spam comment hit bottom (no penalty, just disappears)
    if (c.y > canvas.height && c.type === 'spam') {
      state.comments.splice(i, 1);
      continue;
    }

    // Good comment hit bottom (missed opportunity)
    if (c.y > canvas.height && c.type === 'good') {
      state.combo = 0;
      state.comments.splice(i, 1);
      continue;
    }
  }

  // Update particles
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt * 2;
    if (p.life <= 0) state.particles.splice(i, 1);
  }

  // Update flash
  if (state.flashTimer > 0) state.flashTimer -= dt;
  if (state.shakeTimer > 0) state.shakeTimer -= dt;

  // Level up
  const newLevel = Math.min(LEVEL_CONFIG.length - 1, Math.floor(state.score / 500));
  if (newLevel > state.level) state.level = newLevel;

  // Game over
  if (state.lives <= 0) state.phase = 'gameover';
}

function drawRoundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke(); }
}

function drawComment(c) {
  const typeData = COMMENT_TYPES[c.type];
  const wobbleX = Math.sin(c.wobble) * 5;
  const x = c.x + wobbleX;
  const y = c.y;

  // Background bubble
  const bgColor = typeData.color + '22';
  const borderColor = typeData.color;
  drawRoundRect(x, y, c.w, c.h, 8, bgColor, borderColor);

  // Label emoji
  ctx.font = '14px sans-serif';
  ctx.fillText(typeData.label, x + 8, y + 20);

  // Text (clip to bubble width)
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(x + 28, y + 4, c.w - 36, c.h - 8, 4);
  ctx.clip();
  ctx.fillStyle = typeData.color;
  ctx.font = '11px "Courier New", monospace';
  ctx.fillText(c.text, x + 32, y + 20);
  ctx.restore();
}

function drawPlayer() {
  const { x, y } = state.player;

  // Glow
  ctx.shadowColor = COLORS.accent;
  ctx.shadowBlur = 15;

  // Cursor shape
  ctx.fillStyle = COLORS.accent;
  ctx.beginPath();
  ctx.moveTo(x + PLAYER_W / 2, y);
  ctx.lineTo(x + PLAYER_W / 2 + 12, y + PLAYER_H);
  ctx.lineTo(x + PLAYER_W / 2 - 12, y + PLAYER_H);
  ctx.closePath();
  ctx.fill();

  // Inner dot
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x + PLAYER_W / 2, y + 8, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawHUD() {
  const cfg = LEVEL_CONFIG[Math.min(state.level, LEVEL_CONFIG.length - 1)];

  // Score
  ctx.fillStyle = COLORS.accent;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${Math.floor(state.score)}`, 10, 28);

  // Lives
  ctx.fillStyle = COLORS.bad;
  ctx.fillText('❤'.repeat(Math.max(0, state.lives)), 10, 50);

  // Level
  ctx.fillStyle = COLORS.muted;
  ctx.font = '12px "Courier New", monospace';
  ctx.fillText(`${cfg.desc} (Lv.${state.level + 1})`, 10, 70);

  // Combo
  if (state.combo > 1) {
    ctx.fillStyle = COLORS.combo;
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`COMBO x${state.combo}`, canvas.width - 10, 30);
    ctx.textAlign = 'left';
  }

  // Max combo
  if (state.maxCombo > 1) {
    ctx.fillStyle = COLORS.muted;
    ctx.font = '11px "Courier New", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`Best: x${state.maxCombo}`, canvas.width - 10, 50);
    ctx.textAlign = 'left';
  }
}

function drawGrain() {
  // Simple film grain overlay
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 300; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
    ctx.fillRect(x, y, 1, 1);
  }
  ctx.globalAlpha = 1;
}

function render() {
  // Shake offset
  let sx = 0, sy = 0;
  if (state.shakeTimer > 0) {
    sx = (Math.random() - 0.5) * state.shakeTimer;
    sy = (Math.random() - 0.5) * state.shakeTimer;
  }

  ctx.save();
  ctx.translate(sx, sy);

  // Background
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,221,255,0.05)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Flash overlay
  if (state.flashTimer > 0) {
    ctx.globalAlpha = state.flashTimer * 0.3;
    ctx.fillStyle = state.flashColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  }

  if (state.phase === 'menu') {
    drawMenu();
  } else if (state.phase === 'playing') {
    // Comments
    for (const c of state.comments) drawComment(c);
    // Player
    drawPlayer();
    // Particles
    for (const p of state.particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    // HUD
    drawHUD();
    // Grain
    drawGrain();
  } else if (state.phase === 'gameover') {
    for (const c of state.comments) drawComment(c);
    drawGameOver();
  }

  ctx.restore();
}

function drawMenu() {
  // Title
  ctx.fillStyle = COLORS.accent;
  ctx.font = 'bold 26px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('COMMENT CASCADE', canvas.width / 2, canvas.height * 0.22);

  ctx.fillStyle = COLORS.muted;
  ctx.font = '12px "Courier New", monospace';
  ctx.fillText('Moderate the chat. Catch hate. Avoid spam.', canvas.width / 2, canvas.height * 0.30);

  // Legend
  const lx = canvas.width / 2 - 80;
  const ly = canvas.height * 0.40;

  ctx.font = '12px "Courier New", monospace';
  ctx.textAlign = 'left';

  ctx.fillStyle = COLORS.good + '44';
  drawRoundRect(lx, ly, 160, 26, 6, COLORS.good + '22', COLORS.good);
  ctx.fillStyle = COLORS.good;
  ctx.fillText('👍  Good Comment — +pts + combo', lx + 10, ly + 17);

  ctx.fillStyle = COLORS.bad + '44';
  drawRoundRect(lx, ly + 34, 160, 26, 6, COLORS.bad + '22', COLORS.bad);
  ctx.fillStyle = COLORS.bad;
  ctx.fillText('💀  Hate Comment — catch or lose!', lx + 10, ly + 51);

  ctx.fillStyle = COLORS.spam + '44';
  drawRoundRect(lx, ly + 68, 160, 26, 6, COLORS.spam + '22', COLORS.spam);
  ctx.fillStyle = COLORS.spam;
  ctx.fillText('🚫  Spam — avoid!', lx + 10, ly + 85);

  // Start button
  const bx = canvas.width / 2 - 80;
  const by = canvas.height * 0.72;
  const bw = 160;
  const bh = 44;
  drawRoundRect(bx, by, bw, bh, 10, COLORS.accent + '33', COLORS.accent);
  ctx.fillStyle = COLORS.accent;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('▶ START', canvas.width / 2, by + 28);

  ctx.fillStyle = COLORS.muted;
  ctx.font = '10px "Courier New", monospace';
  ctx.fillText('Mouse or touch to move', canvas.width / 2, canvas.height * 0.86);

  drawGrain();
}

function drawGameOver() {
  ctx.fillStyle = COLORS.darkOverlay;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';

  ctx.fillStyle = COLORS.bad;
  ctx.font = 'bold 28px "Courier New", monospace';
  ctx.fillText('CHAT BANNED', canvas.width / 2, canvas.height * 0.30);

  ctx.fillStyle = COLORS.accent;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.fillText(`Score: ${Math.floor(state.score)}`, canvas.width / 2, canvas.height * 0.42);

  ctx.fillStyle = COLORS.combo;
  ctx.font = '14px "Courier New", monospace';
  ctx.fillText(`Max Combo: x${state.maxCombo}`, canvas.width / 2, canvas.height * 0.50);

  // Restart
  const bx = canvas.width / 2 - 80;
  const by = canvas.height * 0.60;
  drawRoundRect(bx, by, 160, 44, 10, COLORS.accent + '33', COLORS.accent);
  ctx.fillStyle = COLORS.accent;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.fillText('↻ TRY AGAIN', canvas.width / 2, by + 28);

  drawGrain();
}

// --- Game Loop ---
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - state.lastTime) / 1000, 0.1);
  state.lastTime = timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// --- Input Handling ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY,
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

function handleMove(e) {
  e.preventDefault();
  const pos = getPos(e);
  state.mouseX = pos.x;
}

function handleClick(e) {
  e.preventDefault();
  const pos = getPos(e);

  if (state.phase === 'menu') {
    // Check start button
    const bx = canvas.width / 2 - 80;
    const by = canvas.height * 0.72;
    if (pos.x >= bx && pos.x <= bx + 160 && pos.y >= by && pos.y <= by + 44) {
      state.phase = 'playing';
      state.score = 0;
      state.lives = 3;
      state.level = 0;
      state.combo = 0;
      state.maxCombo = 0;
      state.comments = [];
      state.particles = [];
      state.lastSpawn = Date.now();
    }
  } else if (state.phase === 'gameover') {
    const bx = canvas.width / 2 - 80;
    const by = canvas.height * 0.60;
    if (pos.x >= bx && pos.x <= bx + 160 && pos.y >= by && pos.y <= by + 44) {
      state.phase = 'playing';
      state.score = 0;
      state.lives = 3;
      state.level = 0;
      state.combo = 0;
      state.maxCombo = 0;
      state.comments = [];
      state.particles = [];
      state.lastSpawn = Date.now();
    }
  }
}

canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('touchmove', handleMove, { passive: false });
canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart', handleClick, { passive: false });

// Keyboard controls (WASD / Arrow keys)
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) {
    e.preventDefault();
  }
  if (state.phase === 'menu' && (e.key === 'Enter' || e.key === ' ')) {
    state.phase = 'playing';
    state.score = 0; state.lives = 3; state.level = 0;
    state.combo = 0; state.maxCombo = 0;
    state.comments = []; state.particles = [];
    state.lastSpawn = Date.now();
  }
  if (state.phase === 'gameover' && (e.key === 'Enter' || e.key === ' ')) {
    state.phase = 'playing';
    state.score = 0; state.lives = 3; state.level = 0;
    state.combo = 0; state.maxCombo = 0;
    state.comments = []; state.particles = [];
    state.lastSpawn = Date.now();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Keyboard player movement update
setInterval(() => {
  if (state.phase !== 'playing') return;
  const speed = 8;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) state.mouseX -= speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) state.mouseX += speed;
  state.mouseX = Math.max(0, Math.min(canvas.width, state.mouseX));
}, 16);

// --- Start ---
initGame();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
