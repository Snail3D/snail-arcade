<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>G-Code Grab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Courier New',monospace;color:#0ff}
#gameCanvas{display:block;width:100%;height:100%}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,.95);z-index:10;pointer-events:auto}
#overlay.hidden{display:none}
#overlay h1{font-size:clamp(28px,6vw,56px);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #08f;margin-bottom:8px;letter-spacing:4px}
#overlay .subtitle{color:#f0f;font-size:clamp(12px,2.5vw,18px);margin-bottom:30px;text-shadow:0 0 10px #f0f}
#overlay .info{color:#888;font-size:clamp(10px,2vw,14px);text-align:center;line-height:1.8;max-width:400px;padding:0 20px;margin-bottom:30px}
#startBtn,#restartBtn{pointer-events:auto;background:transparent;border:2px solid #0ff;color:#0ff;padding:14px 40px;font-size:clamp(16px,3vw,22px);font-family:'Courier New',monospace;cursor:pointer;text-transform:uppercase;letter-spacing:3px;transition:all .2s}
#startBtn:hover,#restartBtn:hover{background:#0ff;color:#0a0a12;box-shadow:0 0 20px #0ff}
#hud{position:fixed;top:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(10,10,18,.8);border-bottom:1px solid #0ff3;font-size:clamp(12px,2.5vw,16px);z-index:5;pointer-events:none}
#hud .score{color:#0ff}
#hud .layer{color:#f0f}
#hud .combo{color:#ff0}
#layerBar{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#0ff,#f0f);z-index:5;transition:width .3s;pointer-events:none}
#touchControls{position:fixed;bottom:0;left:0;right:0;height:40%;display:none;justify-content:space-between;z-index:4;pointer-events:auto}
.touch-btn{width:50%;height:100%;background:transparent;border:none;pointer-events:auto;touch-action:none}
.touch-btn::after{content:'';position:absolute;inset:0;border:1px solid #0ff2;border-radius:20px}
#touchL{border-radius:0 0 0 20px}
#touchR{border-radius:0 0 20px 0}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <span class="score">SCORE: <span id="hudScore">0</span></span>
  <span class="combo">COMBO: <span id="hudCombo">x1</span></span>
  <span class="layer">LAYER: <span id="hudLayer">1</span></span>
</div>
<div id="layerBar" style="width:0%"></div>
<div id="touchControls">
  <button class="touch-btn" id="touchL"></button>
  <button class="touch-btn" id="touchR"></button>
</div>
<div id="overlay">
  <h1>G-CODE GRAB</h1>
  <div class="subtitle">COLLECT THE CODE. DODGE THE ERRORS.</div>
  <div class="info">
    Move your nozzle to collect G-code commands:<br>
    <span style="color:#0ff">G0/G1</span> — Moves &nbsp;
    <span style="color:#0f0">M104</span> — Temperature<br>
    <span style="color:#f0f">G28</span> — Home &nbsp;
    <span style="color:#ff0">G92</span> — Reset<br><br>
    <span style="color:#f44">AVOID</span> — Under-extrusion, Stringing, Warping<br><br>
    Build up combos for bonus points!
  </div>
  <button id="startBtn">INITIALIZE</button>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const hud=document.getElementById('hud');
const hudScore=document.getElementById('hudScore');
const hudCombo=document.getElementById('hudCombo');
const hudLayer=document.getElementById('hudLayer');
const layerBar=document.getElementById('layerBar');
const touchControls=document.getElementById('touchControls');

let W,H,dpr;
function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

// Audio
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type='sine',vol=0.15){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxCollect(){playTone(880,.1,'sine',0.12);playTone(1320,.08,'sine',0.08)}
function sfxError(){playTone(150,.25,'sawtooth',0.15)}
function sfxCombo(){playTone(660,.08);setTimeout(()=>playTone(880,.08),80);setTimeout(()=>playTone(1100,.12),160)}
function sfxLayerUp(){playTone(523,.1);setTimeout(()=>playTone(659,.1),100);setTimeout(()=>playTone(784,.15),200)}

// Game state
let game={running:false,score:0,layer:1,combo:0,maxCombo:0,layerProgress:0,layerTarget:10,nozzleX:0,nozzleY:0,nozzleW:40,nozzleH:20,
  items:[],particles:[],grainOffset:0,shakeX:0,shakeY:0,shakeTime:0,
  spawnTimer:0,spawnInterval:60,invincible:0,
  keys:{left:false,right:false},
  touchDir:0,lastCollectTime:0,
  bgStars:[],gcodeLines:[]};

function initBg(){
  game.bgStars=[];
  for(let i=0;i<80;i++)game.bgStars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.5,b:Math.random()});
  game.gcodeLines=[];
  const lines=['G28','G0 Z10','G1 F1500','M104 S200','G92 E0','G1 X50 Y50 E10','M140 S60','G0 Z0.2','G1 X100 E20','G28 X0'];
  for(let i=0;i<12;i++){
    game.gcodeLines.push({x:Math.random()*W,y:Math.random()*H,l:lines[Math.floor(Math.random()*lines.length)],s:Math.random()*8+10,a:Math.random()*0.08+0.02});
  }
}

function goodTypes(){
  return[
    {text:'G0',color:'#0ff',pts:10},
    {text:'G1',color:'#0ff',pts:10},
    {text:'G28',color:'#f0f',pts:25},
    {text:'M104',color:'#0f0',pts:15},
    {text:'G92',color:'#ff0',pts:20},
    {text:'G0 Z',color:'#0ff',pts:10},
    {text:'G1 X',color:'#0ff',pts:10},
    {text:'M140',color:'#0f0',pts:15},
  ];
}
function badTypes(){
  return[
    {text:'UNDER-X',color:'#f44',pts:-30},
    {text:'STRING',color:'#f84',pts:-20},
    {text:'WARP',color:'#f44',pts:-25},
    {text:'CLOG',color:'#f64',pts:-20},
    {text:'DELAM',color:'#f44',pts:-35},
  ];
}

function spawnItem(){
  const isBad=Math.random()<0.3+game.layer*0.03;
  const pool=isBad?badTypes():goodTypes();
  const t=pool[Math.floor(Math.random()*pool.length)];
  const speed=1.5+game.layer*0.25+Math.random()*1.5;
  game.items.push({
    x:Math.random()*(W-60)+30,
    y:-30,
    w:Math.max(50,ctx.measureText(t.text).width+20),
    h:22,
    text:t.text,
    color:t.color,
    pts:t.pts,
    speed:Math.min(speed,6),
    bad:isBad,
    rot:(Math.random()-0.5)*0.3,
    alpha:1,
    pulse:Math.random()*Math.PI*2,
  });
}

function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*3+1;
    game.particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,color,size:Math.random()*3+1});
  }
}

function resetGame(){
  game.score=0;game.layer=1;game.combo=0;game.maxCombo=0;
  game.layerProgress=0;game.layerTarget=10;
  game.nozzleX=W/2;game.nozzleY=H-80;
  game.items=[];game.particles=[];
  game.spawnTimer=0;game.spawnInterval=55;
  game.invincible=0;game.shakeTime=0;
  game.touchDir=0;game.lastCollectTime=0;
  initBg();
}

function startGame(){
  initAudio();
  resetGame();
  game.running=true;
  overlay.classList.add('hidden');
  hud.style.display='flex';
  touchControls.style.display='flex';
  updateHUD();
}

function gameOver(){
  game.running=false;
  hud.style.display='none';
  touchControls.style.display='none';
  overlay.classList.remove('hidden');
  overlay.innerHTML=`
    <h1>PRINT ABORTED</h1>
    <div class="subtitle">FINAL SCORE: ${game.score}</div>
    <div class="info">Layer reached: ${game.layer}<br>Max combo: x${game.maxCombo}<br>G-code collected: ${game.layerProgress + game.layer*10 - game.layerTarget + 10}</div>
    <button id="restartBtn" onclick="document.getElementById('overlay').classList.add('hidden');document.getElementById('hud').style.display='flex';document.getElementById('touchControls').style.display='flex';resetGame();game.running=true;">RETRY</button>
  `;
}

function updateHUD(){
  hudScore.textContent=game.score;
  hudCombo.textContent='x'+Math.max(1,game.combo);
  hudCombo.style.color=game.combo>=5?'#f0f':game.combo>=3?'#ff0':'#888';
  hudLayer.textContent=game.layer;
  const pct=Math.min(100,(game.layerProgress/game.layerTarget)*100);
  layerBar.style.width=pct+'%';
}

// Input
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')game.keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')game.keys.right=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')game.keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')game.keys.right=false;
});

let touchInterval=null;
function handleTouch(dir){
  game.touchDir=dir;
}
function stopTouch(){
  game.touchDir=0;
}
const touchL=document.getElementById('touchL');
const touchR=document.getElementById('touchR');
touchL.addEventListener('touchstart',e=>{e.preventDefault();handleTouch(-1)},{passive:false});
touchL.addEventListener('touchend',e=>{e.preventDefault();stopTouch()},{passive:false});
touchL.addEventListener('touchcancel',e=>{e.preventDefault();stopTouch()},{passive:false});
touchR.addEventListener('touchstart',e=>{e.preventDefault();handleTouch(1)},{passive:false});
touchR.addEventListener('touchend',e=>{e.preventDefault();stopTouch()},{passive:false});
touchR.addEventListener('touchcancel',e=>{e.preventDefault();stopTouch()},{passive:false});

startBtn.addEventListener('click',startGame);

// Collision
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// Main loop
let lastTime=0;
function gameLoop(timestamp){
  requestAnimationFrame(gameLoop);
  const dt=Math.min((timestamp-lastTime)/16.67,3);
  lastTime=timestamp;
  if(!game.running)return;

  // Move nozzle
  const speed=5*dt;
  if(game.keys.left||game.touchDir===-1)game.nozzleX-=speed;
  if(game.keys.right||game.touchDir===1)game.nozzleX+=speed;
  game.nozzleX=Math.max(game.nozzleW/2,Math.min(W-game.nozzleW/2,game.nozzleX));
  game.nozzleY=H-80;

  // Shake decay
  if(game.shakeTime>0){game.shakeTime-=dt;if(game.shakeTime<=0){game.shakeX=0;game.shakeY=0}}
  if(game.invincible>0)game.invincible-=dt;

  // Spawn items
  game.spawnTimer+=dt;
  if(game.spawnTimer>=game.spawnInterval/game.speedFactor()){
    game.spawnTimer=0;
    spawnItem();
    if(game.layer>3&&Math.random()<0.3)spawnItem();
    if(game.layer>6&&Math.random()<0.3)spawnItem();
  }

  // Update items
  for(let i=game.items.length-1;i>=0;i--){
    const item=game.items[i];
    item.y+=item.speed*dt;
    item.pulse+=0.1*dt;

    // Check collision with nozzle
    const nx=game.nozzleX-game.nozzleW/2;
    const ny=game.nozzleY-game.nozzleH/2;
    if(rectsOverlap(nx,ny,game.nozzleW,game.nozzleH,item.x-item.w/2,item.y-10,item.w,20)){
      if(item.bad){
        if(game.invincible<=0){
          game.score=Math.max(0,game.score+item.pts);
          game.combo=0;
          game.shakeTime=10;
          game.shakeX=(Math.random()-0.5)*8;
          game.shakeY=(Math.random()-0.5)*8;
          spawnParticles(item.x,item.y,'#f44',12);
          sfxError();
          game.invincible=20;
        }
      }else{
        const now=Date.now();
        if(now-game.lastCollectTime<1500)game.combo++;
        else game.combo=1;
        game.lastCollectTime=now;
        game.maxCombo=Math.max(game.maxCombo,game.combo);
        const comboMult=Math.max(1,game.combo);
        game.score+=item.pts*comboMult;
        game.layerProgress++;
        spawnParticles(item.x,item.y,item.color,10);
        sfxCollect();
        if(game.combo>=3)sfxCombo();

        // Layer up
        if(game.layerProgress>=game.layerTarget){
          game.layer++;
          game.layerProgress=0;
          game.layerTarget=Math.floor(game.layerTarget*1.3);
          game.spawnInterval=Math.max(20,60-game.layer*3);
          sfxLayerUp();
          spawnParticles(W/2,H/2,'#f0f',20);
        }
      }
      game.items.splice(i,1);
      updateHUD();
      continue;
    }

    // Remove if off screen
    if(item.y>H+50){
      if(!item.bad){
        game.combo=0;
      }
      game.items.splice(i,1);
    }
  }

  // Update particles
  for(let i=game.particles.length-1;i>=0;i--){
    const p=game.particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=0.05*dt;
    p.life-=0.03*dt;
    if(p.life<=0)game.particles.splice(i,1);
  }

  // Grain offset
  game.grainOffset=Math.random()*1000;

  render();
}

// speedFactor helper
game.speedFactor=function(){return 1};

function render(){
  ctx.save();
  ctx.translate(game.shakeX,game.shakeY);

  // Background
  ctx.fillStyle='#0a0a12';
  ctx.fillRect(-10,-10,W+20,H+20);

  // Grid
  ctx.strokeStyle='#0ff08';
  ctx.lineWidth=0.5;
  const gridSize=40;
  for(let x=0;x<W;x+=gridSize){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gridSize){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // Background G-code lines
  ctx.font='10px Courier New';
  for(const line of game.gcodeLines){
    ctx.fillStyle=line.color||'#0ff';
    ctx.globalAlpha=line.a;
    ctx.fillText(line.l,line.x,line.y);
  }
  ctx.globalAlpha=1;

  // Stars
  for(const star of game.bgStars){
    star.b+=0.01*dt;
    const alpha=0.3+Math.sin(star.b)*0.3;
    ctx.fillStyle=`rgba(0,255,255,${alpha})`;
    ctx.fillRect(star.x,star.y,star.s,star.s);
  }

  // Build plate
  const plateY=H-120;
  const plateH=H-plateY-60;
  ctx.fillStyle='#0d0d1a';
  ctx.fillRect(0,plateY,W,plateH);
  ctx.strokeStyle='#0ff2';
  ctx.lineWidth=1;
  ctx.strokeRect(0,plateY,W,plateH);

  // Build plate lines (layer lines)
  ctx.strokeStyle='#0ff08';
  for(let y=plateY;y<H-60;y+=8){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // Draw items
  for(const item of game.items){
    ctx.save();
    ctx.translate(item.x,item.y);
    ctx.rotate(item.rot);

    // Glow
    ctx.shadowColor=item.color;
    ctx.shadowBlur=8+Math.sin(item.pulse)*4;

    // Background pill
    ctx.fillStyle=item.bad?'rgba(255,50,50,0.15)':'rgba(0,255,255,0.1)';
    ctx.strokeStyle=item.color;
    ctx.lineWidth=1.5;
    const r=5;
    const x=-item.w/2,y=-10,w=item.w,h=20;
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    ctx.fill();ctx.stroke();

    // Text
    ctx.shadowBlur=0;
    ctx.fillStyle=item.color;
    ctx.font='bold 11px Courier New';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(item.text,0,0);

    ctx.restore();
  }

  // Draw nozzle
  const nx=game.nozzleX;
  const ny=game.nozzleY;
  ctx.save();
  ctx.translate(nx,ny);

  // Invincibility flash
  if(game.invincible>0&&Math.floor(game.invincible)%4<2){
    ctx.globalAlpha=0.5;
  }

  // Nozzle body
  ctx.fillStyle='#1a1a2e';
  ctx.strokeStyle='#0ff';
  ctx.lineWidth=2;
  ctx.shadowColor='#0ff';
  ctx.shadowBlur=10;

  // Nozzle shape - trapezoid
  ctx.beginPath();
  ctx.moveTo(-15,-10);ctx.lineTo(15,-10);
  ctx.lineTo(8,10);ctx.lineTo(-8,10);
  ctx.closePath();
  ctx.fill();ctx.stroke();

  // Nozzle tip
  ctx.fillStyle='#0ff';
  ctx.beginPath();
  ctx.moveTo(-4,10);ctx.lineTo(4,10);
  ctx.lineTo(0,16);
  ctx.closePath();
  ctx.fill();

  // Hotend glow
  ctx.fillStyle=`rgba(255,${100+Math.sin(Date.now()/200)*50},0,0.3)`;
  ctx.beginPath();
  ctx.arc(0,16,6,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  // Particles
  for(const p of game.particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // Film grain overlay
  ctx.globalAlpha=0.03;
  for(let i=0;i<200;i++){
    const gx=Math.random()*W;
    const gy=Math.random()*H;
    ctx.fillStyle=Math.random()>0.5?'#fff':'#000';
    ctx.fillRect(gx,gy,1,1);
  }
  ctx.globalAlpha=1;

  // Vignette
  const grad=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);
  grad.addColorStop(0,'rgba(10,10,18,0)');
  grad.addColorStop(1,'rgba(10,10,18,0.5)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  ctx.restore();
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
