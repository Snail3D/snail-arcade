<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐌 Snail Hugger FPS 🐌</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a0a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100;
  }
  
  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.8);
    border-radius: 2px;
  }
  #crosshair::before { width: 2px; height: 24px; left: 11px; top: 0; }
  #crosshair::after { width: 24px; height: 2px; top: 11px; left: 0; }
  
  #hug-indicator {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, 30px);
    color: #fff; font-size: 18px; font-weight: bold;
    text-shadow: 0 0 10px #ff6b9d, 0 2px 4px rgba(0,0,0,0.8);
    opacity: 0; transition: opacity 0.2s;
    text-align: center;
  }
  #hug-indicator.show { opacity: 1; }
  
  #score-panel {
    position: absolute; top: 20px; right: 20px;
    background: rgba(0,0,0,0.6); border: 2px solid #ff6b9d;
    border-radius: 12px; padding: 12px 20px;
    color: #fff; text-align: right;
  }
  #score-panel .label { font-size: 12px; color: #ff6b9d; text-transform: uppercase; letter-spacing: 2px; }
  #score-panel .value { font-size: 36px; font-weight: bold; color: #fff; text-shadow: 0 0 20px #ff6b9d; }
  
  #controls-panel {
    position: absolute; bottom: 20px; left: 20px;
    background: rgba(0,0,0,0.5); border-radius: 8px; padding: 10px 14px;
    color: rgba(255,255,255,0.7); font-size: 13px; line-height: 1.6;
  }
  #controls-panel span { color: #ff6b9d; font-weight: bold; }
  
  #message {
    position: absolute; top: 30%; left: 50%;
    transform: translateX(-50%);
    font-size: 32px; font-weight: bold; color: #fff;
    text-shadow: 0 0 30px #ff6b9d, 0 0 60px #ff6b9d;
    opacity: 0; transition: opacity 0.5s;
    text-align: center;
  }
  #message.show { opacity: 1; }
  
  #click-to-start {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 5, 30, 0.95); z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #click-to-start h1 {
    font-size: 64px; color: #ff6b9d; text-shadow: 0 0 40px #ff6b9d;
    margin-bottom: 10px;
  }
  #click-to-start h2 {
    font-size: 28px; color: #fff; margin-bottom: 40px;
  }
  #click-to-start p { color: rgba(255,255,255,0.6); font-size: 18px; margin: 5px 0; }
  #click-to-start .start-btn {
    margin-top: 30px; padding: 15px 50px; font-size: 24px; font-weight: bold;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    color: #fff; border: none; border-radius: 50px; cursor: pointer;
    pointer-events: all;
    box-shadow: 0 0 30px rgba(255,107,157,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #click-to-start .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(255,107,157,0.8);
  }
  
  .heart-burst {
    position: fixed; pointer-events: none; z-index: 150;
    font-size: 32px; animation: heartBurst 1s ease-out forwards;
  }
  @keyframes heartBurst {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    50% { opacity: 1; transform: translate(-50%, -100%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); }
  }
</style>
</head>
<body>

<div id="click-to-start">
  <h1>🐌 SNAIL HUGGER 🐌</h1>
  <h2>First Person Hugging Adventure</h2>
  <p><span style="color:#ff6b9d">WASD</span> — Move</p>
  <p><span style="color:#ff6b9d">MOUSE</span> — Look around</p>
  <p><span style="color:#ff6b9d">E</span> — Hug nearby snails!</p>
  <p style="margin-top:15px; color:#ff6b9d;">Hug all the SnailKing subjects to spread joy! 💖</p>
  <button class="start-btn" onclick="startGame()">CLICK TO PLAY</button>
</div>

<div id="hud">
  <div id="crosshair"></div>
  <div id="hug-indicator">💖 Press E to HUG!</div>
  <div id="score-panel">
    <div class="label">Hugs</div>
    <div class="value" id="score">0</div>
  </div>
  <div id="controls-panel">
    <span>WASD</span> Move &nbsp;|&nbsp; <span>MOUSE</span> Look &nbsp;|&nbsp; <span>E</span> Hug
  </div>
  <div id="message"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Game state
let camera, scene, renderer;
let playerHeight = 1.7;
let moveSpeed = 0.12;
let npcs = [];
let score = 0;
let gameStarted = false;
let isLocked = false;

let keys = { w: false, a: false, s: false, d: false, e: false };
let mouse = { x: 0, y: 0, dx: 0, dy: 0 };
let yaw = 0, pitch = 0;

const NPC_COUNT = 12;
const HUG_DIST = 2.5;

// Snail names for messages
const SNAIL_NAMES = ['Sir Slimebert', 'Princess Shelly', 'Sir Hugsworth', 'Lady Mozzarella', 'Duke Squash', 'Baron von Slug', 'Queen Helix', 'Sir Crawley', 'Lady Spiral', 'Duke Nautilus', 'Sir Gloop', 'Baron Muffin'];
const HUG_MESSAGES = [
  "WARM HUGS! 💖", "SQUISHY LOVE! 🐌", "SNAIL LOVE! 💕", "COZY HUGS! 🥰",
  "BEST FRIENDS! 🤗", "LOVE EXPLOSION! 💥", "SNAIL POWER! ⚡", "HUG ATTACK! 💪"
];

function startGame() {
  document.getElementById('click-to-start').style.display = 'none';
  gameStarted = true;
  init();
  document.body.requestPointerLock();
}

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === document.body;
});

document.addEventListener('mousemove', (e) => {
  if (!isLocked || !gameStarted) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, pitch));
});

document.addEventListener('keydown', (e) => {
  if (!gameStarted) return;
  const k = e.key.toLowerCase();
  if (k === 'w') keys.w = true;
  if (k === 'a') keys.a = true;
  if (k === 's') keys.s = true;
  if (k === 'd') keys.d = true;
  if (k === 'e' && !keys.e) { keys.e = true; tryHug(); }
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w') keys.w = false;
  if (k === 'a') keys.a = false;
  if (k === 's') keys.s = false;
  if (k === 'd') keys.d = false;
  if (k === 'e') keys.e = false;
});

function init() {
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);
  scene.fog = new THREE.Fog(0x87ceeb, 30, 120);

  // Camera
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, playerHeight, 0);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambient = new THREE.AmbientLight(0xfff0f5, 0.6);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xffeedd, 1.0);
  sun.position.set(50, 80, 30);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 2048;
  sun.shadow.mapSize.height = 2048;
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 200;
  sun.shadow.camera.left = -60;
  sun.shadow.camera.right = 60;
  sun.shadow.camera.top = 60;
  sun.shadow.camera.bottom = -60;
  scene.add(sun);

  // Sky dome
  const skyGeo = new THREE.SphereGeometry(400, 32, 32);
  const skyMat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, side: THREE.BackSide });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // Ground
  const groundGeo = new THREE.PlaneGeometry(200, 200, 50, 50);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x7cba5f });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Add grass variation
  const grassGeo = new THREE.PlaneGeometry(200, 200, 80, 80);
  const positions = groundGeo.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    positions.setZ(i, Math.random() * 0.15);
  }
  positions.needsUpdate = true;
  groundGeo.computeVertexNormals();

  // Scattered trees and decorations
  createEnvironment();

  // NPCs
  createNPCs();

  // Movement listeners
  document.addEventListener('click', () => {
    if (gameStarted && !isLocked) document.body.requestPointerLock();
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}

function createEnvironment() {
  // Trees
  const treePositions = [];
  for (let i = 0; i < 40; i++) {
    let x, z;
    do {
      x = (Math.random() - 0.5) * 150;
      z = (Math.random() - 0.5) * 150;
    } while (Math.sqrt(x*x + z*z) < 8);
    treePositions.push([x, z]);
    createTree(x, z);
  }

  // Mushrooms
  for (let i = 0; i < 30; i++) {
    createMushroom((Math.random() - 0.5) * 140, (Math.random() - 0.5) * 140);
  }

  // Flowers
  const flowerColors = [0xff6b9d, 0xffeb3b, 0xff5722, 0x9c27b0, 0x03a9f4, 0xe91e63];
  for (let i = 0; i < 60; i++) {
    createFlower(
      (Math.random() - 0.5) * 130,
      (Math.random() - 0.5) * 130,
      flowerColors[Math.floor(Math.random() * flowerColors.length)]
    );
  }

  // Small rocks
  for (let i = 0; i < 25; i++) {
    createRock((Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120);
  }

  // Wooden fences / boundary
  for (let i = -70; i <= 70; i += 10) {
    createFence(i, -70);
    createFence(i, 70);
    createFence(-70, i);
    createFence(70, i);
  }
}

function createTree(x, z) {
  // Trunk
  const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 2.5, 8);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.set(x, 1.25, z);
  trunk.castShadow = true;
  scene.add(trunk);

  // Foliage layers
  const colors = [0x2d7d2d, 0x3a9e3a, 0x4caf50];
  const sizes = [2.5, 2.0, 1.5];
  const heights = [2.8, 4.0, 5.0];
  for (let i = 0; i < 3; i++) {
    const geo = new THREE.ConeGeometry(sizes[i], 1.8, 8);
    const mat = new THREE.MeshLambertMaterial({ color: colors[i] });
    const cone = new THREE.Mesh(geo, mat);
    cone.position.set(x, heights[i], z);
    cone.castShadow = true;
    scene.add(cone);
  }
}

function createMushroom(x, z) {
  const stemGeo = new THREE.CylinderGeometry(0.1, 0.12, 0.4, 8);
  const stemMat = new THREE.MeshLambertMaterial({ color: 0xf5f5dc });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.set(x, 0.2, z);
  scene.add(stem);

  const capGeo = new THREE.SphereGeometry(0.25, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2);
  const capMat = new THREE.MeshLambertMaterial({ color: Math.random() > 0.5 ? 0xe53935 : 0xff8c00 });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.set(x, 0.4, z);
  scene.add(cap);
}

function createFlower(x, z, color) {
  const stemGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6);
  const stemMat = new THREE.MeshLambertMaterial({ color: 0x4caf50 });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.set(x, 0.15, z);
  scene.add(stem);

  const petalGeo = new THREE.SphereGeometry(0.08, 6, 6);
  const petalMat = new THREE.MeshLambertMaterial({ color });
  const petal = new THREE.Mesh(petalGeo, petalMat);
  petal.position.set(x, 0.32, z);
  scene.add(petal);
}

function createRock(x, z) {
  const geo = new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.3, 0);
  const mat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const rock = new THREE.Mesh(geo, mat);
  rock.position.set(x, 0.2, z);
  rock.rotation.set(Math.random(), Math.random(), Math.random());
  rock.castShadow = true;
  scene.add(rock);
}

function createFence(x, z) {
  const postGeo = new THREE.BoxGeometry(0.15, 1.2, 0.15);
  const postMat = new THREE.MeshLambertMaterial({ color: 0xa0522d });
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(x, 0.6, z);
  post.castShadow = true;
  scene.add(post);
}

function createNPCs() {
  for (let i = 0; i < NPC_COUNT; i++) {
    let x, z;
    do {
      x = (Math.random() - 0.5) * 80;
      z = (Math.random() - 0.5) * 80;
    } while (Math.sqrt(x*x + z*z) < 6);

    const npc = createSnailNPC(x, z, i);
    npcs.push(npc);
    scene.add(npc.group);
  }
}

function createSnailNPC(x, z, index) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);

  // Snail body (shell + body)
  const bodyGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.5, 12);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0xf5cba7 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.3;
  body.castShadow = true;
  group.add(body);

  // Shell
  const shellGeo = new THREE.SphereGeometry(0.4, 16, 16, 0, Math.PI * 2, 0, Math.PI * 0.7);
  const shellMat = new THREE.MeshLambertMaterial({ color: 0xc9a66b });
  const shell = new THREE.Mesh(shellGeo, shellMat);
  shell.position.set(-0.1, 0.45, 0);
  shell.rotation.x = -Math.PI / 6;
  shell.castShadow = true;
  group.add(shell);

  // Shell spiral detail
  const spiralGeo = new THREE.TorusGeometry(0.25, 0.04, 8, 16);
  const spiralMat = new THREE.MeshLambertMaterial({ color: 0xa07840 });
  const spiral = new THREE.Mesh(spiralGeo, spiralMat);
  spiral.position.set(-0.1, 0.55, 0);
  spiral.rotation.x = -Math.PI / 2.5;
  group.add(spiral);

  // Head
  const headGeo = new THREE.SphereGeometry(0.22, 12, 12);
  const headMat = new THREE.MeshLambertMaterial({ color: 0xf5cba7 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0.3, 0.45, 0);
  head.castShadow = true;
  group.add(head);

  // Crown
  const crownGroup = new THREE.Group();
  const crownBase = new THREE.TorusGeometry(0.15, 0.03, 6, 12);
  const crownMat = new THREE.MeshLambertMaterial({ color: 0xffd700 });
  const crownBaseMesh = new THREE.Mesh(crownBase, crownMat);
  crownGroup.add(crownBaseMesh);

  // Crown spikes
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2;
    const spikeGeo = new THREE.ConeGeometry(0.04, 0.15, 4);
    const spike = new THREE.Mesh(spikeGeo, crownMat);
    spike.position.set(Math.cos(angle) * 0.15, 0.07, Math.sin(angle) * 0.15);
    crownGroup.add(spike);
  }
  crownGroup.position.set(0.3, 0.72, 0);
  group.add(crownGroup);

  // Eyes (on stalks)
  for (let side = -1; side <= 1; side += 2) {
    const stalkGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.2, 6);
    const stalkMat = new THREE.MeshLambertMaterial({ color: 0xf5cba7 });
    const stalk = new THREE.Mesh(stalkGeo, stalkMat);
    stalk.position.set(0.38 + side * 0.05, 0.6, side * 0.08);
    stalk.rotation.z = side * 0.3;
    group.add(stalk);

    const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const eyeMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(0.38 + side * 0.1, 0.72, side * 0.08);
    group.add(eye);

    const pupilGeo = new THREE.SphereGeometry(0.02, 6, 6);
    const pupilMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const pupil = new THREE.Mesh(pupilGeo, pupilMat);
    pupil.position.set(0.38 + side * 0.13, 0.74, side * 0.08);
    group.add(pupil);
  }

  // Antennae
  for (let side = -1; side <= 1; side += 2) {
    const antGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.15, 6);
    const antMat = new THREE.MeshLambertMaterial({ color: 0xf5cba7 });
    const ant = new THREE.Mesh(antGeo, antMat);
    ant.position.set(0.35, 0.62, side * 0.12);
    ant.rotation.z = side * 0.4;
    group.add(ant);
  }

  // Cute blush marks
  for (let side = -1; side <= 1; side += 2) {
    const blushGeo = new THREE.CircleGeometry(0.04, 8);
    const blushMat = new THREE.MeshBasicMaterial({ color: 0xff9999, transparent: true, opacity: 0.7 });
    const blush = new THREE.Mesh(blushGeo, blushMat);
    blush.position.set(0.42, 0.45, side * 0.22);
    blush.rotation.y = side * 0.5;
    group.add(blush);
  }

  // Name label (floating above)
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.roundRect(0, 0, 256, 64, 10);
  ctx.fill();
  ctx.fillStyle = '#ff6b9d';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(SNAIL_NAMES[index % SNAIL_NAMES.length], 128, 40);

  const labelTex = new THREE.CanvasTexture(canvas);
  const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true });
  const label = new THREE.Sprite(labelMat);
  label.scale.set(1.5, 0.4, 1);
  label.position.set(0, 1.2, 0);
  group.add(label);

  // Animation params
  group.userData = {
    baseY: 0,
    bobPhase: Math.random() * Math.PI * 2,
    rotSpeed: 0.5 + Math.random() * 0.5,
    rotDir: Math.random() > 0.5 ? 1 : -1,
    index,
    hugged: false,
    label
  };

  return { group, x, z };
}

function tryHug() {
  const playerPos = camera.position;
  let closestNPC = null;
  let closestDist = HUG_DIST;

  for (const npc of npcs) {
    if (npc.group.userData.hugged) continue;
    const dx = npc.group.position.x - playerPos.x;
    const dz = npc.group.position.z - playerPos.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < closestDist) {
      closestDist = dist;
      closestNPC = npc;
    }
  }

  if (closestNPC) {
    hugNPC(closestNPC);
  }
}

function hugNPC(npc) {
  npc.group.userData.hugged = true;
  score++;
  document.getElementById('score').textContent = score;

  // Heart burst effect
  spawnHeartBurst();

  // Show hug message
  const msg = HUG_MESSAGES[Math.floor(Math.random() * HUG_MESSAGES.length)];
  showMessage(msg, 1500);

  // Fade out the NPC (they got hugged and left happy!)
  const startScale = npc.group.scale.clone();
  const targetScale = 0;
  const startTime = performance.now();
  const duration = 800;

  function shrink() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const s = startScale.x * (1 - eased);
    npc.group.scale.set(s, s, s);
    npc.group.position.y = npc.group.userData.baseY + eased * 0.5;
    npc.group.rotation.y += 0.1;
    if (t < 1) {
      requestAnimationFrame(shrink);
    } else {
      scene.remove(npc.group);
      // Check win condition
      const remaining = npcs.filter(n => !n.group.userData.hugged).length;
      if (remaining === 0) {
        showMessage("🎉 YOU HUGGED THEM ALL! 🎉", 5000);
        setTimeout(() => showMessage("Snail Kingdom is filled with love! 💖", 5000), 2000);
      }
    }
  }
  shrink();

  // Spawn hearts around NPC
  for (let i = 0; i < 8; i++) {
    setTimeout(() => spawnHeartBurst(npc.group.position), i * 60);
  }
}

function spawnHeartBurst(pos) {
  const heart = document.createElement('div');
  heart.className = 'heart-burst';
  heart.textContent = ['💖', '💕', '🩷', '💗', '🐌'][Math.floor(Math.random() * 5)];
  
  if (pos) {
    const vector = pos.clone();
    vector.project(camera);
    heart.style.left = ((vector.x + 1) / 2 * window.innerWidth) + 'px';
    heart.style.top = ((-vector.y + 1) / 2 * window.innerHeight) + 'px';
  } else {
    heart.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 100) + 'px';
    heart.style.top = (window.innerHeight / 2 + (Math.random() - 0.5) * 60) + 'px';
  }
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 1000);
}

function showMessage(text, duration) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

let lastEPress = 0;
function animate() {
  requestAnimationFrame(animate);

  if (!gameStarted) return;

  // Player movement
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

  if (keys.w) camera.position.addScaledVector(forward, moveSpeed);
  if (keys.s) camera.position.addScaledVector(forward, -moveSpeed);
  if (keys.a) camera.position.addScaledVector(right, -moveSpeed);
  if (keys.d) camera.position.addScaledVector(right, moveSpeed);

  // Keep player at correct height
  camera.position.y = playerHeight;

  // Boundary
  camera.position.x = Math.max(-68, Math.min(68, camera.position.x));
  camera.position.z = Math.max(-68, Math.min(68, camera.position.z));

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Animate NPCs (bob and rotate)
  const time = performance.now() * 0.001;
  for (const npc of npcs) {
    if (npc.group.userData.hugged) continue;
    npc.group.position.y = Math.sin(time * 2 + npc.group.userData.bobPhase) * 0.05;
    npc.group.rotation.y += 0.005 * npc.group.userData.rotDir;

    // Face toward player
    const dx = camera.position.x - npc.group.position.x;
    const dz = camera.position.z - npc.group.position.z;
    const angle = Math.atan2(dx, dz);
    npc.group.rotation.y = angle;
  }

  // Check proximity for hug indicator
  const playerPos = camera.position;
  let nearNPC = false;
  for (const npc of npcs) {
    if (npc.group.userData.hugged) continue;
    const dx = npc.group.position.x - playerPos.x;
    const dz = npc.group.position.z - playerPos.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < HUG_DIST) { nearNPC = true; break; }
  }
  document.getElementById('hug-indicator').classList.toggle('show', nearNPC);

  renderer.render(scene, camera);
}
</script>
</body>
</html>
