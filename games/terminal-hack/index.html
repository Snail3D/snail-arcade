<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TERMINAL HACK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #0a0a0f; }
    body { display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
    #term {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0f; color: #33ff33; font-family: 'Courier New', monospace;
      padding: 20px; font-size: 14px; line-height: 1.3;
      display: flex; flex-direction: column;
    }
    #output { flex: 1; overflow-y: auto; white-space: pre-wrap; padding-bottom: 10px; }
    #input-line { display: flex; }
    #prompt { color: #33ff33; }
    #input {
      flex: 1; background: transparent; border: none; color: #33ff33;
      font-family: 'Courier New', monospace; font-size: 14px; outline: none;
    }
    canvas { display: none; }
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,0.95);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 20; font-family: 'Courier New', monospace;
    }
    .overlay h1 { color: #00ff88; font-size: 2.5em; text-shadow: 0 0 20px rgba(0,255,136,0.5); margin-bottom: 10px; }
    .overlay p { color: #888; font-size: 1em; margin: 5px 0; }
    .overlay .hs { color: #00ff88; font-size: 1.2em; margin-bottom: 20px; }
    .btn { padding: 16px 40px; font-size: 1.3em; font-family: 'Courier New', monospace; background: #00ff88; color: #0a0a0a; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="term">
    <div id="output">SYSTEM INITIALIZED...\nCONNECTION ESTABLISHED.\n\n</div>
    <div id="input-line"><span id="prompt">root@node:~$ </span><input id="input" type="text" autocomplete="off" spellcheck="false"></div>
  </div>
  <div id="start" class="overlay">
    <h1>TERMINAL HACK</h1>
    <p>Type commands to hack nodes</p>
    <p>SCAN, HACK, CRACK, DECRYPT, WIPE, DEFEND</p>
    <div class="hs" id="hs-start">🏆 High Score: 0</div>
    <button class="btn" onclick="startGame()">▶ CONNECT</button>
  </div>
  <div id="gameover" class="overlay hidden">
    <h1>🔴 TRACED</h1>
    <p id="go-score">Data extracted: 0</p>
    <div class="hs" id="hs-go">🏆 Best: 0</div>
    <button class="btn" onclick="startGame()">▶ RETRY</button>
  </div>
  <script>
    const output = document.getElementById('output');
    const input = document.getElementById('input');
    const prompt = document.getElementById('prompt');
    let nodes, currentNode, trace, maxTrace, dataExtracted, score, upgrades, gameRunning, level;

    const COMMANDS = {
      SCAN: { desc: 'Scan network for nodes', cost: 0, risk: 0 },
      HACK: { desc: 'Attempt to breach a node', cost: 1, risk: 10 },
      CRACK: { desc: 'Crack encryption (reduces risk)', cost: 2, risk: -15 },
      DECRYPT: { desc: 'Extract data from hacked node', cost: 0, risk: 5 },
      WIPE: { desc: 'Clear trace evidence', cost: 3, risk: -20 },
      DEFEND: { desc: 'Fortify against trace', cost: 2, risk: -10 },
    };

    function reset() {
      nodes = [];
      currentNode = 0;
      trace = 0;
      maxTrace = 100;
      dataExtracted = 0;
      score = 0;
      upgrades = 0;
      level = 1;
      gameRunning = true;
      generateNodes();
      output.textContent = '';
      addOutput('SYSTEM INITIALIZED...');
      addOutput('CONNECTION ESTABLISHED.');
      addOutput('Network scan recommended (SCAN)');
      input.value = '';
      document.getElementById('start').classList.add('hidden');
      document.getElementById('gameover').classList.add('hidden');
    }

    function startGame() { reset(); }

    function generateNodes() {
      const numNodes = 3 + level;
      nodes = [];
      for (let i = 0; i < numNodes; i++) {
        nodes.push({
          id: i + 1,
          security: Math.floor(Math.random() * 5) + 1 + level,
          hacked: false,
          data: Math.floor(Math.random() * 50) + 20 + level * 10,
          defense: Math.floor(Math.random() * 3) + 1
        });
      }
      currentNode = 0;
    }

    function addOutput(text) {
      output.textContent += text + '\n';
      output.scrollTop = output.scrollHeight;
    }

    function executeCommand(cmd, args) {
      if (!gameRunning) return;
      const upper = cmd.toUpperCase();

      switch (upper) {
        case 'SCAN':
          addOutput('── NETWORK SCAN ──');
          for (const n of nodes) {
            const status = n.hacked ? '✓ HACKED' : '🔒 SECURE';
            addOutput(`Node ${n.id}: Security ${n.security} | Data ${n.data}MB | ${status}`);
          }
          addOutput('── END SCAN ──');
          break;

        case 'HACK':
          if (currentNode === 0) { addOutput('ERROR: No node selected. Use SCAN first.'); break; }
          if (currentNode > nodes.length) { addOutput('ERROR: Invalid node.'); break; }
          const n = nodes[currentNode - 1];
          if (n.hacked) { addOutput('ERROR: Node already hacked.'); break; }
          const hackChance = 100 - n.security * 15 - n.defense * 10;
          if (Math.random() * 100 < hackChance) {
            addOutput(`✓ Node ${currentNode} breached!`);
            n.hacked = true;
          } else {
            addOutput(`✕ Hack failed on Node ${currentNode}! Trace increased!`);
            trace += COMMANDS.HACK.risk;
          }
          break;

        case 'CRACK':
          if (currentNode === 0) { addOutput('ERROR: No node selected.'); break; }
          const cn = nodes[currentNode - 1];
          if (cn.hacked) { addOutput('Node already hacked.'); break; }
          cn.security = Math.max(1, cn.security - 2);
          trace = Math.max(0, trace + COMMANDS.CRACK.risk);
          addOutput(`✓ Encryption cracked on Node ${currentNode}. Security reduced.`);
          break;

        case 'DECRYPT':
          if (currentNode === 0) { addOutput('ERROR: No node selected.'); break; }
          const dn = nodes[currentNode - 1];
          if (!dn.hacked) { addOutput('ERROR: Node not hacked.'); break; }
          dataExtracted += dn.data;
          score += dn.data;
          dn.data = 0;
          trace += COMMANDS.DECRYPT.risk;
          addOutput(`✓ ${dn.data}MB extracted from Node ${currentNode}.`);
          // Check if all nodes hacked
          if (nodes.every(n => n.hacked && n.data === 0)) {
            level++;
            addOutput(`── NETWORK CLEARED. LEVEL ${level} ──`);
            generateNodes();
          }
          break;

        case 'WIPE':
          trace = Math.max(0, trace + COMMANDS.WIPE.risk);
          addOutput('✓ Trace evidence wiped.');
          break;

        case 'DEFEND':
          trace = Math.max(0, trace + COMMANDS.DEFEND.risk);
          addOutput('✓ Defenses fortified. Trace reduced.');
          break;

        case 'SELECT':
          const id = parseInt(args);
          if (isNaN(id) || id < 1 || id > nodes.length) {
            addOutput('ERROR: Invalid node ID.');
            break;
          }
          currentNode = id;
          addOutput(`→ Targeting Node ${id}.`);
          break;

        case 'HELP':
          addOutput('── COMMANDS ──');
          for (const [k, v] of Object.entries(COMMANDS)) {
            addOutput(`${k}: ${v.desc} (risk: ${v.risk > 0 ? '+' : ''}${v.risk})`);
          }
          addOutput('SELECT <id>: Target a node');
          addOutput('HELP: This menu');
          addOutput('── END HELP ──');
          break;

        default:
          addOutput(`ERROR: Unknown command '${cmd}'. Type HELP.`);
      }

      // Trace check
      if (trace >= maxTrace) {
        gameOver();
      }
    }

    function handleInput() {
      const text = input.value.trim();
      input.value = '';
      if (!text) return;
      addOutput('root@node:~$ ' + text);
      const parts = text.split(' ');
      const cmd = parts[0];
      const args = parts.slice(1).join(' ');
      executeCommand(cmd, args);
    }

    function gameOver() {
      gameRunning = false;
      const hs = localStorage.getItem('hack_highscore') || 0;
      if (score > parseInt(hs)) {
        localStorage.setItem('hack_highscore', score);
        document.getElementById('hs-go').textContent = '🏆 New High Score: ' + score;
      } else {
        document.getElementById('hs-go').textContent = '🏆 Best: ' + hs;
      }
      document.getElementById('go-score').textContent = 'Data extracted: ' + dataExtracted + 'MB | Level: ' + level;
      document.getElementById('gameover').classList.remove('hidden');
      // Add trace warning to output
      addOutput('── TRACE SIGNAL LOCKED ──');
      addOutput('CONNECTION TERMINATED.');
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleInput();
    });

    // Touch: auto-focus input on touch
    document.getElementById('term').addEventListener('touchstart', () => {
      input.focus();
    });

    const saved = localStorage.getItem('hack_highscore') || 0;
    document.getElementById('hs-start').textContent = '🏆 High Score: ' + saved;
  </script>
</body>
</html>
