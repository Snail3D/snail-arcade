<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Donkey Kong Mobile Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
            touch-action: none;
        }

        canvas {
            background-color: #000;
            border: 4px solid #333;
            max-width: 100%;
            max-height: 70vh;
            image-rendering: pixelated;
        }

        #controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            touch-action: manipulation;
            user-select: none;
        }

        .btn:active {
            background-color: rgba(255, 255, 255, 0.5);
        }

        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.2rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="control-group">
            <div class="btn" id="btn-left">L</div>
            <div class="btn" id="btn-right">R</div>
        </div>
        <div class="control-group">
            <div class="btn" id="btn-jump">J</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // Game Configuration
        const GAME_WIDTH = 320;
        const GAME_HEIGHT = 400;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        let score = 0;
        let gameOver = false;

        // Player State
        const player = {
            x: 30,
            y: 350,
            width: 12,
            height: 16,
            vx: 0,
            vy: 0,
            speed: 1.5,
            jumpPower: -4,
            gravity: 0.2,
            grounded: false,
            onLadder: false,
            direction: 1 // 1 for right, -1 for left
        };

        // Level Elements
        const platforms = [
            { x: 0, y: 380, w: 320, h: 10 }, // Bottom
            { x: 0, y: 300, w: 280, h: 10 }, // Level 1
            { x: 40, y: 220, w: 280, h: 10 }, // Level 2
            { x: 0, y: 140, w: 280, h: 10 }, // Level 3
            { x: 100, y: 60, w: 120, h: 10 } // Top goal platform
        ];

        const ladders = [
            { x: 250, y: 300, w: 15, h: 80 },
            { x: 50, y: 220, w: 15, h: 80 },
            { x: 250, y: 140, w: 15, h: 80 },
            { x: 150, y: 60, w: 15, h: 80 }
        ];

        const goal = { x: 140, y: 30, w: 40, h: 30 };
        const enemies = [];
        const barrels = [];

        // Input Handling
        const keys = { left: false, right: false, jump: false, up: false, down: false };

        function setupControls() {
            const setupBtn = (id, key) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                const start = (e) => { e.preventDefault(); keys[key] = true; };
                const end = (e) => { e.preventDefault(); keys[key] = false; };
                btn.addEventListener('touchstart', start, {passive: false});
                btn.addEventListener('touchend', end, {passive: false});
                btn.addEventListener('mousedown', start);
                btn.addEventListener('mouseup', end);
            };

            setupBtn('btn-left', 'left');
            setupBtn('btn-right', 'right');
            setupBtn('btn-jump', 'jump');

            // Desktop keyboard support
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') keys.left = true;
                if (e.key === 'ArrowRight') keys.right = true;
                if (e.key === 'ArrowUp' || e.key === ' ') keys.jump = true;
                if (e.key === 'ArrowDown') keys.down = true;
            });
            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft') keys.left = false;
                if (e.key === 'ArrowRight') keys.right = false;
                if (e.key === 'ArrowUp' || e.key === ' ') keys.jump = false;
                if (e.key === 'ArrowDown') keys.down = false;
            });
        }

    // Barrel Spawning
        function setupBtnCorrected(id, key) {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[key] = true; };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
        }

        // Barrel Spawning
        let spawnTimer = 0;
        function spawnBarrel() {
            barrels.push({
                x: 100,
                y: 50,
                radius: 6,
                vx: 2,
                vy: 0
            });
        }

        function update() {
            if (gameOver) return;

            // Horizontal Movement
            if (keys.left) {
                player.vx = -player.speed;
                player.direction = -1;
            } else if (keys.right) {
                player.vx = player.speed;
                player.direction = 1;
            } else {
                player.vx = 0;
            }

            // Ladder/Gravity Logic
            if (player.onLadder) {
                player.vy = 0;
                if (keys.up || keys.jump) player.vy = -2; // Use Up or Jump
                if (keys.down) player.vy = 2;
                if (keys.left) player.vx = -player.speed;
                if (keys.right) player.vx = player.speed;
            } else {
                player.vy += player.gravity;
            }

            // Check if player is on a ladder to set onLadder state
            player.onLadder = false;
            ladders.forEach(l => {
                if (player.x + player.width > l.x && 
                    player.x < l.x + l.w &&
                    player.y + player.height > l.y && 
                    player.y < l.y + l.h) {
                    player.onLadder = true;
                }
            });

            player.x += player.vx;
            player.y += player.vy;

            // Collision - Platforms
            player.grounded = false;
            platforms.forEach(p => {
                if (player.x + player.width > p.x && 
                    player.x < p.x + p.w &&
                    player.y + player.height > p.y && 
                    player.y + player.height < p.y + p.h + player.vy + 1) {
                    
                    if (player.vy >= 0) {
                        player.y = p.y - player.height;
                        player.vy = 0;
                        player.grounded = true;
                    }
                }
            });

            // Jump logic
            if (keys.jump && player.grounded && !player.onLadder) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            // Screen bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > GAME_WIDTH) player.x = GAME_WIDTH - player.width;

            // Barrel Logic
            spawnTimer++;
            if (spawnTimer > 150) {
                spawnBarrel();
                spawnTimer = 0;
            }

            for (let i = barrels.length - 1; i >= 0; i--) {
                const b = barrels[i];
                b.vy += 0.15; // gravity
                b.x += b.vx;
                b.y += b.vy;

                // Barrel platform collision
                platforms.forEach(p => {
                    if (b.x > p.x && b.x < p.x + p.w &&
                        b.y + b.radius > p.y && b.y + b.radius < p.y + p.h + b.vy) {
                        b.y = p.y - b.radius;
                        b.vy = 0;
                        // Change direction at platform ends
                        if (b.x >= p.x + p.w - 5 || b.x <= p.x + 5) {
                            b.vx *= -1;
                        }
                    }
                });

                // Barrel collision with player
                const dx = (player.x + player.width/2) - b.x;
                const dy = (player.y + player.height/2) - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < player.width/2 + b.radius) {
                    gameOver = true;
                    setTimeout(() => {
                        location.reload();
                    }, 2000);
                }

                // Remove off-screen barrels
                if (b.y > GAME_HEIGHT) {
                    barrels.splice(i, 1);
                }
            }

            // Goal Check
            if (player.x + player.width > goal.x && player.x < goal.x + goal.w &&
                player.y + player.height > goal.y && player.y < goal.y + goal.h) {
                score += 100;
                scoreEl.innerText = score;
                // Reset player to start for next level (conceptually)
                player.x = 30;
                player.y = 350;
                // Clear barrels to make it "new level"
                barrels.length = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw Platforms
            ctx.fillStyle = '#ff0000';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
            });

            // Draw Ladders
            ctx.fillStyle = '#00ffff';
            ladders.forEach(l => {
                ctx.fillRect(l.x, l.y, l.w, l.h);
                // Ladder rungs
                ctx.strokeStyle = '#000';
                for(let ry = l.y; ry < l.y + l.h; ry += 10) {
                    ctx.beginPath();
                    ctx.moveTo(l.x, ry);
                    ctx.lineTo(l.x + l.w, ry);
                    ctx.stroke();
                }
            });

            // Draw Goal
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

            // Draw Player (Jumpman style)
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Eyes to show direction
            ctx.fillStyle = '#fff';
            const eyeX = player.direction === 1 ? player.x + 8 : player.x + 2;
            ctx.fillRect(eyeX, player.y + 3, 2, 2);

            // Draw Barrels
            ctx.fillStyle = '#8b4513';
            barrels.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
                // Barrel stripes
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(b.x - b.radius, b.y);
                ctx.lineTo(b.x + b.radius, b.y);
                ctx.stroke();
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px Arial';
                ctx.fillText('GAME OVER', GAME_WIDTH/2, GAME_HEIGHT/2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize
        window.onload = () => {
            setupControls();
            gameLoop();
        };
    </script>
</body>
</html>
