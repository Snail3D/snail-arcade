<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gradient Dash — Snail Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: 'Courier New', monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,18,0.92); z-index: 10; pointer-events: auto; }
  #overlay.hidden { display: none; }
  #title { font-size: clamp(28px, 6vw, 56px); color: #00f0ff; text-shadow: 0 0 20px #00f0ff88, 0 0 40px #00f0ff44; letter-spacing: 4px; margin-bottom: 8px; }
  #subtitle { font-size: clamp(12px, 2.5vw, 18px); color: #ff00aa; margin-bottom: 32px; letter-spacing: 2px; }
  #startBtn { padding: 14px 40px; font-size: clamp(16px, 3vw, 22px); font-family: 'Courier New', monospace; background: transparent; color: #00f0ff; border: 2px solid #00f0ff; border-radius: 4px; cursor: pointer; pointer-events: auto; text-transform: uppercase; letter-spacing: 3px; transition: all 0.2s; }
  #startBtn:hover, #startBtn:active { background: #00f0ff22; box-shadow: 0 0 20px #00f0ff44; }
  .controls-hint { font-size: clamp(10px, 2vw, 14px); color: #666; margin-top: 24px; text-align: center; line-height: 1.6; }
  #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 10px 16px; z-index: 5; pointer-events: none; }
  #hudScore, #hudSpeed, #hudHigh { font-size: clamp(12px, 2.5vw, 18px); color: #00f0ff; text-shadow: 0 0 8px #00f0ff88; }
  #hudHigh { color: #ff00aa; text-shadow: 0 0 8px #ff00aa88; }
  #gameOver { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,18,0.9); z-index: 10; pointer-events: auto; }
  #gameOverTitle { font-size: clamp(24px, 5vw, 48px); color: #ff0044; text-shadow: 0 0 20px #ff004488; margin-bottom: 16px; }
  #finalScore { font-size: clamp(16px, 3vw, 28px); color: #00f0ff; margin-bottom: 8px; }
  #finalHigh { font-size: clamp(12px, 2vw, 18px); color: #ff00aa; margin-bottom: 24px; }
  #restartBtn { padding: 12px 36px; font-size: clamp(14px, 2.5vw, 20px); font-family: 'Courier New', monospace; background: transparent; color: #ff00aa; border: 2px solid #ff00aa; border-radius: 4px; cursor: pointer; pointer-events: auto; text-transform: uppercase; letter-spacing: 2px; }
  #restartBtn:hover, #restartBtn:active { background: #ff00aa22; box-shadow: 0 0 20px #ff00aa44; }
  #grain { position: fixed; inset: 0; pointer-events: none; z-index: 2; opacity: 0.04; mix-blend-mode: overlay; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<canvas id="grain"></canvas>

<div id="overlay">
  <div id="title">GRADIENT DASH</div>
  <div id="subtitle">RUN THE LOSS LANDSCAPE</div>
  <button id="startBtn">START</button>
  <div class="controls-hint">
    SPACE / TAP — Jump &nbsp;|&nbsp; ↓ / SWIPE DOWN — Slide<br>
    Dodge black holes · Collect gradient boosters
  </div>
</div>

<div id="hud">
  <span id="hudScore">SCORE: 0</span>
  <span id="hudSpeed">SPD: 1.0x</span>
  <span id="hudHigh">HI: 0</span>
</div>

<div id="gameOver">
  <div id="gameOverTitle">LOSS MINIMUM</div>
  <div id="finalScore">SCORE: 0</div>
  <div id="finalHigh">BEST: 0</div>
  <button id="restartBtn">RESTART</button>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const grainCanvas = document.getElementById('grain');
  const grainCtx = grainCanvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const hudScore = document.getElementById('hudScore');
  const hudSpeed = document.getElementById('hudSpeed');
  const hudHigh = document.getElementById('hudHigh');
  const gameOverScreen = document.getElementById('gameOver');
  const finalScore = document.getElementById('finalScore');
  const finalHigh = document.getElementById('finalHigh');

  let W, H, scale;
  let highScore = parseInt(localStorage.getItem('gradientDashHigh') || '0', 10);
  hudHigh.textContent = 'HI: ' + highScore;

  // Game state
  let gameRunning = false;
  let gameOver = false;
  let score = 0;
  let speed = 3;
  let baseSpeed = 3;
  let maxSpeed = 9;
  let speedMultiplier = 1;
  let frameCount = 0;
  let shakeTimer = 0;
  let shakeIntensity = 0;

  // Audio
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playSound(freq, duration, type, vol) {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || 'square';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (duration || 0.15));
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + (duration || 0.15));
    } catch(e) {}
  }

  function playJump() { playSound(440, 0.12, 'square', 0.08); playSound(660, 0.1, 'sine', 0.06); }
  function playSlide() { playSound(200, 0.15, 'sawtooth', 0.05); }
  function playCollect() { playSound(880, 0.08, 'sine', 0.1); playSound(1100, 0.12, 'sine', 0.08); }
  function playHit() { playSound(120, 0.3, 'sawtooth', 0.15); playSound(80, 0.4, 'square', 0.1); }
  function playBoost() { playSound(600, 0.06, 'sine', 0.08); playSound(900, 0.06, 'sine', 0.08); playSound(1200, 0.1, 'sine', 0.08); }

  // Resize
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    scale = Math.min(W / 800, H / 600);
    canvas.width = W;
    canvas.height = H;
    grainCanvas.width = Math.floor(W / 4);
    grainCanvas.height = Math.floor(H / 4);
    generateGrain();
  }
  window.addEventListener('resize', resize);
  resize();

  // Film grain
  function generateGrain() {
    const w = grainCanvas.width, h = grainCanvas.height;
    const img = grainCtx.createImageData(w, h);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255;
      img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255;
    }
    grainCtx.putImageData(img, 0, 0);
  }

  // Snail player
  const snail = {
    x: 120, y: 0, w: 40, h: 40,
    vy: 0, grounded: true, jumping: false, sliding: false,
    slideTimer: 0, jumpHeld: false,
    groundY: 0,
    animFrame: 0, animTimer: 0,
    shieldTimer: 0,
    trail: []
  };

  const GRAVITY = 0.6;
  const JUMP_VEL = -12;
  const GROUND_OFFSET = 80;

  function resetSnail() {
    snail.groundY = H - GROUND_OFFSET;
    snail.y = snail.groundY;
    snail.vy = 0;
    snail.grounded = true;
    snail.jumping = false;
    snail.sliding = false;
    snail.slideTimer = 0;
    snail.jumpHeld = false;
    snail.shieldTimer = 0;
    snail.trail = [];
  }

  // Obstacles & collectibles
  let obstacles = [];
  let collectibles = [];
  let particles = [];
  let bgNodes = [];
  let bgLines = [];
  let stars = [];

  function initBg() {
    bgNodes = [];
    bgLines = [];
    stars = [];
    for (let i = 0; i < 15; i++) {
      bgNodes.push({ x: Math.random() * W * 2, y: 50 + Math.random() * (H - GROUND_OFFSET - 100), r: 3 + Math.random() * 5, color: Math.random() > 0.5 ? '#00f0ff' : '#ff00aa', pulse: Math.random() * Math.PI * 2 });
    }
    for (let i = 0; i < 20; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H * 0.5, s: 0.5 + Math.random() * 1.5, b: Math.random() });
    }
  }

  function spawnObstacle() {
    const type = Math.random() < 0.55 ? 'minima' : 'saddle';
    if (type === 'minima') {
      const r = 20 + Math.random() * 15;
      obstacles.push({
        type: 'minima', x: W + r, y: snail.groundY - r * 0.3 + Math.random() * 20,
        r: r, pull: 1.5 + speed * 0.2, hit: false
      });
    } else {
      const h = 50 + Math.random() * 30;
      const w = 15 + Math.random() * 20;
      obstacles.push({
        type: 'saddle', x: W + 10, y: snail.groundY - h,
        w: w, h: h, hit: false
      });
    }
  }

  function spawnCollectible() {
    const types = ['lr', 'lr', 'shield', 'point'];
    const type = types[Math.floor(Math.random() * types.length)];
    collectibles.push({
      type: type, x: W + 20,
      y: snail.groundY - 40 - Math.random() * 80,
      r: 12, collected: false, pulse: 0
    });
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 6,
        vy: (Math.random() - 0.5) * 6 - 2,
        life: 1, decay: 0.02 + Math.random() * 0.03,
        r: 1 + Math.random() * 3, color: color
      });
    }
  }

  // Input
  let jumpPressed = false;
  let slidePressed = false;

  function doJump() {
    if (snail.grounded && !snail.sliding && gameRunning) {
      snail.vy = JUMP_VEL;
      snail.grounded = false;
      snail.jumping = true;
      playJump();
    }
  }

  function doSlide() {
    if (snail.grounded && !snail.jumping && gameRunning) {
      snail.sliding = true;
      snail.slideTimer = 30;
      playSlide();
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
    if (e.code === 'ArrowDown') { e.preventDefault(); doSlide(); }
  });

  let touchStartY = 0;
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    initAudio();
    touchStartY = e.touches[0].clientY;
    doJump();
  }, {passive: false});

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 40) { doSlide(); touchStartY = e.touches[0].clientY + 100; }
  }, {passive: false});

  canvas.addEventListener('touchend', function(e) { e.preventDefault(); }, {passive: false});

  // Buttons
  document.getElementById('startBtn').addEventListener('click', function() {
    initAudio();
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('click', function() {
    initAudio();
    startGame();
  });

  function startGame() {
    overlay.style.display = 'none';
    gameOverScreen.style.display = 'none';
    resetSnail();
    obstacles = [];
    collectibles = [];
    particles = [];
    score = 0;
    speed = baseSpeed;
    speedMultiplier = 1;
    frameCount = 0;
    shakeTimer = 0;
    gameOver = false;
    gameRunning = true;
    initBg();
  }

  function endGame() {
    gameRunning = false;
    gameOver = true;
    playHit();
    shakeTimer = 20;
    shakeIntensity = 8;
    spawnParticles(snail.x, snail.y, '#ff0044', 30);
    spawnParticles(snail.x, snail.y, '#00f0ff', 15);

    if (score > highScore) {
      highScore = score;
      localStorage.setItem('gradientDashHigh', String(highScore));
    }
    hudHigh.textContent = 'HI: ' + highScore;

    setTimeout(function() {
      gameOverScreen.style.display = 'flex';
      finalScore.textContent = 'SCORE: ' + score;
      finalHigh.textContent = 'BEST: ' + highScore;
    }, 500);
  }

  // Drawing helpers
  function drawNeonRect(x, y, w, h, color, glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = glow || 8;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    ctx.shadowBlur = 0;
  }

  function drawNeonCircle(x, y, r, color, glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = glow || 10;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Draw snail
  function drawSnail() {
    const sx = snail.x;
    const sy = snail.y;
    const sh = snail.sliding ? snail.h * 0.5 : snail.h;
    const sw = snail.sliding ? snail.w * 1.3 : snail.w;
    const sy2 = snail.sliding ? snail.groundY - sh : sy - sh;

    // Shield glow
    if (snail.shieldTimer > 0) {
      ctx.globalAlpha = 0.2 + Math.sin(frameCount * 0.2) * 0.1;
      ctx.fillStyle = '#00f0ff';
      ctx.beginPath();
      ctx.arc(sx + sw/2, sy2 + sh/2, sw * 0.8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Trail
    ctx.fillStyle = '#00f0ff33';
    for (let i = 0; i < snail.trail.length; i++) {
      const t = snail.trail[i];
      ctx.globalAlpha = t.life * 0.3;
      ctx.fillRect(t.x, t.y, 3, 2);
    }
    ctx.globalAlpha = 1;

    // Body (shell)
    ctx.fillStyle = '#1a1a2e';
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.ellipse(sx + sw * 0.5, sy2 + sh * 0.45, sw * 0.35, sh * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Shell spiral
    ctx.strokeStyle = '#ff00aa';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const cx = sx + sw * 0.5, cy = sy2 + sh * 0.45;
    for (let a = 0; a < Math.PI * 3; a += 0.2) {
      const r = 3 + a * 2;
      ctx.lineTo(cx + Math.cos(a + frameCount * 0.05) * r, cy + Math.sin(a + frameCount * 0.05) * r);
    }
    ctx.stroke();

    // Head
    ctx.fillStyle = '#0a0a12';
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(sx + sw * 0.85, sy2 + sh * 0.55, sw * 0.15, sh * 0.18, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#ff00aa';
    ctx.beginPath();
    ctx.arc(sx + sw * 0.9, sy2 + sh * 0.4, 2.5, 0, Math.PI * 2);
    ctx.arc(sx + sw * 0.92, sy2 + sh * 0.52, 2, 0, Math.PI * 2);
    ctx.fill();

    // Antennae
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 1;
    const antWave = Math.sin(frameCount * 0.15) * 3;
    ctx.beginPath();
    ctx.moveTo(sx + sw * 0.88, sy2 + sh * 0.35);
    ctx.quadraticCurveTo(sx + sw * 0.95 + antWave, sy2 - 5, sx + sw * 0.92 + antWave, sy2 - 12);
    ctx.moveTo(sx + sw * 0.9, sy2 + sh * 0.35);
    ctx.quadraticCurveTo(sx + sw * 0.98 - antWave, sy2 - 2, sx + sw * 0.96 - antWave, sy2 - 10);
    ctx.stroke();

    // Feet
    ctx.fillStyle = '#00f0ff88';
    const footAnim = Math.sin(frameCount * 0.3) * 2;
    ctx.fillRect(sx + sw * 0.2, sy2 + sh, sw * 0.15, 4 + footAnim);
    ctx.fillRect(sx + sw * 0.4, sy2 + sh, sw * 0.15, 4 - footAnim);
    ctx.fillRect(sx + sw * 0.6, sy2 + sh, sw * 0.15, 4 + footAnim);
    ctx.fillRect(sx + sw * 0.8, sy2 + sh, sw * 0.15, 4 - footAnim);
  }

  // Draw ground
  function drawGround() {
    const gy = snail.groundY;
    // Ground line
    ctx.strokeStyle = '#00f0ff44';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, gy + 2);
    ctx.lineTo(W, gy + 2);
    ctx.stroke();

    // Grid lines on ground
    ctx.strokeStyle = '#00f0ff11';
    ctx.lineWidth = 0.5;
    const gridOffset = (frameCount * speed) % 40;
    for (let x = -gridOffset; x < W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, gy + 2);
      ctx.lineTo(x - 20, H);
      ctx.stroke();
    }
    for (let y = gy + 10; y < H; y += 20) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Ground glow
    const grad = ctx.createLinearGradient(0, gy, 0, gy + 30);
    grad.addColorStop(0, '#00f0ff08');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, gy, W, 30);
  }

  // Draw background neural network
  function drawBg() {
    // Stars
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      s.b += 0.02;
      ctx.globalAlpha = 0.3 + Math.sin(s.b) * 0.2;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.globalAlpha = 1;

    // Neural network nodes
    for (let i = 0; i < bgNodes.length; i++) {
      const n = bgNodes[i];
      n.pulse += 0.03;
      n.x -= speed * 0.3;
      if (n.x < -20) { n.x = W + 20 + Math.random() * 100; n.y = 50 + Math.random() * (H - GROUND_OFFSET - 100); }

      const glow = 0.5 + Math.sin(n.pulse) * 0.3;
      ctx.globalAlpha = glow;
      ctx.fillStyle = n.color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();

      // Glow ring
      ctx.strokeStyle = n.color;
      ctx.globalAlpha = glow * 0.3;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Connections between nearby nodes
    ctx.strokeStyle = '#00f0ff11';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < bgNodes.length; i++) {
      for (let j = i + 1; j < bgNodes.length; j++) {
        const dx = bgNodes[i].x - bgNodes[j].x;
        const dy = bgNodes[i].y - bgNodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          ctx.globalAlpha = (1 - dist / 150) * 0.15;
          ctx.beginPath();
          ctx.moveTo(bgNodes[i].x, bgNodes[i].y);
          ctx.lineTo(bgNodes[j].x, bgNodes[j].y);
          ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  // Draw local minima (black holes)
  function drawMinima(obs) {
    const x = obs.x, y = obs.y, r = obs.r;

    // Outer glow
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 1.5);
    grad.addColorStop(0, '#000000');
    grad.addColorStop(0.5, '#1a0022');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r * 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Swirl
    ctx.strokeStyle = '#ff00aa44';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      const offset = (frameCount * 0.05 + i * 2) % (Math.PI * 2);
      for (let a = 0; a < Math.PI * 4; a += 0.1) {
        const rr = 5 + a * (r * 0.25 / (Math.PI * 4));
        ctx.lineTo(x + Math.cos(a + offset) * rr, y + Math.sin(a + offset) * rr);
      }
      ctx.stroke();
    }

    // Core
    ctx.fillStyle = '#0a0015';
    ctx.beginPath();
    ctx.arc(x, y, r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff00aa';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    ctx.fillStyle = '#ff00aa88';
    ctx.font = '8px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('LOCAL MIN', x, y + r + 12);
  }

  // Draw saddle points
  function drawSaddle(obs) {
    const x = obs.x, y = obs.y, w = obs.w, h = obs.h;

    // Barrier
    ctx.fillStyle = '#1a002288';
    ctx.fillRect(x, y, w, h);

    // Swirling edges
    ctx.strokeStyle = '#ff00aa';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ff00aa';
    ctx.shadowBlur = 6;
    ctx.strokeRect(x, y, w, h);
    ctx.shadowBlur = 0;

    // Saddle symbol
    ctx.fillStyle = '#ff00aa88';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('⌒', x + w/2, y + h/2 + 4);

    // Warning label
    ctx.fillStyle = '#ff00aa66';
    ctx.font = '7px Courier New';
    ctx.fillText('SADDLE', x + w/2, y - 5);
  }

  // Draw collectible
  function drawCollectible(col) {
    if (col.collected) return;
    col.pulse += 0.1;
    const x = col.x, y = col.y, r = col.r;
    const pulseR = r + Math.sin(col.pulse) * 2;

    let color, label;
    switch(col.type) {
      case 'lr': color = '#00f0ff'; label = 'LR'; break;
      case 'shield': color = '#ff00aa'; label = 'SH'; break;
      case 'point': color = '#ffff00'; label = '★'; break;
    }

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, pulseR, 0, Math.PI * 2);
    ctx.stroke();

    // Inner
    ctx.fillStyle = color + '22';
    ctx.beginPath();
    ctx.arc(x, y, pulseR - 2, 0, Math.PI * 2);
    ctx.fill();

    // Label
    ctx.shadowBlur = 0;
    ctx.fillStyle = color;
    ctx.font = 'bold 9px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
    ctx.textBaseline = 'alphabetic';
  }

  // Collision check
  function checkCollisions() {
    const sh = snail.sliding ? snail.h * 0.5 : snail.h;
    const sw = snail.sliding ? snail.w * 1.3 : snail.w;
    const sy = snail.sliding ? snail.groundY - sh : snail.y - sh;
    const px = snail.x + sw * 0.2;
    const py = sy + sh * 0.3;
    const pw = sw * 0.6;
    const ph = sh * 0.7;

    // Obstacles
    for (let i = 0; i < obstacles.length; i++) {
      const obs = obstacles[i];
      if (obs.hit) continue;

      if (obs.type === 'minima') {
        const dx = (snail.x + sw/2) - obs.x;
        const dy = (sy + sh/2) - obs.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        // Pull effect
        if (dist < obs.r * 3 && dist > 0) {
          const pullForce = obs.pull / (dist * 0.1);
          snail.x -= (dx / dist) * pullForce * 0.5;
          snail.y -= (dy / dist) * pullForce * 0.3;
        }

        if (dist < obs.r + 10 && !snail.shieldTimer) {
          obs.hit = true;
          endGame();
          return;
        }
      } else if (obs.type === 'saddle') {
        if (snail.x + sw > obs.x && snail.x < obs.x + obs.w &&
            sy + sh > obs.y && sy < obs.y + obs.h) {
          if (!snail.shieldTimer) {
            obs.hit = true;
            endGame();
            return;
          }
        }
      }
    }

    // Collectibles
    for (let i = 0; i < collectibles.length; i++) {
      const col = collectibles[i];
      if (col.collected) continue;
      const dx = (snail.x + sw/2) - col.x;
      const dy = (sy + sh/2) - col.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < col.r + 15) {
        col.collected = true;
        switch(col.type) {
          case 'lr':
            speedMultiplier = Math.min(speedMultiplier + 0.15, 2.0);
            playBoost();
            spawnParticles(col.x, col.y, '#00f0ff', 8);
            break;
          case 'shield':
            snail.shieldTimer = 180;
            playCollect();
            spawnParticles(col.x, col.y, '#ff00aa', 10);
            break;
          case 'point':
            score += 50;
            playCollect();
            spawnParticles(col.x, col.y, '#ffff00', 6);
            break;
        }
      }
    }
  }

  // Main update
  function update() {
    if (!gameRunning) return;
    frameCount++;

    // Speed increase
    speedMultiplier = Math.min(1 + frameCount * 0.0003, 2.0);
    speed = (baseSpeed + frameCount * 0.001) * speedMultiplier;
    speed = Math.min(speed, maxSpeed);

    // Score
    score += Math.floor(speed * 0.5);

    // Snail physics
    if (!snail.grounded) {
      snail.vy += GRAVITY;
      snail.y += snail.vy;
      if (snail.y >= snail.groundY) {
        snail.y = snail.groundY;
        snail.vy = 0;
        snail.grounded = true;
        snail.jumping = false;
      }
    }

    // Slide timer
    if (snail.sliding) {
      snail.slideTimer--;
      if (snail.slideTimer <= 0) snail.sliding = false;
    }

    // Shield timer
    if (snail.shieldTimer > 0) snail.shieldTimer--;

    // Trail
    if (frameCount % 2 === 0) {
      snail.trail.push({ x: snail.x - 5, y: snail.y + snail.h * 0.7, life: 1 });
    }
    for (let i = snail.trail.length - 1; i >= 0; i--) {
      snail.trail[i].life -= 0.04;
      snail.trail[i].x -= speed * 0.5;
      if (snail.trail[i].life <= 0) snail.trail.splice(i, 1);
    }

    // Spawn obstacles
    const spawnRate = Math.max(60, 140 - frameCount * 0.02);
    if (frameCount % Math.floor(spawnRate) === 0) {
      spawnObstacle();
    }

    // Spawn collectibles
    if (frameCount % 90 === 0) {
      spawnCollectible();
    }

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= speed;
      if (obstacles[i].x < -60) obstacles.splice(i, 1);
    }

    // Update collectibles
    for (let i = collectibles.length - 1; i >= 0; i--) {
      collectibles[i].x -= speed;
      if (collectibles[i].x < -30) collectibles.splice(i, 1);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Shake
    if (shakeTimer > 0) shakeTimer--;

    checkCollisions();

    // HUD
    hudScore.textContent = 'SCORE: ' + score;
    hudSpeed.textContent = 'SPD: ' + speedMultiplier.toFixed(1) + 'x';
  }

  // Main render
  function render() {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);

    // Screen shake
    if (shakeTimer > 0) {
      const sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
      const sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
      ctx.save();
      ctx.translate(sx, sy);
    }

    drawBg();
    drawGround();

    // Obstacles
    for (let i = 0; i < obstacles.length; i++) {
      if (obstacles[i].type === 'minima') drawMinima(obstacles[i]);
      else drawSaddle(obstacles[i]);
    }

    // Collectibles
    for (let i = 0; i < collectibles.length; i++) {
      drawCollectible(collectibles[i]);
    }

    // Particles
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Snail
    if (gameRunning || gameOver) drawSnail();

    if (shakeTimer > 0) ctx.restore();

    // Vignette
    const vignette = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
    vignette.addColorStop(0, 'transparent');
    vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
  }

  // Game loop
  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  // Init
  resize();
  initBg();
  loop();

})();
</script>
