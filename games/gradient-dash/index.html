<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gradient Dash 3D — Snail Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: 'Courier New', monospace; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,18,0.92); z-index: 10; pointer-events: auto; }
  #overlay.hidden { display: none; }
  #title { font-size: clamp(28px, 6vw, 56px); color: #00f0ff; text-shadow: 0 0 20px #00f0ff88, 0 0 40px #00f0ff44; letter-spacing: 4px; margin-bottom: 8px; }
  #subtitle { font-size: clamp(12px, 2.5vw, 18px); color: #ff00aa; margin-bottom: 32px; letter-spacing: 2px; }
  #startBtn { padding: 14px 40px; font-size: clamp(16px, 3vw, 22px); font-family: 'Courier New', monospace; background: transparent; color: #00f0ff; border: 2px solid #00f0ff; border-radius: 4px; cursor: pointer; pointer-events: auto; text-transform: uppercase; letter-spacing: 3px; transition: all 0.2s; }
  #startBtn:hover, #startBtn:active { background: #00f0ff22; box-shadow: 0 0 20px #00f0ff44; }
  .controls-hint { font-size: clamp(10px, 2vw, 14px); color: #666; margin-top: 24px; text-align: center; line-height: 1.6; }
  #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; padding: 10px 16px; z-index: 5; pointer-events: none; }
  #hudScore, #hudSpeed, #hudHigh { font-size: clamp(12px, 2.5vw, 18px); color: #00f0ff; text-shadow: 0 0 8px #00f0ff88; }
  #hudHigh { color: #ff00aa; text-shadow: 0 0 8px #ff00aa88; }
  #gameOver { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,10,18,0.9); z-index: 10; pointer-events: auto; }
  #gameOverTitle { font-size: clamp(24px, 5vw, 48px); color: #ff0044; text-shadow: 0 0 20px #ff004488; margin-bottom: 16px; }
  #finalScore { font-size: clamp(16px, 3vw, 28px); color: #00f0ff; margin-bottom: 8px; }
  #finalHigh { font-size: clamp(12px, 2vw, 18px); color: #ff00aa; margin-bottom: 24px; }
  #restartBtn { padding: 12px 36px; font-size: clamp(14px, 2.5vw, 20px); font-family: 'Courier New', monospace; background: transparent; color: #ff00aa; border: 2px solid #ff00aa; border-radius: 4px; cursor: pointer; pointer-events: auto; text-transform: uppercase; letter-spacing: 2px; }
  #restartBtn:hover, #restartBtn:active { background: #ff00aa22; box-shadow: 0 0 20px #ff00aa44; }
  #grain { position: fixed; inset: 0; pointer-events: none; z-index: 2; opacity: 0.04; mix-blend-mode: overlay; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<canvas id="grain"></canvas>

<div id="overlay">
  <div id="title">GRADIENT DASH</div>
  <div id="subtitle">3D · RUN THE LOSS LANDSCAPE</div>
  <button id="startBtn">START</button>
  <div class="controls-hint">
    SPACE / TAP — Jump &nbsp;|&nbsp; ↓ / SWIPE DOWN — Slide<br>
    Dodge black holes · Collect gradient boosters
  </div>
</div>

<div id="hud">
  <span id="hudScore">SCORE: 0</span>
  <span id="hudSpeed">SPD: 1.0x</span>
  <span id="hudHigh">HI: 0</span>
</div>

<div id="gameOver">
  <div id="gameOverTitle">LOSS MINIMUM</div>
  <div id="finalScore">SCORE: 0</div>
  <div id="finalHigh">BEST: 0</div>
  <button id="restartBtn">RESTART</button>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const grainCanvas = document.getElementById('grain');
  const grainCtx = grainCanvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const hudScore = document.getElementById('hudScore');
  const hudSpeed = document.getElementById('hudSpeed');
  const hudHigh = document.getElementById('hudHigh');
  const gameOverScreen = document.getElementById('gameOver');
  const finalScore = document.getElementById('finalScore');
  const finalHigh = document.getElementById('finalHigh');

  let W, H;
  let highScore = parseInt(localStorage.getItem('gradientDashHigh') || '0', 10);
  hudHigh.textContent = 'HI: ' + highScore;

  // Game state
  let gameRunning = false;
  let gameOver = false;
  let score = 0;
  let speed = 3;
  let baseSpeed = 3;
  let maxSpeed = 9;
  let speedMultiplier = 1;
  let frameCount = 0;
  let shakeTimer = 0;
  let shakeIntensity = 0;

  // Audio
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playSound(freq, duration, type, vol) {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || 'square';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (duration || 0.15));
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + (duration || 0.15));
    } catch(e) {}
  }

  function playJump() { playSound(440, 0.12, 'square', 0.08); playSound(660, 0.1, 'sine', 0.06); }
  function playSlide() { playSound(200, 0.15, 'sawtooth', 0.05); }
  function playCollect() { playSound(880, 0.08, 'sine', 0.1); playSound(1100, 0.12, 'sine', 0.08); }
  function playHit() { playSound(120, 0.3, 'sawtooth', 0.15); playSound(80, 0.4, 'square', 0.1); }
  function playBoost() { playSound(600, 0.06, 'sine', 0.08); playSound(900, 0.06, 'sine', 0.08); playSound(1200, 0.1, 'sine', 0.08); }

  // ─── 3D Projection ───
  const FOCAL = 420;
  const HORIZON_Y = 0.42;   // horizon as fraction of H
  const NEAR_Z = 80;
  const FAR_Z = 1400;
  const GROUND_W = 600;     // half-width of ground at z=0

  let VP_X, VP_Y;
  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    grainCanvas.width = Math.floor(W / 4);
    grainCanvas.height = Math.floor(H / 4);
    VP_X = W / 2;
    VP_Y = H * HORIZON_Y;
    generateGrain();
  }
  window.addEventListener('resize', resize);
  resize();

  function project(x, y, z) {
    if (z < NEAR_Z) z = NEAR_Z;
    const scale = FOCAL / z;
    const sx = VP_X + x * scale;
    const sy = VP_Y + y * scale;
    return { sx, sy, scale };
  }

  // Film grain
  function generateGrain() {
    const w = grainCanvas.width, h = grainCanvas.height;
    const img = grainCtx.createImageData(w, h);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255;
      img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255;
    }
    grainCtx.putImageData(img, 0, 0);
  }

  // ─── Snail player (3D) ───
  const snail = {
    x: 0, y: 0, w: 40, h: 40,
    vy: 0, grounded: true, jumping: false, sliding: false,
    slideTimer: 0, jumpHeld: false,
    groundY: 0,
    animFrame: 0, animTimer: 0,
    shieldTimer: 0,
    trail: []
  };

  const GRAVITY = 0.6;
  const JUMP_VEL = -14;
  const GROUND_OFFSET = 80;

  function resetSnail() {
    snail.x = -GROUND_W * 0.5;
    snail.groundY = 220;
    snail.y = snail.groundY;
    snail.vy = 0;
    snail.grounded = true;
    snail.jumping = false;
    snail.sliding = false;
    snail.slideTimer = 0;
    snail.jumpHeld = false;
    snail.shieldTimer = 0;
    snail.trail = [];
  }

  // Obstacles & collectibles
  let obstacles = [];
  let collectibles = [];
  let particles = [];
  let bgNodes = [];
  let stars = [];

  function initBg() {
    bgNodes = [];
    stars = [];
    for (let i = 0; i < 40; i++) {
      bgNodes.push({ x: Math.random() * W * 2, y: Math.random() * H * 0.5, r: 1 + Math.random() * 3, color: Math.random() > 0.5 ? '#00f0ff' : '#ff00aa', pulse: Math.random() * Math.PI * 2, depth: 0.3 + Math.random() * 0.7 });
    }
    for (let i = 0; i < 60; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H * 0.5, s: 0.5 + Math.random() * 1.5, b: Math.random(), twinkle: Math.random() * Math.PI * 2 });
    }
  }

  // spawn obstacles in 3D world space: x = lateral, z = depth (positive = away)
  function spawnObstacle() {
    const type = Math.random() < 0.55 ? 'minima' : 'saddle';
    if (type === 'minima') {
      const r = 28 + Math.random() * 22;
      obstacles.push({
        type: 'minima',
        x: (Math.random() - 0.5) * GROUND_W * 1.2,
        y: 30 + Math.random() * 20,
        z: FAR_Z,
        r: r, pull: 1.5 + speed * 0.2, hit: false,
        spin: 0, vertOffset: Math.random() * Math.PI * 2
      });
    } else {
      const h = 80 + Math.random() * 40;
      const w = 25 + Math.random() * 30;
      obstacles.push({
        type: 'saddle',
        x: (Math.random() - 0.5) * GROUND_W * 1.2,
        y: 0,
        z: FAR_Z,
        w: w, h: h, hit: false
      });
    }
  }

  function spawnCollectible() {
    const types = ['lr', 'lr', 'shield', 'point'];
    const type = types[Math.floor(Math.random() * types.length)];
    collectibles.push({
      type: type,
      x: (Math.random() - 0.5) * GROUND_W * 1.2,
      y: 60 + Math.random() * 100,
      z: FAR_Z,
      r: 18, collected: false, pulse: 0, bob: Math.random() * Math.PI * 2
    });
  }

  function spawnParticles(x, y, z, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y, z: z,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8 - 2,
        vz: (Math.random() - 0.5) * 4,
        life: 1, decay: 0.02 + Math.random() * 0.03,
        r: 1 + Math.random() * 3, color: color
      });
    }
  }

  // Input
  let jumpPressed = false;
  let slidePressed = false;

  function doJump() {
    if (snail.grounded && !snail.sliding && gameRunning) {
      snail.vy = JUMP_VEL;
      snail.grounded = false;
      snail.jumping = true;
      playJump();
    }
  }

  function doSlide() {
    if (snail.grounded && !snail.jumping && gameRunning) {
      snail.sliding = true;
      snail.slideTimer = 30;
      playSlide();
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
    if (e.code === 'ArrowDown') { e.preventDefault(); doSlide(); }
  });

  let touchStartY = 0;
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    initAudio();
    touchStartY = e.touches[0].clientY;
    doJump();
  }, {passive: false});

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 40) { doSlide(); touchStartY = e.touches[0].clientY + 100; }
  }, {passive: false});

  canvas.addEventListener('touchend', function(e) { e.preventDefault(); }, {passive: false});

  document.getElementById('startBtn').addEventListener('click', function() {
    initAudio();
    startGame();
  });
  document.getElementById('restartBtn').addEventListener('click', function() {
    initAudio();
    startGame();
  });

  function startGame() {
    overlay.style.display = 'none';
    gameOverScreen.style.display = 'none';
    resetSnail();
    obstacles = [];
    collectibles = [];
    particles = [];
    score = 0;
    speed = baseSpeed;
    speedMultiplier = 1;
    frameCount = 0;
    shakeTimer = 0;
    gameOver = false;
    gameRunning = true;
    initBg();
  }

  function endGame() {
    gameRunning = false;
    gameOver = true;
    playHit();
    shakeTimer = 20;
    shakeIntensity = 8;
    spawnParticles(snail.x, snail.y + snail.h * 0.5, NEAR_Z + 50, '#ff0044', 30);
    spawnParticles(snail.x, snail.y + snail.h * 0.5, NEAR_Z + 50, '#00f0ff', 15);

    if (score > highScore) {
      highScore = score;
      localStorage.setItem('gradientDashHigh', String(highScore));
    }
    hudHigh.textContent = 'HI: ' + highScore;

    setTimeout(function() {
      gameOverScreen.style.display = 'flex';
      finalScore.textContent = 'SCORE: ' + score;
      finalHigh.textContent = 'BEST: ' + highScore;
    }, 500);
  }

  // ─── Drawing helpers ───
  function drawNeonRect(x, y, w, h, color, glow, lineW) {
    ctx.shadowColor = color;
    ctx.shadowBlur = glow || 8;
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW || 2;
    ctx.strokeRect(x, y, w, h);
    ctx.shadowBlur = 0;
  }

  function drawNeonCircle(x, y, r, color, glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = glow || 10;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ─── 3D Draw: ground plane (perspective grid receding to horizon) ───
  function drawGround() {
    // Ground gradient (sky→horizon→ground)
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#04040a');
    skyGrad.addColorStop(0.35, '#0a0a18');
    skyGrad.addColorStop(0.5, '#1a0830');
    skyGrad.addColorStop(1, '#0a0010');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Ground band
    const groundGrad = ctx.createLinearGradient(0, VP_Y, 0, H);
    groundGrad.addColorStop(0, '#1a0830');
    groundGrad.addColorStop(0.3, '#0a0a18');
    groundGrad.addColorStop(1, '#000005');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, VP_Y, W, H - VP_Y);

    // Depth grid on ground (perspective lines)
    const gridCount = 14;
    const gridSpacing = 100; // world units between grid rings
    const camZ = frameCount * speed * 0.8; // camera z position
    const totalRange = FAR_Z;
    const startZ = (camZ % gridSpacing);
    // Lateral lines (left-right at fixed z)
    for (let i = 0; i < gridCount; i++) {
      const z = NEAR_Z + (i * totalRange / gridCount);
      const p = project(0, 0, z);
      if (p.sy > H) continue;
      const alpha = 0.15 * (1 - (z - NEAR_Z) / totalRange) + 0.05;
      ctx.strokeStyle = `rgba(0,240,255,${alpha})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, p.sy);
      ctx.lineTo(W, p.sy);
      ctx.stroke();
    }

    // Forward grid lines (depth lines from horizon to camera)
    const lateralCount = 16;
    for (let i = -lateralCount / 2; i < lateralCount / 2; i++) {
      const xWorld = (i / (lateralCount / 2)) * GROUND_W;
      const pFar = project(xWorld, 0, FAR_Z);
      const pNear = project(xWorld, 0, NEAR_Z);
      ctx.strokeStyle = 'rgba(0,240,255,0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pFar.sx, pFar.sy);
      ctx.lineTo(pNear.sx, pNear.sy);
      ctx.stroke();
    }

    // Horizon glow
    const horizonGrad = ctx.createLinearGradient(0, VP_Y - 20, 0, VP_Y + 20);
    horizonGrad.addColorStop(0, 'rgba(0,240,255,0)');
    horizonGrad.addColorStop(0.5, 'rgba(255,0,170,0.15)');
    horizonGrad.addColorStop(1, 'rgba(0,240,255,0)');
    ctx.fillStyle = horizonGrad;
    ctx.fillRect(0, VP_Y - 20, W, 40);
  }

  // Draw 3D star field (parallax)
  function drawStars() {
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      s.twinkle += 0.02;
      const a = 0.3 + Math.sin(s.twinkle) * 0.3;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
    ctx.globalAlpha = 1;

    for (let i = 0; i < bgNodes.length; i++) {
      const n = bgNodes[i];
      n.pulse += 0.03;
      n.x -= speed * 0.4 * n.depth;
      if (n.x < -20) { n.x = W + 20 + Math.random() * 100; n.y = Math.random() * H * 0.4; }
      const glow = 0.4 + Math.sin(n.pulse) * 0.3;
      ctx.globalAlpha = glow * (1 - n.depth * 0.5);
      ctx.fillStyle = n.color;
      ctx.shadowColor = n.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * (1.5 - n.depth), 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }

  // Draw snail in 3D
  function drawSnail() {
    const z = NEAR_Z + 30; // snail sits just in front of camera
    const p = project(snail.x, snail.y, z);
    const sx = p.sx;
    const sy = p.sy;
    const pScale = p.scale;
    const sh = snail.sliding ? snail.h * 0.5 * pScale * 0.5 : snail.h * pScale * 0.5;
    const sw = snail.sliding ? snail.w * 1.3 * pScale * 0.5 : snail.w * pScale * 0.5;

    // Shield glow
    if (snail.shieldTimer > 0) {
      ctx.globalAlpha = 0.2 + Math.sin(frameCount * 0.2) * 0.1;
      ctx.fillStyle = '#00f0ff';
      ctx.beginPath();
      ctx.arc(sx, sy - sh * 0.4, sw * 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Shadow on ground beneath snail
    const groundP = project(snail.x, snail.groundY + 5, z);
    ctx.fillStyle = 'rgba(0,240,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(groundP.sx, groundP.sy, sw * 0.7, sw * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body (shell)
    ctx.fillStyle = '#1a1a2e';
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = Math.max(1, 2 * pScale * 0.5);
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(sx, sy - sh * 0.55, sw * 0.42, sh * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Shell spiral
    ctx.strokeStyle = '#ff00aa';
    ctx.lineWidth = Math.max(1, 1.5 * pScale * 0.5);
    ctx.beginPath();
    for (let a = 0; a < Math.PI * 3; a += 0.2) {
      const r = 3 + a * 2;
      ctx.lineTo(sx + Math.cos(a + frameCount * 0.05) * r * pScale * 0.4, sy - sh * 0.55 + Math.sin(a + frameCount * 0.05) * r * pScale * 0.4);
    }
    ctx.stroke();

    // Head
    ctx.fillStyle = '#0a0a12';
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = Math.max(1, 1.5 * pScale * 0.5);
    ctx.beginPath();
    ctx.ellipse(sx + sw * 0.4, sy - sh * 0.5, sw * 0.18, sh * 0.22, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#ff00aa';
    ctx.beginPath();
    ctx.arc(sx + sw * 0.48, sy - sh * 0.7, 2.5 * pScale * 0.5, 0, Math.PI * 2);
    ctx.arc(sx + sw * 0.52, sy - sh * 0.4, 2 * pScale * 0.5, 0, Math.PI * 2);
    ctx.fill();

    // Antennae
    ctx.strokeStyle = '#00f0ff';
    ctx.lineWidth = 1;
    const antWave = Math.sin(frameCount * 0.15) * 3;
    ctx.beginPath();
    ctx.moveTo(sx + sw * 0.42, sy - sh * 0.7);
    ctx.quadraticCurveTo(sx + sw * 0.55 + antWave, sy - sh * 1.1, sx + sw * 0.5 + antWave, sy - sh * 1.4);
    ctx.moveTo(sx + sw * 0.45, sy - sh * 0.7);
    ctx.quadraticCurveTo(sx + sw * 0.62 - antWave, sy - sh * 1.0, sx + sw * 0.58 - antWave, sy - sh * 1.3);
    ctx.stroke();

    // Feet
    ctx.fillStyle = '#00f0ff88';
    const footAnim = Math.sin(frameCount * 0.3) * 2;
    ctx.fillRect(sx - sw * 0.35, sy - sh * 0.1, sw * 0.15, (4 + footAnim) * pScale * 0.4);
    ctx.fillRect(sx - sw * 0.05, sy - sh * 0.1, sw * 0.15, (4 - footAnim) * pScale * 0.4);
    ctx.fillRect(sx + sw * 0.2, sy - sh * 0.1, sw * 0.15, (4 + footAnim) * pScale * 0.4);
    ctx.fillRect(sx + sw * 0.4, sy - sh * 0.1, sw * 0.15, (4 - footAnim) * pScale * 0.4);

    // Trail (3D)
    for (let i = 0; i < snail.trail.length; i++) {
      const t = snail.trail[i];
      const tp = project(t.x, t.y, t.z);
      ctx.globalAlpha = t.life * 0.3;
      ctx.fillStyle = '#00f0ff';
      ctx.fillRect(tp.sx - 2, tp.sy - 1, 4, 2);
    }
    ctx.globalAlpha = 1;
  }

  // Draw 3D obstacle (minima = 3D vortex, saddle = 3D box)
  function drawObstacle3D(obs) {
    const relZ = obs.z;
    if (relZ < NEAR_Z - 50 || relZ > FAR_Z + 100) return;
    const p = project(obs.x, obs.y, relZ);
    const s = p.scale;
    const depthFade = 1 - (relZ - NEAR_Z) / (FAR_Z - NEAR_Z);

    if (obs.type === 'minima') {
      obs.spin += 0.04;
      // Outer glow sphere (multiple concentric rings)
      const r = obs.r * s * 0.5;
      // Halo
      const haloGrad = ctx.createRadialGradient(p.sx, p.sy, 0, p.sx, p.sy, r * 1.8);
      haloGrad.addColorStop(0, 'rgba(0,0,0,0.9)');
      haloGrad.addColorStop(0.4, 'rgba(40,0,60,0.7)');
      haloGrad.addColorStop(1, 'rgba(255,0,170,0)');
      ctx.fillStyle = haloGrad;
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, r * 1.8, 0, Math.PI * 2);
      ctx.fill();

      // Swirling rings
      ctx.strokeStyle = `rgba(255,0,170,${0.5 * depthFade})`;
      ctx.lineWidth = Math.max(1, 2 * s * 0.5);
      ctx.shadowColor = '#ff00aa';
      ctx.shadowBlur = 12 * depthFade;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const offset = obs.spin + i * 2.1;
        ctx.ellipse(p.sx, p.sy, r * (1 + i * 0.2), r * (0.4 + i * 0.15), offset, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;

      // Core (event horizon)
      ctx.fillStyle = '#000005';
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, r * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ff00aa';
      ctx.lineWidth = Math.max(1, 2 * s * 0.5);
      ctx.shadowColor = '#ff00aa';
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Label
      ctx.fillStyle = `rgba(255,0,170,${0.6 * depthFade})`;
      ctx.font = `${Math.max(8, 12 * s * 0.5)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('LOCAL MIN', p.sx, p.sy + r + 14);
    } else {
      // Saddle point = 3D box barrier
      const w = obs.w * s * 0.5;
      const h = obs.h * s * 0.5;
      const d = 20 * s * 0.5;
      // Top face
      ctx.fillStyle = `rgba(40,0,60,${0.85 * depthFade})`;
      ctx.beginPath();
      ctx.moveTo(p.sx - w, p.sy - h);
      ctx.lineTo(p.sx - w + d, p.sy - h - d);
      ctx.lineTo(p.sx + w + d, p.sy - h - d);
      ctx.lineTo(p.sx + w, p.sy - h);
      ctx.closePath();
      ctx.fill();
      // Front face
      ctx.fillStyle = `rgba(20,0,40,${0.95 * depthFade})`;
      ctx.beginPath();
      ctx.moveTo(p.sx - w, p.sy - h);
      ctx.lineTo(p.sx + w, p.sy - h);
      ctx.lineTo(p.sx + w, p.sy);
      ctx.lineTo(p.sx - w, p.sy);
      ctx.closePath();
      ctx.fill();
      // Right face (darker)
      ctx.fillStyle = `rgba(60,0,80,${0.7 * depthFade})`;
      ctx.beginPath();
      ctx.moveTo(p.sx + w, p.sy - h);
      ctx.lineTo(p.sx + w + d, p.sy - h - d);
      ctx.lineTo(p.sx + w + d, p.sy - d);
      ctx.lineTo(p.sx + w, p.sy);
      ctx.closePath();
      ctx.fill();
      // Neon edges
      ctx.strokeStyle = `rgba(255,0,170,${depthFade})`;
      ctx.lineWidth = Math.max(1, 2 * s * 0.5);
      ctx.shadowColor = '#ff00aa';
      ctx.shadowBlur = 8 * depthFade;
      ctx.beginPath();
      ctx.moveTo(p.sx - w, p.sy - h);
      ctx.lineTo(p.sx + w, p.sy - h);
      ctx.lineTo(p.sx + w, p.sy);
      ctx.lineTo(p.sx - w, p.sy);
      ctx.closePath();
      ctx.stroke();
      // Top edges
      ctx.beginPath();
      ctx.moveTo(p.sx - w, p.sy - h);
      ctx.lineTo(p.sx - w + d, p.sy - h - d);
      ctx.lineTo(p.sx + w + d, p.sy - h - d);
      ctx.lineTo(p.sx + w, p.sy - h);
      ctx.stroke();
      // Right edges
      ctx.beginPath();
      ctx.moveTo(p.sx + w, p.sy - h);
      ctx.lineTo(p.sx + w + d, p.sy - h - d);
      ctx.lineTo(p.sx + w + d, p.sy - d);
      ctx.lineTo(p.sx + w, p.sy);
      ctx.stroke();
      ctx.shadowBlur = 0;
      // Warning label
      ctx.fillStyle = `rgba(255,0,170,${0.6 * depthFade})`;
      ctx.font = `${Math.max(8, 10 * s * 0.5)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('SADDLE', p.sx, p.sy - h - d - 6);
    }
  }

  // Draw collectible (3D diamond floating in space)
  function drawCollectible3D(col) {
    if (col.collected) return;
    if (col.z < NEAR_Z - 30 || col.z > FAR_Z + 50) return;
    col.pulse += 0.1;
    col.bob += 0.05;
    const p = project(col.x, col.y + Math.sin(col.bob) * 8, col.z);
    const s = p.scale;
    const depthFade = 1 - (col.z - NEAR_Z) / (FAR_Z - NEAR_Z);
    const r = col.r * s * 0.5;
    const pulseR = r + Math.sin(col.pulse) * r * 0.15;

    let color, label;
    switch(col.type) {
      case 'lr': color = '#00f0ff'; label = 'LR'; break;
      case 'shield': color = '#ff00aa'; label = 'SH'; break;
      case 'point': color = '#ffff00'; label = '★'; break;
    }

    // Outer glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 15 * depthFade;
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, 2 * s * 0.5);
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, pulseR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Inner fill
    ctx.fillStyle = color + '33';
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, pulseR - 2, 0, Math.PI * 2);
    ctx.fill();

    // Label
    ctx.fillStyle = color;
    ctx.font = `bold ${Math.max(8, 10 * s * 0.5)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, p.sx, p.sy);
    ctx.textBaseline = 'alphabetic';
  }

  // Draw particles in 3D
  function drawParticles3D() {
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const pp = project(p.x, p.y, p.z);
      const s = pp.scale;
      const alpha = p.life;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6 * s * 0.3;
      ctx.beginPath();
      ctx.arc(pp.sx, pp.sy, p.r * s * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // ─── Update ───
  function update() {
    if (!gameRunning) return;
    frameCount++;

    // Speed increase
    speedMultiplier = Math.min(1 + frameCount * 0.0003, 2.0);
    speed = (baseSpeed + frameCount * 0.001) * speedMultiplier;
    speed = Math.min(speed, maxSpeed);

    // Score
    score += Math.floor(speed * 0.5);

    // Snail physics
    if (!snail.grounded) {
      snail.vy += GRAVITY;
      snail.y += snail.vy;
      if (snail.y >= snail.groundY) {
        snail.y = snail.groundY;
        snail.vy = 0;
        snail.grounded = true;
        snail.jumping = false;
      }
    }

    // Slide timer
    if (snail.sliding) {
      snail.slideTimer--;
      if (snail.slideTimer <= 0) snail.sliding = false;
    }

    // Shield timer
    if (snail.shieldTimer > 0) snail.shieldTimer--;

    // Trail
    if (frameCount % 2 === 0) {
      snail.trail.push({ x: snail.x - 5, y: snail.y + snail.h * 0.7, z: NEAR_Z + 30, life: 1 });
    }
    for (let i = snail.trail.length - 1; i >= 0; i--) {
      snail.trail[i].life -= 0.04;
      if (snail.trail[i].life <= 0) snail.trail.splice(i, 1);
    }

    // Spawn obstacles
    const spawnRate = Math.max(60, 140 - frameCount * 0.02);
    if (frameCount % Math.floor(spawnRate) === 0) {
      spawnObstacle();
    }

    // Spawn collectibles
    if (frameCount % 90 === 0) {
      spawnCollectible();
    }

    // Update obstacles (move toward camera: decrease z)
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].z -= speed * 1.5;
      if (obstacles[i].z < NEAR_Z - 80) obstacles.splice(i, 1);
    }

    // Update collectibles
    for (let i = collectibles.length - 1; i >= 0; i--) {
      collectibles[i].z -= speed * 1.5;
      if (collectibles[i].z < NEAR_Z - 30) collectibles.splice(i, 1);
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * 0.3;
      p.y += p.vy * 0.3;
      p.z += p.vz * 0.3;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (shakeTimer > 0) shakeTimer--;

    checkCollisions();

    // HUD
    hudScore.textContent = 'SCORE: ' + score;
    hudSpeed.textContent = 'SPD: ' + speedMultiplier.toFixed(1) + 'x';
  }

  // ─── Collision check (3D-aware) ───
  function checkCollisions() {
    const playerZ = NEAR_Z + 30;
    const sh = snail.sliding ? snail.h * 0.5 : snail.h;
    const sw = snail.sliding ? snail.w * 1.3 : snail.w;

    for (let i = 0; i < obstacles.length; i++) {
      const obs = obstacles[i];
      if (obs.hit) continue;
      // Z proximity check
      if (Math.abs(obs.z - playerZ) > 80) continue;

      if (obs.type === 'minima') {
        const dx = snail.x - obs.x;
        const dy = (snail.y - sh * 0.5) - obs.y;
        const dz = playerZ - obs.z;
        const dist3D = Math.sqrt(dx * dx + dy * dy + dz * dz);

        // Pull effect
        if (dist3D < obs.r * 2.5 && dist3D > 0) {
          const pullForce = obs.pull / (dist3D * 0.08);
          snail.x -= (dx / dist3D) * pullForce * 1.5;
          snail.y -= (dy / dist3D) * pullForce * 0.5;
        }

        if (dist3D < obs.r * 0.8 && !snail.shieldTimer) {
          obs.hit = true;
          endGame();
          return;
        }
      } else if (obs.type === 'saddle') {
        // Approximate as 2D collision in lateral plane (saddle is vertical barrier)
        const halfW = obs.w / 2;
        if (Math.abs(snail.x - obs.x) < halfW + sw * 0.4 &&
            snail.y - sh < obs.y + obs.h && snail.y > obs.y) {
          if (!snail.shieldTimer) {
            obs.hit = true;
            endGame();
            return;
          }
        }
      }
    }

    for (let i = 0; i < collectibles.length; i++) {
      const col = collectibles[i];
      if (col.collected) continue;
      if (Math.abs(col.z - playerZ) > 60) continue;
      const dx = snail.x - col.x;
      const dy = (snail.y - sh * 0.5) - col.y;
      const dz = playerZ - col.z;
      const dist3D = Math.sqrt(dx * dx + dy * dy + dz * dz);
      if (dist3D < col.r + 18) {
        col.collected = true;
        switch(col.type) {
          case 'lr':
            speedMultiplier = Math.min(speedMultiplier + 0.15, 2.0);
            playBoost();
            spawnParticles(col.x, col.y, col.z, '#00f0ff', 8);
            break;
          case 'shield':
            snail.shieldTimer = 180;
            playCollect();
            spawnParticles(col.x, col.y, col.z, '#ff00aa', 10);
            break;
          case 'point':
            score += 50;
            playCollect();
            spawnParticles(col.x, col.y, col.z, '#ffff00', 6);
            break;
        }
      }
    }
  }

  // ─── Render ───
  function render() {
    ctx.clearRect(0, 0, W, H);

    // Screen shake
    let sx = 0, sy = 0;
    if (shakeTimer > 0) {
      sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
      sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 20);
      ctx.save();
      ctx.translate(sx, sy);
    }

    drawGround();
    drawStars();

    // Sort drawables by z (far to near) for painter's algorithm
    const drawables = [];
    obstacles.forEach(o => drawables.push({ z: o.z, kind: 'obs', obj: o }));
    collectibles.forEach(c => drawables.push({ z: c.z, kind: 'col', obj: c }));
    drawables.sort((a, b) => b.z - a.z);
    drawables.forEach(d => {
      if (d.kind === 'obs') drawObstacle3D(d.obj);
      else drawCollectible3D(d.obj);
    });

    drawSnail();
    drawParticles3D();

    if (shakeTimer > 0) ctx.restore();

    // Vignette
    const vignette = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
    vignette.addColorStop(0, 'transparent');
    vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
  }

  // Game loop
  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  // Init
  resize();
  initBg();
  loop();
})();
</script>
