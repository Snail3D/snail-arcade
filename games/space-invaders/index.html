<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Invaders - Snail Arcade</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }
        canvas {
            border: 2px solid #333;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            max-width: 100%;
            max-height: 70vh;
        }
        .ui {
            position: absolute;
            top: 10px;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-around;
            font-size: 18px;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            box-sizing: border-box;
            user-select: none;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            touch-action: manipulation;
        }
        .btn:active {
            background: rgba(0, 255, 0, 0.4);
        }
        .game-over {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            width: 100%;
            height: 100%;
            z-index: 10;
            text-align: center;
        }
        h1 { font-size: 32px; color: #ff0000; margin: 0; }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: #0f0;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div id="score">SCORE: 0</div>
        <div id="lives">LIVES: 3</div>
    </div>
    <div id="gameOver" class="game-over">
        <h1 id="statusText">GAME OVER</h1>
        <p id="finalScore">Final Score: 0</p>
        <button onclick="resetGame()">RESTART</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="btn" id="leftBtn">◀</div>
        <div class="btn" id="fireBtn">🔥</div>
        <div class="btn" id="rightBtn">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const gameOverEl = document.getElementById('gameOver');
        const statusTextEl = document.getElementById('statusText');
        const finalScoreEl = document.getElementById('finalScore');

        const resizeCanvas = () => {
            canvas.width = Math.min(window.innerWidth, 800);
            canvas.height = Math.min(window.innerHeight * 0.7, 600);
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let score = 0;
        let lives = 3;
        let gameActive = true;
        let keys = {};

        let player = {
            x: 0,
            y: 0,
            width: 50,
            height: 30,
            speed: 7,
            color: '#0f0'
        };

        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let enemyDirection = 1;
        let enemySpeed = 1;

        const ENEMY_ROWS = 5;
        const ENEMY_WIDTH = 40;
        const ENEMY_HEIGHT = 30;
        const ENEMY_PADDING = 20;

        function initEnemies() {
            enemies = [];
            const padding = ENEMY_PADDING;
            const cols = Math.floor(canvas.width / (ENEMY_WIDTH + padding)) - 1;
            
            for (let row = 0; row < ENEMY_ROWS; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = col * (ENEMY_WIDTH + padding) + 30;
                    enemies.push({
                        x: x,
                        y: row * (ENEMY_HEIGHT + padding) + 50,
                        width: ENEMY_WIDTH,
                        height: ENEMY_HEIGHT,
                        color: row === 0 ? '#ff0000' : (row < 3 ? '#00ffff' : '#ffff00'),
                        alive: true
                    });
                }
            }
        }

        function resetGame() {
            score = 0;
            lives = 3;
            gameActive = true;
            player.x = canvas.width / 2 - 25;
            player.y = canvas.height - 50;
            bullets = [];
            enemyBullets = [];
            enemySpeed = 1;
            enemyDirection = 1;
            scoreEl.innerText = `SCORE: ${score}`;
            livesEl.innerText = `LIVES: ${lives}`;
            gameOverEl.style.display = 'none';
            resizeCanvas();
            player.y = canvas.height - 50;
            initEnemies();
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('keydown', e => {
            if (e.code === 'Space' && gameActive) {
                if (bullets.length < 3) {
                    bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 15, speed: 8 });
                }
            }
        });

        const handleTouch = (id, action) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                action(true);
            }, {passive: false});
            el.addEventListener('touchend', (e) => {
                e.preventDefault();
                action(false);
            }, {passive: false});
        };

        handleTouch('leftBtn', (state) => keys['ArrowLeft'] = state);
        handleTouch('rightBtn', (state) => keys['ArrowRight'] = state);
        
        const fireBtn = document.getElementById('fireBtn');
        if (fireBtn) {
            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameActive && bullets.length < 3) {
                    bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 15, speed: 8 });
                }
            }, {passive: false});
        }

        function endGame(win) {
            gameActive = false;
            statusTextEl.innerText = win ? "MISSION ACCOMPLISHED" : "GAME OVER";
            statusTextEl.style.color = win ? "#0f0" : "#f00";
            finalScoreEl.innerText = `Final Score: ${score}`;
            gameOverEl.style.display = 'flex';
        }

        function update() {
            if (!gameActive) return;

            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;

            bullets.forEach((b, i) => {
                b.y -= b.speed;
                if (b.y < 0) bullets.splice(i, 1);
            });

            enemyBullets.forEach((b, i) => {
                b.y += b.speed;
                if (b.y > canvas.height) enemyBullets.splice(i, 1);
                if (b.x < player.x + player.width && b.x + b.width > player.x &&
                    b.y < player.y + player.height && b.y + b.height > player.y) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    livesEl.innerText = `LIVES: ${lives}`;
                    if (lives <= 0) endGame(false);
                }
            });

            let edgeReached = false;
            enemies.forEach(enemy => {
                if (!enemy.alive) return;
                enemy.x += enemyDirection * enemySpeed;
                if (enemy.x + enemy.width > canvas.width || enemy.x < 0) {
                    edgeReached = true;
                }
                if (enemy.y + enemy.height > player.y) endGame(false);
            });

            if (edgeReached) {
                enemyDirection *= -1;
                enemies.forEach(enemy => enemy.y += 20);
                enemySpeed += 0.2;
            }

            if (Math.random() < 0.01 && enemies.some(e => e.alive)) {
                const activeEnemies = enemies.filter(e => e.alive);
                const shooter = activeEnemies[Math.floor(Math.random() * activeEnemies.length)];
                enemyBullets.push({ x: shooter.x + shooter.width / 2, y: shooter.y + shooter.height, width: 4, height: 10, speed: 4 });
            }

            bullets.forEach((b, bi) => {
                enemies.forEach((enemy) => {
                    if (enemy.alive && b.x < enemy.x + enemy.width && b.x + b.width > enemy.x &&
                        b.y < enemy.y + enemy.height && b.y + b.height > enemy.y) {
                        enemy.alive = false;
                        bullets.splice(bi, 1);
                        score += 100;
                        scoreEl.innerText = `SCORE: ${score}`;
                        if (enemies.every(e => !e.alive)) endGame(true);
                    }
                });
            });

            enemyBullets.forEach((eb, ebi) => {
                enemies.forEach(enemy => {
                    if (enemy.alive && eb.x < enemy.x + enemy.width && eb.x + eb.width > enemy.x &&
                        eb.y < enemy.y + enemy.height && eb.y + eb.height > enemy.y) {
                        enemy.alive = false;
                        enemyBullets.splice(ebi, 1);
                        score += 100;
                        scoreEl.innerText = `SCORE: ${score}`;
                        if (enemies.every(e => !e.alive)) endGame(true);
                    }
                });
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillRect(player.x + player.width/2 - 5, player.y - 10, 10, 10);

            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            ctx.fillStyle = '#f0f';
            enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

            enemies.forEach(enemy => {
                if (enemy.alive) {
                    ctx.fillStyle = enemy.color;
                    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 5, enemy.y + 5, 5, 5);
                    ctx.fillRect(enemy.x + enemy.width - 10, enemy.y + 5, 5, 5);
                }
            });
        }

        // Initialize
        player.x = canvas.width / 2 - 25;
        player.y = canvas.height - 50;
        initEnemies();
        requestAnimationFrame(update);
    </script>
</body>
</html>
