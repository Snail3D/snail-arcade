<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snail's Glitchy Odyssey</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; pointer-events: none; text-shadow: 2px 2px #000; font-size: 16px; }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(0,255,0,0.5); pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">LETTUCE: 0</div>
        <div id="glitch">REALITY: STABLE</div>
    </div>
    <div id="hint">TAP/DRAG TO MOVE</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const glitchEl = document.getElementById('glitch');

        let width, height, score = 0, glitchLevel = 0, frame = 0;
        let snail = { x: 100, y: 100, vx: 0, vy: 0, radius: 15, trail: [] };
        let items = [], particles = [], keys = {}, touchTarget = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function spawnItem() {
            const type = Math.random() > 0.8 ? 'GLITCH' : 'LETTUCE';
            items.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: 10,
                type: type,
                color: type === 'GLITCH' ? '#ff00ff' : '#00ff00'
            });
        }

        function init() {
            resize();
            for(let i=0; i<5; i++) spawnItem();
            
            window.addEventListener('resize', resize);
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            const handleInput = (e) => {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                touchTarget = { x: clientX, y: clientY };
                if (e.cancelable) e.preventDefault();
            };

            canvas.addEventListener('mousedown', handleInput);
            canvas.addEventListener('mousemove', (e) => { if(touchTarget) handleInput(e); });
            window.addEventListener('mouseup', () => touchTarget = null);
            
            canvas.addEventListener('touchstart', handleInput, {passive: false});
            canvas.addEventListener('touchmove', handleInput, {passive: false});
            canvas.addEventListener('touchend', () => touchTarget = null);

            requestAnimationFrame(gameLoop);
        }

        function update() {
            const accel = 0.6, friction = 0.94;

            if (touchTarget) {
                const dx = touchTarget.x - snail.x;
                const dy = touchTarget.y - snail.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) {
                    snail.vx += (dx / dist) * accel;
                    snail.vy += (dy / dist) * accel;
                }
            } else {
                if (keys['ArrowUp'] || keys['KeyW']) snail.vy -= accel;
                if (keys['ArrowDown'] || keys['KeyS']) snail.vy += accel;
                if (keys['ArrowLeft'] || keys['KeyA']) snail.vx -= accel;
                if (keys['ArrowRight'] || keys['KeyD']) snail.vx += accel;
            }

            snail.vx *= friction;
            snail.vy *= friction;
            snail.x += snail.vx;
            snail.y += snail.vy;

            if (snail.x < 0) snail.x = width;
            if (snail.x > width) snail.x = 0;
            if (snail.y < 0) snail.y = height;
            if (snail.y > height) snail.y = 0;

            snail.trail.push({x: snail.x, y: snail.y, a: 1.0});
            if (snail.trail.length > 30) snail.trail.shift();
            snail.trail.forEach(t => t.a -= 0.03);
            snail.trail = snail.trail.filter(t => t.a > 0);

            items.forEach((item, i) => {
                const dx = snail.x - item.x;
                const dy = snail.y - item.y;
                if (Math.sqrt(dx*dx + dy*dy) < snail.radius + item.radius) {
                    if (item.type === 'GLITCH') glitchLevel = Math.min(100, glitchLevel + 20);
                    else score += 10;
                    items.splice(i, 1);
                    spawnItem();
                    for(let j=0; j<8; j++) particles.push({x: item.x, y: item.y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1.0, color: item.color});
                }
            });

            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
            particles = particles.filter(p => p.life > 0);

            scoreEl.innerText = `LETTUCE: ${score}`;
            glitchEl.innerText = glitchLevel > 70 ? "REALITY: ERROR" : (glitchLevel > 40 ? "REALITY: UNSTABLE" : "REALITY: STABLE");
            frame++;
        }

        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, width, height);

            if (glitchLevel > 0 && Math.random() < glitchLevel/100) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.1})`;
                ctx.fillRect(0, Math.random()*height, width, 2);
            }

            ctx.beginPath();
            snail.trail.forEach((t, i) => {
                ctx.strokeStyle = `rgba(170, 255, 170, ${t.a})`;
                ctx.lineWidth = 6;
                if(i===0) ctx.moveTo(t.x, t.y); else ctx.lineTo(t.x, t.y);
            });
            ctx.stroke();

            items.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius, 0, Math.PI*2);
                ctx.fill();
            });

            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = '#aaffaa';
            ctx.beginPath();
            ctx.arc(snail.x, snail.y, snail.radius, 0, Math.PI*2);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>
</html>
