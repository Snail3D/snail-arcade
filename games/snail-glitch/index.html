<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF IS">
    <title>Snail's Glitchy Odyssey</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; cursor: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; text-shadow: 2px 2px #000; }
        .glitch-text { animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">LETTUCE: 0</div>
        <div id="glitch-level">REALITY: STABLE</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const scoreEl = document.getElementById('score');
        const glitchEl = document.getElementById('glitch-level');

        let width, height;
        let score = 0;
        let glitchLevel = 0; // 0 to 100
        let frame = 0;

        // Game Objects
        const snail = {
            x: 100, y: 100,
            vx: 0, vy: 0,
            radius: 15,
            trail: [],
            color: '#aaffaa'
        };

        let particles = [];
        let items = [];
        const keys = {};

        function init() {
            resize();
            spawnItem();
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function spawnItem() {
            items.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: 10,
                type: Math.random() > 0.8 ? 'GLITCH' : 'LETTUCE',
                color: ''
            });
            items[items.length-1].color = items[items.length-1].type === 'GLITCH' ? '#ff00ff' : '#00ff00';
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('resize', resize);

        function update() {
            // Movement (Snail Momentum)
            const accel = 0.5;
            const friction = 0.95;

            if (keys['ArrowUp'] || keys['KeyW']) snail.vy -= accel;
            if (keys['ArrowDown'] || keys['KeyS']) snail.vy += accel;
            if (keys['ArrowLeft'] || keys['KeyA']) snail.vx -= accel;
            if (keys['ArrowRight'] || keys['KeyD']) snail.vx += accel;

            snail.vx *= friction;
            snail.vy *= friction;
            snail.x += snail.vx;
            snail.y += snail.vy;

            // Boundary collision
            if (snail.x < 0) snail.x = width;
            if (snail.x > width) snail.x = 0;
            if (snail.y < 0) snail.y = height;
            if (snail.y > height) snail.y = 0;

            // Trail logic
            snail.trail.push({x: snail.x, y: snail.y, alpha: 1.0});
            if (snail.trail.length > 50) snail.trail.shift();
            for (let i = 0; i < snail.trail.length; i++) {
                snail.trail[i].alpha -= 0.02;
            }
            snail.trail = snail.trail.filter(t => t.alpha > 0);

            // Collision detection
            items.forEach((item, index) => {
                const dx = snail.x - item.x;
                const dy = snail.y - item.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < snail.radius + item.radius) {
                    if (item.type === 'GLITCH') {
                        glitchLevel = Math.min(100, glitchLevel + 20);
                        createExplosion(item.x, item.y, '#ff00ff');
                    } else {
                        score += 10;
                        createExplosion(item.x, item.y, '#00ff00');
                    }
                    items.splice(index, 1);
                    spawnItem();
                    if (Math.random() > 0.7) spawnItem(); // Extra spawns
                }
            });

            // Update UI
            scoreEl.innerText = `LETTUCE: ${score}`;
            if (glitchLevel < 30) glitchEl.innerText = "REALITY: STABLE";
            else if (glitchLevel < 60) glitchEl.innerText = "REALITY: UNSTABLE";
            else if (glitchLevel < 90) glitchEl.innerText = "REALITY: CRITICAL";
            else glitchEl.innerText = "REALITY: ERROR";

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.pop();
            });

            frame++;
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1.0,
                    color
                });
            }
        }

        function draw() {
            // Glitch background effect
            ctx.fillStyle = glitchLevel > 50 ? `rgba(${Math.random()*50}, 0, 0, 1)` : '#1a1a1a';
            ctx.fillRect(0, 0, width, height);

            // Glitch: Random Rect Overlays
            if (glitchLevel > 30 && Math.random() < (glitchLevel/200)) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.3})`;
                ctx.fillRect(Math.random()*width, Math.random()*height, Math.random()*200, 2);
            }

            // Draw Trail
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            for(let i=0; i<snail.trail.length; i++) {
                const p = snail.trail[i];
                ctx.strokeStyle = `rgba(170, 255, 170, ${p.alpha})`;
                if(i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();

            // Draw Items
            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius, 0, Math.PI*2);
                ctx.fillStyle = item.color;
                ctx.fill();
                if(glitchLevel > 50) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = item.color;
                }
            });
            ctx.shadowBlur = 0;

            // Draw Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
            ctx.globalAlpha = 1.0;

            // Draw Snail
            ctx.beginPath();
            ctx.arc(snail.x, snail.y, snail.radius, 0, Math.PI*2);
            ctx.fillStyle = snail.color;
            ctx.fill();
            
            // Snail Eyes
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(snail.x - 5, snail.y - 5, 2, 0, Math.PI*2);
            ctx.arc(snail.x + 5, snail.y - 5, 2, 0, Math.pi*2);
            ctx.fill();

            // Glitch Overlay: Screen Shake/Scanlines
            if (glitchLevel > 70) {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.05)';
                for(let i=0; i<height; i+=4) {
                    ctx.fillRect(0, i + (Math.random()*2), width, 1);
                }
                
                // Digital tearing
                if (frame % 10 === 0) {
                    ctx.drawImage(canvas, Math.random()*10-5, 0, width, height, 0, 0, width, height);
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>
</html>
