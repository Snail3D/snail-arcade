<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bed Blaster — Snail Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #f0eff4;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  canvas {
    border: 2px solid #00f0ff;
    box-shadow: 0 0 30px rgba(0,240,255,0.2);
    border-radius: 4px;
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    font-size: 14px;
    color: #00f0ff;
    letter-spacing: 0.1em;
  }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,20,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #overlay h1 { font-size: 2.5em; color: #00f0ff; text-shadow: 0 0 20px rgba(0,240,255,0.5); margin-bottom: 12px; }
  #overlay p { color: #888; margin-bottom: 8px; max-width: 400px; text-align: center; line-height: 1.6; }
  #overlay .snail { font-size: 4em; margin-bottom: 16px; }
  .btn {
    margin-top: 20px;
    background: #00f0ff;
    color: #0a0a14;
    border: none;
    padding: 12px 36px;
    font-family: inherit;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .btn:hover { background: #fff; }
  #gameover { display: none; }
</style>
</head>
<body>
<div id="hud">
  <span>SCORE: <b id="score">0</b></span>
  <span>LEVEL: <b id="level">1</b></span>
  <span>LIVES: <b id="lives">3</b></span>
</div>
<canvas id="c" width="800" height="480"></canvas>

<div id="overlay">
  <div class="snail">🐌🔥</div>
  <h1>BED BLASTER</h1>
  <p>Dodge blobs, clogs & stringing as you extrude across the print bed. Collect filament spools to power up!</p>
  <p style="color:#555;font-size:12px;margin-top:8px;">↑↓ or W/S to move · Space to fire</p>
  <button class="btn" onclick="startGame()">PRINT IT</button>
</div>

<div id="overlay" id="gameover" style="display:none">
  <h1 id="go-title">PRINT FAILED</h1>
  <p>Score: <b id="go-score">0</b></p>
  <button class="btn" onclick="startGame()">RETRY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let score = 0, lives = 3, level = 1, gameRunning = false;
let player, bullets, blobs, filaments, particles, frame, speed;

const overlay = document.getElementById('overlay');
const gameoverEl = document.getElementById('gameover');

function startGame() {
  overlay.style.display = 'none';
  gameoverEl.style.display = 'none';
  score = 0; lives = 3; level = 1; frame = 0; speed = 3;
  player = { x: 80, y: H / 2, w: 44, h: 28, vy: 0 };
  bullets = []; blobs = []; filaments = []; particles = [];
  gameRunning = true;
  loop();
}

function spawnBlob() {
  const types = ['blob', 'clog', 'string'];
  blobs.push({
    x: W + 20, y: Math.random() * (H - 60) + 30,
    w: 30 + Math.random() * 20, h: 30 + Math.random() * 20,
    type: types[Math.floor(Math.random() * types.length)],
    speed: 2 + Math.random() * 2 + level * 0.3,
    color: { blob: '#ff4444', clog: '#888', string: '#00f0ff' }[types[0]]
  });
}

function spawnFilament() {
  filaments.push({
    x: W + 20, y: Math.random() * (H - 60) + 30,
    r: 12, speed: 2 + Math.random() * 1.5 + level * 0.2,
    color: Math.random() < 0.5 ? '#00f0ff' : '#ff00ff'
  });
}

function explode(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 30, color });
  }
}

function rects(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function drawSnail(x, y, w, h) {
  // Body
  ctx.fillStyle = '#c26b3c';
  ctx.beginPath();
  ctx.ellipse(x + w * 0.3, y + h * 0.7, w * 0.5, h * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Shell
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x + w * 0.15, y + h * 0.6, h * 0.35, 0, Math.PI * 2);
  ctx.stroke();
  // Head
  ctx.fillStyle = '#c26b3c';
  ctx.beginPath();
  ctx.ellipse(x + w * 0.85, y + h * 0.55, w * 0.18, h * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + w * 0.9, y + h * 0.45, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + w * 0.92, y + h * 0.45, 2, 0, Math.PI * 2);
  ctx.fill();
  // Nozzle
  ctx.fillStyle = '#aaa';
  ctx.fillRect(x + w - 4, y + h * 0.45, 10, h * 0.12);
}

function draw() {
  // Grid background (print bed)
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0,240,255,0.06)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // Heated bed glow
  ctx.fillStyle = 'rgba(255,100,0,0.03)';
  ctx.fillRect(0, 0, W, H);

  // Filaments
  filaments.forEach(f => {
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(f.x - 3, f.y - 3, f.r * 0.3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Blobs
  blobs.forEach(b => {
    if (b.type === 'blob') {
      ctx.fillStyle = 'rgba(255,68,68,0.7)';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2, b.y + b.h / 2, b.w * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else if (b.type === 'clog') {
      ctx.fillStyle = '#666';
      ctx.shadowColor = '#999';
      ctx.shadowBlur = 8;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 2;
      ctx.strokeRect(b.x, b.y, b.w, b.h);
    } else {
      ctx.strokeStyle = '#00f0ff';
      ctx.shadowColor = '#00f0ff';
      ctx.shadowBlur = 10;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      for (let i = 0; i < 4; i++) {
        ctx.lineTo(b.x + (Math.random() - 0.5) * 60, b.y + (Math.random() - 0.5) * 60);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  });

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#00f0ff';
    ctx.shadowColor = '#00f0ff';
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x, b.y, 16, 4);
    ctx.shadowBlur = 0;
  });

  // Player
  drawSnail(player.x, player.y, player.w, player.h);

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 4, 4);
    ctx.globalAlpha = 1;
  });

  // Level indicator
  ctx.fillStyle = '#00f0ff';
  ctx.font = '12px Courier New';
  ctx.fillText('LAYER ' + level, W / 2 - 30, 20);

  // Score / lives
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = lives;
}

function update() {
  frame++;

  // Level progression
  if (frame % 1200 === 0) level++;

  // Spawn
  if (frame % Math.max(30, 60 - level * 3) === 0) spawnBlob();
  if (frame % Math.max(60, 90 - level * 4) === 0) spawnFilament();
  if (frame % 120 === 0) bullets.push({ x: player.x + player.w, y: player.y + player.h / 2 - 2, w: 16, h: 4 });

  // Player
  player.y += player.vy;
  player.y = Math.max(0, Math.min(H - player.h, player.y));

  // Bullets
  bullets = bullets.filter(b => { b.x += 8; return b.x < W; });

  // Blobs
  blobs = blobs.filter(b => {
    b.x -= b.speed;
    if (b.x + b.w < 0) { score += 10; return false; }
    if (rects(player, b)) {
      lives--;
      explode(player.x + player.w / 2, player.y + player.h / 2, '#ff4444');
      if (lives <= 0) { gameRunning = false; showGameOver(); }
      return false;
    }
    // Bullet hit
    for (let i = bullets.length - 1; i >= 0; i--) {
      if (rects(bullets[i], b)) { bullets.splice(i, 1); score += 25; explode(b.x + b.w / 2, b.y + b.h / 2, b.color); return false; }
    }
    return true;
  });

  // Filaments
  filaments = filaments.filter(f => {
    f.x -= f.speed;
    if (f.x + f.r < 0) return false;
    const dx = f.x - (player.x + player.w / 2), dy = f.y - (player.y + player.h / 2);
    if (Math.sqrt(dx * dx + dy * dy) < f.r + 20) { score += 50; explode(f.x, f.y, f.color); return false; }
    return true;
  });

  // Particles
  particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });

  // Speed
  speed = 3 + level * 0.5;
}

function showGameOver() {
  overlay.style.display = 'flex';
  gameoverEl.style.display = 'flex';
  document.getElementById('go-score').textContent = score;
}

function loop() {
  if (!gameRunning) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

// Controls
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') player.vy = -5;
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') player.vy = 5;
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') player.vy = 0;
});

// Touch
let touchY = null;
canvas.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (touchY !== null) player.y += (e.touches[0].clientY - touchY) * 0.5;
  touchY = e.touches[0].clientY;
  player.y = Math.max(0, Math.min(H - player.h, player.y));
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => touchY = null);
</script>
</body>
</html>
