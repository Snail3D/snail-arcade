<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hang-On 1985 Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 14px; text-shadow: 2px 2px #000; z-index: 10; }
        #controls { 
            position: absolute; 
            bottom: 20px; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            z-index: 10;
        }
        .btn { 
            width: 60px; 
            height: 60px; 
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            color: white; 
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .btn:active { background: rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body>
    <div id="ui">
        SPEED: <span id="speed">0</span> KM/H<br>
        SCORE: <span id="score">0</span><br>
        TIME: <span id="timer">60</span>s
    </div>
    <div id="controls">
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-up">▲</div>
        <div class="btn" id="btn-down">▼</div>
        <div class="btn" id="btn-right">▶</div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedEl = document.getElementById('speed');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');

        const FPS = 60;
        const SEGMENT_LENGTH = 200;
        const RENDER_DISTANCE = 60;
        const ROAD_WIDTH = 2000;

        let segments = [];
        let playerX = 0;
        let playerZ = 0;
        let speed = 0;
        let score = 0;
        let timer = 60;
        let lastTime = Date.now();
        let keys = {};

        class Segment {
            constructor(index, curve) {
                this.index = index;
                this.curve = curve;
                this.color = Math.floor(index / 4) % 2 ? '#333' : '#444';
                this.grassColor = Math.floor(index / 4) % 2 ? '#0a4a0a' : '#0d5a0d';
            }
        }

        function initRoad() {
            segments = [];
            for (let i = 0; i < 500; i++) {
                let curve = 0;
                if (i > 50 && i < 150) curve = 2;
                if (i > 200 && i < 300) curve = -3;
                if (i > 350 && i < 450) curve = 1.5;
                segments.push(new Segment(i, curve));
            }
        }

        function setupControls() {
            const setupBtn = (id, key) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                const setKey = (val) => { keys[key] = val; };
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setKey(true); }, { passive: false });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); setKey(false); }, { passive: false });
                btn.addEventListener('mousedown', () => setKey(true));
                btn.addEventListener('mouseup', () => setKey(false));
                btn.addEventListener('mouseleave', () => setKey(false));
            };

            setupBtn('btn-left', 'ArrowLeft');
            setupBtn('btn-up', 'ArrowUp');
            setupBtn('btn-down', 'ArrowDown');
            setupBtn('btn-right', 'ArrowRight');

            window.addEventListener('keydown', (e) => { keys[e.key] = true; if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault(); });
            window.addEventListener('keyup', (e) => { keys[e.key] = false; });
        }

        function update(dt) {
            if (timer <= 0) {
                speed = 0;
                return;
            }

            if (keys['ArrowUp'] || keys['w']) speed += 200 * dt;
            if (keys['ArrowDown'] || keys['s']) speed -= 150 * dt;
            if (keys['ArrowLeft'] || keys['a']) playerX -= (0.05 * speed / 2000) + 0.01;
            if (keys['ArrowRight'] || keys['d']) playerX += (0.05 * speed / 2000) + 0.01;

            speed *= 0.98;
            if (speed < 0) speed = 0;
            if (speed > 2000) speed = 2000;

            playerZ += speed * dt;
            score += speed * dt * 0.1;

            let currentSegIdx = Math.floor(playerZ / SEGMENT_LENGTH) % segments.length;
            let currentSeg = segments[currentSegIdx];
            if (currentSeg) playerX -= currentSeg.curve * (speed / 5000);

            if (playerX < -1.5) playerX = -1.5;
            if (playerX > 1.5) playerX = 1.5;

            timer -= dt;

            speedEl.textContent = Math.floor(speed / 10);
            scoreEl.textContent = Math.floor(score);
            timerEl.textContent = Math.max(0, Math.floor(timer));
        }

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const w = canvas.width;
            const h = canvas.height;
            const horizon = h * 0.45;

            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, w, horizon);

            ctx.fillStyle = '#556b2f';
            ctx.beginPath();
            ctx.moveTo(0, horizon);
            ctx.lineTo(w * 0.2, horizon - 50);
            ctx.lineTo(w * 0.4, horizon);
            ctx.lineTo(w * 0.7, horizon - 80);
            ctx.lineTo(w, horizon);
            ctx.fill();

            ctx.fillStyle = '#0d5a0d';
            ctx.fillRect(0, horizon, w, h - horizon);

            let startIdx = Math.floor(playerZ / SEGMENT_LENGTH);

            for (let i = startIdx + RENDER_DISTANCE; i > startIdx; i--) {
                if (i >= segments.length || i < 0) continue;
                let seg = segments[i];
                let baseZ = i * SEGMENT_LENGTH - playerZ;
                if (baseZ <= 0) continue;

                let scale = 300 / baseZ;
                if (scale < 0 || scale > 1) continue;

                let y = horizon + (h - horizon) * (1 - scale);
                let roadWidth = ROAD_WIDTH * scale;
                let centerX = w / 2 + (playerX * roadWidth / 2);

                ctx.fillStyle = seg.grassColor;
                ctx.fillRect(0, y, centerX - roadWidth / 2, y + 20);
                ctx.fillRect(centerX + roadWidth / 2, y, w - (centerX + roadWidth / 2), y + 20);

                ctx.fillStyle = seg.color;
                ctx.fillRect(centerX - roadWidth / 2, y, roadWidth, y + 20);

                ctx.fillStyle = '#fff';
                ctx.fillRect(centerX - roadWidth / 2, y + 10, roadWidth, 2);
            }

            ctx.fillStyle = '#ff0000';
            ctx.save();
            ctx.translate(w / 2, h - 80);
            let lean = 0;
            if (keys['ArrowLeft'] || keys['a']) lean = -0.2;
            if (keys['ArrowRight'] || keys['d']) lean = 0.2;
            ctx.rotate(lean);
            ctx.fillRect(-10, -40, 20, 40);
            ctx.restore();
        }

        function loop() {
            const now = Date.now();
            const dt = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;

            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        initRoad();
        setupControls();
        loop();
    </script>
</body>
</html>
