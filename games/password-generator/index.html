<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Password Generator — Snail Arcade</title>
<style>
  :root {
    --bg: #0a0a0f;
    --fg: #e8e6f0;
    --cyan: #00f0ff;
    --magenta: #ff00ff;
    --muted: rgba(232,230,240,0.5);
    --line: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: var(--bg); font-family: 'Courier New', monospace; }
  body { display: flex; justify-content: center; align-items: flex-start; padding: 16px 12px; }
  ::selection { background: var(--cyan); color: var(--bg); }

  .panel { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }

  .title { text-align: center; margin-bottom: 4px; }
  .title h1 { font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--cyan); font-weight: 700; }
  .title p { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; margin-top: 2px; }

  /* Output */
  .output-box { background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; position: relative; min-height: 48px; display: flex; align-items: center; }
  #output { font-size: 12px; word-break: break-all; line-height: 1.5; letter-spacing: 0.04em; flex: 1; }
  #output.weak { color: #ff4757; }
  #output.medium { color: #ffa502; }
  #output.strong { color: var(--cyan); }

  .copy-btn { appearance: none; background: transparent; border: 1px solid var(--line); color: var(--muted); font-family: inherit; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 9px; border-radius: 5px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .copy-btn:hover { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  .copy-btn.copied { background: #2ed573; color: var(--bg); border-color: #2ed573; }

  /* Length */
  .length-row { display: flex; justify-content: space-between; align-items: center; }
  .length-row label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  #lengthVal { font-size: 16px; font-weight: 700; color: var(--cyan); }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; border-radius: 2px; background: var(--line); outline: none; margin: 8px 0; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--cyan); cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 8px rgba(0,240,255,0.3); }

  /* Options */
  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .opt-chip { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; cursor: pointer; transition: all 0.2s; user-select: none; }
  .opt-chip:hover { border-color: rgba(255,255,255,0.18); }
  .opt-chip.on { border-color: var(--cyan); background: rgba(0,240,255,0.06); }
  .opt-chip input { display: none; }
  .chk { width: 12px; height: 12px; border: 1.5px solid var(--line); border-radius: 3px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .opt-chip.on .chk { background: var(--cyan); border-color: var(--cyan); }
  .chk svg { opacity: 0; transition: opacity 0.15s; }
  .opt-chip.on .chk svg { opacity: 1; }
  .opt-label { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .opt-chip.on .opt-label { color: var(--fg); }

  /* Strength */
  .str-wrap { margin-top: 2px; }
  .str-labels { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .str-labels span { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  #strValue { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; }
  .str-bar { height: 3px; border-radius: 2px; background: var(--line); overflow: hidden; }
  #strFill { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.4s; width: 0%; }

  /* Generate */
  .gen-btn { width: 100%; appearance: none; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-family: inherit; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: all 0.25s; }
  .gen-btn:hover { background: var(--cyan); color: var(--bg); box-shadow: 0 0 18px rgba(0,240,255,0.2); }
  .gen-btn:active { transform: scale(0.98); }

  /* History */
  .hist { border-top: 1px solid var(--line); padding-top: 10px; }
  .hist-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hist-hdr h2 { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
  .clear-btn { appearance: none; background: transparent; border: 0; color: var(--muted); font-family: inherit; font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: all 0.2s; }
  .clear-btn:hover { color: #ff4757; }
  .hist-list { display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
  .hist-list::-webkit-scrollbar { width: 3px; }
  .hist-list::-webkit-scrollbar-track { background: transparent; }
  .hist-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
  .hist-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); border: 1px solid transparent; border-radius: 5px; padding: 6px 8px; transition: all 0.2s; cursor: pointer; }
  .hist-item:hover { border-color: var(--line); background: rgba(255,255,255,0.04); }
  .hist-pwd { font-size: 9px; word-break: break-all; letter-spacing: 0.03em; flex: 1; margin-right: 6px; color: var(--fg); }
  .hist-meta { font-size: 8px; color: var(--muted); white-space: nowrap; }
  .empty-hist { text-align: center; font-size: 9px; color: var(--muted); padding: 12px 0; letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="panel">
  <div class="title"><h1>Password Generator</h1><p>Cryptographically secure · zero storage</p></div>

  <div class="output-box">
    <span id="output"></span>
    <button id="copyBtn" class="copy-btn">Copy</button>
  </div>

  <div class="length-row"><label>Length</label><span id="lengthVal">16</span></div>
  <input type="range" id="lengthSlider" min="4" max="128" value="16">

  <div class="opts">
    <label class="opt-chip on" data-opt="uppercase"><input type="checkbox" checked><div class="chk"><svg width="7" height="7" viewBox="0 0 7 7"><path d="M1 4L3.5 6L6 1" stroke="#0a0a0f" stroke-width="1.3" fill="none"/></svg></div><span class="opt-label">A-Z</span></label>
    <label class="opt-chip" data-opt="lowercase"><input type="checkbox"><div class="chk"><svg width="7" height="7" viewBox="0 0 7 7"><path d="M1 4L3.5 6L6 1" stroke="#0a0a0f" stroke-width="1.3" fill="none"/></svg></div><span class="opt-label">a-z</span></label>
    <label class="opt-chip on" data-opt="numbers"><input type="checkbox" checked><div class="chk"><svg width="7" height="7" viewBox="0 0 7 7"><path d="M1 4L3.5 6L6 1" stroke="#0a0a0f" stroke-width="1.3" fill="none"/></svg></div><span class="opt-label">0-9</span></label>
    <label class="opt-chip on" data-opt="symbols"><input type="checkbox" checked><div class="chk"><svg width="7" height="7" viewBox="0 0 7 7"><path d="M1 4L3.5 6L6 1" stroke="#0a0a0f" stroke-width="1.3" fill="none"/></svg></div><span class="opt-label">!@#$%</span></label>
  </div>

  <div class="str-wrap">
    <div class="str-labels"><span>Strength</span><span id="strValue">—</span></div>
    <div class="str-bar"><div id="strFill" class="str-fill"></div></div>
  </div>

  <button id="genBtn" class="gen-btn">Generate</button>

  <div class="hist">
    <div class="hist-hdr"><h2>Recent</h2><button id="clearHist" class="clear-btn">Clear</button></div>
    <div id="histList" class="hist-list"><div class="empty-hist">No passwords yet</div></div>
  </div>
</div>

<script>
(function(){
  const CS = { uppercase:'ABCDEFGHIJKLMNOPQRSTUVWXYZ', lowercase:'abcdefghijklmnopqrstuvwxyz', numbers:'0123456789', symbols:'!@#$%^&*()_+-=[]{}|;:,.<>?' };
  let hist = [];

  const $ = id => document.getElementById(id);
  const output = $('output'), copyBtn = $('copyBtn'), slider = $('lengthSlider'), lengthVal = $('lengthVal');
  const genBtn = $('genBtn'), clearHist = $('clearHist'), histList = $('histList');
  const strValue = $('strValue'), strFill = $('strFill');

  function sr(max){ const a=new Uint32Array(1); crypto.getRandomValues(a); return a[0]%max; }

  function generate(){
    const len = parseInt(slider.value);
    const active = [];
    document.querySelectorAll('.opt-chip').forEach(c => { if(c.classList.contains('on')) active.push(c.dataset.opt); });
    if(!active.length){ output.textContent='Select at least one'; output.className='weak'; strValue.textContent='—'; strFill.style.width='0%'; return; }

    let pool=''; const ca={}; for(const o of active){ ca[o]=CS[o].split(''); pool+=CS[o]; }

    const pw = [];
    for(const o of active) pw.push(ca[o][sr(ca[o].length)]);
    for(let i=pw.length;i<len;i++) pw.push(pool[sr(pool.length)]);
    for(let i=pw.length-1;i>0;i--){ const j=sr(i+1); [pw[i],pw[j]]=[pw[j],pw[i]]; }

    const result=pw.join('');
    output.textContent=result;
    const bits=Math.log2(pool.length)*len;
    output.className=bits<60?'weak':bits<100?'medium':'strong';

    if(bits===0){ strValue.textContent='—'; strFill.style.width='0%'; }
    else { let label,color,pct; if(bits<60){label='Weak';color='#ff4757';pct=25;}else if(bits<80){label='Fair';color='#ffa502';pct=50;}else if(bits<100){label='Strong';color='#2ed573';pct=75;}else{label='Fortress';color='#00f0ff';pct=100;} strValue.textContent=label; strValue.style.color=color; strFill.style.width=pct+'%'; strFill.style.background=color; }

    hist.unshift({pwd:result,len,opts:active.length,time:Date.now()}); if(hist.length>8) hist.pop(); renderHist();
  }

  function renderHist(){
    if(!hist.length){ histList.innerHTML='<div class="empty-hist">No passwords yet</div>'; return; }
    histList.innerHTML='';
    for(const it of hist){
      const el=document.createElement('div'); el.className='hist-item';
      const pe=document.createElement('span'); pe.className='hist-pwd'; pe.textContent=it.pwd;
      const me=document.createElement('span'); me.className='hist-meta'; me.textContent=it.len+'c';
      el.appendChild(pe); el.appendChild(me);
      el.addEventListener('click',()=>{ navigator.clipboard.writeText(it.pwd).then(()=>flash()); });
      histList.appendChild(el);
    }
  }

  function flash(){ copyBtn.textContent='Copied!'; copyBtn.classList.add('copied'); setTimeout(()=>{copyBtn.textContent='Copy';copyBtn.classList.remove('copied');},1500); }
  function copy(){ if(!output.textContent||output.textContent==='Select at least one') return; navigator.clipboard.writeText(output.textContent).then(()=>flash()); }

  document.querySelectorAll('.opt-chip').forEach(chip=>{ chip.addEventListener('click',()=>{ const cb=chip.querySelector('input'); const ac=document.querySelectorAll('.opt-chip.on').length; if(chip.classList.contains('on')&&ac<=1) return; cb.checked=!cb.checked; chip.classList.toggle('on',cb.checked); generate(); }); });

  slider.addEventListener('input',()=>{ lengthVal.textContent=slider.value; });
  genBtn.addEventListener('click',generate);
  copyBtn.addEventListener('click',copy);
  clearHist.addEventListener('click',()=>{ hist=[]; renderHist(); });

  document.addEventListener('keydown',e=>{ if(e.target.tagName==='INPUT') return; if(e.key==='g'||e.key==='G') generate(); if(e.key==='c'||e.key==='C') copy(); });

  lengthVal.textContent=slider.value; generate();
})();
</script>
</body>
</html>
