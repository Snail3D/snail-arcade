<!DOCTYPE html>
<html lang="ar" id="html-tag" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">لعبة النونوجرام - Nonogram</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --grid-border: #334e68;
            --cell-empty: #ffffff;
            --cell-filled: #243b53;
            --cell-cross: #eb4d4b;
            --text-color: #102a43;
            --accent-color: #3c6382;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 10px; }
        p { margin-bottom: 20px; font-size: 1.1em; }

        .game-container {
            display: grid;
            grid-template-columns: auto auto;
            gap: 5px;
            background: var(--grid-border);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .spacer { background: transparent; }

        .col-clues {
            display: flex;
            grid-column: 2;
        }

        .col-clue {
            width: 30px;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            background: #dbeafe;
            border: 1px solid var(--grid-border);
            font-size: 12px;
            font-weight: bold;
            padding-bottom: 5px;
        }

        .row-clues {
            display: flex;
            flex-direction: column;
            grid-column: 1;
        }

        .row-clue {
            height: 30px;
            width: 120px;
            display: flex;
            justify-content: flex-end;
            align: center;
            background: #dbeafe;
            border: 1px solid var(--grid-border);
            font-size: 12px;
            font-weight: bold;
            padding-right: 8px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 30px);
            grid-template-rows: repeat(5, 30px);
            gap: 2px;
            background-color: var(--grid-border);
            border: 2px solid var(--grid-border);
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: var(--cell-empty);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            font-size: 20px;
            transition: background 0.2s;
        }

        .cell.filled { background-color: var(--cell-filled); }
        .cell.crossed::after { content: '×'; color: var(--cell-cross); }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }

        #message {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
            font-size: 1.5em;
            height: 1.5em;
        }
        #best-time {
            margin-top: 10px;
            font-size: 0.9em;
            color: #3c6382;
        }
        
        .lang-btn {
            background-color: #7f8c8d;
        }
    </style>
</head>
<body id="body-tag">

    <h1 id="main-title">لعبة النونوجرام 🧩</h1>
    <p id="main-instruction">انقر لتلوين المربعات، أو انقر بزر الماوس الأيمن لوضع علامة (X)</p>

    <div id="game-wrapper">
        <div class="game-container" id="game-container">
            <div class="spacer"></div>
            <div class="col-clues" id="col-clues"></div>
            <div class="row-clues" id="row-clues"></div>
            <div id="grid"></div>
        </div>
    </div>

    <div id="message"></div>
    <div id="best-time">Best Time: —</div>

    <div class="controls">
        <button id="new-game-int" onclick="initGame()">لعبة جديدة</button>
        <button id="lang-btn" class="lang-btn" onclick="toggleLanguage()">English</button>
    </div>

    <script>
        const SIZE = 5;
        let solution = [];
        let currentGrid = [];
        let currentLang = 'ar';
        let solveStartTime = 0;
        let solveCount = 0;

        const BEST_TIME_KEY = 'nonogram-best-time';
        function getBestTime() { return parseInt(localStorage.getItem(BEST_TIME_KEY) || '0'); }
        function saveBestTime(time) {
            if (time > 0 && (getBestTime() === 0 || time < getBestTime())) {
                localStorage.setItem(BEST_TIME_KEY, time.toString());
                document.getElementById('best-time').textContent = 'Best Time: ' + time + 's';
            }
        }
        // Track games won
        const GAMES_WON_KEY = 'nonogram-games-won';
        function getGamesWon() { return parseInt(localStorage.getItem(GAMES_WON_KEY) || '0', 10); }
        function saveGameWon() {
            const won = getGamesWon() + 1;
            localStorage.setItem(GAMES_WON_KEY, won.toString());
        }
        // Track consecutive solves for difficulty scaling
        const CONSEC_KEY = 'nonogram-consec';
        function getConsec() { return parseInt(localStorage.getItem(CONSEC_KEY) || '0', 10); }
        function saveConsec(n) { localStorage.setItem(CONSEC_KEY, n.toString()); }
        // Scale grid size based on streak
        let currentSize = 5;
        // Initialize best time display
        (function() {
            const best = getBestTime();
            if (best > 0) document.getElementById('best-time').textContent = 'Best Time: ' + best + 's';
        })();

        const translations = {
            ar: {
                title: 'لعبة النونوجرام 🧩',
                instruction: 'انقر لتلوين المربعات، أو انقر بزر الماوس الأيمن لوضع علامة (X)',
                newGame: 'لعبة جديدة',
                langBtn: 'English',
                winMsg: '🎉 مبروك! لقد حللت اللغز!',
                dir: 'rtl'
            },
            en: {
                title: 'Nonogram Game 🧩',
                instruction: 'Click to fill cells, or right-click to mark (X)',
                newGame: 'New Game',
                langBtn: 'العربية',
                winMsg: '🎉 Congrats! You solved it!',
                dir: 'ltr'
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            updateUI();
        }

        function updateUI() {
            const lang = currentLang;
            const trans = translations[lang];
            
            document.getElementById('html-tag').dir = trans.dir;
            document.getElementById('main-title').innerText = trans.title;
            document.getElementById('main-instruction').innerText = trans.instruction;
            document.getElementById('new-game-int').innerText = trans.newGame;
            document.getElementById('lang-btn').innerText = trans.langBtn;
            
            const msgEl = document.getElementById('message');
            const currentMsg = msgEl.innerText;
            if (currentMsg.includes('🎉') || currentMsg.includes('Congrats')) {
                msgEl.innerText = trans.winMsg;
            }
            
            const rows = document.querySelectorAll('.row-clue');
            rows.forEach(clue => {
                clue.style.justifyContent = trans.dir === 'rtl' ? 'flex-end' : 'flex-start';
                clue.style.paddingRight = trans.dir === 'rtl' ? '8px' : '0';
                clue.style.paddingLeft = trans.dir === 'ltr' ? '8px' : '0';
            });
        }

        function generateRandomGrid(size) {
            let grid = [];
            for (let r = 0; r < size; r++) {
                let row = [];
                for (let c = 0; c < size; c++) {
                    row.push(Math.random() > 0.4 ? 1 : 0);
                }
                grid.push(row);
            }
            return grid;
        }

        function getClues(line) {
            let clues = [];
            let count = 0;
            for (let val of line) {
                if (val === 1) {
                    count++;
                } else {
                    if (count > 0) clues.push(count);
                    count = 0;
                }
            }
            if (count > 0) clues.push(count);
            return clues.length > 0 ? clues : [0];
        }

        function initGame() {
            // Use currentSize instead of fixed SIZE for scaling
            const gs = currentSize || SIZE;
            solution = generateRandomGrid(gs);
            currentGrid = Array(gs).fill().map(() => Array(gs).fill(0));
            document.getElementById('message').innerText = '';
            solveStartTime = Date.now();
            // Update grid CSS to match size
            const gridEl = document.getElementById('grid');
            gridEl.style.gridTemplateColumns = 'repeat(' + gs + ', clamp(26px, 15vw, 50px))';
            gridEl.style.gridTemplateRows = 'repeat(' + gs + ', clamp(26px, 15vw, 50px))';
            renderClues(gs);
            renderGrid(gs);
        }

        function renderClues(size) {
            const gs = size || SIZE;
            const rowCluesEl = document.getElementById('row-clues');
            const colCluesEl = document.getElementById('col-clues');
            rowCluesEl.innerHTML = '';
            colCluesEl.innerHTML = '';

            for (let r = 0; r < gs; r++) {
                const clues = getClues(solution[r]);
                const div = document.createElement('div');
                div.className = 'row-clue';
                div.style.width = 'auto';
                div.style.height = '30px';
                div.style.paddingRight = '8px';
                div.innerText = clues.join(' ');
                rowCluesEl.appendChild(div);
            }

            for (let c = 0; c < gs; c++) {
                let colArr = [];
                for (let r = 0; r < gs; r++) {
                    colArr.push(solution[r][c]);
                }
                const clues = getClues(colArr);
                const div = document.createElement('div');
                div.className = 'col-clue';
                div.style.height = 'auto';
                div.style.width = '30px';
                clues.forEach(num => {
                    const span = document.createElement('span');
                    span.innerText = num;
                    div.appendChild(span);
                });
                colCluesEl.appendChild(div);
            }
            updateUI(); 
        }

        function renderGrid(size) {
            const gs = size || SIZE;
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < gs; r++) {
                for (let c = 0; c < gs; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.style.width = 'clamp(26px, 15vw, 50px)';
                    cell.style.height = 'clamp(26px, 15vw, 50px)';
                    cell.addEventListener('click', () => toggleCell(r, c, 'fill'));
                    cell.addEventListener('touchstart', (e) => { e.preventDefault(); toggleCell(r, c, 'fill'); }, { passive: false });
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        toggleCell(r, c, 'cross');
                    });
                    gridEl.appendChild(cell);
                }
            }
        }

        function toggleCell(r, c, type) {
            const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
            if (type === 'fill') {
                if (currentGrid[r][c] === 1) {
                    currentGrid[r][c] = 0;
                    cell.classList.remove('filled');
                } else {
                    currentGrid[r][c] = 1;
                    cell.classList.remove('crossed');
                    cell.classList.add('filled');
                }
            } else {
                if (cell.classList.contains('crossed')) {
                    cell.classList.remove('crossed');
                } else {
                    cell.classList.add('crossed');
                    cell.classList.remove('filled');
                    currentGrid[r][c] = 0;
                }
            }
            checkWin();
        }

        function checkWin() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (currentGrid[r][c] !== solution[r][c]) return;
                }
            }
            const timeTaken = Math.round((Date.now() - solveStartTime) / 1000);
            document.getElementById('message').innerText = translations[currentLang].winMsg;
            saveBestTime(timeTaken);
            saveGameWon();
            solveCount++;
            const consec = getConsec();
            saveConsec(consec + 1);
            // Scale up difficulty every 3 solves: increase grid size
            if (solveCount % 3 === 0 && currentSize < 10) {
                currentSize = Math.min(10, currentSize + 1);
                document.getElementById('message').innerText += ' (Next: ' + currentSize + '×' + currentSize + ')';
            }
        }

        initGame();
    </script>
</body>
</html>
