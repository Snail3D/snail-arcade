<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Agent Ecosystem Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e17;font-family:'Courier New',monospace;color:#c0d0e0}
canvas{display:block;position:fixed;top:0;left:0;z-index:0}
#ui{position:fixed;top:12px;right:12px;z-index:10;width:260px;max-height:calc(100vh - 24px);overflow-y:auto;overflow-x:hidden;transition:transform .3s}
#ui.collapsed{transform:translateX(calc(100% + 12px))}
#ui::-webkit-scrollbar{width:4px}
#ui::-webkit-scrollbar-thumb{background:#1a3a5c;border-radius:2px}
.panel{background:rgba(10,14,23,.92);border:1px solid #1a3a5c;border-radius:8px;padding:14px;margin-bottom:8px;backdrop-filter:blur(8px)}
.panel h3{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#4a9eff;margin-bottom:10px;border-bottom:1px solid #1a2a3c;padding-bottom:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:7px 10px;margin:3px 0;background:rgba(20,40,70,.7);border:1px solid #1a3a5c;border-radius:5px;color:#8ab4e0;font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:rgba(30,60,100,.8);border-color:#4a9eff;color:#c0d8f0}
.btn:active{transform:scale(.97)}
.btn.active{background:rgba(40,80,140,.7);border-color:#4a9eff;color:#fff;box-shadow:0 0 8px rgba(74,158,255,.3)}
.btn-row{display:flex;gap:4px}
.btn-row .btn{flex:1}
.stat{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:#7a9ab8}
.stat .val{color:#4a9eff;font-weight:bold}
.slider-row{margin:6px 0}
.slider-row label{font-size:10px;color:#6a8aaa;display:flex;justify-content:space-between;margin-bottom:3px}
.slider-row label span{color:#4a9eff}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:#1a2a3c;border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#4a9eff;border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(74,158,255,.5)}
#toggle-ui{position:fixed;top:12px;right:280px;z-index:11;width:28px;height:28px;background:rgba(10,14,23,.9);border:1px solid #1a3a5c;border-radius:5px;color:#4a9eff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
#toggle-ui:hover{border-color:#4a9eff}
#toggle-ui.shifted{right:12px}
#species-info{position:fixed;bottom:12px;left:12px;z-index:10;pointer-events:none}
.species-tag{display:inline-block;padding:3px 8px;margin:2px;background:rgba(10,14,23,.85);border:1px solid #1a3a5c;border-radius:4px;font-size:10px;pointer-events:auto;cursor:help;transition:all .15s}
.species-tag:hover{border-color:#4a9eff;background:rgba(20,40,70,.8)}
#tooltip{position:fixed;z-index:20;background:rgba(10,14,23,.95);border:1px solid #4a9eff;border-radius:6px;padding:10px;font-size:11px;max-width:220px;pointer-events:none;opacity:0;transition:opacity .15s;line-height:1.5}
#tooltip.show{opacity:1}
#tooltip .tt-title{color:#4a9eff;font-weight:bold;margin-bottom:4px;font-size:12px}
#tooltip .tt-stat{color:#7a9ab8}
#tooltip .tt-stat span{color:#c0d0e0}
#fps{position:fixed;top:12px;left:12px;z-index:10;font-size:10px;color:#3a6a3a;background:rgba(10,14,23,.8);padding:3px 8px;border-radius:4px}
@media(max-width:600px){
  #ui{width:200px;right:6px;top:6px}
  #toggle-ui{right:214px;top:6px}
  .panel{padding:10px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fps">60 FPS</div>

<div id="species-info"></div>
<div id="tooltip"><div class="tt-title"></div><div class="tt-body"></div></div>

<button id="toggle-ui" title="Toggle UI">☰</button>
<div id="ui">
  <div class="panel">
    <h3>🧬 Spawn Agents</h3>
    <div class="btn-row">
      <button class="btn" data-species="worker">Worker</button>
      <button class="btn" data-species="scout">Scout</button>
    </div>
    <div class="btn-row">
      <button class="btn" data-species="hunter">Hunter</button>
      <button class="btn" data-species="archivist">Archivist</button>
    </div>
    <button class="btn" id="spawn-random">🎲 Spawn Random x5</button>
    <button class="btn" id="spawn-cluster">🌿 Spawn Cluster x10</button>
  </div>

  <div class="panel">
    <h3>⚙️ Controls</h3>
    <div class="btn-row">
      <button class="btn" id="btn-pause">⏸ Pause</button>
      <button class="btn" id="btn-speed">1x</button>
    </div>
    <div class="slider-row">
      <label>Resources <span id="res-val">50</span></label>
      <input type="range" id="res-slider" min="10" max="200" value="50">
    </div>
    <div class="slider-row">
      <label>Speed <span id="speed-val">1x</span></label>
      <input type="range" id="speed-slider" min="1" max="8" value="1">
    </div>
  </div>

  <div class="panel">
    <h3>📊 Statistics</h3>
    <div class="stat"><span>Population</span><span class="val" id="s-pop">0</span></div>
    <div class="stat"><span>Avg Energy</span><span class="val" id="s-energy">0</span></div>
    <div class="stat"><span>Delegations</span><span class="val" id="s-delegate">0</span></div>
    <div class="stat"><span>Evolutions</span><span class="val" id="s-evolve">0</span></div>
    <div class="stat"><span>Resources</span><span class="val" id="s-resources">0</span></div>
    <div class="stat"><span>Deaths</span><span class="val" id="s-deaths">0</span></div>
  </div>

  <div class="panel">
    <h3>🔧 Actions</h3>
    <button class="btn" id="btn-evolve-all">⚡ Evolve All</button>
    <button class="btn" id="btn-save">💾 Save State</button>
    <button class="btn" id="btn-load">📂 Load State</button>
    <button class="btn" id="btn-reset">🗑 Reset Ecosystem</button>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────
const SPECIES = {
  worker:    { color:'#4ae080', shape:'rect',    speed:1.2, energy:100, range:80,  delegateRate:.001, evolveAt:50,  desc:'Balanced gatherer. Efficient at collecting resources.' },
  scout:     { color:'#40a0ff', shape:'triangle',speed:2.5, energy:70,  range:120, delegateRate:.002, evolveAt:40,  desc:'Fast explorer. Finds resource clusters, delegates to workers.' },
  hunter:    { color:'#ff4060', shape:'diamond', speed:1.8, energy:130, range:100, delegateRate:.004, evolveAt:60,  desc:'Aggressive competitor. Takes resources from others.' },
  archivist: { color:'#c080ff', shape:'hexagon', speed:.8,  energy:90,  range:60,  delegateRate:.003, evolveAt:70,  desc:'Slow collector. Forms clusters, high delegation capacity.' }
};
const RESOURCE_TYPES = [
  { name:'compute', color:'#ffaa00' },
  { name:'memory',  color:'#00ccaa' },
  { name:'bandwidth',color:'#ff66aa' },
  { name:'storage', color:'#88aaff' }
];
const COMPAT = {
  worker:  { worker:1, scout:.7, hunter:.3, archivist:.8 },
  scout:   { worker:.7, scout:.5, hunter:.2, archivist:.9 },
  hunter:  { worker:.3, scout:.2, hunter:.6, archivist:.2 },
  archivist:{ worker:.8, scout:.9, hunter:.2, archivist:.7 }
};

// ─── CANVAS SETUP ─────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener('resize', resize); resize();

// ─── SIMULATION STATE ─────────────────────────────────
let paused = false, simSpeed = 1, resAbundance = 50;
let agents = [], resources = [], delegations = [], particles = [];
let stats = { delegations:0, evolutions:0, deaths:0 };
let lastTime = 0, fpsCounter = 0, fpsTime = 0, fpsDisplay = 60;
let mouse = { x:0, y:0, down:false };
let uiVisible = true;

// ─── HEX GRID BACKGROUND ──────────────────────────────
const hexSize = 28;
let hexPattern = null;
function buildHexPattern(){
  const s = hexSize * 2;
  const pc = document.createElement('canvas');
  pc.width = s * 1.5; pc.height = s * 3;
  const pctx = pc.getContext('2d');
  pctx.fillStyle = '#0a0e17';
  pctx.fillRect(0,0,pc.width,pc.height);
  pctx.strokeStyle = 'rgba(20,40,70,0.25)';
  pctx.lineWidth = 0.5;
  function hex(cx,cy){
    pctx.beginPath();
    for(let i=0;i<6;i++){
      const a = Math.PI/3*i - Math.PI/6;
      const x = cx + hexSize*Math.cos(a), y = cy + hexSize*Math.sin(a);
      i? pctx.lineTo(x,y) : pctx.moveTo(x,y);
    }
    pctx.closePath(); pctx.stroke();
  }
  for(let row=-1;row<5;row++) for(let col=-1;col<4;col++){
    hex(col*s*0.75, row*s*0.5 + (col%2)*s*0.25);
  }
  hexPattern = ctx.createPattern(pc,'repeat');
}
buildHexPattern();

// ─── PARTICLE SYSTEM ──────────────────────────────────
class Particle {
  constructor(x,y,vx,vy,life,color,size){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.life=this.maxLife=life;this.color=color;this.size=size;
  }
  update(dt){ this.x+=this.vx*dt; this.y+=this.vy*dt; this.life-=dt; this.vy+=15*dt; }
  get alive(){ return this.life>0; }
  draw(c){
    const a = this.life/this.maxLife;
    c.globalAlpha = a*0.8;
    c.fillStyle = this.color;
    c.beginPath();
    c.arc(this.x,this.y,this.size*a,0,Math.PI*2);
    c.fill();
    c.globalAlpha = 1;
  }
}

function emitParticles(x,y,count,color,speed,life,size){
  for(let i=0;i<count;i++){
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*speed;
    particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,life*(0.5+Math.random()*0.5),color,size*(0.5+Math.random()*0.5)));
  }
}

// ─── RESOURCE ─────────────────────────────────────────
class Resource {
  constructor(x,y,type){
    this.x=x;this.y=y;this.type=type;
    this.radius = 5 + Math.random()*4;
    this.amount = 20 + Math.random()*15;
    this.maxAmount = this.amount;
    this.pulse = Math.random()*Math.PI*2;
    this.alive = true;
  }
  update(dt){
    this.pulse += dt*2;
    if(this.amount < this.maxAmount) this.amount = Math.min(this.maxAmount, this.amount + dt*0.5*(resAbundance/50));
  }
  draw(c){
    const p = 1 + Math.sin(this.pulse)*0.15;
    const r = this.radius * p;
    const col = RESOURCE_TYPES[this.type].color;
    const g = c.createRadialGradient(this.x,this.y,0,this.x,this.y,r*3);
    g.addColorStop(0, col+'aa');
    g.addColorStop(0.4, col+'44');
    g.addColorStop(1, col+'00');
    c.fillStyle = g;
    c.beginPath(); c.arc(this.x,this.y,r*3,0,Math.PI*2); c.fill();
    c.fillStyle = col;
    c.beginPath(); c.arc(this.x,this.y,r,0,Math.PI*2); c.fill();
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(this.x-r*0.2,this.y-r*0.2,r*0.3,0,Math.PI*2); c.fill();
  }
  get alive(){ return this.amount > 1; }
}

// ─── AGENT ────────────────────────────────────────────
class Agent {
  constructor(x,y,species){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*2;this.vy=(Math.random()-.5)*2;
    this.species=species;
    const sp = SPECIES[species];
    this.energy = sp.energy;
    this.maxEnergy = sp.energy;
    this.state = 'foraging';
    this.connections = [];
    this.stress = 0;
    this.exp = 0;
    this.level = 0;
    this.age = 0;
    this.target = null;
    this.wanderAngle = Math.random()*Math.PI*2;
    this.alive = true;
    this.delegating = false;
    this.delegationCooldown = 0;
    this.trail = [];
    this.glowPhase = Math.random()*Math.PI*2;
    this.evolutionColor = null;
    this.abilityUnlocked = false;
  }

  findTarget(){
    let best = null, bestDist = Infinity;
    for(const r of resources){
      if(!r.alive) continue;
      const d = dist(this.x,this.y,r.x,r.y);
      if(d < bestDist){ bestDist=d; best=r; }
    }
    // Hunter: also targets other agents
    if(this.species==='hunter' && !this.delegating){
      for(const a of agents){
        if(a===this || !a.alive) continue;
        const d = dist(this.x,this.y,a.x,a.y);
        if(d < 100 && d < bestDist){ bestDist=d; best=a; }
      }
    }
    this.target = best;
  }

  update(dt){
    if(!this.alive) return;
    this.age += dt;
    this.glowPhase += dt*3;
    this.delegationCooldown = Math.max(0, this.delegationCooldown - dt);
    this.stress = Math.max(0, this.stress - dt*0.5);

    const sp = SPECIES[this.species];
    const energyCost = dt * (2 + this.stress*0.5);
    this.energy -= energyCost;

    if(this.energy <= 0){ this.die(); return; }

    // State transitions
    if(this.energy < this.maxEnergy*0.15 && this.state !== 'resting'){
      this.state = 'resting';
    } else if(this.state === 'resting' && this.energy > this.maxEnergy*0.5){
      this.state = 'foraging';
    }

    if(this.state === 'resting'){
      this.vx *= 0.95; this.vy *= 0.95;
      this.energy = Math.min(this.maxEnergy, this.energy + dt*3);
    } else {
      this.findTarget();

      if(this.target && this.target.alive){
        const dx = this.target.x - this.x;
        const dy = this.target.y - this.y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if(d > 1){
          const ax = (dx/d) * sp.speed * 0.5;
          const ay = (dy/d) * sp.speed * 0.5;
          this.vx += ax*dt*10; this.vy += ay*dt*10;
        }
        // Collect resource
        if(d < sp.range*0.15 && this.target instanceof Resource){
          const gathered = Math.min(this.target.amount, dt*15*(1+this.level*0.2));
          this.target.amount -= gathered;
          this.energy = Math.min(this.maxEnergy, this.energy + gathered*0.8);
          this.exp += gathered*0.05;
          emitParticles(this.target.x,this.target.y,2,sp.color,30,0.3,2);
        }
        // Hunter steals
        if(this.species==='hunter' && this.target instanceof Agent && d < 30){
          const stolen = dt*5;
          this.target.energy -= stolen;
          this.energy = Math.min(this.maxEnergy, this.energy + stolen*0.6);
          emitParticles(this.target.x,this.target.y,3,'#ff4060',40,0.4,2);
          if(this.target.energy <= 0) this.target.die();
        }
      } else {
        // Wander
        this.wanderAngle += (Math.random()-0.5)*dt*3;
        this.vx += Math.cos(this.wanderAngle)*sp.speed*0.15*dt*10;
        this.vy += Math.sin(this.wanderAngle)*sp.speed*0.15*dt*10;
      }

      // Friction
      this.vx *= 0.96; this.vy *= 0.96;

      // Edge avoidance
      const margin = 40;
      if(this.x < margin) this.vx += dt*50;
      if(this.x > W-margin) this.vx -= dt*50;
      if(this.y < margin) this.vy += dt*50;
      if(this.y > H-margin) this.vy -= dt*50;

      // Clamp speed
      const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
      if(spd > sp.speed*3){ this.vx=this.vx/spd*sp.speed*3; this.vy=this.vy/spd*sp.speed*3; }
    }

    this.x += this.vx*dt*60;
    this.y += this.vy*dt*60;

    // Trail
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length > 12) this.trail.shift();

    // Delegation
    if(this.delegationCooldown <= 0 && this.energy > this.maxEnergy*0.3){
      tryDelegate(this);
    }

    // Evolution check
    if(this.exp >= SPECIES[this.species].evolveAt * (this.level+1) && this.level < 3){
      this.evolve();
    }
  }

  evolve(){
    this.level++;
    this.exp = 0;
    this.maxEnergy += 20;
    this.energy = this.maxEnergy;
    this.abilityUnlocked = true;
    stats.evolutions++;
    const base = SPECIES[this.species].color;
    this.evolutionColor = base;
    emitParticles(this.x,this.y,25,base,80,1.2,3);
  }

  die(){
    this.alive = false;
    stats.deaths++;
    emitParticles(this.x,this.y,15,SPECIES[this.species].color,50,0.8,2);
    // 10% chance to respawn as seed
    if(Math.random() < 0.1){
      setTimeout(()=>{
        if(!paused) agents.push(new Agent(Math.random()*(W-80)+40, Math.random()*(H-80)+40, this.species));
      }, 2000 + Math.random()*3000);
    }
  }

  draw(c){
    const sp = SPECIES[this.species];
    const glow = 0.5 + Math.sin(this.glowPhase)*0.3;
    const stressGlow = this.stress > 0.5;

    // Trail
    if(this.trail.length > 1){
      c.beginPath();
      c.moveTo(this.trail[0].x, this.trail[0].y);
      for(let i=1;i<this.trail.length;i++) c.lineTo(this.trail[i].x, this.trail[i].y);
      c.strokeStyle = stressGlow ? 'rgba(255,64,96,0.2)' : sp.color+'33';
      c.lineWidth = 1;
      c.stroke();
    }

    // Glow
    const g = c.createRadialGradient(this.x,this.y,0,this.x,this.y,18+this.level*4);
    const gc = stressGlow ? 'rgba(255,64,96,' : (sp.color+'');
    g.addColorStop(0, gc+(0.4*glow)+')');
    g.addColorStop(1, gc+'00)');
    c.fillStyle = g;
    c.beginPath(); c.arc(this.x,this.y,18+this.level*4,0,Math.PI*2); c.fill();

    // Shape
    const s = 5 + this.level*2;
    c.fillStyle = stressGlow ? '#ff4060' : sp.color;
    c.strokeStyle = '#fff';
    c.lineWidth = 1;
    c.beginPath();

    const angle = Math.atan2(this.vy, this.vx);
    c.save();
    c.translate(this.x, this.y);
    c.rotate(angle);

    switch(sp.shape){
      case 'rect':
        c.rect(-s,-s*0.7,s*2,s*1.4); break;
      case 'triangle':
        c.moveTo(s,0); c.lineTo(-s*0.8,-s*0.7); c.lineTo(-s*0.8,s*0.7); c.closePath(); break;
      case 'diamond':
        c.moveTo(s,0); c.lineTo(0,-s*0.7); c.lineTo(-s,0); c.lineTo(0,s*0.7); c.closePath(); break;
      case 'hexagon':
        for(let i=0;i<6;i++){
          const a=Math.PI/3*i;
          (i?c.lineTo:c.moveTo)(Math.cos(a)*s, Math.sin(a)*s);
        }
        c.closePath(); break;
    }
    c.fill();
    c.stroke();
    c.restore();

    // Energy bar
    const bw = 14, bh = 2;
    const ex = this.x - bw/2, ey = this.y - 14 - this.level*3;
    c.fillStyle = 'rgba(0,0,0,0.5)';
    c.fillRect(ex,ey,bw,bh);
    const ep = this.energy/this.maxEnergy;
    c.fillStyle = ep>0.5?'#4ae080':ep>0.25?'#ffaa00':'#ff4060';
    c.fillRect(ex,ey,bw*ep,bh);

    // Level indicator
    if(this.level > 0){
      c.fillStyle = '#fff';
      c.font = '8px monospace';
      c.textAlign = 'center';
      c.fillText('Lv'+(this.level+1), this.x, this.y + 3 + this.level*3);
    }
  }
}

// ─── DELEGATION ───────────────────────────────────────
function tryDelegate(agent){
  if(agent.delegationCooldown > 0) return;
  if(agent.connections.length >= 3) return;

  let best = null, bestScore = 0;
  for(const other of agents){
    if(other===agent || !other.alive) continue;
    const d = dist(agent.x,agent.y,other.x,other.y);
    if(d > SPECIES[agent.species].range) continue;
    const compat = COMPAT[agent.species]?.[other.species] || 0;
    if(compat < 0.2) continue;
    const score = compat * (1 - d/SPECIES[agent.species].range);
    if(score > bestScore){ bestScore=score; best=other; }
  }

  if(best && bestScore > 0.3 && Math.random() < SPECIES[agent.species].delegateRate*60){
    agent.delegating = true;
    agent.delegationCooldown = 2;
    agent.stress = Math.min(1, agent.stress + 0.1);

    // Transfer energy
    const transfer = 5 + Math.random()*10;
    agent.energy -= transfer*0.5;
    best.energy = Math.min(best.maxEnergy, best.energy + transfer);
    agent.exp += 2;
    best.exp += 3;
    stats.delegations++;

    // Create delegation link
    delegations.push({
      from: agent, to: best,
      age: 0, maxAge: 3 + Math.random()*3,
      strength: bestScore
    });

    emitParticles((agent.x+best.x)/2,(agent.y+best.y)/2,5,
      '#4a9eff',30,0.5,2);
  }
}

// ─── SPAWN RESOURCES ──────────────────────────────────
function spawnResources(){
  const target = Math.floor(resAbundance);
  const alive = resources.filter(r=>r.alive);
  if(alive.length < target){
    const count = Math.min(3, target - alive.length);
    for(let i=0;i<count;i++){
      const type = Math.floor(Math.random()*RESOURCE_TYPES.length);
      resources.push(new Resource(
        40+Math.random()*(W-80),
        40+Math.random()*(H-80),
        type
      ));
    }
  }
}

// ─── SPAWN AGENTS ─────────────────────────────────────
function spawnAgent(species, x, y){
  const sx = x ?? (40+Math.random()*(W-80));
  const sy = y ?? (40+Math.random()*(H-80));
  agents.push(new Agent(sx, sy, species));
}

// ─── UTILITIES ────────────────────────────────────────
function dist(x1,y1,x2,y2){ return Math.sqrt((x2-x1)**2+(y2-y1)**2); }

// ─── MAIN LOOP ────────────────────────────────────────
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime)/1000, 0.05) * simSpeed;
  lastTime = ts;

  // FPS
  fpsCounter++;
  if(ts - fpsTime > 500){
    fpsDisplay = Math.round(fpsCounter/((ts-fpsTime)/1000));
    fpsCounter = 0; fpsTime = ts;
    document.getElementById('fps').textContent = fpsDisplay + ' FPS';
  }

  if(paused){ render(); updateUI(); return; }

  // Update
  spawnResources();
  for(const a of agents) a.update(dt);
  agents = agents.filter(a=>a.alive);
  resources.forEach(r=>r.update(dt));
  resources = resources.filter(r=>r.alive);
  delegations.forEach(d=>d.age+=dt);
  delegations = delegations.filter(d=>d.age < d.maxAge);
  particles.forEach(p=>p.update(dt));
  particles = particles.filter(p=>p.alive);

  // Population cap
  if(agents.length > 300) agents.splice(0, agents.length-300);

  render();
  updateUI();
}

function render(){
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0,0,W,H);

  // Hex grid
  if(hexPattern){ ctx.fillStyle=hexPattern; ctx.fillRect(0,0,W,H); }

  // Subtle vignette
  const vg = ctx.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W*0.7);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);

  // Delegations
  for(const d of delegations){
    const a = 1 - d.age/d.maxAge;
    ctx.beginPath();
    ctx.moveTo(d.from.x,d.from.y);
    ctx.lineTo(d.to.x,d.to.y);
    ctx.strokeStyle = `rgba(74,158,255,${a*0.5})`;
    ctx.lineWidth = 1 + d.strength*2;
    ctx.stroke();
    // Animated dot along line
    const t = (Date.now()%1000)/1000;
    const mx = d.from.x+(d.to.x-d.from.x)*t;
    const my = d.from.y+(d.to.y-d.from.y)*t;
    ctx.fillStyle = `rgba(74,158,255,${a*0.8})`;
    ctx.beginPath(); ctx.arc(mx,my,2,0,Math.PI*2); ctx.fill();
  }

  // Resources
  resources.forEach(r=>r.draw(ctx));

  // Agents
  agents.forEach(a=>a.draw(ctx));

  // Particles
  particles.forEach(p=>p.draw(ctx));

  // Mouse cursor glow
  if(mouse.x > 0){
    const mg = ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,60);
    mg.addColorStop(0,'rgba(74,158,255,0.08)');
    mg.addColorStop(1,'transparent');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.arc(mouse.x,mouse.y,60,0,Math.PI*2); ctx.fill();
  }
}

// ─── UI ───────────────────────────────────────────────
function updateUI(){
  document.getElementById('s-pop').textContent = agents.length;
  const avgE = agents.length ? Math.round(agents.reduce((s,a)=>s+a.energy,0)/agents.length) : 0;
  document.getElementById('s-energy').textContent = avgE;
  document.getElementById('s-delegate').textContent = stats.delegations;
  document.getElementById('s-evolve').textContent = stats.evolutions;
  document.getElementById('s-resources').textContent = resources.filter(r=>r.alive).length;
  document.getElementById('s-deaths').textContent = stats.deaths;
}

// Species buttons
document.querySelectorAll('[data-species]').forEach(btn=>{
  btn.addEventListener('click', ()=> spawnAgent(btn.dataset.species));
});

document.getElementById('spawn-random').addEventListener('click', ()=>{
  const keys = Object.keys(SPECIES);
  for(let i=0;i<5;i++) spawnAgent(keys[Math.floor(Math.random()*keys.length)]);
});

document.getElementById('spawn-cluster').addEventListener('click', ()=>{
  const cx = W/2+(Math.random()-0.5)*200, cy = H/2+(Math.random()-0.5)*200;
  const keys = Object.keys(SPECIES);
  for(let i=0;i<10;i++){
    const sp = keys[Math.floor(Math.random()*keys.length)];
    spawnAgent(sp, cx+(Math.random()-0.5)*100, cy+(Math.random()-0.5)*100);
  }
});

// Pause
document.getElementById('btn-pause').addEventListener('click', function(){
  paused = !paused;
  this.textContent = paused ? '▶ Resume' : '⏸ Pause';
  this.classList.toggle('active', paused);
});

// Speed
document.getElementById('btn-speed').addEventListener('click', function(){
  const speeds = [0.5,1,2,4];
  const idx = speeds.indexOf(simSpeed);
  simSpeed = speeds[(idx+1)%speeds.length];
  this.textContent = simSpeed+'x';
  document.getElementById('speed-val').textContent = simSpeed+'x';
  document.getElementById('speed-slider').value = simSpeed;
});

document.getElementById('speed-slider').addEventListener('input', function(){
  simSpeed = +this.value;
  document.getElementById('speed-val').textContent = simSpeed+'x';
  document.getElementById('btn-speed').textContent = simSpeed+'x';
});

// Resource slider
document.getElementById('res-slider').addEventListener('input', function(){
  resAbundance = +this.value;
  document.getElementById('res-val').textContent = resAbundance;
});

// Evolve all
document.getElementById('btn-evolve-all').addEventListener('click', ()=>{
  for(const a of agents){
    a.exp = a.maxEnergy * 0.8;
    a.update(0.016); // trigger evolution check
  }
});

// Reset
document.getElementById('btn-reset').addEventListener('click', ()=>{
  if(!confirm('Reset the entire ecosystem?')) return;
  agents=[]; resources=[]; delegations=[]; particles=[];
  stats={delegations:0,evolutions:0,deaths:0};
  spawnInitial();
});

// Save/Load
document.getElementById('btn-save').addEventListener('click', ()=>{
  const state = {
    agents: agents.map(a=>({x:a.x,y:a.y,species:a.species,energy:a.energy,exp:a.exp,level:a.level,stress:a.stress})),
    resources: resources.map(r=>({x:r.x,y:r.y,type:r.type,amount:r.amount})),
    stats
  };
  localStorage.setItem('agent-ecosystem', JSON.stringify(state));
  showToast('State saved!');
});

document.getElementById('btn-load').addEventListener('click', ()=>{
  const raw = localStorage.getItem('agent-ecosystem');
  if(!raw){ showToast('No saved state found'); return; }
  try{
    const state = JSON.parse(raw);
    agents = state.agents.map(a=>{
      const ag = new Agent(a.x,a.y,a.species);
      ag.energy=a.energy; ag.exp=a.exp; ag.level=a.level; ag.stress=a.stress;
      return ag;
    });
    resources = state.resources.map(r=>{
      const res = new Resource(r.x,r.y,r.type);
      res.amount=r.amount;
      return res;
    });
    stats = state.stats || stats;
    showToast('State loaded!');
  } catch(e){ showToast('Load failed: '+e.message); }
});

// Toggle UI
document.getElementById('toggle-ui').addEventListener('click', ()=>{
  uiVisible = !uiVisible;
  document.getElementById('ui').classList.toggle('collapsed', !uiVisible);
  document.getElementById('toggle-ui').classList.toggle('shifted', !uiVisible);
});

// Tooltip system
const tooltip = document.getElementById('tooltip');
const speciesInfo = document.getElementById('species-info');
const speciesKeys = Object.keys(SPECIES);
speciesKeys.forEach(k=>{
  const tag = document.createElement('span');
  tag.className = 'species-tag';
  tag.textContent = k.toUpperCase();
  tag.style.borderColor = SPECIES[k].color+'66';
  tag.addEventListener('mouseenter', (e)=>{
    tooltip.querySelector('.tt-title').textContent = k.toUpperCase();
    tooltip.querySelector('.tt-body').innerHTML =
      SPECIES[k].desc + '<br><span class="tt-stat">Speed: <span>'+SPECIES[k].speed+'</span> | ' +
      'Energy: <span>'+SPECIES[k].energy+'</span> | ' +
      'Evolve at: <span>'+SPECIES[k].evolveAt+'</span> exp</span>';
    tooltip.style.left = e.clientX+10+'px';
    tooltip.style.top = e.clientY-60+'px';
    tooltip.classList.add('show');
  });
  tag.addEventListener('mouseleave', ()=> tooltip.classList.remove('show'));
  speciesInfo.appendChild(tag);
});

// Toast notification
function showToast(msg){
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(10,14,23,.95);border:1px solid #4a9eff;color:#4a9eff;padding:8px 20px;border-radius:6px;font:12px monospace;opacity:0;transition:opacity .3s';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.style.opacity='1');
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); },2000);
}

// Mouse tracking
canvas.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
canvas.addEventListener('mouseleave', ()=>{ mouse.x=mouse.y=-1; });
canvas.addEventListener('click', e=>{
  if(e.shiftKey){
    // Shift+click spawns a resource
    const type = Math.floor(Math.random()*RESOURCE_TYPES.length);
    resources.push(new Resource(e.clientX, e.clientY, type));
  }
});

// Touch support
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t = e.touches[0];
  mouse.x = t.clientX; mouse.y = t.clientY;
},{passive:false});
canvas.addEventListener('touchend', ()=>{ mouse.x=mouse.y=-1; });

// ─── INIT ─────────────────────────────────────────────
function spawnInitial(){
  for(let i=0;i<15;i++) spawnAgent('worker');
  for(let i=0;i<8;i++) spawnAgent('scout');
  for(let i=0;i<5;i++) spawnAgent('hunter');
  for(let i=0;i<5;i++) spawnAgent('archivist');
  for(let i=0;i<resAbundance;i++){
    const type = Math.floor(Math.random()*RESOURCE_TYPES.length);
    resources.push(new Resource(40+Math.random()*(W-80),40+Math.random()*(H-80),type));
  }
}

spawnInitial();
lastTime = performance.now();
fpsTime = lastTime;
requestAnimationFrame(loop);
</script>
