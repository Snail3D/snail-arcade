<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Galaga - Snail Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function() {
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Game State ---
const STATE = { menu: 0, playing: 1, gameover: 2, paused: 3 };
let state = STATE.menu;
let score = 0;
let highScore = parseInt(localStorage.getItem('galaga-best') || '0');
let lives = 3;
let level = 1;
let shakeTimer = 0;
let frameCount = 0;
let comboCount = 0;
let comboTimer = 0;
let maxCombo = 0;

// --- Player ---
const player = {
  x: 0, y: 0, w: 32, h: 32, speed: 5,
  shootCooldown: 0, invuln: 0,
  spreadTimer: 0, shieldTimer: 0, tripleTimer: 0, cloakTimer: 0,
  trail: []
};

// --- Entity Lists ---
let bullets = [];
let enemyBullets = [];
let enemies = [];
let particles = [];
let stars = [];
let nebulaClouds = [];
let enemyFormationX = 0;
let formationDir = 1;
let formationSpeed = 0.5;
let levelAnnounceTimer = 0;
let menuPulse = 0;
let bossWaveActive = false;

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === STATE.menu && e.code === 'Space') { startGame(); keys['Space'] = false; return; }
  if (state === STATE.gameover && e.code === 'Space') { state = STATE.menu; return; }
  if (e.code === 'KeyP' && state === STATE.playing) { state = STATE.paused; return; }
  if (e.code === 'KeyP' && state === STATE.paused) { state = STATE.playing; return; }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Prevent page scrolling from space bar
window.addEventListener('keydown', e => {
  if (e.code === 'Space') e.preventDefault();
}, { passive: false });

// Touch input
let touchX = null;
let touchActive = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchX = t.clientX;
  touchActive = true;
  if (state === STATE.menu) startGame();
  if (state === STATE.gameover) state = STATE.menu;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchActive && state === STATE.playing) {
    touchX = e.touches[0].clientX;
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
}, { passive: false });

// --- Nebula Background ---
function initNebula() {
  nebulaClouds = [];
  for (let i = 0; i < 8; i++) {
    nebulaClouds.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 80 + Math.random() * 200,
      color: ['#1a0030', '#001a30', '#300020', '#002020'][Math.floor(Math.random() * 4)],
      speed: 0.1 + Math.random() * 0.3,
      phase: Math.random() * Math.PI * 2
    });
  }
}
initNebula();

function initStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      s: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.8 + 0.2,
      brightness: Math.random() * 0.5 + 0.5
    });
  }
}
initStars();

// --- Enemy Types ---
const ENEMY_TYPES = [
  { name: 'butterfly', color1: '#ff3366', color2: '#ff6699', hp: 1, pts: 100, draw: drawButterfly },
  { name: 'beetle', color1: '#33ff66', color2: '#66ff99', hp: 1, pts: 150, draw: drawBeetle },
  { name: 'boss', color1: '#ffcc00', color2: '#ffee66', hp: 3, pts: 300, draw: drawBoss, isBoss: true },
  { name: 'grabber', color1: '#cc66ff', color2: '#dd99ff', hp: 1, pts: 200, draw: drawGrabber },
  { name: 'swirler', color1: '#ff6633', color2: '#ff9966', hp: 2, pts: 250, draw: drawSwirler },
];

// --- Formation ---
function createEnemies() {
  enemies = [];
  const cols = Math.min(8, 5 + Math.floor(level / 3));
  const rows = Math.min(6, 4 + Math.floor(level / 4));
  const spacingX = Math.min(50, (canvas.width - 100) / (cols + 2));
  const spacingY = 45;
  const totalW = (cols - 1) * spacingX;
  const startX = canvas.width / 2 - totalW / 2;
  const startY = 80;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let typeIdx;
      // Boss waves every 5 levels: bottom 2 rows are bosses, row above has grabbers
      const isBossWave = level % 5 === 0;
      if (isBossWave) {
        if (r >= rows - 2) typeIdx = 2; // bosses
        else if (r >= rows - 3) typeIdx = 3; // grabbers
        else typeIdx = r % 2; // butterfly/beetle
      } else {
        if (r >= rows - 2) typeIdx = 2; // bosses on normal waves too
        else if (r >= rows - 3 && level > 8) typeIdx = 3 + (Math.floor(Math.random() * 2)); // grabbers/swirlers late game
        else typeIdx = r % 2;
      }

      const hp = (typeIdx >= 2) ? (typeIdx === 2 ? 3 : 1 + Math.floor(level / 5)) : 1;
      enemies.push({
        x: startX + c * spacingX,
        y: startY + r * spacingY,
        homeX: startX + c * spacingX,
        homeY: startY + r * spacingY,
        w: 28, h: 28,
        type: ENEMY_TYPES[typeIdx],
        hp, maxHp: hp,
        state: 'formation',
        divePath: null,
        animFrame: 0,
        flashTimer: 0,
        grabTarget: null,
        swirlerAngle: 0
      });
    }
  }
  enemyFormationX = 0;
  formationDir = 1;
  formationSpeed = 0.5 + level * 0.15;
  bossWaveActive = (level % 5 === 0);
}

// --- Dive Patterns ---
function generateDivePath(enemy) {
  const patterns = ['swoop', 'loop', 'zigzag', 'direct'];
  // Grabbers use grab pattern, swirlers use spiral
  if (enemy.type.name === 'grabber') patterns.push('grab');
  if (enemy.type.name === 'swirler') patterns.push('spiral');
  const p = patterns[Math.floor(Math.random() * patterns.length)];
  return { type: p, t: 0, startX: enemy.x, startY: enemy.y };
}

function getDiveTarget(path) {
  const maxDiveY = Math.min(canvas.height - 120, canvas.height * 0.6);
  switch (path.type) {
    case 'swoop': return { x: canvas.width * (0.2 + Math.random() * 0.6), y: maxDiveY };
    case 'loop': return { x: canvas.width / 2, y: maxDiveY };
    case 'zigzag': return { x: Math.random() * canvas.width, y: maxDiveY };
    case 'direct': return { x: player.x, y: maxDiveY };
    case 'grab': return { x: player.x, y: player.y + 30 };
    case 'spiral': return { x: canvas.width / 2, y: maxDiveY };
  }
}

// --- Start Game ---
function startGame() {
  state = STATE.playing;
  score = 0;
  lives = 3;
  level = 1;
  comboCount = 0;
  comboTimer = 0;
  maxCombo = 0;
  bullets = [];
  enemyBullets = [];
  particles = [];
  player.x = canvas.width / 2;
  player.y = canvas.height - 60;
  player.shootCooldown = 0;
  player.invuln = 180;
  player.spreadTimer = 0;
  player.shieldTimer = 0;
  player.tripleTimer = 0;
  player.cloakTimer = 0;
  createEnemies();
  levelAnnounceTimer = 120;
}

// --- Particles ---
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: Math.random() * 3 + 1
    });
  }
}

function spawnScorePopup(x, y, pts) {
  particles.push({
    x, y, vx: 0, vy: -1.5,
    life: 60, maxLife: 60,
    text: '+' + pts,
    isText: true
  });
}

// --- Shooting ---
function playerShoot() {
  if (player.shootCooldown > 0) return;

  // Fastest cooldown: spread(3) > triple(4) > normal(8)
  let cooldown = 10;
  if (player.spreadTimer > 0) cooldown = 5;
  else if (player.tripleTimer > 0) cooldown = 7;

  player.shootCooldown = cooldown;

  // Center bullet always fires
  bullets.push({ x: player.x, y: player.y - 16, w: 8, h: 20, speed: 8 });

  if (player.spreadTimer > 0) {
    // Spread shot: 5 bullets fanning out
    for (let a = -2; a <= 2; a++) {
      const angle = -Math.PI / 2 + a * 0.15;
      bullets.push({
        x: player.x, y: player.y - 14,
        w: 6, h: 14, speed: 7,
        vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2
      });
    }
  } else if (player.tripleTimer > 0) {
    // Triple shot: center + 2 angled
    bullets.push({ x: player.x - 12, y: player.y - 8, w: 7, h: 16, speed: 7, vx: -1 });
    bullets.push({ x: player.x + 12, y: player.y - 8, w: 7, h: 16, speed: 7, vx: 1 });
  } else if (player.shieldTimer > 0) {
    // Shield: bigger center bullet, slower fire rate but more damage visual
    bullets.push({ x: player.x, y: player.y - 16, w: 10, h: 22, speed: 9 });
  }
}

function enemyShoot(enemy) {
  const dx = player.x - enemy.x;
  const dy = player.y - enemy.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist === 0) return;
  const speed = 2 + level * 0.3;

  // Swirlers fire 3 bullets in a spread
  if (enemy.type.name === 'swirler') {
    for (let a = -1; a <= 1; a++) {
      const angle = Math.atan2(dy, dx) + a * 0.2;
      enemyBullets.push({
        x: enemy.x, y: enemy.y + 14,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        w: 4, h: 4
      });
    }
  } else {
    enemyBullets.push({
      x: enemy.x, y: enemy.y + 14,
      vx: (dx / dist) * speed,
      vy: (dy / dist) * speed,
      w: 4, h: 4
    });
  }
}

// --- Collision ---
function rects(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function circleDist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

// --- Update ---
function update() {
  frameCount++;

  // Stars always scroll
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  }

  // Nebula clouds drift
  for (const n of nebulaClouds) {
    n.y += n.speed;
    n.phase += 0.002;
    if (n.y + n.r > canvas.height) { n.y = -n.r; n.x = Math.random() * canvas.width; }
  }

  if (state !== STATE.playing) return;

  // Level announcement
  if (levelAnnounceTimer > 0) levelAnnounceTimer--;

  // Screen shake
  if (shakeTimer > 0) shakeTimer--;

  // Combo timer
  if (comboTimer > 0) { comboTimer--; } else { comboCount = 0; }
  if (comboCount > maxCombo) maxCombo = comboCount;

  // Powerup timers
  if (player.spreadTimer > 0) player.spreadTimer--;
  if (player.shieldTimer > 0) player.shieldTimer--;
  if (player.tripleTimer > 0) player.tripleTimer--;
  if (player.cloakTimer > 0) player.cloakTimer--;

  // Player movement
  const pw = player.w / 2;
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed * 0.5;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed * 0.5;
  player.x = Math.max(pw, Math.min(canvas.width - pw, player.x));
  player.y = Math.max(canvas.height / 2, Math.min(canvas.height - 30, player.y));

  // Touch move
  if (touchActive && touchX !== null) {
    const dx = touchX - player.x;
    player.x += Math.sign(dx) * Math.min(Math.abs(dx), player.speed * 2);
    if (frameCount % 15 === 0) playerShoot();
  }

  // Keyboard shoot (hold space for rapid fire)
  if (keys['Space'] && state === STATE.playing) {
    playerShoot();
  }

  // Player cooldown & invulnerability
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.invuln > 0) player.invuln--;

  // Player trail
  player.trail.push({ x: player.x, y: player.y + 16 });
  if (player.trail.length > 8) player.trail.shift();

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y -= b.vy || b.speed;
    if (b.vx) b.x += b.vx;
    if (b.y < -20) bullets.splice(i, 1);
  }

  // Update enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.y > canvas.height + 20 || b.y < -20 || b.x < -20 || b.x > canvas.width + 20) {
      enemyBullets.splice(i, 1);
    }
  }

  // Formation movement
  enemyFormationX += formationDir * formationSpeed;
  const edgeLimit = 60;
  if (enemyFormationX > edgeLimit || enemyFormationX < -edgeLimit) {
    formationDir *= -1;
  }

  // Update enemies
  let activeCount = 0;
  for (const e of enemies) {
    if (e.flashTimer > 0) e.flashTimer--;

    switch (e.state) {
      case 'formation':
        activeCount++;
        e.x = e.homeX + enemyFormationX;
        e.y = e.homeY + Math.sin(frameCount * 0.03 + e.homeX * 0.01) * 5;
        e.animFrame = (e.animFrame + 0.05) % 2;

        // Bosses shoot
        if (e.type.isBoss && Math.random() < 0.005 * level) {
          enemyShoot(e);
        }
        // Regular enemies sometimes shoot (increases with level)
        if (!e.type.isBoss && Math.random() < 0.002 * level) {
          enemyShoot(e);
        }

        // Grabbers grab player on sight (late game)
        if (e.type.name === 'grabber' && level > 3 && Math.random() < 0.003) {
          e.state = 'diving';
          e.divePath = generateDivePath(e);
        }
        break;

      case 'diving':
        if (!e.divePath) {
          e.divePath = generateDivePath(e);
        }
        const path = e.divePath;
        path.t += (e.type.name === 'swirler') ? 0.006 : 0.008;

        switch (path.type) {
          case 'swoop': {
            const tgt = getDiveTarget(path);
            const progress = Math.min(path.t * 1.5, 1);
            const midX = (path.startX + tgt.x) / 2;
            const midY = Math.min(path.startY, tgt.y) - 150;
            const t2 = progress * progress;
            e.x = (1 - t2) * path.startX + 2 * t2 * (1 - progress) * midX + t2 * tgt.x;
            e.y = (1 - t2) * path.startY + 2 * t2 * (1 - progress) * midY + t2 * tgt.y;
            if (progress >= 1) { e.state = 'returning'; e.divePath = null; }
            break;
          }
          case 'loop': {
            const angle = path.t * Math.PI * 2;
            const radius = 150;
            e.x = path.startX + Math.cos(angle) * radius;
            e.y = path.startY - 100 + Math.sin(angle) * radius;
            if (path.t >= 1) { e.state = 'returning'; e.divePath = null; }
            break;
          }
          case 'zigzag': {
            const tgt = getDiveTarget(path);
            const progress = Math.min(path.t, 1);
            e.x = path.startX + (tgt.x - path.startX) * progress + Math.sin(path.t * 8) * 30;
            e.y = path.startY + (tgt.y - path.startY) * progress;
            if (progress >= 1) { e.state = 'returning'; e.divePath = null; }
            break;
          }
          case 'direct': {
            const tgt = getDiveTarget(path);
            const progress = Math.min(path.t, 1);
            e.x = path.startX + (tgt.x - path.startX) * progress;
            e.y = path.startY + (tgt.y - path.startY) * progress;
            if (progress >= 1) { e.state = 'returning'; e.divePath = null; }
            break;
          }
          case 'grab': {
            const progress = Math.min(path.t, 1);
            e.x = path.startX + (player.x - path.startX) * progress;
            e.y = path.startY + ((player.y + 30) - path.startY) * progress;
            if (progress >= 1) {
              // Grabbed the player! Deal damage and return to formation
              if (player.invuln <= 0 && player.shieldTimer <= 0) {
                lives--;
                spawnExplosion(player.x, player.y, '#00ff88', 20);
                shakeTimer = 15;
                player.invuln = 120;
                if (lives <= 0) { state = STATE.gameover; if (score > highScore) { highScore = score; localStorage.setItem('galaga-best', highScore); } }
              }
              e.state = 'returning';
              e.divePath = null;
            }
            break;
          }
          case 'spiral': {
            const tgt = getDiveTarget(path);
            const radius = 120 * (1 - path.t);
            e.swirlerAngle += 0.08;
            e.x = path.startX + Math.cos(e.swirlerAngle) * (radius + 50 * path.t);
            e.y = path.startY + ((tgt.y - 50) - path.startY) * path.t;
            if (path.t >= 1) { e.state = 'returning'; e.divePath = null; }
            break;
          }
        }

        // Divers shoot while diving
        if (Math.random() < 0.01 * level) {
          enemyShoot(e);
        }
        break;

      case 'returning':
        activeCount++;
        const dx = e.homeX + enemyFormationX - e.x;
        const dy = e.homeY - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 3) {
          e.x += (dx / dist) * 2;
          e.y += (dy / dist) * 2;
        } else {
          e.state = 'formation';
          e.divePath = null;
        }
        break;
    }
  }

  // Random dive attacks (more as level increases)
  if (activeCount > 0 && Math.random() < 0.008 * level) {
    const formationEnemies = enemies.filter(e => e.state === 'formation');
    if (formationEnemies.length > 0) {
      const diver = formationEnemies[Math.floor(Math.random() * formationEnemies.length)];
      // Grabbers dive more aggressively
      if (diver.type.name === 'grabber' && level > 3) {
        // Skip random dive for grabbers, they have their own grab logic
      } else {
        diver.state = 'diving';
        diver.divePath = null;
      }
    }
  }

  // Collision: player bullets vs enemies
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    let hit = false;
    for (const e of enemies) {
      if (rects(b, e)) {
        e.hp--;
        e.flashTimer = 4;
        if (e.hp <= 0) {
          // Combo system: kill quickly = more points
          comboCount++;
          comboTimer = 120; // 2 seconds to keep combo
          const multiplier = Math.min(comboCount, 10);
          const pts = e.type.pts * multiplier;
          score += pts;

          spawnExplosion(e.x, e.y, e.type.color1, 20 + (multiplier > 5 ? 10 : 0));
          spawnScorePopup(e.x, e.y, pts);
          if (multiplier > 1) {
            particles.push({ x: e.x, y: e.y - 20, vx: 0, vy: -0.5, life: 45, maxLife: 45, text: 'x' + multiplier + ' COMBO', isText: true });
          }

          shakeTimer = Math.min(4 + Math.floor(multiplier / 3), 8);

          // Powerup drops (higher chance with combo)
          const dropChance = 0.12 + Math.min(comboCount * 0.03, 0.2);
          if (Math.random() < dropChance) {
            const types = ['spread', 'triple', 'shield'];
            particles.push({
              x: e.x, y: e.y, vx: 0, vy: 1.5,
              life: 360, maxLife: 360,
              isPowerup: true, color: '#ffcc00', powerupType: types[Math.floor(Math.random() * types.length)]
            });
          }

          // Cloak drops rarely (3% chance, independent of other powerups)
          if (Math.random() < 0.03) {
            particles.push({
              x: e.x, y: e.y + 10, vx: 0, vy: 1.2,
              life: 420, maxLife: 420,
              isPowerup: true, color: '#aa88ff', powerupType: 'cloak'
            });
          }

          enemies.splice(enemies.indexOf(e), 1);
        } else {
          spawnExplosion(b.x, b.y, '#ffffff', 5);
        }
        hit = true;
        break;
      }
    }
    if (hit) bullets.splice(i, 1);
  }

  // Collision: enemy bullets vs player
  if (player.invuln <= 0 && player.cloakTimer <= 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      if (player.shieldTimer > 0 && circleDist(b, player) < 24) {
        // Shield absorbs bullets
        spawnExplosion(b.x, b.y, '#00ccff', 5);
        enemyBullets.splice(i, 1);
        continue;
      }
      if (circleDist(b, player) < 18) {
        playerHit();
        enemyBullets.splice(i, 1);
        break;
      }
    }
  }

  // Collision: enemies vs player (body slam — only diving enemies, and skip during cloak)
  if (player.invuln <= 0 && player.cloakTimer <= 0) {
    for (const e of enemies) {
      if (e.state === 'diving' && circleDist(e, player) < 24) {
        playerHit();
        break;
      }
    }
  }

  // Collision: powerups vs player
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (p.isPowerup) {
      p.y += p.vy;
      if (circleDist(p, player) < 24) {
        spawnExplosion(p.x, p.y, '#ffcc00', 15);
        if (p.powerupType === 'spread') {
          player.spreadTimer = 600;
        } else if (p.powerupType === 'triple') {
          player.tripleTimer = 600;
        } else if (p.powerupType === 'shield') {
          player.shieldTimer = 600;
        } else if (p.powerupType === 'cloak') {
          player.cloakTimer = 480; // 8 seconds of invisibility
        }
        particles.splice(i, 1);
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (!p.isText && !p.isPowerup) {
      p.x += p.vx;
      p.y += p.vy;
    }
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Level complete?
  if (enemies.length === 0) {
    level++;
    createEnemies();
    levelAnnounceTimer = 120;
  }

  // Update high score
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('galaga-best', highScore);
  }
}

function playerHit() {
  lives--;
  spawnExplosion(player.x, player.y, '#00ff88', 30);
  shakeTimer = 10;
  player.invuln = 120;
  if (player.tripleTimer > 0) player.tripleTimer = 0;
  if (player.spreadTimer > 0) player.spreadTimer = 0;
  if (player.shieldTimer > 0) player.shieldTimer = 0;
  // Cloak is preserved on hit — it's a safety net
  comboCount = 0;

  if (lives <= 0) {
    state = STATE.gameover;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('galaga-best', highScore);
    }
  }
}

// --- Draw Functions ---
function drawNebula() {
  for (const n of nebulaClouds) {
    const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    grad.addColorStop(0, n.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }
}

function drawPlayer() {
  if (player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0) return;

  const px = player.x;
  const py = player.y;

  // Engine trail
  for (let i = 0; i < player.trail.length; i++) {
    const t = player.trail[i];
    const alpha = (i / player.trail.length) * 0.4;
    ctx.fillStyle = `rgba(0,255,136,${alpha})`;
    ctx.fillRect(t.x - 3, t.y, 6, 8);
  }

  // Shield bubble
  if (player.shieldTimer > 0) {
    const shieldAlpha = 0.2 + Math.sin(frameCount * 0.15) * 0.1;
    ctx.strokeStyle = `rgba(0,204,255,${shieldAlpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, 22 + Math.sin(frameCount * 0.1) * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(0,204,255,${shieldAlpha * 0.3})`;
    ctx.beginPath();
    ctx.arc(px, py, 22, 0, Math.PI * 2);
    ctx.fill();
  }

  // Cloak — ship phases in and out, bullets pass through during cloak
  if (player.cloakTimer > 0) {
    const cloakPhase = Math.sin(frameCount * 0.12);
    ctx.globalAlpha = 0.3 + cloakPhase * 0.3;
    // Cloak wisps
    ctx.fillStyle = `rgba(180,120,255,${0.15 + cloakPhase * 0.1})`;
    for (let i = 0; i < 5; i++) {
      const angle = frameCount * 0.05 + (i / 5) * Math.PI * 2;
      const wispR = 18 + Math.sin(frameCount * 0.1 + i) * 5;
      ctx.beginPath();
      ctx.arc(px + Math.cos(angle) * wispR, py + Math.sin(angle) * wispR, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Engine glow
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 12;

  // Ship body (arrow/pointed shape)
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.moveTo(px, py - 16);
  ctx.lineTo(px - 14, py + 12);
  ctx.lineTo(px - 4, py + 8);
  ctx.lineTo(px + 4, py + 8);
  ctx.lineTo(px + 14, py + 12);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#ccffcc';
  ctx.beginPath();
  ctx.arc(px, py - 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // Active powerup indicators (small icons around ship)
  if (player.spreadTimer > 0) {
    ctx.fillStyle = `rgba(255,102,0,${0.5 + Math.sin(frameCount * 0.2) * 0.3})`;
    ctx.fillRect(px - 20, py + 6, 8, 3);
    ctx.fillRect(px + 12, py + 6, 8, 3);
  }
  if (player.tripleTimer > 0) {
    ctx.fillStyle = `rgba(255,204,0,${0.5 + Math.sin(frameCount * 0.2) * 0.3})`;
    ctx.fillRect(px - 20, py - 2, 8, 3);
    ctx.fillRect(px + 12, py - 2, 8, 3);
  }

  ctx.shadowBlur = 0;
}

function drawButterfly(e) {
  const x = e.x, y = e.y;
  ctx.shadowColor = e.type.color1;
  ctx.shadowBlur = 8;

  const wingY = Math.abs(Math.sin(e.animFrame * Math.PI)) * 6;

  ctx.fillStyle = e.type.color1;
  ctx.beginPath();
  ctx.ellipse(x - 8, y, 8, Math.max(1, 5 + wingY), -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 8, y, 8, Math.max(1, 5 + wingY), 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = e.type.color2;
  ctx.fillRect(x - 3, y - 8, 6, 16);

  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 4, y - 6, 3, 3);
  ctx.fillRect(x + 1, y - 6, 3, 3);

  ctx.shadowBlur = 0;
}

function drawBeetle(e) {
  const x = e.x, y = e.y;
  ctx.shadowColor = e.type.color1;
  ctx.shadowBlur = 8;

  ctx.fillStyle = e.type.color1;
  ctx.beginPath();
  ctx.ellipse(x, y, 10, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = e.type.color2;
  ctx.beginPath();
  ctx.ellipse(x, y - 3, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  const legAnim = Math.sin(e.animFrame * Math.PI) * 3;
  ctx.strokeStyle = e.type.color1;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 10, y);
  ctx.lineTo(x - 14, y - 4 + legAnim);
  ctx.moveTo(x + 10, y);
  ctx.lineTo(x + 14, y - 4 - legAnim);
  ctx.stroke();

  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 3, y - 10, 2, 2);
  ctx.fillRect(x + 1, y - 10, 2, 2);

  ctx.shadowBlur = 0;
}

function drawBoss(e) {
  const x = e.x, y = e.y;
  ctx.shadowColor = e.type.color1;
  ctx.shadowBlur = 10 + Math.sin(frameCount * 0.1) * 5;

  // Crown
  ctx.fillStyle = e.type.color1;
  ctx.beginPath();
  ctx.moveTo(x - 10, y - 12);
  ctx.lineTo(x - 8, y - 18);
  ctx.lineTo(x - 4, y - 14);
  ctx.lineTo(x, y - 20);
  ctx.lineTo(x + 4, y - 14);
  ctx.lineTo(x + 8, y - 18);
  ctx.lineTo(x + 10, y - 12);
  ctx.closePath();
  ctx.fill();

  // Body
  ctx.fillStyle = e.type.color1;
  ctx.beginPath();
  ctx.ellipse(x, y, 12, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face plate
  ctx.fillStyle = e.type.color2;
  ctx.fillRect(x - 8, y - 6, 16, 10);

  // Angry eyes
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(x - 6, y - 5, 4, 4);
  ctx.fillRect(x + 2, y - 5, 4, 4);

  // Mouth
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 4, y + 2, 8, 3);

  // HP indicator
  if (e.maxHp > 1) {
    ctx.fillStyle = '#ff0000';
    for (let i = 0; i < e.hp; i++) {
      ctx.fillRect(x - 8 + i * 6, y + 7, 4, 2);
    }
  }

  ctx.shadowBlur = 0;
}

function drawGrabber(e) {
  const x = e.x, y = e.y;
  ctx.shadowColor = e.type.color1;
  ctx.shadowBlur = 8;

  // Tentacle body — purple alien with grasping arms
  ctx.fillStyle = e.type.color1;
  ctx.beginPath();
  ctx.ellipse(x, y, 9, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (big and menacing)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 4, y - 4, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 4, y - 4, 3, 0, Math.PI * 2);
  ctx.fill();
  // Pupils (look toward player)
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x - 3, y - 4, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 5, y - 4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Grasping tentacles (animated)
  const tentAnim = Math.sin(e.animFrame * Math.PI * 2);
  ctx.strokeStyle = e.type.color2;
  ctx.lineWidth = 2;
  // Left tentacle
  ctx.beginPath();
  ctx.moveTo(x - 8, y + 4);
  ctx.quadraticCurveTo(x - 16, y + 8 + tentAnim * 4, x - 14, y + 14);
  ctx.stroke();
  // Right tentacle
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 4);
  ctx.quadraticCurveTo(x + 16, y + 8 - tentAnim * 4, x + 14, y + 14);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function drawSwirler(e) {
  const x = e.x, y = e.y;
  ctx.shadowColor = e.type.color1;
  ctx.shadowBlur = 8 + Math.sin(frameCount * 0.15) * 4;

  // Spinning orange alien — triple threat
  const rot = frameCount * 0.05;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Spinning body (triangle-ish)
  ctx.fillStyle = e.type.color1;
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
    const r = 10;
    if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
    else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();

  // Inner core
  ctx.fillStyle = e.type.color2;
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Eyes (always face player direction)
  const eyeAngle = Math.atan2(player.y - y, player.x - x);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + Math.cos(eyeAngle - 0.3) * 4, y + Math.sin(eyeAngle - 0.3) * 4 - 2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + Math.cos(eyeAngle + 0.3) * 4, y + Math.sin(eyeAngle + 0.3) * 4 - 2, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawBullets() {
  // Player bullets (green neon)
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#00ff88';
  for (const b of bullets) {
    ctx.fillRect(b.x - b.w / 2, b.y, b.w, b.h);
    // Glow trail
    ctx.fillStyle = 'rgba(0,255,136,0.3)';
    ctx.fillRect(b.x - b.w / 2, b.y + b.h, b.w, 8);
    ctx.fillStyle = '#00ff88';
  }

  // Spread shot bullets (orange)
  ctx.shadowColor = '#ff6633';
  ctx.fillStyle = '#ff6633';
  for (const b of bullets) {
    if (b.vx !== undefined && b.vy !== undefined) {
      ctx.fillRect(b.x - b.w / 2, b.y, b.w, b.h);
      ctx.fillStyle = 'rgba(255,102,51,0.3)';
      ctx.fillRect(b.x - b.w / 2, b.y + b.h, b.w, 6);
      ctx.fillStyle = '#ff6633';
    }
  }

  // Shield bullets (blue, slightly bigger)
  ctx.shadowColor = '#00ccff';
  ctx.fillStyle = '#00ccff';
  for (const b of bullets) {
    if (b.w === 10) {
      ctx.fillRect(b.x - b.w / 2, b.y, b.w, b.h);
      ctx.shadowBlur = 14;
      ctx.fillStyle = 'rgba(0,204,255,0.4)';
      ctx.fillRect(b.x - b.w / 2 - 2, b.y, b.w + 4, b.h);
      ctx.fillStyle = '#00ccff';
      ctx.shadowBlur = 8;
    }
  }

  // Enemy bullets (red neon)
  ctx.shadowColor = '#ff3366';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ff3366';
  for (const b of enemyBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
}

function drawEnemies() {
  for (const e of enemies) {
    const color = e.flashTimer > 0 ? '#ffffff' : e.type.color1;
    const origColor = e.type.color1;
    e.type.color1 = color;
    e.type.draw(e);
    e.type.color1 = origColor;
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;

    if (p.isText) {
      ctx.fillStyle = p.text.includes('COMBO') ? `rgba(255,102,0,${alpha})` : `rgba(255,204,0,${alpha})`;
      ctx.font = p.text.includes('COMBO') ? 'bold 12px "Courier New", monospace' : 'bold 14px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
    } else if (p.isPowerup) {
      // Powerup icon with type indicator
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 12;
      ctx.fillStyle = `rgba(255,204,0,${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 8 + Math.sin(frameCount * 0.1) * 2, 0, Math.PI * 2);
      ctx.fill();

      // Type letter
      const letter = p.powerupType === 'spread' ? 'W' : p.powerupType === 'triple' ? 'T' : p.powerupType === 'cloak' ? 'C' : 'S';
      const letterColor = p.powerupType === 'spread' ? '#ff6633' : p.powerupType === 'triple' ? '#ffcc00' : p.powerupType === 'cloak' ? '#aa88ff' : '#00ccff';
      ctx.fillStyle = letterColor;
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(letter, p.x, p.y + 3);
      ctx.shadowBlur = 0;
    } else {
      const r = parseInt(p.color.slice(1, 3), 16);
      const g = parseInt(p.color.slice(3, 5), 16);
      const b2 = parseInt(p.color.slice(5, 7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b2},${alpha})`;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
  }
}

function drawHUD() {
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score.toString().padStart(7, '0')}`, 10, 25);

  // Combo display
  if (comboCount > 1) {
    const comboAlpha = Math.min(1, comboTimer / 30);
    ctx.fillStyle = `rgba(255,102,0,${comboAlpha})`;
    ctx.font = `bold ${Math.min(14, canvas.width * 0.018)}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`COMBO x${comboCount}`, canvas.width / 2, 42);
  }

  ctx.textAlign = 'center';
  const waveLabel = (level % 5 === 0) ? '★ BOSS WAVE ★' : `WAVE ${level}`;
  ctx.fillStyle = (level % 5 === 0) ? '#ff3366' : '#00ff88';
  ctx.font = `bold ${Math.min(16, canvas.width * 0.02)}px "Courier New", monospace`;
  ctx.fillText(waveLabel, canvas.width / 2, 25);

  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    const lx = canvas.width - 20 - i * 24;
    ctx.fillStyle = '#00ff88';
    ctx.beginPath();
    ctx.moveTo(lx, 15);
    ctx.lineTo(lx - 8, 28);
    ctx.lineTo(lx + 8, 28);
    ctx.closePath();
    ctx.fill();
  }

  // Active powerup indicators
  let hudY = canvas.height - 40;
  ctx.font = 'bold 11px "Courier New", monospace';
  ctx.textAlign = 'left';
  if (player.spreadTimer > 0) {
    ctx.fillStyle = `rgba(255,102,0,${0.5 + Math.sin(frameCount * 0.1) * 0.3})`;
    ctx.fillText(`SPREAD: ${Math.ceil(player.spreadTimer / 60)}s`, 10, hudY);
    hudY -= 15;
  }
  if (player.tripleTimer > 0) {
    ctx.fillStyle = `rgba(255,204,0,${0.5 + Math.sin(frameCount * 0.1) * 0.3})`;
    ctx.fillText(`TRIPLE: ${Math.ceil(player.tripleTimer / 60)}s`, 10, hudY);
    hudY -= 15;
  }
  if (player.shieldTimer > 0) {
    ctx.fillStyle = `rgba(0,204,255,${0.5 + Math.sin(frameCount * 0.1) * 0.3})`;
    ctx.fillText(`SHIELD: ${Math.ceil(player.shieldTimer / 60)}s`, 10, hudY);
    hudY -= 15;
  }
  if (player.cloakTimer > 0) {
    ctx.fillStyle = `rgba(180,120,255,${0.5 + Math.sin(frameCount * 0.1) * 0.3})`;
    ctx.fillText(`CLOAK: ${Math.ceil(player.cloakTimer / 60)}s`, 10, hudY);
  }
}

function drawMenu() {
  menuPulse += 0.03;

  // Title
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 20 + Math.sin(menuPulse) * 10;
  ctx.fillStyle = '#00ff88';
  ctx.font = `bold ${Math.min(64, canvas.width * 0.08)}px "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GALAGA', canvas.width / 2, canvas.height * 0.3);

  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffcc00';
  ctx.font = `${Math.min(18, canvas.width * 0.025)}px "Courier New", monospace`;
  ctx.fillText('[ PRESS SPACE TO START ]', canvas.width / 2, canvas.height * 0.48);

  // Animated enemies in menu
  const demoEnemies = [
    { x: canvas.width / 2 - 100, y: canvas.height * 0.6 },
    { x: canvas.width / 2, y: canvas.height * 0.58 },
    { x: canvas.width / 2 + 100, y: canvas.height * 0.6 },
    { x: canvas.width / 2 - 50, y: canvas.height * 0.64 },
    { x: canvas.width / 2 + 50, y: canvas.height * 0.64 },
  ];

  for (const d of demoEnemies) {
    const bobY = Math.sin(menuPulse * 2 + d.x * 0.01) * 5;
    const color = d.y > canvas.height * 0.62 ? '#ff3366' : '#33ff66';
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = color;

    ctx.beginPath();
    ctx.ellipse(d.x, d.y + bobY, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.fillRect(d.x - 4, d.y + bobY - 4, 3, 3);
    ctx.fillRect(d.x + 1, d.y + bobY - 4, 3, 3);
  }

  ctx.shadowBlur = 0;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = `${Math.min(16, canvas.width * 0.02)}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`HIGH SCORE: ${highScore.toString().padStart(7, '0')}`, canvas.width / 2, canvas.height * 0.75);
  }

  // Powerup legend
  ctx.fillStyle = '#888';
  ctx.font = `${Math.min(11, canvas.width * 0.014)}px "Courier New", monospace`;
  ctx.fillText('W = Spread Shot  |  T = Triple Shot  |  S = Shield  |  C = Cloak', canvas.width / 2, canvas.height * 0.83);
  ctx.fillText('ARROWS / WASD to move | SPACE to shoot', canvas.width / 2, canvas.height * 0.88);
  ctx.fillText('P to pause', canvas.width / 2, canvas.height * 0.93);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.shadowColor = '#ff3366';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff3366';
  ctx.font = `bold ${Math.min(48, canvas.width * 0.06)}px "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width / 2, canvas.height * 0.38);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#00ff88';
  ctx.font = `${Math.min(20, canvas.width * 0.025)}px "Courier New", monospace`;
  ctx.fillText(`FINAL SCORE: ${score.toString().padStart(7, '0')}`, canvas.width / 2, canvas.height * 0.48);

  // Show max combo
  if (maxCombo > 1) {
    ctx.fillStyle = '#ff6600';
    ctx.font = `bold ${Math.min(14, canvas.width * 0.018)}px "Courier New", monospace`;
    ctx.fillText(`BEST COMBO: x${maxCombo}`, canvas.width / 2, canvas.height * 0.53);
  }

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = `bold ${Math.min(16, canvas.width * 0.02)}px "Courier New", monospace`;
    ctx.fillText('*** NEW HIGH SCORE ***', canvas.width / 2, canvas.height * 0.58);
  }

  ctx.fillStyle = '#888';
  ctx.font = `${Math.min(14, canvas.width * 0.018)}px "Courier New", monospace`;
  ctx.fillText('[ PRESS SPACE ]', canvas.width / 2, canvas.height * 0.7);
}

function drawLevelAnnounce() {
  if (levelAnnounceTimer <= 0) return;
  const alpha = Math.min(1, levelAnnounceTimer / 30);
  ctx.fillStyle = `rgba(255,204,0,${alpha})`;
  ctx.font = `bold ${Math.min(36, canvas.width * 0.045)}px "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 15;
  const waveLabel = (level % 5 === 0) ? '★ BOSS WAVE ' + level + ' ★' : `WAVE ${level}`;
  ctx.fillText(waveLabel, canvas.width / 2, canvas.height / 2);
  ctx.shadowBlur = 0;
}

// --- CRT Effect ---
function applyCRT() {
  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let y = 0; y < canvas.height; y += 3) {
    ctx.fillRect(0, y, canvas.width, 1);
  }

  // Vignette
  const grad = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, canvas.height * 0.3,
    canvas.width / 2, canvas.height / 2, canvas.height * 0.8
  );
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// --- Render ---
function render() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Screen shake offset
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeTimer,
      (Math.random() - 0.5) * shakeTimer
    );
  }

  drawNebula();
  drawStars();

  if (state === STATE.menu) {
    drawMenu();
  } else if (state === STATE.playing || state === STATE.paused) {
    drawEnemies();
    drawBullets();
    drawParticles();
    drawPlayer();
    drawHUD();
    drawLevelAnnounce();

    if (state === STATE.paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff88';
      ctx.font = `bold ${Math.min(40, canvas.width * 0.05)}px "Courier New", monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      ctx.font = `${Math.min(16, canvas.width * 0.02)}px "Courier New", monospace`;
      ctx.fillStyle = '#888';
      ctx.fillText('Press P to resume', canvas.width / 2, canvas.height / 2 + 40);
    }
  } else if (state === STATE.gameover) {
    drawEnemies();
    drawParticles();
    drawGameOver();
  }

  // Active powerup color tint
  if (state === STATE.playing) {
    let tintAlpha = 0;
    let tintColor = '';
    if (player.spreadTimer > 0) { tintAlpha = 0.03; tintColor = '255,102,0'; }
    else if (player.tripleTimer > 0) { tintAlpha = 0.03; tintColor = '255,204,0'; }
    else if (player.shieldTimer > 0) { tintAlpha = 0.03; tintColor = '0,204,255'; }
    else if (player.cloakTimer > 0) { tintAlpha = 0.03; tintColor = '140,100,220'; }
    if (tintAlpha > 0) {
      ctx.fillStyle = `rgba(${tintColor},${tintAlpha + Math.sin(frameCount * 0.1) * 0.015})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  // CRT overlay (no shake on this)
  ctx.restore();
  applyCRT();
}

// --- Game Loop ---
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();

})();
</script>
