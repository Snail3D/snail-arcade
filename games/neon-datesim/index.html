<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEON DATE SIM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; background: #0a0a0f; }
    body { display: flex; justify-content: center; align-items: center; font-family: 'Courier New', monospace; }
    canvas { display: block; touch-action: none; }
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,0.95);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10; font-family: 'Courier New', monospace;
    }
    .overlay h1 { color: #00ff88; font-size: 2.5em; text-shadow: 0 0 20px rgba(0,255,136,0.5); margin-bottom: 10px; }
    .overlay p { color: #888; font-size: 1em; margin: 5px 0; }
    .overlay .hs { color: #00ff88; font-size: 1.2em; margin-bottom: 20px; }
    .btn { padding: 16px 40px; font-size: 1.3em; font-family: 'Courier New', monospace; background: #00ff88; color: #0a0a0a; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="start" class="overlay">
    <h1>NEON DATE SIM</h1>
    <p>Make choices. Find your romance.</p>
    <div class="hs" id="hs-start">🏆 Best Affinity: 0</div>
    <button class="btn" onclick="startGame()">▶ START</button>
  </div>
  <div id="gameover" class="overlay hidden">
    <h1>STORY END</h1>
    <p id="go-score">Ending: ???</p>
    <div class="hs" id="hs-go">🏆 Best: 0</div>
    <button class="btn" onclick="startGame()">▶ PLAY AGAIN</button>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, scene, affinity, currentNode, gameRunning, ending;
    const CHARS = {
      raven: {name:'Raven', color:'#8844ff', emoji:'💜'},
      nova: {name:'Nova', color:'#4488ff', emoji:'💙'},
      ember: {name:'Ember', color:'#ff8844', emoji:'🧡'}
    };

    // Dialogue tree
    const STORY = [
      // Node 0: Intro
      {id:0, scene:'cafe', text:'You arrive at a neon-lit cafe. Three figures sit at separate tables.', choices:[
        {text:'Approach Raven (purple)', next:1, aff:{raven:5}},
        {text:'Approach Nova (blue)', next:2, aff:{nova:5}},
        {text:'Approach Ember (orange)', next:3, aff:{ember:5}},
      ]},
      // Node 1: Raven intro
      {id:1, scene:'cafe', char:'raven', text:'Raven looks up from her book. "Oh, hello. I didn\'t see you there."', choices:[
        {text:'"What are you reading?"', next:4, aff:{raven:10}},
        {text:'"Great weather, huh?"', next:5, aff:{raven:2}},
        {text:'"You look lonely."', next:6, aff:{raven:-5}},
      ]},
      // Node 2: Nova intro
      {id:2, scene:'park', char:'nova', text:'Nova waves energetically. "Hey! Glad you made it!"', choices:[
        {text:'"What\'s the plan today?"', next:7, aff:{nova:10}},
        {text:'"Nice weather for a walk."', next:8, aff:{nova:3}},
        {text:'"You seem really excited."', next:9, aff:{nova:5}},
      ]},
      // Node 3: Ember intro
      {id:3, scene:'library', char:'ember', text:'Ember smiles warmly. "I saved us a spot by the window."', choices:[
        {text:'"This place has great vibes."', next:10, aff:{ember:10}},
        {text:'"What do you recommend?"', next:11, aff:{ember:8}},
        {text:'"Let\'s get straight to business."', next:12, aff:{ember:-3}},
      ]},
      // Node 4: Raven book
      {id:4, scene:'library', char:'raven', text:'"A collection of poetry. Ancient verses about stars and loneliness." Her eyes glimmer.', choices:[
        {text:'"Poetry suits you."', next:13, aff:{raven:15}},
        {text:'"Can I read your favorites?"', next:14, aff:{raven:20}},
        {text:'"Bit boring, isn\'t it?"', next:15, aff:{raven:-10}},
      ]},
      // Node 5: Raven weather
      {id:5, scene:'cafe', char:'raven', text:'She gives a faint smile. "Yes, pleasant. Though I prefer rain."', choices:[
        {text:'"Rain is romantic."', next:16, aff:{raven:12}},
        {text:'"Sunshine is better."', next:17, aff:{raven:3}},
        {text:'"Don\'t you get cold?"', next:18, aff:{raven:5}},
      ]},
      // Node 6: Raven lonely
      {id:6, scene:'cafe', char:'raven', text:'She tenses. "I\'m fine. I just... prefer my own company."', choices:[
        {text:'"I\'m sorry, that was rude."', next:19, aff:{raven:5}},
        {text:'"Everyone gets lonely sometimes."', next:20, aff:{raven:10}},
        {text:'"That\'s why you need me."', next:21, aff:{raven:-15}},
      ]},
      // Node 7: Nova plan
      {id:7, scene:'park', char:'nova', text:'"I was thinking we could hit the new arcade, then rooftop stargazing!"', choices:[
        {text:'"Arcade sounds awesome!"', next:22, aff:{nova:15}},
        {text:'"Stargazing is more my speed."', next:23, aff:{nova:8}},
        {text:'"That\'s too much for one day."', next:24, aff:{nova:-5}},
      ]},
      // Node 8: Nova weather
      {id:8, scene:'park', char:'nova', text:'"Right?! We should go somewhere before the sun sets!"', choices:[
        {text:'"Lead the way!"', next:25, aff:{nova:12}},
        {text:'"Let\'s just sit and talk."', next:26, aff:{nova:3}},
        {text:'"I\'m actually tired."', next:27, aff:{nova:-8}},
      ]},
      // Node 9: Nova excited
      {id:9, scene:'park', char:'nova', text:'"I\'m always excited to meet someone new! Life is an adventure!"', choices:[
        {text:'"I love your energy."', next:28, aff:{nova:20}},
        {text:'"You\'re very optimistic."', next:29, aff:{nova:10}},
        {text:'"Calm down a bit."', next:30, aff:{nova:-10}},
      ]},
      // Node 10: Ember vibes
      {id:10, scene:'cafe', char:'ember', text:'"I knew you\'d appreciate it. I come here every weekend — the pastries are divine."', choices:[
        {text:'"Let\'s share a pastry."', next:31, aff:{ember:15}},
        {text:'"Tell me about yourself."', next:32, aff:{ember:12}},
        {text:'"I\'m not really hungry."', next:33, aff:{ember:-5}},
      ]},
      // Node 11: Ember recommend
      {id:11, scene:'cafe', char:'ember', text:'"The honey latte is magical. And the cinnamon roll — absolute art." She beams.', choices:[
        {text:'"I\'ll try the latte."', next:34, aff:{ember:10}},
        {text:'"You really know your food."', next:35, aff:{ember:15}},
        {text:'"I\'ll just have water."', next:36, aff:{ember:-8}},
      ]},
      // Node 12: Ember business
      {id:12, scene:'cafe', char:'ember', text:'She looks slightly hurt. "Oh... right. Efficiency." She stares at her coffee.', choices:[
        {text:'"Wait, I didn\'t mean it like that."', next:37, aff:{ember:5}},
        {text:'"Let\'s talk about art."', next:38, aff:{ember:10}},
        {text:'"Yes, let\'s keep it brief."', next:39, aff:{ember:-15}},
      ]},
      // Ending nodes (13+)
      {id:13, scene:'rooftop', char:'raven', text:'She blushes. "You think so? Most people don\'t get me."', choices:[{text:'"I want to get you."', next:40, aff:{raven:25}}]},
      {id:14, scene:'library', char:'raven', text:'She hands you the book reverently. "These are my favorites. Read them."', choices:[{text:"I\'ll treasure them.", next:40, aff:{raven:30}}]},
      {id:15, scene:'cafe', char:'raven', text:'She closes her book. "I think we\'re done here." She leaves.', choices:[{text:'Wait, I\'m sorry!',next:41,aff:{raven:-5}}]},
      {id:16, scene:'rooftop', char:'raven', text:'"Exactly. Rain washes everything clean. New beginnings." She looks at you.', choices:[{text:"I\'d like a new beginning with you.", next:40, aff:{raven:25}}]},
      {id:17, scene:'park', char:'raven', text:'"Hm. You\'re a daylight person. We\'re very different."', choices:[{text:"Different can work.", next:40, aff:{raven:10}}]},
      {id:18, scene:'cafe', char:'raven', text:'"I wear a scarf. It\'s cozy. Want to see my favorite café with warmer drinks?"', choices:[{text:"I\'d love to.", next:40, aff:{raven:20}}]},
      {id:19, scene:'cafe', char:'raven', text:'She relaxes. "Thank you. Most people don\'t apologize."', choices:[{text:"I care about how you feel.", next:40, aff:{raven:15}}]},
      {id:20, scene:'cafe', char:'raven', text:'She nods slowly. "Maybe you\'re right. It\'s nice to have someone to talk to."', choices:[{text:"I\'m here for you.", next:40, aff:{raven:20}}]},
      {id:21, scene:'cafe', char:'raven', text:'She stands abruptly. "I don\'t need anyone." Walks away.', choices:[{text:'...',next:41,aff:{}}]},
      // Nova endings
      {id:22, scene:'rooftop', char:'nova', text:'"YES! Best decision ever! Let\'s go!" She grabs your hand.', choices:[{text:"Lead the way!", next:42, aff:{nova:25}}]},
      {id:23, scene:'rooftop', char:'nova', text:'"Stargazing it is! I know the perfect rooftop spot."', choices:[{text:"Show me.", next:42, aff:{nova:20}}]},
      {id:24, scene:'park', char:'nova', text:'She deflates. "Oh... okay. Maybe another time."', choices:[{text:"Actually, let\'s do it!", next:42, aff:{nova:5}}]},
      {id:25, scene:'park', char:'nova', text:'She pulls you toward a glowing tunnel. "Trust me, this is amazing!"', choices:[{text:"I trust you.", next:42, aff:{nova:25}}]},
      {id:26, scene:'park', char:'nova', text:'She sits on a bench. "Okay, talking is nice too." She leans back.', choices:[{text:"Tell me your dreams.", next:42, aff:{nova:15}}]},
      {id:27, scene:'park', char:'nova', text:'"Oh, okay. We can rest. But next time — adventure!"', choices:[{text:"Next time for sure.", next:42, aff:{nova:8}}]},
      {id:28, scene:'rooftop', char:'nova', text:'She beams brighter. "That means so much coming from you!"', choices:[{text:"You light up my world.", next:42, aff:{nova:30}}]},
      {id:29, scene:'park', char:'nova', text:'"Life\'s too short for negativity! I want to make every moment count."', choices:[{text:"Let\'s make moments together.", next:42, aff:{nova:20}}]},
      {id:30, scene:'park', char:'nova', text:'She goes quiet. "I\'m just being myself..."', choices:[{text:"Yourself is wonderful.", next:42, aff:{nova:10}}]},
      // Ember endings
      {id:31, scene:'cafe', char:'ember', text:'She orders two cinnamon rolls. "Sharing food is intimacy, you know."', choices:[{text:"I love that.", next:43, aff:{ember:25}}]},
      {id:32, scene:'cafe', char:'ember', text:'"I\'m an artist — I paint murals across the city. Life is my canvas."', choices:[{text:"I\'d love to see your art.", next:43, aff:{ember:20}}]},
      {id:33, scene:'cafe', char:'ember', text:'"Oh! More for me then." She laughs warmly. "I like an honest date."', choices:[{text:"Honesty is important.", next:43, aff:{ember:10}}]},
      {id:34, scene:'cafe', char:'ember', text:'She sips hers happily. "See? Magic in a cup. Life\'s about these small joys."', choices:[{text:"I want to share joys with you.", next:43, aff:{ember:25}}]},
      {id:35, scene:'cafe', char:'ember', text:'"Food is my love language. Making someone a meal — that\'s how I care."', choices:[{text:"Cook for me sometime?", next:43, aff:{ember:20}}]},
      {id:36, scene:'cafe', char:'ember', text:'She looks disappointed. "You\'re not really here to connect, are you?"', choices:[{text:"I am. I just didn\'t want to impose.", next:43, aff:{ember:3}}]},
      {id:37, scene:'cafe', char:'ember', text:'She brightens. "Okay. Let\'s pretend that didn\'t happen. Tell me about you."', choices:[{text:"I\'d rather hear about you.", next:43, aff:{ember:15}}]},
      {id:38, scene:'library', char:'ember', text:'"I\'m painting a mural about hope rising from darkness. Want to see the studio?"', choices:[{text:"I\'d love to.", next:43, aff:{ember:20}}]},
      {id:39, scene:'cafe', char:'ember', text:'She pays her share and stands. "I think we want different things. Good luck."', choices:[{text:'...',next:41,aff:{}}]},
      // Final nodes
      {id:40, scene:'rooftop', char:'raven', text:'Raven takes your hand. "I think... this could be something beautiful."', choices:[{text:"I agree.", next:44, aff:{raven:50}}]},
      {id:41, scene:'cafe', text:'The date ends awkwardly. You walk home alone.', choices:[{text:'Restart?',next:0}]},
      {id:42, scene:'rooftop', char:'nova', text:'Nova pulls you close under the stars. "This was perfect. Let\'s do this forever."', choices:[{text:"Forever sounds right.", next:44, aff:{nova:50}}]},
      {id:43, scene:'rooftop', char:'ember', text:'Ember hugs you warmly. "You\'re special. I want to paint you into my life."', choices:[{text:"I want that too.", next:44, aff:{ember:50}}]},
      {id:44, scene:'rooftop', text:'── GOOD ENDING ──\nYou found a genuine connection in the neon night.', choices:[{text:'Play again?',next:0}]},
    ];

    function resize() {
      W = Math.min(window.innerWidth, 480);
      H = Math.min(window.innerHeight, 720);
      canvas.width = W;
      canvas.height = H;
    }
    resize();
    window.addEventListener('resize', resize);

    function reset() {
      affinity = {raven:0, nova:0, ember:0};
      currentNode = 0;
      ending = null;
      gameRunning = true;
      document.getElementById('start').classList.add('hidden');
      document.getElementById('gameover').classList.add('hidden');
    }

    function startGame() { reset(); }

    function choose(idx) {
      const node = STORY.find(n => n.id === currentNode);
      if (!node || !node.choices || idx >= node.choices.length) return;
      const choice = node.choices[idx];
      // Apply affinity
      if (choice.aff) {
        for (const [k, v] of Object.entries(choice.aff)) {
          affinity[k] = (affinity[k] || 0) + v;
        }
      }
      currentNode = choice.next;
      // Check ending
      const nextNode = STORY.find(n => n.id === currentNode);
      if (nextNode && nextNode.id === 44) {
        // Determine which character had highest affinity
        const maxChar = Object.entries(affinity).sort((a,b) => b[1]-a[1])[0];
        ending = maxChar[0];
      }
      if (nextNode && nextNode.id === 41) {
        // Bad ending
        ending = 'bad';
      }
    }

    function draw() {
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      const node = STORY.find(n => n.id === currentNode);
      if (!node) return;

      // Scene background
      const scenes = {
        cafe: 'NEON CAFE — 11:47 PM',
        park: 'OBSIDIAN PARK — 10:23 PM',
        library: 'THE SILENT ARCHIVE',
        rooftop: 'ROOFTOP — STARS ABOVE'
      };
      ctx.fillStyle = '#00ff88';
      ctx.font = '12px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(scenes[node.scene] || 'UNKNOWN', W/2, 30);

      // Character portrait
      if (node.char) {
        const char = CHARS[node.char];
        const cx = W/2, cy = 80;
        ctx.fillStyle = char.color;
        ctx.beginPath();
        ctx.arc(cx, cy, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '30px Courier New';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(char.emoji, cx, cy + 2);
        ctx.fillStyle = '#888';
        ctx.font = '10px Courier New';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(char.name, cx, 130);
      }

      // Dialogue text
      ctx.fillStyle = '#ccc';
      ctx.font = '13px Courier New';
      ctx.textAlign = 'left';
      const maxW = W - 40;
      ctx.textBaseline = 'top';
      const lines = wordWrap(node.text, maxW);
      const ty = node.char ? 150 : 100;
      lines.forEach((l, i) => {
        ctx.fillText(l, 20, ty + i * 18);
      });

      // Choices
      const choices = node.choices || [];
      const ch = 35, cw = W - 40, cgap = 8;
      const cStart = H - 30 - choices.length * (ch + cgap);
      for (let i = 0; i < choices.length; i++) {
        const cy2 = cStart + i * (ch + cgap);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(10, cy2, cw, ch);
        ctx.strokeStyle = '#00ff88';
        ctx.strokeRect(10, cy2, cw, ch);
        ctx.fillStyle = '#fff';
        ctx.font = '11px Courier New';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText((i+1) + '. ' + choices[i].text, 20, cy2 + ch/2 + 2);
      }

      // Affinity display
      ctx.fillStyle = '#666';
      ctx.font = '10px Courier New';
      ctx.textAlign = 'left';
      let ay = 10;
      for (const [k, v] of Object.entries(affinity)) {
        const char = CHARS[k];
        ctx.fillText(char.emoji + ' ' + v, 10, ay);
        ay += 12;
      }

      // Ending check
      if (ending === 'bad') {
        document.getElementById('go-score').textContent = 'Ending: Walked away alone';
        const hs = localStorage.getItem('ds_highscore') || 0;
        document.getElementById('hs-go').textContent = '🏆 Best Affinity: ' + hs;
        document.getElementById('gameover').classList.remove('hidden');
        gameRunning = false;
      } else if (ending && currentNode === 44) {
        const char = CHARS[ending];
        document.getElementById('go-score').textContent = 'Ending: ' + char.name + ' ending! ❤️';
        const maxAff = Math.max(...Object.values(affinity));
        const hs = localStorage.getItem('ds_highscore') || 0;
        if (maxAff > parseInt(hs)) localStorage.setItem('ds_highscore', maxAff);
        document.getElementById('hs-go').textContent = '🏆 Best Affinity: ' + Math.max(maxAff, parseInt(hs));
        document.getElementById('gameover').classList.remove('hidden');
        gameRunning = false;
      }
    }

    function wordWrap(text, maxW) {
      ctx.font = '13px Courier New';
      const lines = [];
      let current = '';
      for (const word of text.split(' ')) {
        const test = current ? current + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && current) {
          lines.push(current);
          current = word;
        } else {
          current = test;
        }
      }
      if (current) lines.push(current);
      return lines;
    }

    // Touch
    canvas.addEventListener('click', (e) => {
      if (!gameRunning) return;
      const node = STORY.find(n => n.id === currentNode);
      if (!node) return;
      const rect = canvas.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const choices = node.choices || [];
      const ch = 35, cw = W - 40, cgap = 8;
      const cStart = H - 30 - choices.length * (ch + cgap);
      for (let i = 0; i < choices.length; i++) {
        const cy2 = cStart + i * (ch + cgap);
        if (y > cy2 && y < cy2 + ch) { choose(i); return; }
      }
    });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!gameRunning) return;
      const node = STORY.find(n => n.id === currentNode);
      if (!node) return;
      const rect = canvas.getBoundingClientRect();
      const t = e.touches[0];
      const y = t.clientY - rect.top;
      const choices = node.choices || [];
      const ch = 35, cw = W - 40, cgap = 8;
      const cStart = H - 30 - choices.length * (ch + cgap);
      for (let i = 0; i < choices.length; i++) {
        const cy2 = cStart + i * (ch + cgap);
        if (y > cy2 && y < cy2 + ch) { choose(i); return; }
      }
    });

    function loop() {
      draw();
      requestAnimationFrame(loop);
    }

    const saved = localStorage.getItem('ds_highscore') || 0;
    document.getElementById('hs-start').textContent = '🏆 Best Affinity: ' + saved;
    loop();
  </script>
</body>
</html>
