<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minesweeper (Windows NT) – Mobile</title>
  <style>
    body {font-family:sans-serif;margin:0;padding:10px;background:#fff;}
    #game {width:100%;max-width:400px;margin:auto;}
    .board {display:grid;grid-template-columns:repeat(9,1fr);gap:2px;margin:auto;width:100%;}
    .cell {aspect-ratio:1;background:#e0e0e0;border:1px solid #777;font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
    .cell.flag::after {content:"🚩";color:#ff3b30;}
    .cell.mine::after {content:"💣";color:#000;}
    .cell.revealed {background:#c0c0c0;cursor:default;}
    .empty {background:#c0c0c0;font-size:0;}
    .control {margin:10px 0;text-align:center;}
    .control button{padding:8px 12px;font-size:1rem;background:#6a5acd;color:#fff;border:none;border-radius:4px;cursor:pointer;}
    .control button:hover{background:#5d58c5;}
  </style>
</head>
<body>
  <h3 style="text-align:center;">Minesweeper (Windows NT) – Mobile</h3>
  <div class="control">
    <span id="mode-label">Flag placement</span>
    <input type="radio" name="mode" id="clsr" checked><label for="clsr">Clear</label>
    <input type="radio" name="mode" id="flg"><label for="flg">Flag</label>
  </div>
  <div id="game">
    <div class="board" id="board"></div>
    <div class="control"><button id="btnRestart">Restart</button></div>
  </div>

  <script>
    const COLS = 9;
    const ROWS = 9;
    const MINES = 10;
    const board = document.getElementById('board');
    const modeLabel = document.getElementById('mode-label');
    const restartBtn = document.getElementById('btnRestart');

    let mineSet = new Set(); // will hold mine indices
    let cells = [];

    // generate a fixed set of mine positions (seeded for consistency)
    const presetMines = [5,12,18,35,41,45,48,52,55,57];
    mineSet = new Set(presetMines);

    // update mode label & flag mode
    function updateMode(){
      const selected = document.querySelector('input[name="mode"]:checked');
      const flagMode = selected && selected.id==='flg';
      modeLabel.textContent = flagMode ? 'Flag mode' : 'Clear mode';
    }
    document.querySelectorAll('input[name="mode"]').forEach(el=>{
      el.addEventListener('change', updateMode);
    });
    updateMode();

    // create cells
    for(let i=0;i<COLS*ROWS;i++){
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.dataset.idx = i;
      if(mineSet.has(i)){
        cell.classList.add('minesquare');
      }else{
        cell.classList.add('empty');
      }
      cell.addEventListener('click', onCellClick);
      cell.addEventListener('contextmenu', onCellRightClick);
      board.appendChild(cell);
      cells.push(cell);
    }

    function countAdjacent(idx){
      const r = Math.floor(idx / COLS);
      const c = idx % COLS;
      let cnt = 0;
      for(let dr=-1; dr<=1; dr++){
        for(let dc=-1; dc<=1; dc++){
          if(dr===0 && dc===0) continue;
          const nr = r + dr, nc = c + dc;
          if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS){
            const nIdx = nr*COLS + nc;
            if(mineSet.has(nIdx)) cnt++;
          }
        }
      }
      return cnt;
    }

    function onCellClick(e){
      const cell = e.currentTarget;
      if(cell.classList.contains('revealed') || cell.classList.contains('flag')) return;
      const idx = +cell.dataset.idx;
      if(cell.classList.contains('minesquare')){
        // hit a mine
        cell.classList.remove('minesquare');
        cell.classList.add('revealed','mine');
        cell.innerText = '💣';
        alert('Boom! Game over.');
        return;
      }
      // safe click
      cell.classList.add('revealed');
      const adj = countAdjacent(idx);
      if(adj>0){
        cell.classList.add('empty');
        cell.innerText = adj;
        return;
      }
      // empty – flood reveal
      const revealQueue = [idx];
      const visited = new Set();
      while(revealQueue.length){
        const cur = revealQueue.shift();
        if(visited.has(cur)) continue;
        visited.add(cur);
        const r = Math.floor(cur / COLS);
        const c = cur % COLS;
        const neighborIdxs = [];
        for(let dr=-1; dr<=1; dr++){
          for(let dc=-1; dc<=1; dc++){
            if(dr===0 && dc===0) continue;
            const nr = r + dr, nc = c + dc;
            if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS){
              const nIdx = nr*COLS + nc;
              if(!mineSet.has(nIdx) && !visited.has(nIdx) && cells[nIdx].classList.contains('empty')){ // safe neighbor not a mine and not revealed
                neighborIdxs.push(nIdx);
              }
            }
          }
        }
        for(let nIdx of neighborIdxs){
          const nCell = cells[nIdx];
          if(nCell.classList.contains('revealed') || nCell.classList.contains('flag')) continue;
          nCell.classList.add('revealed');
          const adjN = countAdjacent(nIdx);
          if(adjN>0){
            nCell.classList.add('empty');
            nCell.innerText = adjN;
          }else{
            nCell.classList.add('empty');
            nCell.innerText = '';
            revealQueue.push(nIdx);
          }
        }
      }
    }

    function onCellRightClick(e){
      e.preventDefault();
      const flagMode = document.querySelector('input[name="mode"]:checked')?.id==='flg';
      if(!flagMode) return;
      const cell = e.currentTarget;
      const isFlagged = cell.classList.toggle('flag');
      cell.innerText = isFlagged ? '🚩' : '';
    }

    restartBtn.addEventListener('click', ()=>{location.reload();});

  </script>
</body>
</html>
