<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minesweeper (Windows NT style) - Mobile</title>
  <style>
    body {font-family: sans-serif; margin:0; padding:10px; background:#fff;}
    #game {width: 100%; max-width: 400px; margin:auto;}
    .board {display:grid; grid-template-columns: repeat(var(--cols),1fr); gap:2px; width:100%;}
    .cell {aspect-ratio:1; background:#dbdbdb; border:1px solid #777; font-size:1.2rem; display:flex; align-items:center; justify-content:center; cursor:pointer;}
    .cell.flag::after {content:"🚩"; color:#ff3b30;}
    .cell.mine::after {content:"💣"; color:#000;}
    .cell.empty {background:#fff; font-size:0;}
    .control {margin:10px 0; text-align:center;}
    .hidden {visibility:hidden;}
    .reveal {background:#e0e0e0;}
  </style>
</head>
<body>
  <h3 style="text-align:center;">Minesweeper (Windows NT) – Mobile</h3>
  <div class=fixed-control>
    <span id="mode-label">Flag placement</span>
    <input type="radio" name="mode" id="clsr" checked><label for="clsr">Clear</label>
    <input type="radio" name="mode" id="flg"><label for="flg">Flag</label>
  </div>
  <div id="game">
    <div class="board" id="board"></div>
    <div class="control"><button id="btnRestart">Restart</button></div>
  </div>
  <script>
    const cols = 9;
    const rows = 9;
    const mines = 10;
    const board = document.getElementById('board');
    const btnRestart = document.getElementById('btnRestart');
    const modeR = document.querySelector('input[name="mode"]:checked');
    const modeLabel = document.getElementById('mode-label');
    document.querySelectorAll('input[name="mode"]').forEach(el=> {
      el.addEventListener('change',()=>{modeR.innerText = el.id==='flg'?'Flag placement':'Clear mode';modeLabel.innerText = el.id==='flg?'Flag mode':'Clear'});
    });
    let cells = [];
    let minesPos = [];

    function init() {
      board.innerHTML='';
      cells = [];
      minesPos = [];
      const positions=[...Array(cols*rows).keys()];
      for(let i=0;i<mines;i++){
        const idx=Math.floor(Math.random()*positions.length);
        const val=positions.splice(idx,1)[0];
        minesPos.push([val%cols, Math.floor(val/cols)]);
      }
      const flatten=m=>m.flat();
      const coords=flatten(minesPos.map(v=>[v[0],v[1]]));
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const cell=document.createElement('div');
          cell.classList.add('cell','hidden');
          cell.dataset.r=r;cell.dataset.c=c;
          cell.addEventListener('click',()=>onCellClick(cell));
          board.appendChild(cell);
          cells.push(cell);
        }
      }
      for(let p of minesPos){
        const [c,r]=p;
        const idx=r*cols+c;
        cells[idx].classList.add('mine');
      }
    }
    function onCellClick(cell){
      const r=+cell.dataset.r, c=+cell.dataset.c;
      cell.classList.remove('hidden');
      const idx=r*cols+c;
      if(cell.classList.contains('mine')){
        cell.classList.add('mine');
        cell.innerText='💣';
        alert('Boom! Game over.');
        return;
      }
      const adjacent= countMines(r,c);
      if(adjacent===0){
        cell.classList.add('empty');
        cell.innerText='0';
        // flood reveal
        flood(r,c);
      }else{
        cell.classList.add('empty');
        cell.innerText=adjacent;
      }
    }
    function countMines(r,c){
      let cnt=0;
      for(let dr=[-1,0,1]for(let dc=[-1,0,1])if(dr!==0||dc!==0){\n      const nr=r+dr, nc=c+dc;\n      if(nr>=0 && nr<rows && nc>=0 && nc<cols){\n        if(minesPos.some(m=>m[0]===nc && m[1]===nr)) cnt++;\n      }\n    }\n    return cnt;\n  }
    function flood(r,c){
      const q=[[r,c]];
      const visited= new Set();
      while(q.length){
        const [rr,cc]=q.shift();
        if(rr<0||rr>=rows||cc<0||cc>=cols)continue;
        const idx=rr*cols+cc;
        if(visited.has(idx))continue;
        visited.add(idx);
        const cell=cells[idx];
        if(cell.classList.contains('mine')||cell.classList.contains('empty'))continue;
        const adjacent=countMines(rr,cc);
        cell.classList.add('empty');
        cell.innerText=adjacent;
        if(adjacent===0){
          q.push([rr-1,cc]);
          q.push([rr+1,cc]);
          q.push([rr,cc-1]);
          q.push([rr,cc+1]);
        }
      }
    }
    btnRestart.addEventListener('click',init);
    init();
  </script>
</body></html>
