<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0">
<title>Red Baron — WWI Air Dogfight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;user-select:none}
canvas{display:block;max-width:100vw;max-height:100vh;image-rendering:auto}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=480,H=720;
canvas.width=W;canvas.height=H;

let state='menu'; // menu, playing, gameover
let score=0,highScore=parseInt(localStorage.getItem('redbaron_hi')||'0');
let lives=3,level=1,frame=0;
let shakeTimer=0;
const keys={};
const touch={active:false,x:W/2,y:H-140};

// Player plane
const p={x:W/2,y:H-130,w:48,h:56,shootCooldown:0,invuln:0};

// Arrays
let clouds=[],bullets=[],enemies=[],explosions=[];
let spawnTimer=0;

function init(){
  score=0;lives=3;level=1;frame=0;
  p.x=W/2;p.y=H-130;p.shootCooldown=0;p.invuln=0;
  bullets=[];enemies=[];explosions=[];clouds=[];spawnTimer=0;shakeTimer=0;
  for(let i=0;i<6;i++) clouds.push(mkCloud(Math.random()*H));
}

function mkCloud(y){return{x:Math.random()*W,y:y||-80,w:60+Math.random()*80,h:25+Math.random()*20}}

// Draw a biplane
function drawBiplane(x,y,w,h,facing,col,hasRedBaron){
  ctx.save();
  ctx.translate(x,y);
  if(facing==='up'){
    // String art biplane - facing down (player) or up (enemy)
    const fy=facing==='down'?1:-1;
    // Fuselage
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.ellipse(0,fy*12,w*0.18,h*0.45);
    ctx.fill();
    // Wings
    ctx.fillStyle=col;
    ctx.globalAlpha=0.85;
    ctx.fillRect(-w*0.48,-5,w*0.96,8);
    ctx.fillRect(-w*0.4,5,w*0.8,6);
    ctx.globalAlpha=1;
    // Struts
    ctx.strokeStyle='#333';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-w*0.35,-3);ctx.lineTo(-w*0.32,8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*0.35,-3);ctx.lineTo(w*0.32,8);ctx.stroke();
    // Propeller / spinner
    ctx.fillStyle=hasRedCol?'#cc0000':'#ffcc44';
    ctx.beginPath();
    ctx.ellipse(0,fy*(h*0.45),w*0.14,w*0.14,0,0,Math.PI*2);
    ctx.fill();
    // Red Baron cross mark
    if(hasRedBaron){
      ctx.fillStyle='#fff';ctx.font=`bold ${w*0.18}px monospace`;
      ctx.textAlign='center';ctx.fillText('†',0,fy*40);
    }
  }
  ctx.restore();
}

const hasRedCol='#cc0000';
const enemyCol='#448844';
const playerCol='#cc8800';

function drawPlayer(x,y){
  ctx.save();
  ctx.translate(x,y);
  // Body/fuselage
  const bw=p.w/2,bh=p.h/2;
  ctx.fillStyle=playerCol;
  ctx.beginPath();
  ctx.ellipse(0,12,bw*0.18,bh*0.45,0,0,Math.PI*2);
  ctx.fill();
  // Lower wing (broad)
  ctx.fillStyle=playerCol;ctx.globalAlpha=0.9;
  ctx.fillRect(-bw*0.52,-5,bw*1.04,9);
  // Upper wing
  ctx.fillRect(-bw*0.46,6,bw*0.92,7);
  ctx.globalAlpha=1;
  // Struts
  ctx.strokeStyle='#333';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-bw*0.42,-3);ctx.lineTo(-bw*0.39,8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bw*0.42,-3);ctx.lineTo(bw*0.39,8);ctx.stroke();
  // Nose spinner (red)
  ctx.fillStyle=hasRedCol;
  ctx.beginPath();
  ctx.ellipse(0,bh*0.45,bw*0.13,bw*0.13,0,0,Math.PI*2);
  ctx.fill();
  // Tail
  ctx.fillStyle=playerCol;
  ctx.fillRect(-bw*0.25,bh-14,bw*0.5,6);
  ctx.fillRect(-3,bh-14,6,12);
  // Cockpit
  ctx.fillStyle='#2a5';ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawEnemy(x,y,ew,eh){
  ctx.save();
  ctx.translate(x,y);
  const ew2=ew/2,eh2=eh/2;
  // Green fuselage
  ctx.fillStyle=enemyCol;
  ctx.beginPath();
  ctx.ellipse(0,-12,ew2*0.18,eh2*0.45,0,0,Math.PI*2);
  ctx.fill();
  // Wings
  ctx.fillStyle=enemyCol;ctx.globalAlpha=0.9;
  ctx.fillRect(-ew2*0.52,-28,ew*1.04,8);
  ctx.fillRect(-ew2*0.46,-18,ew2*0.92,6);
  ctx.globalAlpha=1;
  // Struts
  ctx.strokeStyle='#333';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(-ew2*0.42,-25);ctx.lineTo(-ew2*0.39,-15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ew2*0.42,-25);ctx.lineTo(ew2*0.39,-15);ctx.stroke();
  // Nose (greenish spinner)
  ctx.fillStyle='#6a6';
  ctx.beginPath();ctx.ellipse(0,-eh2*0.45,ew2*0.13,ew2*0.13,0,0,Math.PI*2);ctx.fill();
  // Tail
  ctx.fillStyle=enemyCol;
  ctx.fillRect(-ew2*0.22,-eh+8,ew2*0.5,6);
  ctx.fillRect(-3,-eh+8,6,10);
  // Red Baron cross on some enemies
  if(Math.random()>0.7||level>3){
    ctx.fillStyle='#fff';ctx.font=`bold ${ew2*0.22}px monospace`;
    ctx.textAlign='center';
    ctx.fillText('†',0,-38);
  }
  ctx.restore();
}

function spawnCloud(){clouds.push(mkCloud());}

function shoot(){
  if(p.shootCooldown>0)return;
  p.shootCooldown=10;
  bullets.push({x:p.x-10,y:p.y-p.h/2,vy:-8});
  bullets.push({x:p.x+10,y:p.y-p.h/2,vy:-8});
}

function spawnEnemy(){
  const ew=36+Math.random()*16;
  const eh=44+Math.random()*16;
  const sp=1.5+level*0.3+Math.random()*0.8;
  enemies.push({
    x:Math.random()*(W-60)+30,
    y:-eh,
    w:ew,h:eh,
    speed:sp,
    aimX:p.x+Math.random()*60-30,
    hasRedBaron:Math.random()<(level-1)*0.08,
    shootTimer:60+Math.random()*90,
    bulletTimer:0
  });
}

function rectHit(a,b){
  return Math.abs(a.x-b.x)<(a.w||a.w2||20)/2+(b.w||b.w2||30)/2 &&
         Math.abs(a.y-b.y)<(a.h||a.h2||24)/2+(b.h||b.h2||40)/2;
}

let groundOffset=0;

function drawSkyAndGround(){
  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,H*0.6);
  sg.addColorStop(0,'#4a90d9');
  sg.addColorStop(1,'#87ceeb');
  ctx.fillStyle=sg;
  ctx.fillRect(0,0,W,H*0.55);

  // Ground
  const gg=ctx.createLinearGradient(0,H*0.55,0,H);
  gg.addColorStop(0,'#8B7355');
  gg.addColorStop(0.3,'#6B8E23');
  gg.addColorStop(1,'#556B2F');
  ctx.fillStyle=gg;
  ctx.fillRect(0,H*0.55,W,H*0.45);

  // Ground detail - scrolling
  groundOffset=(groundOffset+1)%40;
  ctx.strokeStyle='#7a9a33';ctx.lineWidth=1;
  for(let y=H*0.55;y<H;y+=40){
    const yy=((y+groundOffset)%H-H*0.45+H*0.45)%40+H*0.55;
    ctx.beginPath();ctx.moveTo(0,yy);
    for(let x=0;x<W;x+=30){
      ctx.lineTo(x+15,yy+(Math.sin(x*0.05+frame*0.01)*8));
      ctx.lineTo(x+30,yy);
    }
    ctx.stroke();
  }

  // No-man's-land line
  ctx.strokeStyle='#5a4a3a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H*0.55);ctx.lineTo(W,H*0.55);ctx.stroke();
}

function drawCloud(c){
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.beginPath();
  ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x-c.w*0.3,c.y+c.h*0.15,c.w*0.35,c.h*0.35,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(c.x+c.w*0.28,c.y+c.h*0.1,c.w*0.3,c.h*0.3,0,0,Math.PI*2);
  ctx.fill();
}

function drawExplosion(e){
  const prog=e.frame/e.maxFrames;
  const r=e.size*(0.5+prog*1.5);
  ctx.save();
  ctx.globalAlpha=1-prog;
  // Core
  ctx.fillStyle=prog<0.3?'#fff':prog<0.6?'#ffcc00':'#ff4400';
  ctx.beginPath();ctx.arc(e.x,e.y,r,0,Math.PI*2);ctx.fill();
  // Debris sparks
  ctx.fillStyle='#ff4400';
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2+e.frame*0.1;
    const d=r*(0.8+prog*0.5);
    ctx.beginPath();
    ctx.arc(e.x+Math.cos(a)*d,e.y+Math.sin(a)*d,2+prog*3,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawHUD(){
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.textAlign='left';
  ctx.fillText('SCORE: '+score,10,24);
  ctx.textAlign='right';
  ctx.fillText('LEVEL: '+level,W-10,24);
  // Lives
  for(let i=0;i<lives;i++){
    ctx.fillStyle='#ff4444';ctx.font='20px serif';ctx.textAlign='left';
    ctx.fillText('🐌',10+i*28,H-10);
  }
}

function drawMenu(){
  // Background
  drawSkyAndGround();
  clouds.forEach(drawCloud);

  // Overlay
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,H);

  // Title
  ctx.fillStyle='#cc0000';ctx.font='bold 36px monospace';ctx.textAlign='center';
  ctx.fillText('RED BARON',W/2,H*0.32);
  ctx.fillStyle='#ffcc00';ctx.font='20px monospace';
  ctx.fillText('WWI AIR DOGFIGHT',W/2,H*0.32+32);

  // Decorative biplane
  ctx.fillStyle='#cc8800';
  const bx=W/2,by=H*0.48;
  drawPlayer(bx,by);

  // Instructions
  ctx.fillStyle='#aaa';ctx.font='14px monospace';
  ctx.fillText('TOUCH/DRAG TO MOVE',W/2,H*0.68);
  ctx.fillText('TAP TO SHOOT',W/2,H*0.68+22);
  ctx.fillText('SPACE + ARROWS ON DESKTOP',W/2,H*0.68+44);

  // Start button
  const btnY=H*0.82,btnW=200,btnH=50,btnX=H/2-btnW/2;
  const pulse=Math.sin(frame*0.05)*3;
  ctx.fillStyle='#cc0000';
  roundRect(btnX,btnY-pulse,btnW,btnH,12);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 22px monospace';
  ctx.fillText('▶ START',W/2,btnY+btnH/2+7);

  if(highScore>0){
    ctx.fillStyle='#888';ctx.font='14px monospace';
    ctx.fillText('HIGH SCORE: '+highScore,W/2,btnY+70);
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawGameOver(){
  drawSkyAndGround();
  clouds.forEach(drawCloud);
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#ff0000';ctx.font='bold 32px monospace';ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H*0.35);
  ctx.fillStyle='#fff';ctx.font='20px monospace';
  ctx.fillText('FINAL SCORE: '+score,W/2,H*0.45);
  if(score>=highScore&&score>0){
    ctx.fillStyle='#ffcc00';ctx.font='bold 16px monospace';
    ctx.fillText('★ NEW HIGH SCORE ★',W/2,H*0.52);
  }

  // Retry button
  const btnY=H*0.65,btnW=200,btnH=50;
  const pulse=Math.sin(frame*0.05)*3;
  ctx.fillStyle='#4a4';
  roundRect2(W/2-btnW/2,btnY-pulse,btnW,btnH,12);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 22px monospace';
  ctx.fillText('RETRY',W/2,btnY+btnH/2+7);
}

function roundRect2(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Game loop
function update(){
  frame++;
  if(state==='menu'){
    clouds.forEach(c=>{c.y+=0.5;if(c.y>c.h+10){c.y=-c.h-10;c.x=Math.random()*W;}});
    return;
  }
  if(state==='gameover'){
    clouds.forEach(c=>{c.y+=0.5;if(c.y>c.h+10){c.y=-c.h-10;c.x=Math.random()*W;}});
    explosions.forEach(e=>e.frame++);
    explosions=explosions.filter(e=>e.frame<e.maxFrames);
    return;
  }

  // Player movement
  if(keys['ArrowLeft']||keys['a'])p.x-=5;
  if(keys['ArrowRight']||keys['d'])p.x+=5;
  if(keys['ArrowUp']||keys['w'])p.y-=4;
  if(keys['ArrowDown']||keys['s'])p.y+=4;
  if(keys[' '])shoot();
  // Touch/mouse override
  if(touch.active){
    const dx=touch.x-p.x;
    const dy=touch.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>4){p.x+=dx/dist*6;p.y+=dy/dist*6;}
  }
  p.x=Math.max(p.w/2,Math.min(W-p.w/2,p.x));
  p.y=Math.max(H*0.15,Math.min(H-p.h/2-30,p.y));

  if(p.shootCooldown>0)p.shootCooldown--;
  if(p.invuln>0)p.invuln--;

  // Spawn clouds
  if(clouds.length<7&&Math.random()<0.02)spawnCloud();
  clouds.forEach(c=>{c.y+=0.5;if(c.y>c.h+10){c.y=-c.h-10;c.x=Math.random()*W;}});

  // Spawn enemies
  spawnTimer++;
  const spawnRate=Math.max(30,90-level*5);
  if(spawnTimer>=spawnRate){spawnTimer=0;spawnEnemy();if(level>2&&Math.random()<0.5)spawnEnemy();}

  // Level up
  level=1+Math.floor(score/25);

  // Update bullets
  bullets.forEach(b=>b.y+=b.vy);
  bullets=bullets.filter(b=>b.y>-20);

  // Update enemies
  enemies.forEach(e=>{
    // Track player aim
    e.y+=e.speed;
    e.x+=(e.aimX-e.x)*0.01;
    // Enemy shoot
    e.bulletTimer++;
    if(e.bulletTimer>120+Math.random()*60){
      e.bulletTimer=0;
      // Enemy bullet goes down
      e._lastBullet={x:e.x,y:e.y+e.h/2};
    }
  });
  // Enemy bullets
  let ebs=enemies.filter(e=>e._lastBullet).map(e=>{
    const b=e._lastBullet;delete e._lastBullet;
    return{x:b.x,y:b.y,vy:4+level*0.5};
  });
  ebs=ebs||[];
  ebs.forEach(b=>b.y+=b.vy);
  ebs=ebs.filter(b=>b.y<H+20);

  // Remove off-screen enemies
  enemies=enemies.filter(e=>e.y<H+50);

  // Collision: bullets vs enemies
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      const bw2=8,bh2=6;
      const ew2=e.w/2,eh2=e.h/2;
      if(Math.abs(b.x-e.x)<ew2+bw2&&Math.abs(b.y-e.y)<eh2+bh2){
        // Hit enemy!
        bullets.splice(bi,1);
        enemies.splice(ei,1);
        score+=2;
        explosions.push({x:e.x,y:e.y,size:e.h*0.5,frame:0,maxFrames:30});
        shakeTimer=8;
      }
    });
  });

  // Collision: player bullets vs enemy bullets (they can hit player too)
  ebs.forEach((eb)=>{
    if(Math.abs(eb.x-p.x)<p.w/2*0.7&&Math.abs(eb.y-p.y)<p.h/2*0.7&&p.invuln<=0){
      // Player hit
      const idx=ebs.indexOf(eb);
      if(idx>-1)ebs.splice(idx,1);
      lives--;
      p.invuln=60;
      shakeTimer=12;
      explosions.push({x:p.x,y:p.y,size:25,frame:0,maxFrames:25});
      if(lives<=0){
        state='gameover';
        if(score>highScore){highScore=score;localStorage.setItem('redbaron_hi',highScore);}
      }
    }
  });

  // Collision: enemies vs player
  enemies.forEach((e)=>{
    if(Math.abs(e.x-p.x)<(e.w+p.w)/2*0.6&&Math.abs(e.y-p.y)<(e.h+p.h)/2*0.6&&p.invuln<=0){
      lives--;p.invuln=60;shakeTimer=12;
      const idx=enemies.indexOf(e);if(idx>-1)enemies.splice(idx,1);
      explosions.push({x:e.x,y:e.y,size:30,frame:0,maxFrames:35});
      if(lives<=0){
        state='gameover';
        if(score>highScore){highScore=score;localStorage.setItem('redbaron_hi',highScore);}
      }
    }
  });

  // Explosion updates
  explosions.forEach(e=>e.frame++);
  explosions=explosions.filter(e=>e.frame<e.maxFrames);
  if(shakeTimer>0)shakeTimer--;
}

function draw(){
  ctx.save();
  // Screen shake
  if(shakeTimer>0){
    const s=shakeTimer*0.8;
    ctx.translate(Math.random()*s-s/2,Math.random()*s-s/2);
  }

  if(state==='menu'){
    drawMenu();
  } else if(state==='gameover'){
    drawGameOver();
    explosions.forEach(drawExplosion);
  } else {
    drawSkyAndGround();
    clouds.forEach(drawCloud);
    // Draw bullets
    ctx.fillStyle='#ffcc00';
    bullets.forEach(b=>{
      ctx.fillRect(b.x-2,b.y-4,4,8);
    });
    // Enemy bullets
    ctx.fillStyle='#ff4444';
    let ebs=enemies.filter(e=>e._lastBullet).map(e=>{
      const b=e._lastBullet;delete e._lastBullet;
      return{x:b.x,y:b.y};
    });
    ebs.forEach(b=>{ctx.fillRect(b.x-2,b.y-4,4,8);});

    // Draw enemies
    enemies.forEach(e=>drawEnemy(e.x,e.y,e.w,e.h));
    // Draw player
    if(p.invuln<=0||Math.floor(frame/4)%2===0){
      drawPlayer(p.x,p.y);
    }
    // Draw explosions
    explosions.forEach(drawExplosion);
    // HUD
    drawHUD();
  }
  ctx.restore();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input handlers
canvas.addEventListener('touchstart',(e)=>{
  e.preventDefault();
  const t=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const x=(t.clientX-rect.left)*(W/rect.width);
  const y=(t.clientY-rect.top)*(H/rect.height);
  if(state==='menu'){
    // Start game
    init();state='playing';
  } else if(state==='gameover'){
    init();state='playing';
  } else {
    touch.active=true;touch.x=x;touch.y=y;
  }
},{passive:false});

canvas.addEventListener('touchmove',(e)=>{
  e.preventDefault();
  const t=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  const x=(t.clientX-rect.left)*(W/rect.width);
  const y=(t.clientY-rect.top)*(H/rect.height);
  touch.x=x;touch.y=y;
},{passive:false});

canvas.addEventListener('touchend',(e)=>{
  e.preventDefault();touch.active=false;
},{passive:false});

// Mouse fallback
canvas.addEventListener('mousedown',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(W/rect.width);
  const y=(e.clientY-rect.top)*(H/rect.height);
  if(state==='menu'){init();state='playing';}
  else if(state==='gameover'){init();state='playing';}
  else{touch.active=true;touch.x=x;touch.y=y;}
});

canvas.addEventListener('mousemove',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const x=(e.clientX-rect.left)*(W/rect.width);
  const y=(e.clientY-rect.top)*(H/rect.height);
  touch.x=x;touch.y=y;
});

canvas.addEventListener('mouseup',()=>{touch.active=false;});

// Keyboard
window.addEventListener('keydown',(e)=>{keys[e.key]=true;if(e.key===' ')e.preventDefault();});
window.addEventListener('keyup',(e)=>{keys[e.key]=false;});

// Start!
loop();
</script>
</body>
</html>
