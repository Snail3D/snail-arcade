<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Belay of Faith</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    touch-action: none;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(6, 6, 18, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    gap: 24px;
  }
  #overlay.hidden { display: none; }
  .title {
    font-size: clamp(24px, 6vw, 52px);
    font-weight: 900;
    color: #00f5ff;
    text-shadow: 0 0 20px #00f5ff88, 0 0 60px #ff00aa55;
    letter-spacing: 2px;
    text-align: center;
  }
  .subtitle {
    color: #ff00aa;
    font-size: clamp(10px, 2.5vw, 16px);
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
    text-shadow: 0 0 10px #ff00aa;
  }
  .start-btn {
    padding: 16px 48px;
    font-family: 'Orbitron', monospace;
    font-size: clamp(14px, 3vw, 20px);
    font-weight: 700;
    background: transparent;
    border: 2px solid #00f5ff;
    color: #00f5ff;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
    text-shadow: 0 0 10px #00f5ff;
    box-shadow: 0 0 20px #00f5ff44, inset 0 0 20px #00f5ff11;
  }
  .start-btn:hover, .start-btn:active {
    background: #00f5ff22;
    box-shadow: 0 0 40px #00f5ff88, inset 0 0 30px #00f5ff33;
    transform: scale(1.05);
  }
  .score-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    font-size: clamp(10px, 2.5vw, 14px);
    color: #00f5ff;
    text-shadow: 0 0 8px #00f5ff;
    z-index: 5;
    pointer-events: none;
  }
  .score-bar span { color: #ff00aa; text-shadow: 0 0 8px #ff00aa; }
</style>
</head>
<body>
<div id="overlay">
  <div class="title">BELAY OF FAITH</div>
  <div class="subtitle">Climb higher, maker.<br>Dodge the falling debris.<br>Collect the blessing sparks.<br>Keep the faith.</div>
  <button class="start-btn" onclick="startGame()">BEGIN ASCENT</button>
</div>
<div class="score-bar" id="scoreBar" style="display:none">
  <div>SCORE: <span id="scoreDisp">0</span></div>
  <div>BEST: <span id="bestDisp">0</span></div>
</div>
<canvas id="c"></canvas>
<script>
// === GAME ENGINE ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreBar = document.getElementById('scoreBar');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === STATE ===
let gameState = 'menu'; // menu, playing, gameover
let score = 0;
let bestScore = parseInt(localStorage.getItem('belayBest') || '0');
let frame = 0;
let scrollY = 0;
let scrollSpeed = 1.2;

// Player
let player = { x: 0, y: 0, vx: 0, vy: 0, w: 32, h: 40, grounded: false };

// World objects
let platforms = [];
let sparks = [];
let debris = [];
let particles = [];

let touchX = null;
let keys = { left: false, right: false };

// === INIT ===
function initGame() {
  score = 0;
  frame = 0;
  scrollY = 0;
  scrollSpeed = 1.2;
  platforms = [];
  sparks = [];
  debris = [];
  particles = [];

  player.x = W / 2 - player.w / 2;
  player.y = H - 160;
  player.vx = 0;
  player.vy = 0;
  player.grounded = false;

  // Starting platforms
  platforms.push({ x: W / 2 - 60, y: H - 120, w: 120, h: 12 });
  for (let i = 0; i < 8; i++) {
    spawnPlatform(H - 200 - i * 90);
  }
}

function spawnPlatform(y) {
  const pw = 80 + Math.random() * 80;
  platforms.push({
    x: Math.random() * (W - pw),
    y: y,
    w: pw,
    h: 12
  });
}

function spawnSpark(y) {
  sparks.push({
    x: Math.random() * (W - 20),
    y: y,
    w: 16,
    h: 16,
    angle: 0,
    pulse: 0
  });
}

function spawnDebris() {
  const types = ['wrench', 'gear', 'bolt', 'drop'];
  debris.push({
    x: Math.random() * (W - 20),
    y: -20,
    w: 18,
    h: 18,
    vy: 1.5 + Math.random() * 2,
    type: types[Math.floor(Math.random() * types.length)],
    angle: 0,
    spin: (Math.random() - 0.5) * 0.15
  });
}

function spawnParticle(x, y, color) {
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 6,
    vy: -Math.random() * 4 - 1,
    life: 30 + Math.random() * 20,
    color,
    size: 3 + Math.random() * 4
  });
}

// === UPDATE ===
function update() {
  if (gameState !== 'playing') return;
  frame++;

  // Scroll
  scrollY += scrollSpeed;
  score = Math.floor(scrollY / 10);
  scrollSpeed = 1.2 + score * 0.0003;

  // Player input
  const accel = 0.8;
  const maxSpd = 6;
  const friction = 0.85;

  if (keys.left || (touchX !== null && touchX < W / 2)) {
    player.vx -= accel;
  } else if (keys.right || (touchX !== null && touchX >= W / 2)) {
    player.vx += accel;
  } else {
    player.vx *= friction;
  }
  player.vx = Math.max(-maxSpd, Math.min(maxSpd, player.vx));

  // Gravity
  player.vy += 0.4;
  player.vy = Math.min(player.vy, 12);

  player.x += player.vx;
  player.y += player.vy;

  // Wrap horizontally
  if (player.x + player.w < 0) player.x = W;
  if (player.x > W) player.x = -player.w;

  // Platform collision (top only)
  player.grounded = false;
  for (const p of platforms) {
    const py = p.y - scrollY;
    if (
      player.vy >= 0 &&
      player.x + player.w > p.x &&
      player.x < p.x + p.w &&
      player.y + player.h >= py &&
      player.y + player.h <= py + p.h + player.vy + 2
    ) {
      player.y = py - player.h;
      player.vy = 0;
      player.grounded = true;
    }
  }

  // Spark collection
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    const sy = s.y - scrollY;
    s.pulse += 0.1;
    if (
      player.x + player.w > s.x &&
      player.x < s.x + s.w &&
      player.y + player.h > sy &&
      player.y < sy + s.h
    ) {
      score += 50;
      for (let j = 0; j < 8; j++) spawnParticle(s.x + 8, sy + 8, '#00f5ff');
      sparks.splice(i, 1);
      continue;
    }
    if (sy > H + 40) sparks.splice(i, 1);
  }

  // Debris update & collision
  for (let i = debris.length - 1; i >= 0; i--) {
    const d = debris[i];
    d.y += d.vy;
    d.angle += d.spin;
    const dy = d.y - scrollY;
    if (
      player.x + player.w > d.x &&
      player.x < d.x + d.w &&
      player.y + player.h > dy &&
      player.y < dy + d.h
    ) {
      // Hit!
      for (let j = 0; j < 20; j++) spawnParticle(player.x + player.w / 2, player.y + player.h / 2, '#ff00aa');
      gameState = 'gameover';
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('belayBest', bestScore);
      }
      return;
    }
    if (dy > H + 40) { debris.splice(i, 1); continue; }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Spawn platforms
  const topPlatform = platforms.reduce((a, b) => a.y < b.y ? a : b);
  while (topPlatform.y - scrollY < H + 200) {
    const newY = topPlatform.y - (80 + Math.random() * 60);
    spawnPlatform(newY);
    if (Math.random() < 0.5) spawnSpark(newY - 40);
    break;
  }
  platforms = platforms.filter(p => p.y - scrollY < H + 100);

  // Spawn debris
  if (frame > 60 && Math.random() < 0.02 + score * 0.0001) {
    spawnDebris();
  }

  // Death by falling
  if (player.y - scrollY > H + 50) {
    gameState = 'gameover';
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('belayBest', bestScore);
    }
  }
}

// === RENDER ===
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a18');
  grad.addColorStop(1, '#12081f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid lines (scrolling)
  ctx.strokeStyle = '#00f5ff11';
  ctx.lineWidth = 1;
  const gridSize = 50;
  const offsetY = scrollY % gridSize;
  for (let y = -gridSize + offsetY; y < H + gridSize; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }

  // Platforms
  for (const p of platforms) {
    const py = p.y - scrollY;
    if (py < -20 || py > H + 20) continue;
    ctx.fillStyle = '#1a1a2e';
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 2;
    roundRect(ctx, p.x, py, p.w, p.h, 4);
    ctx.fill();
    ctx.stroke();
    // Glow
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Sparks
  for (const s of sparks) {
    const sy = s.y - scrollY;
    if (sy < -30 || sy > H + 30) continue;
    const pulse = Math.sin(s.pulse) * 3;
    ctx.save();
    ctx.translate(s.x + 8, sy + 8);
    ctx.rotate(s.angle);
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 15 + pulse;
    // Star shape
    ctx.fillStyle = '#00f5ff';
    drawStar(ctx, 0, 0, 5, 8 + pulse, 4 + pulse / 2);
    ctx.fill();
    ctx.restore();
  }

  // Debris
  for (const d of debris) {
    const dy = d.y - scrollY;
    if (dy < -30 || dy > H + 30) continue;
    ctx.save();
    ctx.translate(d.x + d.w / 2, dy + d.h / 2);
    ctx.rotate(d.angle);
    ctx.shadowColor = '#ff00aa';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff00aa';
    if (d.type === 'wrench') {
      // Wrench shape
      ctx.fillRect(-8, -3, 16, 6);
      ctx.fillRect(-8, -6, 5, 12);
      ctx.fillRect(5, -6, 5, 12);
    } else if (d.type === 'gear') {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const r = i % 2 === 0 ? 9 : 5;
        const px = Math.cos(a) * r;
        const py2 = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py2);
        else ctx.lineTo(px, py2);
      }
      ctx.closePath();
      ctx.fill();
    } else if (d.type === 'bolt') {
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-3, -10, 6, 4);
    } else {
      // Drop
      ctx.beginPath();
      ctx.moveTo(0, -9);
      ctx.bezierCurveTo(8, -2, 8, 8, 0, 9);
      ctx.bezierCurveTo(-8, 8, -8, -2, 0, -9);
      ctx.fill();
    }
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Player
  if (gameState === 'playing' || gameState === 'gameover') {
    const px = player.x;
    const py = player.y - scrollY;
    if (py > -60 && py < H + 60) {
      drawPlayer(ctx, px, py);
    }
  }

  // Film grain
  if (gameState === 'playing') {
    applyGrain(ctx, W, H, 0.03);
  }

  // Game over overlay
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(6, 6, 18, 0.85)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff00aa';
    ctx.shadowColor = '#ff00aa';
    ctx.shadowBlur = 20;
    ctx.font = `bold ${Math.min(48, W / 8)}px Orbitron`;
    ctx.fillText('FAITH FALTERED', W / 2, H / 2 - 40);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#00f5ff';
    ctx.font = `${Math.min(24, W / 15)}px Orbitron`;
    ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 10);
    ctx.fillStyle = '#ff00aa88';
    ctx.font = `${Math.min(16, W / 22)}px Orbitron`;
    ctx.fillText(`BEST: ${bestScore}`, W / 2, H / 2 + 45);
    ctx.fillStyle = '#ffffff66';
    ctx.font = `${Math.min(14, W / 26)}px Orbitron`;
    ctx.fillText('TAP OR PRESS ANY KEY TO RETRY', W / 2, H / 2 + 90);
  }

  // Update score display
  if (scoreBar.style.display !== 'none') {
    document.getElementById('scoreDisp').textContent = score;
    document.getElementById('bestDisp').textContent = bestScore;
  }
}

// === DRAWING HELPERS ===
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = Math.PI / 2 * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
}

function drawPlayer(ctx, x, y) {
  ctx.save();
  ctx.translate(x + player.w / 2, y + player.h / 2);

  // Body
  ctx.fillStyle = '#0a0a18';
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 15;

  // Torso
  roundRect(ctx, -10, -8, 20, 18, 4);
  ctx.fill();
  ctx.stroke();

  // Head
  ctx.beginPath();
  ctx.arc(0, -14, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Arms (raised as if climbing)
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#00f5ff';
  ctx.beginPath();
  ctx.moveTo(-10, -4);
  ctx.lineTo(-18, -14);
  ctx.moveTo(10, -4);
  ctx.lineTo(18, -14);
  ctx.stroke();

  // Legs
  ctx.beginPath();
  ctx.moveTo(-6, 10);
  ctx.lineTo(-8, 20);
  ctx.moveTo(6, 10);
  ctx.lineTo(8, 20);
  ctx.stroke();

  // Halo glow
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 20;
  ctx.strokeStyle = '#ffff0066';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, -24, 8, 3, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

let grainCanvas = null;
function applyGrain(ctx, w, h, intensity) {
  if (!grainCanvas) grainCanvas = document.createElement('canvas');
  grainCanvas.width = w;
  grainCanvas.height = h;
  const gctx = grainCanvas.getContext('2d');
  const imgData = gctx.createImageData(w, h);
  const data = imgData.data;
  for (let i = 0; i < data.length; i += 4) {
    const v = Math.random() * 255 * intensity;
    data[i] = v;
    data[i + 1] = v;
    data[i + 2] = v;
    data[i + 3] = 20;
  }
  gctx.putImageData(imgData, 0, 0);
  ctx.drawImage(grainCanvas, 0, 0);
}

// === GAME LOOP ===
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();

// === INPUT ===
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (gameState === 'gameover') startGame();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'gameover') { startGame(); return; }
  touchX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchX = null;
  if (gameState === 'gameover') startGame();
}, { passive: false });

document.getElementById('overlay').addEventListener('click', () => {});

// === START ===
function startGame() {
  overlay.classList.add('hidden');
  scoreBar.style.display = 'flex';
  initGame();
  gameState = 'playing';
}
</script>
</body>
</html>
