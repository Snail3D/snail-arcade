<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snail Shopping Spree</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    #game-container {
      width: 100%;
      max-width: 400px;
      height: 100vh;
      background: #f8f9fa;
      position: relative;
      overflow: hidden;
    }
    
    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    #score {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
    
    #timer {
      font-size: 16px;
      color: #e74c3c;
      font-weight: bold;
    }
    
    #game-area {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 120px;
      overflow: hidden;
    }
    
    #snail {
      position: absolute;
      width: 40px;
      height: 40px;
      background: #3498db;
      border-radius: 50%;
      transition: left 0.1s ease;
      z-index: 50;
    }
    
    #snail::before {
      content: "🐌";
      position: absolute;
      top: 5px;
      left: 5px;
      font-size: 30px;
    }
    
    .item {
      position: absolute;
      width: 30px;
      height: 30px;
      font-size: 25px;
      text-align: center;
      line-height: 30px;
      z-index: 40;
    }
    
    .obstacle {
      position: absolute;
      width: 25px;
      height: 25px;
      background: #e74c3c;
      border-radius: 50%;
      z-index: 35;
    }
    
    #controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 100;
    }
    
    .control-btn {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 50%;
      background: #3498db;
      color: white;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    
    .control-btn:active {
      background: #2980b9;
      transform: scale(0.95);
    }
    
    #start-screen, #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      color: white;
    }
    
    #start-screen h1, #game-over-screen h1 {
      font-size: 28px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .start-btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background: #3498db;
      color: white;
      cursor: pointer;
      margin: 10px;
    }
    
    .start-btn:active {
      background: #2980b9;
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="header">
      <div id="score">Score: 0</div>
      <div id="timer">Time: 60</div>
    </div>
    
    <div id="game-area">
      <div id="snail"></div>
    </div>
    
    <div id="controls">
      <button class="control-btn" id="left-btn">←</button>
      <button class="control-btn" id="right-btn">→</button>
    </div>
    
    <div id="start-screen">
      <h1>🐌 Snail Shopping Spree 🛒</h1>
      <p>Collect items, avoid obstacles!</p>
      <button class="start-btn" id="start-game">Start Shopping!</button>
    </div>
    
    <div id="game-over-screen" class="hidden">
      <h1>Time's Up!</h1>
      <p id="final-score">Score: 0</p>
      <button class="start-btn" id="restart-game">Shop Again!</button>
    </div>
  </div>

  <script>
    class SnailShoppingSpree {
      constructor() {
        this.snail = document.getElementById('snail');
        this.gameArea = document.getElementById('game-area');
        this.scoreElement = document.getElementById('score');
        this.timerElement = document.getElementById('timer');
        this.startScreen = document.getElementById('start-screen');
        this.gameOverScreen = document.getElementById('game-over-screen');
        this.finalScoreElement = document.getElementById('final-score');
        
        this.snailX = 180;
        this.snailY = 200;
        this.score = 0;
        this.timeLeft = 60;
        this.gameRunning = false;
        this.items = [];
        this.obstacles = [];
        this.gameSpeed = 2;
        
        this.setupEventListeners();
        this.updateSnailPosition();
      }
      
      setupEventListeners() {
        document.getElementById('start-game').addEventListener('click', () => this.startGame());
        document.getElementById('restart-game').addEventListener('click', () => this.restartGame());
        
        // Touch/mouse controls for snail
        this.gameArea.addEventListener('click', (e) => {
          if (this.gameRunning) {
            const rect = this.gameArea.getBoundingClientRect();
            this.snailX = e.clientX - rect.left - 20;
            this.updateSnailPosition();
          }
        });
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
          if (!this.gameRunning) return;
          
          switch(e.key) {
            case 'ArrowLeft':
              this.snailX = Math.max(0, this.snailX - 30);
              this.updateSnailPosition();
              break;
            case 'ArrowRight':
              this.snailX = Math.min(this.gameArea.offsetWidth - 40, this.snailX + 30);
              this.updateSnailPosition();
              break;
          }
        });
        
        // Mobile controls
        document.getElementById('left-btn').addEventListener('click', () => {
          if (this.gameRunning) {
            this.snailX = Math.max(0, this.snailX - 40);
            this.updateSnailPosition();
          }
        });
        
        document.getElementById('right-btn').addEventListener('click', () => {
          if (this.gameRunning) {
            this.snailX = Math.min(this.gameArea.offsetWidth - 40, this.snailX + 40);
            this.updateSnailPosition();
          }
        });
      }
      
      startGame() {
        this.startScreen.classList.add('hidden');
        this.gameRunning = true;
        this.score = 0;
        this.timeLeft = 60;
        this.items = [];
        this.obstacles = [];
        this.gameSpeed = 2;
        
        this.updateScore();
        this.updateTimer();
        this.gameLoop();
        this.spawnItems();
        this.spawnObstacles();
      }
      
      restartGame() {
        this.gameOverScreen.classList.add('hidden');
        this.startGame();
      }
      
      updateSnailPosition() {
        this.snail.style.left = this.snailX + 'px';
        this.snail.style.top = this.snailY + 'px';
      }
      
      updateScore() {
        this.scoreElement.textContent = `Score: ${this.score}`;
      }
      
      updateTimer() {
        this.timerElement.textContent = `Time: ${this.timeLeft}`;
      }
      
      spawnItems() {
        if (!this.gameRunning) return;
        
        const itemEmojis = ['🥑', '🍎', '🥛', '🍞', '🧀', '🥕', '🍌', '🥦'];
        const item = document.createElement('div');
        item.className = 'item';
        item.textContent = itemEmojis[Math.floor(Math.random() * itemEmojis.length)];
        item.style.left = Math.random() * (this.gameArea.offsetWidth - 30) + 'px';
        item.style.top = '-30px';
        
        this.gameArea.appendChild(item);
        this.items.push({
          element: item,
          x: parseFloat(item.style.left),
          y: -30,
          collected: false
        });
        
        setTimeout(() => this.spawnItems(), 1000 + Math.random() * 1500);
      }
      
      spawnObstacles() {
        if (!this.gameRunning) return;
        
        const obstacle = document.createElement('div');
        obstacle.className = 'obstacle';
        obstacle.style.left = Math.random() * (this.gameArea.offsetWidth - 25) + 'px';
        obstacle.style.top = '-25px';
        
        this.gameArea.appendChild(obstacle);
        this.obstacles.push({
          element: obstacle,
          x: parseFloat(obstacle.style.left),
          y: -25,
          hit: false
        });
        
        setTimeout(() => this.spawnObstacles(), 2000 + Math.random() * 2000);
      }
      
      gameLoop() {
        if (!this.gameRunning) return;
        
        // Update items
        for (let i = this.items.length - 1; i >= 0; i--) {
          const item = this.items[i];
          item.y += this.gameSpeed;
          item.element.style.top = item.y + 'px';
          
          // Check collection
          if (!item.collected && 
              Math.abs(this.snailX - item.x) < 35 && 
              Math.abs(this.snailY - item.y) < 35) {
            item.collected = true;
            this.score += 10;
            this.updateScore();
            item.element.remove();
            this.items.splice(i, 1);
          }
          
          // Remove if off screen
          if (item.y > this.gameArea.offsetHeight) {
            item.element.remove();
            this.items.splice(i, 1);
          }
        }
        
        // Update obstacles
        for (let i = this.obstacles.length - 1; i >= 0; i--) {
          const obstacle = this.obstacles[i];
          obstacle.y += this.gameSpeed;
          obstacle.element.style.top = obstacle.y + 'px';
          
          // Check collision
          if (!obstacle.hit && 
              Math.abs(this.snailX - obstacle.x) < 30 && 
              Math.abs(this.snailY - obstacle.y) < 30) {
            obstacle.hit = true;
            this.score = Math.max(0, this.score - 15);
            this.updateScore();
            obstacle.element.style.background = '#f39c12';
          }
          
          // Remove if off screen
          if (obstacle.y > this.gameArea.offsetHeight) {
            obstacle.element.remove();
            this.obstacles.splice(i, 1);
          }
        }
        
        // Increase difficulty over time
        if (this.timeLeft % 10 === 0) {
          this.gameSpeed = Math.min(5, this.gameSpeed + 0.1);
        }
        
        requestAnimationFrame(() => this.gameLoop());
      }
      
      timer() {
        if (!this.gameRunning) return;
        
        this.timeLeft--;
        this.updateTimer();
        
        if (this.timeLeft <= 0) {
          this.endGame();
        } else {
          setTimeout(() => this.timer(), 1000);
        }
      }
      
      endGame() {
        this.gameRunning = false;
        this.finalScoreElement.textContent = `Score: ${this.score}`;
        this.gameOverScreen.classList.remove('hidden');
      }
    }
    
    // Start the game
    new SnailShoppingSpree();
  </script>
</body>
</html>
